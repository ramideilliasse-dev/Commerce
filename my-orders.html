 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
content="#ff6a00">

<title>Meus Pedidos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#f5f6fb;

color:#222;

}

/* ===========================
HEADER
=========================== */

.header{

position:fixed;

top:0;

left:0;

right:0;

height:70px;

background:white;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 4px 15px rgba(0,0,0,.08);

z-index:100;

}

.backBtn{

position:absolute;

left:15px;

width:42px;

height:42px;

border:none;

border-radius:50%;

background:#f2f2f2;

font-size:20px;

cursor:pointer;

}

.title{

font-size:22px;

font-weight:bold;

color:#ff6a00;

}

/* ===========================
CONTAINER
=========================== */

.container{

padding:

90px 15px

120px;

}

/* ===========================
ORDER CARD
=========================== */

.orderCard{

background:white;

border-radius:18px;

padding:18px;

margin-bottom:18px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

}

/* ===========================
TOP
=========================== */

.orderTop{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.orderNumber{

font-size:15px;

font-weight:bold;

}

.orderDate{

font-size:12px;

color:#777;

margin-top:5px;

}

/* ===========================
STATUS
=========================== */

.status{

padding:7px 14px;

border-radius:20px;

font-size:12px;

font-weight:bold;

color:white;

}

.pending{

background:#ff9800;

}

.accepted{

background:#2196f3;

}

.preparing{

background:#673ab7;

}

.shipping{

background:#00bcd4;

}

.delivered{

background:#16a34a;

}

.cancelled{

background:#dc2626;

}

/* ===========================
PRODUCT
=========================== */

.orderItem{

display:flex;

gap:12px;

margin-top:15px;

padding-top:15px;

border-top:1px solid #eee;

}

.orderImage{

width:70px;

height:70px;

border-radius:12px;

object-fit:cover;

background:#f4f4f4;

}

.orderInfo{

flex:1;

}

.productName{

font-weight:bold;

font-size:15px;

margin-bottom:6px;

}

.productQty{

font-size:13px;

color:#666;

}

.productPrice{

margin-top:6px;

color:#ff6a00;

font-weight:bold;

}

/* ===========================
TOTAL
=========================== */

.total{

margin-top:18px;

padding-top:15px;

border-top:1px solid #eee;

display:flex;

justify-content:space-between;

font-size:18px;

font-weight:bold;

}

/* ===========================
TIMELINE
=========================== */

.timeline{

margin-top:20px;

padding-top:15px;

border-top:1px dashed #ddd;

}

.timelineTitle{

font-weight:bold;

margin-bottom:12px;

}

.timelineItem{

display:flex;

gap:10px;

margin-bottom:10px;

font-size:13px;

}

.timelineDot{

width:10px;

height:10px;

background:#16a34a;

border-radius:50%;

margin-top:4px;

}

/* ===========================
EMPTY
=========================== */

.empty{

text-align:center;

padding:80px 20px;

color:#777;

font-size:16px;

}

/* ===========================
LOADER
=========================== */

.loader{

text-align:center;

padding:80px;

font-size:16px;

}

/* ===========================
BUTTON
=========================== */

.actionBtn{

margin-top:15px;

height:46px;

border:none;

border-radius:14px;

background:#ff6a00;

color:white;

font-size:15px;

font-weight:bold;

cursor:pointer;

width:100%;

}

/* ===========================
TOAST
=========================== */

.toastBox{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

z-index:99999;

}

</style>

</head>

<body>

<div class="header">

<button
class="backBtn"
onclick="history.back()">

←

</button>

<div class="title">

📦 Meus Pedidos

</div>

</div>

<div class="container">

<div
id="ordersContainer"
class="loader">

Carregando pedidos...

</div>
<!-- ===========================
TOAST
=========================== -->

<div
id="toastBox"
class="toastBox">

</div>

<!-- ===========================
LOADER OVERLAY
=========================== -->

<div
id="loaderOverlay"

style="
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
justify-content:center;
align-items:center;
z-index:999999;
">

<div
style="
background:white;
padding:30px;
border-radius:18px;
text-align:center;
width:260px;
">

<div

style="
width:45px;
height:45px;
border:5px solid #eee;
border-top:5px solid #ff6a00;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
">

</div>

<p

style="
margin-top:20px;
font-weight:bold;
">

Carregando...

</p>

</div>

</div>

<style>

@keyframes spin{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

</style>

</div>

<!-- ===========================
MY ORDERS JS
=========================== -->

<script
type="module"
src="./js/my-orders.js">

</script>

<!-- ===========================
SERVICE WORKER
=========================== -->

<script>

window.addEventListener("load",()=>{

if("serviceWorker" in navigator){

navigator.serviceWorker

.register("/service-worker.js")

.then(()=>{

console.log("✅ Service Worker OK");

})

.catch(console.error);

}

});

</script>

</body>

</html>

 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>Marketplace Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang{
background:white;
color:#ff6a00;
border:none;
padding:5px 10px;
border-radius:5px;
}

/* SEARCH */

.searchBox{
background:white;
padding:10px;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:25px;
border:2px solid #ff6a00;
}

/* CATEGORIES */

.categories{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
}

.cat{
background:white;
padding:10px;
border-radius:10px;
min-width:100px;
text-align:center;
font-size:13px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* SLIDER */

.banner{
margin:10px;
background:linear-gradient(45deg,#ff6a00,#ff9900);
color:white;
padding:30px;
border-radius:10px;
text-align:center;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#ff6a00;
font-weight:bold;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:6px 8px;
border-radius:6px;
margin-top:5px;
}

/* NAVBAR */

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
font-size:12px;
}

</style>

</head>

<body>


<div class="header">

<span>Marketplace Angola</span>

<select id="lang" class="lang">

<option value="pt">Português</option>

<option value="fr">Français</option>

</select>

</div>



<div class="searchBox">

<input id="search" placeholder="Procurar produto...">

</div>



<!-- CATEGORIES -->

<div class="categories">

<div class="cat">📱 Telefones</div>

<div class="cat">👕 Roupas</div>

<div class="cat">💄 Beleza</div>

<div class="cat">💻 Eletrónica</div>

<div class="cat">🏠 Casa</div>

<div class="cat">🚗 Auto</div>

</div>



<!-- BANNER -->

<div class="banner">

<h2>Compre direto do vendedor</h2>

<p>Produtos de comerciantes de Angola</p>

</div>



<!-- PRODUCTS -->

<div id="productList" class="products"></div>



<!-- NAVBAR -->

<div class="nav">

<div>🏠<br>Início</div>

<div>📦<br>Categorias</div>

<div>💬<br>Mensagens</div>

<div>🛒<br>Carrinho</div>

<div>👤<br>Conta</div>

</div>



<script type="module">

import { db } from "./firebase.js";

import {

collection,
getDocs

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let products=[];

async function loadProducts(){

const snap = await getDocs(collection(db,"products"));

const container=document.getElementById("productList");

container.innerHTML="";

products=[];

snap.forEach(docSnap=>{

const data=docSnap.data();

data.id=docSnap.id;

products.push(data);

container.innerHTML+=`

<div class="product">

<img src="${data.image}">

<h4>${data.name}</h4>

<div class="price">${data.price} Kz</div>

<button onclick="viewProduct('${data.id}')">

Ver produto

</button>

<button onclick="viewShop('${data.merchantId}')">

Loja

</button>

</div>

`;

});

}

window.viewProduct=function(id){

window.location.href="product.html?id="+id;

}

window.viewShop=function(id){

window.location.href="merchant-shop.html?id="+id;

}


/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase();

const container=document.getElementById("productList");

container.innerHTML="";

products.forEach(p=>{

if(p.name.toLowerCase().includes(value)){

container.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h4>${p.name}</h4>

<div class="price">${p.price} Kz</div>

<button onclick="viewProduct('${p.id}')">

Ver produto

</button>

<button onclick="viewShop('${p.merchantId}')">

Loja

</button>

</div>

`;

}

});

});

loadProducts();

</script>

</body>

</html>

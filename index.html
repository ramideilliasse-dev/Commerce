 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Online Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* 🔥 HEADER FIXE */
.header{
position:fixed;
top:0;
left:0;
right:0;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.headerRight{
display:flex;
gap:10px;
}

.profile{
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;
}

.accountBtn{
background:black;
color:white;
border:none;
padding:6px 12px;
border-radius:20px;
}

/* 🔥 SEARCH FIXE */
.searchBox{
position:fixed;
top:65px;
left:0;
right:0;
background:white;
padding:10px;
z-index:999;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid #ddd;
}

/* 🔥 MESSAGE ANIMÉ */
.banner{
margin-top:120px;
background:#ff6a00;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
animation:slide 2s infinite alternate;
}

@keyframes slide{
from{opacity:0.5;transform:translateY(0);}
to{opacity:1;transform:translateY(-3px);}
}

/* PRODUCTS */
.products{
column-count:2;
column-gap:12px;
padding:12px;
padding-bottom:80px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:12px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
}

.product img{
width:100%;
}

.info{
padding:10px;
}

.name{font-weight:bold;}
.price{color:#ff6a00;font-weight:bold;}
.desc{font-size:13px;color:#555;}

.badge{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

/* 🔥 CART BUTTON */
.cartBtn{
position:absolute;
right:10px;
bottom:10px;
background:#1aa34a;
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* 🔥 NAV FIXE */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
z-index:1000;
}

.nav div{
text-align:center;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping Online 🇦🇴</div>

<div class="headerRight">
<img id="profilePic" class="profile">
<input type="file" id="profileUpload" hidden>
<button id="accountButton" class="accountBtn">Criar conta</button>
</div>
</div>

<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
</div>

<!-- 🔥 MESSAGE PRO -->
<div class="banner">
🔥 Promoções incríveis hoje • Entrega rápida em Angola 🚀
</div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='messages.html'">💬<br>Mensagens</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let products=[]

/* PROFILE */
const profilePic=document.getElementById("profilePic")
const upload=document.getElementById("profileUpload")

profilePic.onclick=()=>upload.click()

upload.onchange=function(){
const url=URL.createObjectURL(this.files[0])
profilePic.src=url
localStorage.setItem("profilePic",url)
}

profilePic.src=localStorage.getItem("profilePic") || "https://via.placeholder.com/35"

/* ACCOUNT */
const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth,(user)=>{
if(user){
accountButton.innerText="Minha Loja"
accountButton.onclick=()=>location.href="merchant-shop.html"
}else{
accountButton.innerText="Criar conta"
accountButton.onclick=()=>location.href="merchant-register.html"
}
})

/* PRODUCT CARD PRO */
function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"
const desc = p.description?.slice(0,50) || ""

if(p.category==="restaurant"){
return `
<div class="product">

<div class="badge">🍽️ Restaurante</div>

<div onclick="openProduct('${p.id}')">
<img src="${img}">
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>

<!-- 🔥 UX PRO -->
<button onclick="openProduct('${p.id}')">Ver prato</button>
<button onclick="addToCart('${p.id}')" style="background:#1aa34a;color:white;border:none;padding:8px;border-radius:8px;width:100%;margin-top:5px;">
Adicionar 🛒
</button>

</div>
</div>
`
}

/* NORMAL */
return `
<div class="product" onclick="openProduct('${p.id}')">

<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>

<img src="${img}">

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>
</div>

</div>
`
}

/* LOAD */
async function loadProducts(){
const snap=await getDocs(collection(db,"products"))
const container=document.getElementById("productList")
container.innerHTML=""
products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
container.innerHTML+=productHTML(data)
})
}

/* OPEN */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* CART */
window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product){
alert("Erro produto ❌")
return
}

const exist = cart.find(p => p.id === id)

if(exist){
exist.qty++
}else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.images?.[0] || "",
qty:1,
merchantId:product.merchantId || "unknown"
})
}

localStorage.setItem("cart", JSON.stringify(cart))
alert("Adicionado 🛒")
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){

const v=this.value.toLowerCase()
const container=document.getElementById("productList")
container.innerHTML=""

products.forEach(p=>{
if(p.name.toLowerCase().includes(v)){
container.innerHTML+=productHTML(p)
}
})

})

loadProducts()

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Online Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
right:0;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{font-size:22px;font-weight:bold;}

.headerRight{
display:flex;
gap:10px;
align-items:center;
}

/* CART BADGE */
.cartIcon{
position:relative;
cursor:pointer;
font-size:22px;
}

.cartBadge{
background:red;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
position:absolute;
top:-8px;
right:-10px;
}

/* PROFILE */
.profile{
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;
}

.accountBtn{
background:black;
color:white;
border:none;
padding:6px 12px;
border-radius:20px;
}

/* SEARCH */
.searchBox{
position:fixed;
top:65px;
left:0;
right:0;
background:white;
padding:10px;
z-index:999;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid #ddd;
}

/* BANNER */
.banner{
margin-top:120px;
background:#ff6a00;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

/* PRODUCTS */
.products{
column-count:2;
column-gap:12px;
padding:12px;
padding-bottom:100px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:12px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.3s;
}

.product:hover{
transform:scale(1.03);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

/* INFO */
.info{padding:10px;}

.name{font-weight:bold;}
.price{color:#ff6a00;font-weight:bold;}
.desc{font-size:13px;color:#555;}

/* CART BTN */
.cartBtn{
position:absolute;
right:10px;
bottom:10px;
background:#1aa34a;
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
z-index:1000;
}

.nav div{
text-align:center;
font-size:13px;
cursor:pointer;
}

/* TOAST */
.toast{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 15px;
border-radius:20px;
display:none;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<img id="profilePic" class="profile">
<input type="file" id="profileUpload" hidden>

<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
</div>

<div class="banner">
🔥 Promoções hoje • Entrega rápida 🚀
</div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='messages.html'">💬<br>Mensagens</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let products=[]

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}

/* CART COUNT (FIX IMPORTANT) */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")

let total = 0
cart.forEach(i=> total += i.qty || 1)

document.getElementById("cartCount").innerText = total
}
updateCartCount()

/* PROFILE */
const profilePic=document.getElementById("profilePic")
const upload=document.getElementById("profileUpload")

profilePic.onclick=()=>upload.click()

upload.onchange=function(){
const url=URL.createObjectURL(this.files[0])
profilePic.src=url
localStorage.setItem("profilePic",url)
}

profilePic.src=localStorage.getItem("profilePic") || "https://via.placeholder.com/35"

/* AUTH */
const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth, async (user)=>{

if(user){

const ref = doc(db,"users",user.uid)
let snap = await getDoc(ref)

if(!snap.exists()){
await setDoc(ref,{
email:user.email,
role:"client",
approved:false,
blocked:false,
createdAt:Date.now()
})
snap = await getDoc(ref)
}

const data = snap.data()

if(data.role === "admin" || data.role === "superadmin"){
accountButton.innerText="Admin 👑"
accountButton.onclick=()=>location.href="admin-dashboard.html"
}
else if(data.role === "merchant"){
accountButton.innerText="Minha Loja"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}
else{
accountButton.innerText="Criar loja"
accountButton.onclick=()=>location.href="settings.html"
}

}else{
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
}

})

/* PRODUCT */
function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"

return `
<div class="product" onclick="openProduct('${p.id}')">

<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>

<img src="${img}">

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${(p.description||"").slice(0,50)}</div>
</div>

</div>
`
}

/* LOAD */
async function loadProducts(){

const snap=await getDocs(collection(db,"products"))
const container=document.getElementById("productList")

container.innerHTML=""
products=[] // 🔥 FIX IMPORTANT

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
container.innerHTML+=productHTML(data)
})

}

/* OPEN */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* CART */
window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){
exist.qty++
}else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1,
merchantId:product.merchantId || ""
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()
showToast("Adicionado 🛒")

}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){

const v=this.value.toLowerCase()
const container=document.getElementById("productList")

container.innerHTML=""

products.forEach(p=>{
if(p.name.toLowerCase().includes(v)){
container.innerHTML+=productHTML(p)
}
})

})

loadProducts()

</script>

</body>
</html>

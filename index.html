 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marketplace Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
}

/* SEARCH */

.searchBox{
padding:12px;
background:white;
}

.searchBox input{
width:100%;
padding:14px;
border-radius:30px;
border:2px solid #ff6a00;
font-size:16px;
}

/* SECTION */

.section{
margin-top:10px;
background:white;
padding:12px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

/* PRODUCTS GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:6px;
cursor:pointer;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
border-radius:8px;
}

.name{
font-size:14px;
font-weight:bold;
margin-top:5px;
}

.price{
color:#ff6a00;
font-weight:bold;
}

/* SHOP */

.shop{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
cursor:pointer;
}

.shop img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.shopName{
font-weight:bold;
color:#0a7a2f;
}

</style>

</head>

<body>

<div class="header">

Marketplace Angola 🇦🇴

</div>

<div class="searchBox">

<input id="search" placeholder="Procurar produto...">

</div>

<!-- SPONSORED -->

<div class="section">

<div class="title">

⭐ Produtos patrocinados

</div>

<div id="sponsored" class="grid"></div>

</div>

<!-- POPULAR -->

<div class="section">

<div class="title">

🔥 Produtos populares

</div>

<div id="popular" class="grid"></div>

</div>

<!-- AI RECOMMEND -->

<div class="section">

<div class="title">

🤖 Recomendado para você

</div>

<div id="recommend" class="grid"></div>

</div>

<!-- SHOPS -->

<div class="section">

<div class="title">

🏪 Lojas recomendadas

</div>

<div id="shops"></div>

</div>

<!-- ALL PRODUCTS -->

<div class="section">

<div class="title">

🛍 Produtos

</div>

<div id="products" class="grid"></div>

</div>



<script type="module">

import { db } from "./firebase.js"

import {

collection,
getDocs,
query,
orderBy,
limit

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



function productCard(p){

return `

<div class="product" onclick="viewProduct('${p.id}')">

<img src="${p.image}">

<div class="name">${p.name}</div>

<div class="price">${p.price} Kz</div>

</div>

`

}


/* VIEW PRODUCT */

window.viewProduct=function(id){

location.href="product.html?id="+id

}


/* LOAD SPONSORED */

async function loadSponsored(){

const q=query(

collection(db,"products"),
orderBy("created","desc"),
limit(4)

)

const snap=await getDocs(q)

const box=document.getElementById("sponsored")

snap.forEach(doc=>{

let p=doc.data()

p.id=doc.id

box.innerHTML+=productCard(p)

})

}


/* LOAD POPULAR */

async function loadPopular(){

const q=query(

collection(db,"products"),
orderBy("sales","desc"),
limit(6)

)

const snap=await getDocs(q)

const box=document.getElementById("popular")

snap.forEach(doc=>{

let p=doc.data()

p.id=doc.id

box.innerHTML+=productCard(p)

})

}


/* LOAD AI RECOMMEND */

async function loadRecommend(){

const snap=await getDocs(collection(db,"products"))

const box=document.getElementById("recommend")

snap.forEach(doc=>{

let p=doc.data()

p.id=doc.id

if(Math.random()>0.6){

box.innerHTML+=productCard(p)

}

})

}


/* LOAD SHOPS */

async function loadShops(){

const snap=await getDocs(collection(db,"shops"))

const box=document.getElementById("shops")

snap.forEach(doc=>{

const s=doc.data()

box.innerHTML+=`

<div class="shop" onclick="openShop('${doc.id}')">

<img src="${s.logo || 'https://i.imgur.com/2DhmtJ4.png'}">

<div>

<div class="shopName">${s.name}</div>

<div>${s.followers || 0} seguidores</div>

</div>

</div>

`

})

}


/* OPEN SHOP */

window.openShop=function(id){

location.href="merchant-shop.html?id="+id

}


/* LOAD PRODUCTS */

async function loadProducts(){

const snap=await getDocs(collection(db,"products"))

const box=document.getElementById("products")

snap.forEach(doc=>{

let p=doc.data()

p.id=doc.id

box.innerHTML+=productCard(p)

})

}


loadSponsored()

loadPopular()

loadRecommend()

loadShops()

loadProducts()

</script>

</body>

</html>

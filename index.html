 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffffff,#eaeaea);
font-family:Arial;
overflow:hidden;
}

/* CONTAINER */
.container{
text-align:center;
}

/* LOGO */
.logo{
position:relative;
opacity:0;
animation:fadeIn 1.5s forwards;
}

/* BIG S */
.bigS{
font-size:90px;
color:#8B0000;
font-weight:bold;
position:absolute;
left:-20px;
top:-30px;
animation:drawS 1.5s ease forwards;
}

/* SHOPPING */
.shopping{
font-size:38px;
color:#8B0000;
font-weight:bold;
letter-spacing:1px;
}

/* ANGOLA */
.angola{
font-size:34px;
color:#111;
font-weight:bold;
margin-top:5px;
letter-spacing:2px;
}

/* BAG */
.bag{
font-size:90px;
margin-top:40px;
opacity:0;
animation:bounce 1.5s infinite, fadeIn 2s forwards 1s;
}

/* LOADING BAR */
.loader{
margin-top:20px;
width:200px;
height:6px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-left:auto;
margin-right:auto;
}

.progress{
height:100%;
width:0%;
background:#ff6a00;
animation:load 2.5s linear forwards;
}

/* TEXT */
.loadingText{
margin-top:10px;
font-size:14px;
color:#777;
letter-spacing:2px;
}

/* ANIMATIONS */
@keyframes fadeIn{
to{opacity:1;}
}

@keyframes drawS{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes load{
0%{width:0;}
100%{width:100%;}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<div class="bigS">S</div>
<div class="shopping">hopping</div>
<div class="angola">ANGOLA</div>
</div>

<div class="bag">🛍️</div>

<div class="loader">
<div class="progress"></div>
</div>

<div class="loadingText">Carregando...</div>

</div>

<script>

/* TRANSITION PREMIUM */
setTimeout(()=>{
document.body.style.transition="opacity 0.5s"
document.body.style.opacity="0"

setTimeout(()=>{
window.location.href="home.html"
},500)

},2800)

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Online Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
}

.logo{
font-size:28px;
font-weight:bold;
color:#111;
}

.accountBtn{
background:black;
color:white;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */

.searchBox{
padding:12px;
background:white;
}

.searchBox input{
width:100%;
padding:14px;
border-radius:30px;
border:1px solid #ddd;
font-size:16px;
}

/* PRODUCTS */

.products{
column-count:2;
column-gap:12px;
padding:12px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:12px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
overflow:hidden;
}

.product img{
width:100%;
display:block;
}

.info{
padding:10px;
}

.name{
font-size:15px;
font-weight:bold;
color:#111;
margin-bottom:4px;
}

.price{
color:#ff6a00;
font-weight:bold;
font-size:16px;
}

/* NAVBAR */

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

.nav div{
text-align:center;
font-size:14px;
cursor:pointer;
}

</style>

</head>

<body>


<!-- HEADER -->

<div class="header">

<div class="logo">

Shopping Online Angola 🇦🇴

</div>

<button id="accountButton" class="accountBtn">

Criar conta

</button>

</div>


<!-- SEARCH -->

<div class="searchBox">

<input id="search" placeholder="Procurar produto...">

</div>


<!-- PRODUCTS -->

<div id="productList" class="products"></div>


<!-- NAVBAR -->

<div class="nav">

<div onclick="location.href='index.html'">
🏠<br>Inicio
</div>

<div onclick="location.href='categories.html'">
📦<br>Categorias
</div>

<div onclick="location.href='messages.html'">
💬<br>Mensagens
</div>

<div onclick="location.href='cart.html'">
🛒<br>Carrinho
</div>

</div>



<script type="module">

import { db,auth } from "./firebase.js"

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"



let products=[]


/* SMART ACCOUNT BUTTON */

const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth,(user)=>{

if(user){

accountButton.innerText="Dashboard"

accountButton.onclick=function(){

location.href="merchant-dashboard.html"

}

}else{

accountButton.innerText="Criar conta"

accountButton.onclick=function(){

location.href="merchant-register.html"

}

}

})



/* PRODUCT CARD */

function productHTML(p){

const img=p.images ? p.images[0] : p.image || ""

return `

<div class="product" onclick="viewProduct('${p.id}')">

<img src="${img}">

<div class="info">

<div class="name">${p.name}</div>

<div class="price">${p.price} Kz</div>

</div>

</div>

`

}



/* LOAD PRODUCTS */

async function loadProducts(){

const snap=await getDocs(collection(db,"products"))

const container=document.getElementById("productList")

container.innerHTML=""

products=[]

snap.forEach(docSnap=>{

const data=docSnap.data()

data.id=docSnap.id

products.push(data)

container.innerHTML+=productHTML(data)

})

}



/* VIEW PRODUCT */

window.viewProduct=function(id){

location.href="product.html?id="+id

}



/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase()

const container=document.getElementById("productList")

container.innerHTML=""

products.forEach(p=>{

if(p.name.toLowerCase().includes(value)){

container.innerHTML+=productHTML(p)

}

})

})


loadProducts()

</script>

</body>

</html>

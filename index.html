 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
<title>Toma</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#111827,#1f2937,#0f172a);
font-family:Arial;
overflow:hidden;
color:white;
}

/* BACKGROUND GLOW */
.bgGlow{
position:absolute;
width:300px;
height:300px;
background:#ff6a00;
filter:blur(120px);
opacity:0.25;
border-radius:50%;
animation:moveGlow 6s infinite alternate;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
text-align:center;
animation:fadeUp 1.2s ease;
}

/* APP ICON */
.logoBox{
width:120px;
height:120px;
margin:auto;
border-radius:30px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 10px 40px rgba(0,0,0,0.4),
0 0 30px rgba(255,106,0,0.25);

animation:pulse 2s infinite;
}

/* LOGO LETTER */
.logo{
font-size:70px;
font-weight:bold;
color:#ff6a00;
}

/* APP NAME */
.appName{
margin-top:25px;
font-size:34px;
font-weight:bold;
letter-spacing:1px;
}

.appName span{
color:#ff6a00;
}

/* SUBTITLE */
.subtitle{
margin-top:8px;
font-size:14px;
color:#cbd5e1;
letter-spacing:3px;
}

/* LOADER */
.loader{
margin-top:35px;
width:220px;
height:6px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
margin-left:auto;
margin-right:auto;
}

.progress{
height:100%;
width:0%;
border-radius:20px;
background:linear-gradient(90deg,#ff6a00,#ff9f43);
animation:loading 2.8s linear forwards;
}

/* TEXT */
.loadingText{
margin-top:12px;
font-size:13px;
color:#aaa;
letter-spacing:2px;
}

/* ANIMATIONS */

@keyframes loading{
0%{width:0%;}
100%{width:100%;}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

@keyframes moveGlow{
0%{
transform:translate(-100px,-50px);
}
100%{
transform:translate(100px,50px);
}
}

</style>
</head>

<body>

<div class="bgGlow"></div>

<div class="container">

<div class="logoBox">
<div class="logo">T</div>
</div>

<div class="appName">
<span>T</span>oma
</div>

<div class="subtitle">
SHOPPING ANGOLA 🇦🇴
</div>

<div class="loader">
<div class="progress"></div>
</div>

<div class="loadingText">
Carregando...
</div>

</div>

<script>

/* PREMIUM TRANSITION */

setTimeout(()=>{

document.body.style.transition = "opacity 0.6s ease"
document.body.style.opacity = "0"

setTimeout(()=>{

window.location.href = "homes.html"

},600)

},3000)

</script>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

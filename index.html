<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Marketplace</title>

<link rel="stylesheet" href="style.css">

<style>

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

#search{
padding:10px;
width:200px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Marketplace</h2>

<input id="search" placeholder="Rechercher produit">

<select id="categoryFilter">

<option value="">Toutes catégories</option>
<option>Electronique</option>
<option>Téléphone</option>
<option>Vêtements</option>
<option>Maison</option>

</select>

<a href="cart.html">Panier</a>

</div>

<div class="products" id="products"></div>

</div>


<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


let allProducts=[];

const container=document.getElementById("products");


/* charger produits */

async function loadProducts(){

const snapshot=await getDocs(collection(db,"products"));

snapshot.forEach(doc=>{

allProducts.push({

id:doc.id,
...doc.data()

});

});

displayProducts(allProducts);

}


/* afficher produits */

function displayProducts(products){

container.innerHTML="";

products.forEach(product=>{

container.innerHTML+=`

<div class="product">

<img src="${product.images[0]}">

<h4>${product.name}</h4>

<p>${product.price} Kz</p>

<p>${product.category}</p>

<a href="product.html?id=${product.id}">

<button>Voir produit</button>

</a>

<a href="merchant-shop.html?id=${product.merchantId}">

<button>Boutique marchand</button>

</a>

</div>

`;

});

}


/* recherche */

document.getElementById("search").addEventListener("input",function(){

const text=this.value.toLowerCase();

const filtered=allProducts.filter(p=>p.name.toLowerCase().includes(text));

displayProducts(filtered);

});


/* filtre catégorie */

document.getElementById("categoryFilter").addEventListener("change",function(){

const cat=this.value;

if(cat===""){

displayProducts(allProducts);

return;

}

const filtered=allProducts.filter(p=>p.category===cat);

displayProducts(filtered);

});


loadProducts();

</script>

</body>
</html>

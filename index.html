  <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Online Angola</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
right:0;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.headerRight{
display:flex;
gap:10px;
}

.profile{
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;
}

.accountBtn{
background:black;
color:white;
border:none;
padding:6px 12px;
border-radius:20px;
}

/* SEARCH */
.searchBox{
position:fixed;
top:65px;
left:0;
right:0;
background:white;
padding:10px;
z-index:999;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid #ddd;
}

/* BANNER */
.banner{
margin-top:120px;
background:#ff6a00;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
animation:slide 2s infinite alternate;
}

@keyframes slide{
from{opacity:0.5;}
to{opacity:1;}
}

/* PRODUCTS */
.products{
column-count:2;
column-gap:12px;
padding:12px;
padding-bottom:100px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:12px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
}

.product img{
width:100%;
}

.info{
padding:10px;
}

.name{font-weight:bold;}
.price{color:#ff6a00;font-weight:bold;}
.desc{font-size:13px;color:#555;}

.cartBtn{
position:absolute;
right:10px;
bottom:10px;
background:#1aa34a;
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
z-index:1000;
}

/* SUPPORT BUTTON */
.supportBtn{
position:fixed;
bottom:80px;
right:15px;
background:#25D366;
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping Online 🇦🇴</div>

<div class="headerRight">
<img id="profilePic" class="profile">
<input type="file" id="profileUpload" hidden>
<button id="accountButton" class="accountBtn">...</button>
</div>
</div>

<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
</div>

<div class="banner">
🔥 Promoções incríveis hoje • Entrega rápida 🚀
</div>

<div id="productList" class="products"></div>

<!-- SUPPORT BUTTON -->
<button class="supportBtn" onclick="contactSupport()">💬</button>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='messages.html'">💬<br>Mensagens</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let products=[]

/* PROFILE */
const profilePic=document.getElementById("profilePic")
const upload=document.getElementById("profileUpload")

profilePic.onclick=()=>upload.click()

upload.onchange=function(){
const url=URL.createObjectURL(this.files[0])
profilePic.src=url
localStorage.setItem("profilePic",url)
}

profilePic.src=localStorage.getItem("profilePic") || "https://via.placeholder.com/35"

/* BUTTON */
const accountButton=document.getElementById("accountButton")

/* AUTH + ROLE */
onAuthStateChanged(auth, async (user)=>{

try{

if(user){

const ref = doc(db,"users",user.uid)
let snap = await getDoc(ref)

/* CREATE USER */
if(!snap.exists()){
await setDoc(ref,{
email:user.email,
createdAt:Date.now(),
approved:false,
role:"client",
blocked:false
})
snap = await getDoc(ref)
}

const userData = snap.data()

if(userData.blocked){
alert("Conta bloqueada ❌")
return
}

if(userData.role === "admin"){
accountButton.innerText="Admin 👑"
accountButton.onclick=()=>location.href="admin-dashboard.html"
}
else if(userData.role === "merchant"){
if(userData.approved){
accountButton.innerText="Minha Loja"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}else{
accountButton.innerText="Aguardando ⏳"
}
}
else{
accountButton.innerText="Criar loja"
accountButton.onclick=()=>location.href="merchant-register.html"
}

}else{
accountButton.innerText="Conectar"
accountButton.onclick=()=>location.href="login.html"
}

}catch(e){
console.error(e)
}

})

/* PRODUCT CARD */
function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"

return `
<div class="product" onclick="openProduct('${p.id}')">

<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>

<img src="${img}">

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${(p.description||"").slice(0,50)}</div>
</div>

</div>
`
}

/* LOAD */
async function loadProducts(){

const snap=await getDocs(collection(db,"products"))
const container=document.getElementById("productList")

container.innerHTML=""
products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
container.innerHTML+=productHTML(data)
})

}

/* OPEN */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* CART */
window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){
exist.qty++
}else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
qty:1,
merchantId:product.merchantId || "unknown"
})
}

localStorage.setItem("cart", JSON.stringify(cart))
alert("Adicionado 🛒")

}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){

const v=this.value.toLowerCase()
const container=document.getElementById("productList")

container.innerHTML=""

products.forEach(p=>{
if(p.name.toLowerCase().includes(v)){
container.innerHTML+=productHTML(p)
}
})

})

/* SUPPORT SYSTEM */
window.contactSupport = function(){

const phone = "244922623238" // 🔥 TON NUMÉRO SUPPORT
const message = "Olá, preciso de ajuda com a aplicação."

const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message)

window.open(url, "_blank")

}

loadProducts()

</script>

</body>
</html>

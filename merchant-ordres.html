 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
.header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* COUNT */
.countBox{
background:white;
padding:10px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #eee;
}

/* CONTAINER */
.container{
padding:10px;
}

/* CARD */
.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.order h3{
margin:0 0 5px 0;
}

.info{
font-size:14px;
color:#444;
margin-top:5px;
}

/* STATUS */
.status{
margin-top:10px;
font-weight:bold;
}

/* BUTTONS */
.actions{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.confirm{
background:#ff9800;
color:white;
}

.sent{
background:#007bff;
color:white;
}

.done{
background:#1aa34a;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<div class="header">
Pedidos do vendedor
</div>

<div class="countBox">
📦 Novos pedidos: <span id="orderCount">0</span>
</div>

<div class="container" id="ordersList"></div>


<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
getDocs,
query,
where,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null

onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Faça login")
location.href="index.html"
return
}

currentUser=user
loadOrders()

})



/* LOAD ORDERS */

async function loadOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

const container=document.getElementById("ordersList")
container.innerHTML=""

let count=0

snap.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(o.seen===false){
count++
}

container.innerHTML+=orderHTML(o,id)

})

document.getElementById("orderCount").innerText=count

}



/* ORDER HTML */

function orderHTML(o,id){

return `

<div class="order">

<h3>${o.productName}</h3>

<div class="info">💰 ${o.price} Kz</div>

<div class="info">👤 ${o.clientName}</div>

<div class="info">📞 ${o.clientPhone}</div>

<div class="info">📍 ${o.clientAddress}</div>

<div class="info">💳 ${o.paymentMethod}</div>

<div class="status">Status: ${o.status || "pendente"}</div>

<div class="actions">

<button class="whatsapp" onclick="contactClient('${o.clientPhone}','${o.productName}')">
WhatsApp
</button>

<button class="confirm" onclick="confirmOrder('${id}')">
Confirmar
</button>

<button class="sent" onclick="markSent('${id}')">
Enviado
</button>

<button class="done" onclick="markDelivered('${id}')">
Entregue
</button>

</div>

</div>

`

}



/* WHATSAPP AUTO */

window.contactClient=function(phone,product){

const message=`Olá, recebemos seu pedido de ${product}. Vamos tratar disso rapidamente.`

const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

}



/* STATUS UPDATE */

window.confirmOrder=async function(id){

await updateDoc(doc(db,"orders",id),{
status:"confirmado",
seen:true
})

alert("Pedido confirmado ✔")

loadOrders()

}

window.markSent=async function(id){

await updateDoc(doc(db,"orders",id),{
status:"enviado"
})

alert("Pedido enviado 🚚")

loadOrders()

}

window.markDelivered=async function(id){

await updateDoc(doc(db,"orders",id),{
status:"entregue"
})

alert("Entrega concluída ✅")

loadOrders()

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:10px;
}

/* CARD */

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.order h3{
margin:0 0 5px 0;
}

.info{
font-size:14px;
color:#444;
margin-top:5px;
}

/* STATUS */

.status{
margin-top:10px;
font-weight:bold;
}

/* BUTTONS */

.actions{
display:flex;
gap:8px;
margin-top:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.paid{
background:#1aa34a;
color:white;
}

.sent{
background:#007bff;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<div class="header">
Pedidos do vendedor
</div>

<div class="container" id="ordersList"></div>


<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
getDocs,
query,
where,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"



let currentUser=null


onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Faça login")
location.href="index.html"
return
}

currentUser=user

loadOrders()

})



/* LOAD ORDERS */

async function loadOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

const container=document.getElementById("ordersList")

container.innerHTML=""

snap.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

container.innerHTML+=orderHTML(o,id)

})

}



/* ORDER HTML */

function orderHTML(o,id){

return `

<div class="order">

<h3>${o.productName}</h3>

<div class="info">💰 ${o.price} Kz</div>

<div class="info">👤 ${o.clientName}</div>

<div class="info">📞 ${o.clientPhone}</div>

<div class="info">📍 ${o.clientAddress}</div>

<div class="info">💳 ${o.paymentMethod}</div>

<div class="status">Status: ${o.status}</div>

<div class="actions">

<button class="whatsapp" onclick="contactClient('${o.clientPhone}')">
WhatsApp
</button>

<button class="paid" onclick="markPaid('${id}')">
Pago
</button>

<button class="sent" onclick="markSent('${id}')">
Enviado
</button>

</div>

</div>

`

}



/* WHATSAPP */

window.contactClient=function(phone){

const message="Olá, sobre o seu pedido..."
const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

}



/* UPDATE STATUS */

window.markPaid=async function(id){

await updateDoc(doc(db,"orders",id),{
status:"pago"
})

alert("Marcado como pago")

loadOrders()

}

window.markSent=async function(id){

await updateDoc(doc(db,"orders",id),{
status:"enviado"
})

alert("Marcado como enviado")

loadOrders()

}

</script>

</body>

</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Dashboard Merchant</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* NOTIF */
.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btnShop{background:#111;color:white;}
.btnAdd{background:#1aa34a;color:white;}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* FILTER */
.filter{
display:flex;
gap:8px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#eee;
}

.filter .active{
background:#1aa34a;
color:white;
}

/* ORDER CARD */
.order{
background:#fff;
padding:15px;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.orderHeader{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:8px;
}

.status{
padding:4px 8px;
border-radius:8px;
font-size:12px;
color:white;
}

.pending{background:#f39c12;}
.done{background:#1aa34a;}

/* ITEMS */
.items{
margin-top:8px;
font-size:13px;
color:#444;
}

/* BUTTONS */
button{
margin-top:6px;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

/* PRODUCTS */
.productCard{
padding:10px;
border-bottom:1px solid #eee;
}

/* LOGOUT */
.btnLogout{
width:100%;
padding:14px;
background:#111;
color:white;
border:none;
border-radius:12px;
margin-top:10px;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
/* =========================================
   CONTAINER PREMIUM
========================================= */

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

/* =========================================
   GRID STATISTIQUES
========================================= */

.statsGrid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:18px;

margin-bottom:25px;

}

.statCard{

background:white;

border-radius:22px;

padding:22px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

transition:.25s;

position:relative;

overflow:hidden;

}

.statCard:hover{

transform:translateY(-6px);

box-shadow:0 20px 45px rgba(0,0,0,.15);

}

.statCard::before{

content:"";

position:absolute;

top:0;

left:0;

width:6px;

height:100%;

}

.revenue::before{

background:#16a34a;

}

.orders::before{

background:#2563eb;

}

.products::before{

background:#ff6a00;

}

.rating::before{

background:#f59e0b;

}

.statIcon{

font-size:34px;

margin-bottom:15px;

}

.statValue{

font-size:28px;

font-weight:bold;

margin-bottom:6px;

}

.statLabel{

color:#666;

font-size:14px;

}

/* =========================================
   ACTIONS RAPIDES
========================================= */

.quickActions{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(170px,1fr));

gap:15px;

margin-bottom:25px;

}

.actionCard{

background:white;

border:none;

border-radius:20px;

padding:22px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:12px;

font-size:28px;

cursor:pointer;

box-shadow:0 8px 25px rgba(0,0,0,.08);

transition:.25s;

}

.actionCard:hover{

transform:translateY(-5px);

background:#ff6a00;

color:white;

}

.actionCard span{

font-size:15px;

font-weight:bold;

}

/* =========================================
   SECTIONS
========================================= */

.sectionCard{

background:white;

border-radius:22px;

padding:22px;

margin-bottom:22px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.sectionHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:18px;

}

.sectionHeader h2{

margin:0;

font-size:22px;

}

.sectionHeader span{

background:#ff6a00;

color:white;

padding:6px 14px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}

/* =========================================
   RECHERCHE
========================================= */

.searchInput{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid #ddd;

margin-bottom:18px;

font-size:15px;

outline:none;

transition:.25s;

}

.searchInput:focus{

border-color:#ff6a00;

box-shadow:0 0 0 4px rgba(255,106,0,.15);

}
/* =========================================
   CARTES COMMANDES PREMIUM
========================================= */

.order{

background:#fff;

border-radius:18px;

padding:20px;

margin-bottom:18px;

box-shadow:0 8px 22px rgba(0,0,0,.08);

transition:.25s;

border-left:6px solid #ff6a00;

}

.order:hover{

transform:translateY(-3px);

box-shadow:0 16px 35px rgba(0,0,0,.12);

}

.orderHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.orderTitle{

font-size:18px;

font-weight:bold;

}

.orderCustomer{

margin:10px 0;

line-height:1.8;

font-size:15px;

color:#444;

}

.items{

margin-top:15px;

padding:15px;

background:#f8f8f8;

border-radius:12px;

line-height:1.8;

font-size:14px;

}

.orderFooter{

margin-top:18px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:12px;

}

.orderPrice{

font-size:22px;

font-weight:bold;

color:#16a34a;

}

.orderDate{

font-size:13px;

color:#777;

}

.orderActions{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.btnDone{

background:#16a34a;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.btnDone:hover{

background:#15803d;

}

.btnDelete{

background:#dc2626;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.btnDelete:hover{

background:#b91c1c;

}
</style>
</head>

<body>

<div class="header">Dashboard Merchant 🚀</div>

<div class="notifBell">
🔔 <span id="notifBadge" class="notifBadge">0</span>
</div>

<div class="container">

    <!-- ==========================
         CARTES STATISTIQUES
    ========================== -->

    <div class="statsGrid">

        <div class="statCard revenue">

            <div class="statIcon">💰</div>

            <div class="statValue" id="revenueValue">
                0 Kz
            </div>

            <div class="statLabel">
                Receita Total
            </div>

        </div>

        <div class="statCard orders">

            <div class="statIcon">📦</div>

            <div class="statValue" id="ordersValue">
                0
            </div>

            <div class="statLabel">
                Pedidos
            </div>

        </div>

        <div class="statCard products">

            <div class="statIcon">🛍️</div>

            <div class="statValue" id="productsValue">
                0
            </div>

            <div class="statLabel">
                Produtos
            </div>

        </div>

        <div class="statCard rating">

            <div class="statIcon">⭐</div>

            <div class="statValue" id="ratingValue">
                0.0
            </div>

            <div class="statLabel">
                Avaliação
            </div>

        </div>

    </div>

    <!-- ==========================
         ACTIONS RAPIDES
    ========================== -->

    <div class="quickActions">

        <button class="actionCard" onclick="openShop()">

            🏪

            <span>Minha Loja</span>

        </button>

        <button class="actionCard" onclick="addProduct()">

            ➕

            <span>Novo Produto</span>

        </button>

        <button class="actionCard" onclick="openCoupons()">

            🎟️

            <span>Cupons</span>

        </button>

        <button class="actionCard">

            📈

            <span>Relatórios</span>

        </button>

    </div>

    <!-- ==========================
         PEDIDOS
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>📦 Pedidos</h2>

            <span id="ordersCount">
                0
            </span>

        </div>

        <div class="filter">

            <button id="f_all" onclick="setFilter('all')">
                Todos
            </button>

            <button id="f_pending" onclick="setFilter('pending')">
                Pendentes
            </button>

            <button id="f_done" onclick="setFilter('concluido')">
                Concluídos
            </button>

        </div>

        <div id="ordersList"></div>

    </div>

    <!-- ==========================
         VENDAS DOS INFLUENCIADORES
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>📊 Influenciadores</h2>

        </div>

        <div id="influencerSales">

            Carregando...

        </div>

    </div>

    <!-- ==========================
         AVALIAÇÕES
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>⭐ Avaliações</h2>

        </div>

        <div id="reviewsBox">

            Carregando...

        </div>

    </div>

    <!-- ==========================
         PRODUTOS
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>🛍️ Produtos</h2>

        </div>

        <input
            id="searchProduct"
            class="searchInput"
            placeholder="🔍 Procurar produto..."
            oninput="filterProducts()"
        >

        <div id="productsList"></div>

    </div>

    <button
        class="btnLogout"
        onclick="logout()">

        🚪 Sair

    </button>

</div>

<div id="toastBox" class="toastBox"></div>
 <script type="module" src="./js/merchant-dashboard.js"></script>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* STATS */
.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#1aa34a;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* FILTER */
.filter{
display:flex;
gap:10px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.active{
background:#ff6a00;
color:white;
}

/* ORDER */
.order{
border-bottom:1px solid #eee;
padding:10px 0;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnWhats{background:#25D366;color:white;}
.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

.btnLogout{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
Dashboard PRO 🚀
</div>

<div class="container">

<!-- STATS -->
<div class="card">
<h3>Resumo</h3>

<div class="stats">
<div class="stat">
Hoje<br><span id="todaySales">0</span> Kz
</div>

<div class="stat">
Total<br><span id="totalSales">0</span> Kz
</div>

<div class="stat">
Pedidos<br><span id="totalOrders">0</span>
</div>
</div>

</div>

<!-- FILTER -->
<div class="card">

<div class="filter">
<button id="allBtn" class="active" onclick="setFilter('all')">Todos</button>
<button id="pendingBtn" onclick="setFilter('pendente')">Pendentes</button>
<button id="doneBtn" onclick="setFilter('concluido')">Concluídos</button>
</div>

<div id="ordersList"></div>

</div>

<button class="btnLogout" onclick="logout()">Sair</button>

</div>

<!-- 🔊 SOUND -->
<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
query,
where,
onSnapshot,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser = null
let filter = "all"
let firstLoad = true

/* AUTH */
onAuthStateChanged(auth, (user)=>{

if(!user){
location.href="merchant-register.html"
return
}

currentUser = user
listenOrders()

})

/* REALTIME LISTENER */
function listenOrders(){

const q = query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q, (snapshot)=>{

let html=""
let totalSales=0
let todaySales=0
let totalOrders=0

const today = new Date().toDateString()

snapshot.forEach(docSnap=>{

const o = docSnap.data()
const id = docSnap.id

/* FILTER */
if(filter !== "all" && o.status !== filter) return

totalOrders++
totalSales += o.price * o.qty

if(new Date(o.date).toDateString() === today){
todaySales += o.price * o.qty
}

html += `
<div class="order">

<b>${o.productName}</b><br>
${o.qty} x ${o.price} Kz<br>

👤 ${o.clientName}<br>
📞 ${o.clientPhone}<br>
📍 ${o.clientAddress}<br>

Status: ${o.status}<br>

<button class="btnWhats" onclick="contactClient('${o.clientPhone}')">
WhatsApp
</button>

<button class="btnDone" onclick="markDone('${id}')">
Concluir
</button>

<button class="btnDelete" onclick="deleteOrder('${id}')">
Supprimer
</button>

</div>
`
})

document.getElementById("ordersList").innerHTML = html
document.getElementById("totalSales").innerText = totalSales
document.getElementById("todaySales").innerText = todaySales
document.getElementById("totalOrders").innerText = totalOrders

/* 🔊 SOUND NEW ORDER */
if(!firstLoad && snapshot.docChanges().length > 0){
document.getElementById("notifSound").play()
}

firstLoad = false

})

}

/* FILTER */
window.setFilter = function(f){

filter = f

document.getElementById("allBtn").classList.remove("active")
document.getElementById("pendingBtn").classList.remove("active")
document.getElementById("doneBtn").classList.remove("active")

if(f==="all") document.getElementById("allBtn").classList.add("active")
if(f==="pendente") document.getElementById("pendingBtn").classList.add("active")
if(f==="concluido") document.getElementById("doneBtn").classList.add("active")

listenOrders()

}

/* WHATSAPP */
window.contactClient = function(phone){

let msg="Olá 👋 sobre o seu pedido..."

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank")

}

/* DONE */
window.markDone = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"concluido"
})

}

/* DELETE */
window.deleteOrder = async function(id){

if(confirm("Apagar pedido?")){
await deleteDoc(doc(db,"orders",id))
}

}

/* LOGOUT */
window.logout = function(){

signOut(auth)
location.href="index.html"

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Merchant</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* NOTIF */
.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btnShop{background:#111;color:white;}
.btnAdd{background:#1aa34a;color:white;}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* FILTER */
.filter{
display:flex;
gap:8px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#eee;
}

.filter .active{
background:#1aa34a;
color:white;
}

/* ORDER CARD */
.order{
background:#fff;
padding:15px;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.orderHeader{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:8px;
}

.status{
padding:4px 8px;
border-radius:8px;
font-size:12px;
color:white;
}

.pending{background:#f39c12;}
.done{background:#1aa34a;}

/* ITEMS */
.items{
margin-top:8px;
font-size:13px;
color:#444;
}

/* BUTTONS */
button{
margin-top:6px;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

/* PRODUCTS */
.productCard{
padding:10px;
border-bottom:1px solid #eee;
}

/* LOGOUT */
.btnLogout{
width:100%;
padding:14px;
background:#111;
color:white;
border:none;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Dashboard Merchant 🚀</div>

<div class="notifBell">
🔔 <span id="notifBadge" class="notifBadge">0</span>
</div>

<div class="container">

<div class="actions">
<button class="btnShop" onclick="openShop()">Minha loja 🏪</button>
<button class="btnAdd" onclick="addProduct()">+ Produto</button>
</div>

<div class="card">
<h3>📦 Pedidos</h3>

<div class="filter">
<button onclick="setFilter('all')" id="f_all">Todos</button>
<button onclick="setFilter('pending')" id="f_pending">Pendentes</button>
<button onclick="setFilter('concluido')" id="f_done">Concluídos</button>
</div>

<div id="ordersList"></div>
</div>

<div class="card">
<h3>🛍️ Meus produtos</h3>
<div id="productsList"></div>
</div>

<button class="btnLogout" onclick="logout()">Sair</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,query,where,onSnapshot,
updateDoc,deleteDoc,doc,getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged,signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null
let filter="all"

const ordersList = document.getElementById("ordersList")
const notifBadge = document.getElementById("notifBadge")

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html"
return
}
currentUser=user
listenOrders()
loadProducts()
})

/* LISTEN ORDERS */
function listenOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{

let html=""
let count=0

snapshot.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(filter!=="all" && o.status!==filter) return

if(!o.seen) count++

/* PRODUITS */
let itemsHTML = ""

if(o.items){
o.items.forEach(i=>{
itemsHTML += `• ${i.name} x${i.qty}<br>`
})
}else{
itemsHTML = `${o.productName} x${o.qty}`
}

html+=`
<div class="order">

<div class="orderHeader">
<span>Pedido</span>
<span class="status ${o.status==="concluido"?"done":"pending"}">
${o.status || "pending"}
</span>
</div>

👤 <b>${o.clientName}</b><br>
📞 ${o.clientPhone}<br>
📍 ${o.clientAddress}<br>

<div class="items">
${itemsHTML}
</div>

💰 Total: <b>${o.total || o.price || 0} Kz</b>

<br>

<button class="btnDone" onclick="markDone('${id}')">✔ Concluir</button>
<button class="btnDelete" onclick="deleteOrder('${id}')">🗑 Supprimer</button>

</div>
`
})

ordersList.innerHTML = html || "Sem pedidos"

/* 🔔 NOTIF */
if(count>0){
notifBadge.style.display="inline-block"
notifBadge.innerText=count
}else{
notifBadge.style.display="none"
}

})

}

/* PRODUITS */
async function loadProducts(){

const q=query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

let html=""

snap.forEach(d=>{
const p=d.data()
const id=d.id

html+=`
<div class="productCard">
<b>${p.name}</b><br>
💰 ${p.price} Kz<br>

<button class="btnDelete" onclick="deleteProduct('${id}')">Supprimer</button>
</div>
`
})

document.getElementById("productsList").innerHTML=html

}

/* ACTIONS */
window.setFilter=f=>{
filter=f
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"))
document.getElementById("f_"+(f==="pending"?"pending":f==="concluido"?"done":"all")).classList.add("active")
listenOrders()
}

window.markDone=id=>{
updateDoc(doc(db,"orders",id),{
status:"concluido",
seen:true
})
}

window.deleteOrder=id=>{
if(confirm("Apagar pedido?")){
deleteDoc(doc(db,"orders",id))
}
}

window.deleteProduct=async (id)=>{
if(confirm("Supprimer ce produit ?")){
await deleteDoc(doc(db,"products",id))
loadProducts()
}
}

window.openShop=()=>{
location.href="merchant-shop.html?id="+currentUser.uid
}

window.addProduct=()=>{
location.href="add-product.html"
}

window.logout=async ()=>{
await signOut(auth)
location.href="index.html"
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
z-index:2000;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-100px);
background:#1aa34a;
color:white;
padding:12px 20px;
border-radius:25px;
font-weight:bold;
transition:0.4s;
z-index:3000;
opacity:0;
}
.toast.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
.actions{display:flex;gap:10px;margin-bottom:15px;}
.actions button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.btnShop{background:black;color:white;}
.btnAdd{background:#1aa34a;color:white;}

.stats{display:flex;gap:10px;}
.stat{flex:1;background:#1aa34a;color:white;padding:12px;border-radius:10px;text-align:center;}

.filter{display:flex;gap:10px;margin-bottom:10px;}
.filter button{flex:1;padding:10px;border:none;border-radius:8px;}
.active{background:#ff6a00;color:white;}

.order{border-bottom:1px solid #eee;padding:10px 0;}
.productCard{border-bottom:1px solid #eee;padding:10px 0;}

button{margin-top:5px;padding:6px 10px;border:none;border-radius:6px;}
.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

.btnLogout{width:100%;padding:12px;background:black;color:white;border:none;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">Dashboard PRO 🚀</div>

<div class="notifBell" onclick="markAllSeen()">
🔔 <span id="notifBadge" class="notifBadge">0</span>
</div>

<div id="toast" class="toast">Nova encomenda 🛒</div>

<div class="container">

<div class="actions">
<button class="btnShop" onclick="openShop()">Ver minha loja 🏪</button>
<button class="btnAdd" onclick="addProduct()">+ Produto</button>
</div>

<div class="card">
<h3>Resumo</h3>
<div class="stats">
<div class="stat">Hoje<br><span id="todaySales">0</span> Kz</div>
<div class="stat">Total<br><span id="totalSales">0</span> Kz</div>
<div class="stat">Pedidos<br><span id="totalOrders">0</span></div>
</div>
</div>

<div class="card">
<h3>Pedidos</h3>
<div class="filter">
<button class="active" onclick="setFilter('all')">Todos</button>
<button onclick="setFilter('pendente')">Pendentes</button>
<button onclick="setFilter('concluido')">Concluídos</button>
</div>
<div id="ordersList"></div>
</div>

<div class="card">
<h3>Mes Produits</h3>
<div id="productsList"></div>
</div>

<button class="btnLogout" onclick="logout()">Sair</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"

/* 🔔 GLOBAL NOTIFICATIONS */
import { startNotifications } from "./notifications.js"
startNotifications()

import {
collection,query,where,onSnapshot,
updateDoc,deleteDoc,doc,getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged,signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null
let filter="all"

const toast=document.getElementById("toast")
const badge=document.getElementById("notifBadge")

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html"
return
}
currentUser=user
listenOrders()
loadProducts()
})

/* COMMANDES */
function listenOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{

let html=""
let unseen=0

snapshot.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(!o.seen) unseen++

if(filter!=="all" && o.status!==filter) return

html+=`
<div class="order">
<b>${o.productName}</b><br>
${o.qty} x ${o.price} Kz<br>

<button class="btnDone" onclick="markDone('${id}')">Concluir</button>
<button class="btnDelete" onclick="deleteOrder('${id}')">Supprimer</button>
</div>
`
})

ordersList.innerHTML=html

badge.style.display = unseen>0 ? "block":"none"
badge.innerText=unseen

})

}

/* PRODUITS */
async function loadProducts(){

const q=query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

let html=""

snap.forEach(d=>{
const p=d.data()
const id=d.id

html+=`
<div class="productCard">
<b>${p.name}</b><br>
💰 ${p.price} Kz<br>

<button class="btnDelete" onclick="deleteProduct('${id}')">Supprimer</button>
</div>
`
})

document.getElementById("productsList").innerHTML=html

}

/* ACTIONS */
window.setFilter=f=>{
filter=f
listenOrders()
}

window.markDone=id=>{
updateDoc(doc(db,"orders",id),{status:"concluido"})
}

window.deleteOrder=id=>{
if(confirm("Apagar pedido?")){
deleteDoc(doc(db,"orders",id))
}
}

window.deleteProduct=async (id)=>{
if(confirm("Supprimer ce produit ?")){
await deleteDoc(doc(db,"products",id))
loadProducts()
}
}

window.logout=()=>{
signOut(auth)
location.href="index.html"
}

window.openShop=()=>location.href="merchant-shop.html?id="+currentUser.uid
window.addProduct=()=>location.href="add-product.html"

</script>

</body>
</html>

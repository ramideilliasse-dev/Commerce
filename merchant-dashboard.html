 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Vendedor</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
.header{
background:#ff6a00;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

/* CONTAINER */
.container{
padding:15px;
max-width:800px;
margin:auto;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* STATS */
.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#1aa34a;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
}

/* ORDER */
.order{
border-bottom:1px solid #eee;
padding:10px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.btnWhats{
background:#25D366;
color:white;
}

.btnDone{
background:#1aa34a;
color:white;
}

.btnLogout{
background:black;
color:white;
width:100%;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
Dashboard do Vendedor 📊
</div>

<div class="container">

<!-- STATS -->
<div class="card">
<h3>Resumo</h3>

<div class="stats">
<div class="stat">
Pedidos<br>
<span id="totalOrders">0</span>
</div>

<div class="stat">
Vendas (Kz)<br>
<span id="totalSales">0</span>
</div>
</div>

</div>

<!-- ORDERS -->
<div class="card">
<h3>Pedidos recebidos</h3>

<div id="ordersList"></div>

</div>

<!-- LOGOUT -->
<button class="btnLogout" onclick="logout()">
Sair da conta
</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
query,
where,
getDocs,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"


let currentUser = null

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
alert("Faça login ❌")
location.href="merchant-register.html"
return
}

currentUser = user

loadOrders()

})

/* LOAD ORDERS */
async function loadOrders(){

const q = query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

const snap = await getDocs(q)

let html=""
let totalSales = 0
let totalOrders = 0

snap.forEach(docSnap=>{

const o = docSnap.data()
const id = docSnap.id

totalOrders++
totalSales += (o.price * o.qty)

html += `
<div class="order">

<b>${o.productName}</b><br>
${o.qty} x ${o.price} Kz<br>

👤 ${o.clientName}<br>
📞 ${o.clientPhone}<br>
📍 ${o.clientAddress}<br>

Status: ${o.status}<br>

<button class="btnWhats" onclick="contactClient('${o.clientPhone}')">
WhatsApp
</button>

<button class="btnDone" onclick="markDone('${id}')">
Concluir
</button>

</div>
`
})

document.getElementById("ordersList").innerHTML = html
document.getElementById("totalSales").innerText = totalSales
document.getElementById("totalOrders").innerText = totalOrders

}

/* CONTACT CLIENT */
window.contactClient = function(phone){

let msg = "Olá 👋, sobre o seu pedido..."

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg)

window.open(url,"_blank")

}

/* MARK DONE */
window.markDone = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"concluido"
})

alert("Pedido concluído ✔")

loadOrders()

}

/* LOGOUT */
window.logout = function(){

signOut(auth)
location.href="index.html"

}

</script>

</body>
</html>

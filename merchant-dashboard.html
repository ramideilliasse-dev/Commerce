 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Dashboard Merchant</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* NOTIF */
.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btnShop{background:#111;color:white;}
.btnAdd{background:#1aa34a;color:white;}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* FILTER */
.filter{
display:flex;
gap:8px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#eee;
}

.filter .active{
background:#1aa34a;
color:white;
}

/* ORDER CARD */
.order{
background:#fff;
padding:15px;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.orderHeader{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:8px;
}

.status{
padding:4px 8px;
border-radius:8px;
font-size:12px;
color:white;
}

.pending{background:#f39c12;}
.done{background:#1aa34a;}

/* ITEMS */
.items{
margin-top:8px;
font-size:13px;
color:#444;
}

/* BUTTONS */
button{
margin-top:6px;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

/* PRODUCTS */
.productCard{
padding:10px;
border-bottom:1px solid #eee;
}

/* LOGOUT */
.btnLogout{
width:100%;
padding:14px;
background:#111;
color:white;
border:none;
border-radius:12px;
margin-top:10px;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>
</head>

<body>

<div class="header">Dashboard Merchant 🚀</div>

<div class="notifBell">
🔔 <span id="notifBadge" class="notifBadge">0</span>
</div>

<div class="container">

<div class="actions">

<button class="btnShop"
onclick="openShop()">
Minha loja 🏪
</button>

<button class="btnAdd"
onclick="addProduct()">
+ Produto
</button>

<button
style="
background:#ff6a00;
color:white;
font-weight:bold;
border:none;
border-radius:12px;
padding:14px;
cursor:pointer;
"
onclick="openCoupons()">
🎟️ Cupons
</button>

</div>
 <div class="card">

<h3>📊 Estatísticas</h3>

<div id="statsBox">

💰 Receita: 0 Kz<br>

📦 Pedidos: 0<br>

🛍️ Produtos: 0

</div>

</div>
<div class="card">
<h3>📦 Pedidos</h3>

<div class="filter">
<button onclick="setFilter('all')" id="f_all">Todos</button>
<button onclick="setFilter('pending')" id="f_pending">Pendentes</button>
<button onclick="setFilter('concluido')" id="f_done">Concluídos</button>
</div>

<div id="ordersList"></div>
</div>
<div class="card">

<h3>📊 Vendas por Influenciador</h3>

<div id="influencerSales">
Carregando...
</div>

</div>
<div class="card">
<h3>🛍️ Meus produtos</h3>
 <input
id="searchProduct"
placeholder="🔍 Procurar produto..."
oninput="filterProducts()"
style="
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
">
<div id="productsList"></div>
</div>

<button class="btnLogout" onclick="home.html()">Sair</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,query,where,onSnapshot,
updateDoc,deleteDoc,doc,getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { initFCM }
from "./notifications-fcm.js";
import { onAuthStateChanged,signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null
let filter="all"
let allProducts = []
const ordersList = document.getElementById("ordersList")
const notifBadge = document.getElementById("notifBadge")

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(!user){
location.href="login.html"
return
}

currentUser=user
const userSnap =
await getDoc(
doc(db,"users",user.uid)
)

if(
userSnap.exists() &&
userSnap.data().blocked
){

alert(
"Sua loja foi bloqueada pelo administrador"
)

await signOut(auth)

location.href="login.html"

return

}
listenOrders()

loadProducts()

loadInfluencerSales()
loadStats()
 initFCM();
})

/* LISTEN ORDERS */
function listenOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{

let html=""
let count=0

snapshot.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(filter!=="all" && o.status!==filter) return

if(!o.seen) count++

/* PRODUITS */
let itemsHTML = ""

if(o.items){
o.items.forEach(i=>{
itemsHTML += `• ${i.name} x${i.qty}<br>`
})
}else{
itemsHTML = `${o.productName} x${o.qty}`
}

html+=`
<div class="order">

<div class="orderHeader">
<span>Pedido</span>
<span class="status ${o.status==="concluido"?"done":"pending"}">
${o.status || "pending"}
</span>
</div>

👤 <b>${o.clientName}</b><br>
📞 ${o.clientPhone}<br>
📍 ${o.clientAddress}<br>

<div class="items">
${itemsHTML}
</div>
💰 Total: <b>${o.total || o.price || 0} Kz</b>

<br>

🕒 ${
o.createdAt
? new Date(o.createdAt).toLocaleString("pt-PT")
: "-"
}

<br>

<button class="btnDone" onclick="markDone('${id}')">✔ Concluir</button>
<button class="btnDelete" onclick="deleteOrder('${id}')">🗑 Supprimer</button>

</div>
`
})

ordersList.innerHTML = html || "Sem pedidos"

/* 🔔 NOTIF */
if(count>0){
notifBadge.style.display="inline-block"
notifBadge.innerText=count
}else{
notifBadge.style.display="none"
}

})

}
async function loadInfluencerSales(){

const q = query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

const snap = await getDocs(q)

let stats = {}

snap.forEach(docSnap=>{

const o = docSnap.data()

if(!o.couponCode) return

if(!stats[o.couponCode]){

stats[o.couponCode] = {
sales:0,
amount:0,
commission:0
}

}

stats[o.couponCode].sales++

stats[o.couponCode].amount +=
Number(o.total || 0)
stats[o.couponCode].commission +=
(
Number(o.total || 0)
*
Number(o.commission || 0)
)
/100
})

let html = ""

Object.keys(stats).forEach(code=>{

html += `

<div style="
padding:12px;
border-bottom:1px solid #eee;
">

<b>${code}</b><br>

🛒 ${stats[code].sales} vendas

<br>

💰 ${stats[code].amount} Kz

<br>

💸 Comissão:
${Math.round(
stats[code].commission
)} Kz

</div>

`

})

document.getElementById(
"influencerSales"
).innerHTML =
html || "Nenhuma venda"

}
 async function loadStats(){

const ordersSnap = await getDocs(
query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)
)

const productsSnap = await getDocs(
query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)
)

let totalRevenue = 0
let totalOrders = 0

ordersSnap.forEach(docSnap=>{

const o = docSnap.data()

totalOrders++

totalRevenue += Number(o.total || 0)

})

document.getElementById("statsBox").innerHTML = `

💰 Receita:
<b>${totalRevenue} Kz</b><br><br>

📦 Pedidos:
<b>${totalOrders}</b><br><br>

🛍️ Produtos:
<b>${productsSnap.size}</b>

`

}
/* PRODUITS */
async function loadProducts(){

const q=query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

let html=""
allProducts = []
snap.forEach(d=>{
const p=d.data()
const id=d.id
allProducts.push({
id,
...p
})
html+=`
<div class="productCard">

<div style="display:flex;justify-content:space-between;align-items:center">

<div>

<b>${p.name}</b><br>

💰 ${p.price} Kz

${p.discount ? `
<span style="
background:red;
color:white;
padding:2px 8px;
border-radius:20px;
font-size:12px;
margin-left:5px;
">
-${p.discount}%
</span>
` : ""}

</div>

<img 
src="${p.images?.[0] || ''}" 
style="
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
"
>

</div>

<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

<button onclick="editProduct('${id}')">
✏️ Modifier
</button>

<button class="btnDelete" onclick="deleteProduct('${id}')">
🗑 Supprimer
</button>

</div>

</div>
`
})

document.getElementById("productsList").innerHTML=html

}

/* ACTIONS */
window.setFilter=f=>{
filter=f
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"))
document.getElementById("f_"+(f==="pending"?"pending":f==="concluido"?"done":"all")).classList.add("active")
listenOrders()
}

window.markDone=id=>{
updateDoc(doc(db,"orders",id),{
status:"concluido",
seen:true
})
}

window.deleteOrder = async (id)=>{

if(!confirm("Apagar pedido?")) return

try{

await deleteDoc(
doc(db,"orders",id)
)

showToast(
"Pedido apagado ✅",
"success"
)

}catch(e){

showToast(
"Erro ao apagar pedido ❌",
"error"
)

console.error(e)

}

}
/* ================= EDIT PRODUCT ================= */

window.editProduct = function(id){

location.href =
"edit-product.html?id=" + id

}


window.deleteProduct=async (id)=>{
if(confirm("Supprimer ce produit ?")){
await deleteDoc(doc(db,"products",id))
loadProducts()
}
}
window.filterProducts = function(){

const search =
document.getElementById("searchProduct")
.value
.toLowerCase()

const filtered =
allProducts.filter(p=>

(p.name || "")
.toLowerCase()
.includes(search)

)

let html = ""

filtered.forEach(p=>{

html += `
<div class="productCard">

<div style="
display:flex;
justify-content:space-between;
align-items:center">

<div>

<b>${p.name}</b><br>

💰 ${p.price} Kz

</div>

<img
src="${p.images?.[0] || ''}"
style="
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
">

</div>

</div>
`

})

document.getElementById(
"productsList"
).innerHTML =
html || "Nenhum produto encontrado"

}
window.openShop=()=>{
location.href="merchant-shop.html?id="+currentUser.uid
}

window.addProduct=()=>{
location.href="add-product.html"
}
window.openCoupons = ()=>{

location.href =
"merchant-coupons.html"

}
window.logout=async ()=>{
await signOut(auth)
location.href="index.html"
}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

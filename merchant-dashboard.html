<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do vendedor</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
font-size:18px;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTAINER */

.container{
padding:15px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:28px;
color:#ff6a00;
}

/* FORM */

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form input,
.form select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.form button{
background:#ff6a00;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:18px;
width:100%;
}

/* PRODUCT LIST */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.product h4{
margin:5px 0;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:8px;
border-radius:6px;
width:100%;
}

</style>

</head>

<body>


<div class="header">

<span>Painel do vendedor</span>

<button onclick="logout()">Sair</button>

</div>


<div class="container">


<!-- STATS -->

<div class="stats">

<div class="card">
<h2 id="totalProducts">0</h2>
Produtos
</div>

<div class="card">
<h2 id="followers">0</h2>
Seguidores
</div>

</div>


<!-- ADD PRODUCT -->

<div class="form">

<h3>Adicionar produto</h3>

<input id="name" placeholder="Nome do produto">

<input id="price" placeholder="Preço">

<input id="image" placeholder="Link da imagem">

<select id="category">

<option value="telefone">Telefone</option>
<option value="roupas">Roupas</option>
<option value="beleza">Beleza</option>
<option value="eletronica">Eletrónica</option>
<option value="casa">Casa</option>
<option value="auto">Auto</option>

</select>

<button onclick="addProduct()">
Publicar produto
</button>

</div>


<h3>Meus produtos</h3>

<div id="productList" class="products"></div>


</div>



<script type="module">

import { auth, db } from "./firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


let userId="";


/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid

loadProducts()

}else{

location.href="merchant-login.html"

}

})


/* ADD PRODUCT */

window.addProduct=async function(){

const name=document.getElementById("name").value
const price=document.getElementById("price").value
const image=document.getElementById("image").value
const category=document.getElementById("category").value

if(!name || !price){

alert("Preencha nome e preço")

return

}

await addDoc(collection(db,"products"),{

name,
price,
image,
category,
merchantId:userId,
verified:true

})

alert("Produto publicado")

loadProducts()

}


/* LOAD PRODUCTS */

async function loadProducts(){

const q=query(collection(db,"products"),where("merchantId","==",userId))

const snap=await getDocs(q)

const container=document.getElementById("productList")

container.innerHTML=""

let total=0

snap.forEach(docSnap=>{

const data=docSnap.data()

total++

container.innerHTML+=`

<div class="product">

<img src="${data.image}">

<h4>${data.name}</h4>

<p>${data.price} Kz</p>

<button class="deleteBtn" onclick="deleteProduct('${docSnap.id}')">
Excluir
</button>

</div>

`

})

document.getElementById("totalProducts").innerText=total

}


/* DELETE */

window.deleteProduct=async function(id){

await deleteDoc(doc(db,"products",id))

loadProducts()

}


/* LOGOUT */

window.logout=function(){

signOut(auth)

location.href="index.html"

}

</script>

</body>

</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* 🔴 BADGE */
.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
z-index:2000;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

/* 🔥 TOAST UBER */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-100px);
background:#1aa34a;
color:white;
padding:12px 20px;
border-radius:25px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.4s;
z-index:3000;
opacity:0;
}

.toast.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btnShop{background:black;color:white;}
.btnAdd{background:#1aa34a;color:white;}

/* STATS */
.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#1aa34a;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* FILTER */
.filter{
display:flex;
gap:10px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.active{
background:#ff6a00;
color:white;
}

/* ORDER */
.order{
border-bottom:1px solid #eee;
padding:10px 0;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnWhats{background:#25D366;color:white;}
.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

.btnLogout{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
Dashboard PRO 🚀
</div>

<!-- 🔔 NOTIF -->
<div class="notifBell" onclick="markAllSeen()">
🔔
<span id="notifBadge" class="notifBadge">0</span>
</div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast">Nova encomenda 🛒</div>

<div class="container">

<div class="actions">
<button class="btnShop" onclick="openShop()">Ver minha loja 🏪</button>
<button class="btnAdd" onclick="addProduct()">+ Publicar produto</button>
</div>

<div class="card">
<h3>Resumo</h3>

<div class="stats">
<div class="stat">
Hoje<br><span id="todaySales">0</span> Kz
</div>

<div class="stat">
Total<br><span id="totalSales">0</span> Kz
</div>

<div class="stat">
Pedidos<br><span id="totalOrders">0</span>
</div>
</div>
</div>

<div class="card">

<div class="filter">
<button id="allBtn" class="active" onclick="setFilter('all')">Todos</button>
<button id="pendingBtn" onclick="setFilter('pendente')">Pendentes</button>
<button id="doneBtn" onclick="setFilter('concluido')">Concluídos</button>
</div>

<div id="ordersList"></div>

</div>

<button class="btnLogout" onclick="logout()">Sair</button>

</div>

<!-- 🔊 SOUND -->
<audio id="notifSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,query,where,onSnapshot,updateDoc,deleteDoc,doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged,signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null
let filter="all"
let firstLoad=true

const toast=document.getElementById("toast")
const sound=document.getElementById("notifSound")
const badge=document.getElementById("notifBadge")

/* 🔥 TOAST FUNCTION */
function showToast(msg){
toast.innerText=msg
toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},3000)
}

/* 🔊 VIBRATION */
function vibrate(){
if(navigator.vibrate){
navigator.vibrate([200,100,200])
}
}

/* AUTH */
onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="merchant-register.html"
return
}

currentUser=user
listenOrders()

})

/* REALTIME */
function listenOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{

let html=""
let totalSales=0
let todaySales=0
let totalOrders=0
let unseen=0

const today=new Date().toDateString()

snapshot.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(!o.seen) unseen++

if(filter!=="all" && o.status!==filter) return

totalOrders++
totalSales+=o.price*o.qty

if(new Date(o.date).toDateString()===today){
todaySales+=o.price*o.qty
}

html+=`
<div class="order">
<b>${o.productName}</b><br>
${o.qty} x ${o.price} Kz<br>
👤 ${o.clientName || ""}<br>
📞 ${o.clientPhone || ""}<br>
📍 ${o.clientAddress || ""}<br>
Status: ${o.status}<br>

<button class="btnWhats" onclick="contactClient('${o.clientPhone}')">WhatsApp</button>
<button class="btnDone" onclick="markDone('${id}')">Concluir</button>
<button class="btnDelete" onclick="deleteOrder('${id}')">Supprimer</button>
</div>
`
})

ordersList.innerHTML=html
totalSalesEl.innerText=totalSales
todaySalesEl.innerText=todaySales
totalOrdersEl.innerText=totalOrders

/* 🔴 BADGE */
if(unseen>0){
badge.style.display="block"
badge.innerText=unseen
}else{
badge.style.display="none"
}

/* 🔥 NOTIFICATION PRO */
if(!firstLoad){

snapshot.docChanges().forEach(change=>{

if(change.type==="added"){

const data=change.doc.data()

if(!data.seen){

showToast("🛒 Nova encomenda!")
sound.play()
vibrate()

}

}

})

}

firstLoad=false

})

}

/* MARK SEEN */
window.markAllSeen=async function(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{
snapshot.forEach(async docSnap=>{
if(!docSnap.data().seen){
await updateDoc(doc(db,"orders",docSnap.id),{seen:true})
}
})
})

}

/* OTHER FUNCTIONS */
window.setFilter=function(f){
filter=f
listenOrders()
}

window.contactClient=function(phone){
if(!phone) return
window.open("https://wa.me/"+phone,"_blank")
}

window.markDone=async id=>{
await updateDoc(doc(db,"orders",id),{status:"concluido"})
}

window.deleteOrder=async id=>{
if(confirm("Apagar pedido?")){
await deleteDoc(doc(db,"orders",id))
}
}

window.logout=function(){
signOut(auth)
location.href="index.html"
}

window.openShop=()=>location.href="merchant-shop.html?id="+currentUser.uid
window.addProduct=()=>location.href="add-product.html"

</script>

</body>
</html>

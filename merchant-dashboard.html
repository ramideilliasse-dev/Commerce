 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Dashboard Merchant</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* NOTIF */
.notifBell{
position:fixed;
top:15px;
right:15px;
font-size:22px;
}

.notifBadge{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
display:none;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btnShop{background:#111;color:white;}
.btnAdd{background:#1aa34a;color:white;}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* FILTER */
.filter{
display:flex;
gap:8px;
margin-bottom:10px;
}

.filter button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#eee;
}

.filter .active{
background:#1aa34a;
color:white;
}

/* ORDER CARD */
.order{
background:#fff;
padding:15px;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.orderHeader{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:8px;
}

.status{
padding:4px 8px;
border-radius:8px;
font-size:12px;
color:white;
}

.pending{background:#f39c12;}
.done{background:#1aa34a;}

/* ITEMS */
.items{
margin-top:8px;
font-size:13px;
color:#444;
}

/* BUTTONS */
button{
margin-top:6px;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btnDone{background:#1aa34a;color:white;}
.btnDelete{background:red;color:white;}

/* PRODUCTS */
.productCard{
padding:10px;
border-bottom:1px solid #eee;
}

/* LOGOUT */
.btnLogout{
width:100%;
padding:14px;
background:#111;
color:white;
border:none;
border-radius:12px;
margin-top:10px;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
/* =========================================
   CONTAINER PREMIUM
========================================= */

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

/* =========================================
   GRID STATISTIQUES
========================================= */

.statsGrid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:18px;

margin-bottom:25px;

}

.statCard{

background:white;

border-radius:22px;

padding:22px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

transition:.25s;

position:relative;

overflow:hidden;

}

.statCard:hover{

transform:translateY(-6px);

box-shadow:0 20px 45px rgba(0,0,0,.15);

}

.statCard::before{

content:"";

position:absolute;

top:0;

left:0;

width:6px;

height:100%;

}

.revenue::before{

background:#16a34a;

}

.orders::before{

background:#2563eb;

}

.products::before{

background:#ff6a00;

}

.rating::before{

background:#f59e0b;

}

.statIcon{

font-size:34px;

margin-bottom:15px;

}

.statValue{

font-size:28px;

font-weight:bold;

margin-bottom:6px;

}

.statLabel{

color:#666;

font-size:14px;

}

/* =========================================
   ACTIONS RAPIDES
========================================= */

.quickActions{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(170px,1fr));

gap:15px;

margin-bottom:25px;

}

.actionCard{

background:white;

border:none;

border-radius:20px;

padding:22px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:12px;

font-size:28px;

cursor:pointer;

box-shadow:0 8px 25px rgba(0,0,0,.08);

transition:.25s;

}

.actionCard:hover{

transform:translateY(-5px);

background:#ff6a00;

color:white;

}

.actionCard span{

font-size:15px;

font-weight:bold;

}

/* =========================================
   SECTIONS
========================================= */

.sectionCard{

background:white;

border-radius:22px;

padding:22px;

margin-bottom:22px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.sectionHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:18px;

}

.sectionHeader h2{

margin:0;

font-size:22px;

}

.sectionHeader span{

background:#ff6a00;

color:white;

padding:6px 14px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}

/* =========================================
   RECHERCHE
========================================= */

.searchInput{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid #ddd;

margin-bottom:18px;

font-size:15px;

outline:none;

transition:.25s;

}

.searchInput:focus{

border-color:#ff6a00;

box-shadow:0 0 0 4px rgba(255,106,0,.15);

}
/* =========================================
   CARTES COMMANDES PREMIUM
========================================= */

.order{

background:#fff;

border-radius:18px;

padding:20px;

margin-bottom:18px;

box-shadow:0 8px 22px rgba(0,0,0,.08);

transition:.25s;

border-left:6px solid #ff6a00;

}

.order:hover{

transform:translateY(-3px);

box-shadow:0 16px 35px rgba(0,0,0,.12);

}

.orderHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.orderTitle{

font-size:18px;

font-weight:bold;

}

.orderCustomer{

margin:10px 0;

line-height:1.8;

font-size:15px;

color:#444;

}

.items{

margin-top:15px;

padding:15px;

background:#f8f8f8;

border-radius:12px;

line-height:1.8;

font-size:14px;

}

.orderFooter{

margin-top:18px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:12px;

}

.orderPrice{

font-size:22px;

font-weight:bold;

color:#16a34a;

}

.orderDate{

font-size:13px;

color:#777;

}

.orderActions{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.btnDone{

background:#16a34a;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.btnDone:hover{

background:#15803d;

}

.btnDelete{

background:#dc2626;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.btnDelete:hover{

background:#b91c1c;

}
</style>
</head>

<body>

<div class="header">Dashboard Merchant 🚀</div>

<div class="notifBell">
🔔 <span id="notifBadge" class="notifBadge">0</span>
</div>

<div class="container">

    <!-- ==========================
         CARTES STATISTIQUES
    ========================== -->

    <div class="statsGrid">

        <div class="statCard revenue">

            <div class="statIcon">💰</div>

            <div class="statValue" id="revenueValue">
                0 Kz
            </div>

            <div class="statLabel">
                Receita Total
            </div>

        </div>

        <div class="statCard orders">

            <div class="statIcon">📦</div>

            <div class="statValue" id="ordersValue">
                0
            </div>

            <div class="statLabel">
                Pedidos
            </div>

        </div>

        <div class="statCard products">

            <div class="statIcon">🛍️</div>

            <div class="statValue" id="productsValue">
                0
            </div>

            <div class="statLabel">
                Produtos
            </div>

        </div>

        <div class="statCard rating">

            <div class="statIcon">⭐</div>

            <div class="statValue" id="ratingValue">
                0.0
            </div>

            <div class="statLabel">
                Avaliação
            </div>

        </div>

    </div>

    <!-- ==========================
         ACTIONS RAPIDES
    ========================== -->

    <div class="quickActions">

        <button class="actionCard" onclick="openShop()">

            🏪

            <span>Minha Loja</span>

        </button>

        <button class="actionCard" onclick="addProduct()">

            ➕

            <span>Novo Produto</span>

        </button>

        <button class="actionCard" onclick="openCoupons()">

            🎟️

            <span>Cupons</span>

        </button>

        <button class="actionCard">

            📈

            <span>Relatórios</span>

        </button>

    </div>

    <!-- ==========================
         PEDIDOS
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>📦 Pedidos</h2>

            <span id="ordersCount">
                0
            </span>

        </div>

        <div class="filter">

            <button id="f_all" onclick="setFilter('all')">
                Todos
            </button>

            <button id="f_pending" onclick="setFilter('pending')">
                Pendentes
            </button>

            <button id="f_done" onclick="setFilter('concluido')">
                Concluídos
            </button>

        </div>

        <div id="ordersList"></div>

    </div>

    <!-- ==========================
         VENDAS DOS INFLUENCIADORES
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>📊 Influenciadores</h2>

        </div>

        <div id="influencerSales">

            Carregando...

        </div>

    </div>

    <!-- ==========================
         AVALIAÇÕES
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>⭐ Avaliações</h2>

        </div>

        <div id="reviewsBox">

            Carregando...

        </div>

    </div>

    <!-- ==========================
         PRODUTOS
    ========================== -->

    <div class="sectionCard">

        <div class="sectionHeader">

            <h2>🛍️ Produtos</h2>

        </div>

        <input
            id="searchProduct"
            class="searchInput"
            placeholder="🔍 Procurar produto..."
            oninput="filterProducts()"
        >

        <div id="productsList"></div>

    </div>

    <button
        class="btnLogout"
        onclick="logout()">

        🚪 Sair

    </button>

</div>
<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
query,
where,
onSnapshot,
updateDoc,
deleteDoc,
doc,
getDocs,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { initFCM }
from "./notifications-fcm.js";
import { onAuthStateChanged,signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser=null
let filter="all"
let allProducts = []
const ordersList = document.getElementById("ordersList")
const notifBadge = document.getElementById("notifBadge")

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(!user){
location.href="login.html"
return
}

currentUser=user
const userSnap =
await getDoc(
doc(db,"users",user.uid)
)

if(
userSnap.exists() &&
userSnap.data().blocked
){

alert(
"Sua loja foi bloqueada pelo administrador"
)

await signOut(auth)

location.href="login.html"

return

}
listenOrders()

loadProducts()

loadInfluencerSales()
loadStats()
loadReviews()
 initFCM();
})

/* LISTEN ORDERS */
function listenOrders(){

const q=query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

onSnapshot(q,(snapshot)=>{

let html=""
let count=0

snapshot.forEach(docSnap=>{

const o=docSnap.data()
const id=docSnap.id

if(filter!=="all" && o.status!==filter) return

if(!o.seen) count++

/* PRODUITS */
let itemsHTML = ""

if(o.items){
o.items.forEach(i=>{
itemsHTML += `• ${i.name} x${i.qty}<br>`
})
}else{
itemsHTML = `${o.productName} x${o.qty}`
}

html+=`
<div class="order">

<div class="orderHeader">
<span>Pedido</span>
<span class="status ${o.status==="concluido"?"done":"pending"}">
${o.status || "pending"}
</span>
</div>

👤 <b>${o.clientName}</b><br>
📞 ${o.clientPhone}<br>
📍 ${o.clientAddress}<br>

<div class="items">
${itemsHTML}
</div>
💰 Total: <b>${o.total || o.price || 0} Kz</b>

<br>

🕒 ${
o.createdAt
? new Date(o.createdAt).toLocaleString("pt-PT")
: "-"
}

<br>

<button class="btnDone" onclick="markDone('${id}')">✔ Concluir</button>
<button class="btnDelete" onclick="deleteOrder('${id}')">🗑 Supprimer</button>

</div>
`
})

ordersList.innerHTML = html || "Sem pedidos"

/* 🔔 NOTIF */
if(count>0){
notifBadge.style.display="inline-block"
notifBadge.innerText=count
}else{
notifBadge.style.display="none"
}

})

}
async function loadInfluencerSales(){

const q = query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)

const snap = await getDocs(q)

let stats = {}

snap.forEach(docSnap=>{

const o = docSnap.data()

if(!o.couponCode) return

if(!stats[o.couponCode]){

stats[o.couponCode] = {
sales:0,
amount:0,
commission:0
}

}

stats[o.couponCode].sales++

stats[o.couponCode].amount +=
Number(o.total || 0)
stats[o.couponCode].commission +=
(
Number(o.total || 0)
*
Number(o.commission || 0)
)
/100
})

let html = ""

Object.keys(stats).forEach(code=>{

html += `

<div style="
padding:12px;
border-bottom:1px solid #eee;
">

<b>${code}</b><br>

🛒 ${stats[code].sales} vendas

<br>

💰 ${stats[code].amount} Kz

<br>

💸 Comissão:
${Math.round(
stats[code].commission
)} Kz

</div>

`

})

document.getElementById(
"influencerSales"
).innerHTML =
html || "Nenhuma venda"

}
 async function loadStats(){

const ordersSnap = await getDocs(
query(
collection(db,"orders"),
where("merchantId","==",currentUser.uid)
)
)

const productsSnap = await getDocs(
query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)
)

let totalRevenue = 0
let totalOrders = 0

ordersSnap.forEach(docSnap=>{

const o = docSnap.data()

totalOrders++

totalRevenue += Number(o.total || 0)

})

document.getElementById("statsBox").innerHTML = `

💰 Receita:
<b>${totalRevenue} Kz</b><br><br>

📦 Pedidos:
<b>${totalOrders}</b><br><br>

🛍️ Produtos:
<b>${productsSnap.size}</b>

`

}
/* PRODUITS */
async function loadProducts(){

const q=query(
collection(db,"products"),
where("merchantId","==",currentUser.uid)
)

const snap=await getDocs(q)

let html=""
allProducts = []
snap.forEach(d=>{
const p=d.data()
const id=d.id
allProducts.push({
id,
...p
})
html+=`
<div class="productCard">

<div style="display:flex;justify-content:space-between;align-items:center">

<div>

<b>${p.name}</b><br>

💰 ${p.price} Kz

${p.discount ? `
<span style="
background:red;
color:white;
padding:2px 8px;
border-radius:20px;
font-size:12px;
margin-left:5px;
">
-${p.discount}%
</span>
` : ""}

</div>

<img 
src="${p.images?.[0] || ''}" 
style="
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
"
>

</div>

<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

<button onclick="editProduct('${id}')">
✏️ Modifier
</button>

<button class="btnDelete" onclick="deleteProduct('${id}')">
🗑 Supprimer
</button>

</div>

</div>
`
})

document.getElementById("productsList").innerHTML=html

}

/* ACTIONS */
window.setFilter=f=>{
filter=f
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"))
document.getElementById("f_"+(f==="pending"?"pending":f==="concluido"?"done":"all")).classList.add("active")
listenOrders()
}

window.markDone=id=>{
updateDoc(doc(db,"orders",id),{
status:"concluido",
seen:true
})
}

window.deleteOrder = async (id)=>{

if(!confirm("Apagar pedido?")) return

try{

await deleteDoc(
doc(db,"orders",id)
)

showToast(
"Pedido apagado ✅",
"success"
)

}catch(e){

showToast(
"Erro ao apagar pedido ❌",
"error"
)

console.error(e)

}

}
/* ================= EDIT PRODUCT ================= */

window.editProduct = function(id){

alert(
"ID enviado:\n" + id
)

location.href =
"edit-product.html?id=" + id

}


window.deleteProduct=async (id)=>{
if(confirm("Supprimer ce produit ?")){
await deleteDoc(doc(db,"products",id))
loadProducts()
}
}
window.filterProducts = function(){

const search =
document.getElementById("searchProduct")
.value
.toLowerCase()

const filtered =
allProducts.filter(p=>

(p.name || "")
.toLowerCase()
.includes(search)

)

let html = ""

filtered.forEach(p=>{

html += `
<div class="productCard">

<div style="
display:flex;
justify-content:space-between;
align-items:center">

<div>

<b>${p.name}</b><br>

💰 ${p.price} Kz

</div>

<img
src="${p.images?.[0] || ''}"
style="
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
">

</div>

</div>
`

})

document.getElementById(
"productsList"
).innerHTML =
html || "Nenhum produto encontrado"

}
async function loadReviews(){

const q = query(
collection(db,"reviews"),
where("merchantId","==",currentUser.uid)
)

const snap = await getDocs(q)

let html = ""

let totalStars = 0

snap.forEach(docSnap=>{

const r = docSnap.data()

totalStars += Number(r.rating || 0)

html += `

<div style="
padding:12px;
border-bottom:1px solid #eee;
">

<div style="
color:#f59e0b;
font-size:18px;
">
${"⭐".repeat(r.rating || 0)}
</div>

<b>${r.clientName || "Cliente"}</b>

<br>

${r.comment || ""}

<br>

<small style="color:#666">
${r.productName || ""}
</small>

</div>

`

})

const avg =
snap.size > 0
? (totalStars / snap.size).toFixed(1)
: "0.0"

document.getElementById("reviewsBox").innerHTML = `

<div style="
margin-bottom:12px;
font-weight:bold;
">

⭐ Média: ${avg}/5
(${snap.size} avaliações)

</div>

${html || "Nenhuma avaliação"}

`

}
window.openShop=()=>{
location.href="merchant-shop.html?id="+currentUser.uid
}

window.addProduct=()=>{
location.href="add-product.html"
}
window.openCoupons = ()=>{

location.href =
"merchant-coupons.html"

}
window.logout=async ()=>{
await signOut(auth)
location.href="index.html"
}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Loja</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER SHOP */

.shopHeader{
background:white;
padding:25px;
border-bottom:1px solid #eee;
text-align:center;
}

.shopTop{
display:flex;
justify-content:space-between;
align-items:center;
}

.shopName{
font-size:30px;
font-weight:bold;
color:#111;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
background:#ddd;
}

.publishBtn{
background:#1aa34a;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* PRODUCTS */

.products{
column-count:2;
column-gap:12px;
padding:12px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:12px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
}

.product img{
width:100%;
}

.info{
padding:10px;
}

.name{
font-weight:bold;
margin-bottom:4px;
}

.price{
color:#ff6a00;
font-weight:bold;
}

.desc{
font-size:13px;
color:#555;
margin-top:4px;
}

/* DELETE BUTTON */

.deleteBtn{
position:absolute;
top:8px;
right:8px;
background:red;
color:white;
border:none;
border-radius:20px;
padding:5px 10px;
font-size:12px;
cursor:pointer;
}

/* REVIEWS */

.reviews{
background:white;
margin-top:20px;
padding:15px;
}

.review{
border-bottom:1px solid #eee;
padding:8px 0;
}

.stars{
color:orange;
}

</style>

</head>

<body>


<!-- SHOP HEADER -->

<div class="shopHeader">

<div class="shopTop">

<div class="shopName" id="shopName">
Minha Loja
</div>

<img id="profilePic" class="profile">

<button class="publishBtn" onclick="location.href='add-product.html'">
Publicar produtos
</button>

</div>

</div>



<!-- PRODUCTS -->

<div id="productList" class="products"></div>



<!-- CLIENT REVIEWS -->

<div class="reviews">

<h3>Avaliações dos clientes</h3>

<div id="reviewList"></div>

</div>



<script type="module">

import { db,auth } from "./firebase.js"

import {
collection,
getDocs,
query,
where,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"



let currentUser



/* PROFILE PHOTO */

const profilePic=document.getElementById("profilePic")

profilePic.src=localStorage.getItem("profilePic") || ""



/* PRODUCT CARD */

function productHTML(p){

let desc=""

if(p.description){
desc=p.description.split("\n")[0].slice(0,50)
}

const img=p.images ? p.images[0] : ""

return `

<div class="product">

<button onclick="deleteProduct('${p.id}')" class="deleteBtn">
Excluir
</button>

<img src="${img}">

<div class="info">

<div class="name">${p.name}</div>

<div class="price">${p.price} Kz</div>

<div class="desc">${desc}</div>

</div>

</div>

`

}



/* LOAD MERCHANT PRODUCTS */

async function loadProducts(uid){

const q=query(
collection(db,"products"),
where("merchantId","==",uid)
)

const snap=await getDocs(q)

const container=document.getElementById("productList")

container.innerHTML=""

snap.forEach(docSnap=>{

const data=docSnap.data()

data.id=docSnap.id

container.innerHTML+=productHTML(data)

})

}



/* DELETE PRODUCT */

window.deleteProduct=async function(id){

const ok=confirm("Excluir produto?")

if(!ok)return

await deleteDoc(doc(db,"products",id))

alert("Produto removido")

location.reload()

}



/* LOAD REVIEWS */

async function loadReviews(uid){

const q=query(
collection(db,"reviews"),
where("merchantId","==",uid)
)

const snap=await getDocs(q)

const box=document.getElementById("reviewList")

snap.forEach(docSnap=>{

const r=docSnap.data()

box.innerHTML+=`

<div class="review">

<div class="stars">
⭐ ${r.rating}/5
</div>

<div>${r.comment}</div>

</div>

`

})

}



/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(!user){

location.href="index.html"

return

}

currentUser=user

loadProducts(user.uid)

loadReviews(user.uid)

})

</script>

</body>

</html>

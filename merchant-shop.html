<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Loja | Toma</title>

<link rel="stylesheet" href="merchant-dashboard-v2.css">

<link rel="stylesheet" href="merchant-shop.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

</head>

<body>

<div class="productsPage">

<header class="productsHeader">

<div class="leftHeader">

<a href="merchant-dashboard-v2.html" class="backButton">

<span class="material-symbols-rounded">

arrow_back

</span>

</a>

<div>

<h1>Minha Loja</h1>

<p>Gerencie o perfil da sua loja.</p>

</div>

</div>

</header>

<section class="shopProfile">

<div class="shopBanner">

<img id="shopBannerImage"

src="assets/default-banner.jpg"

alt="Banner da Loja">

</div>

<div class="shopInfoCard">

<img id="shopLogo"

class="shopLogo"

src="assets/default-store.png"

alt="Logo da Loja">

<h2 id="shopTitle">

Minha Loja

</h2>

<p id="shopDescription">

Descrição da loja...

</p>

<div class="shopDetails">

<p><strong>📍 Cidade:</strong> <span id="shopCity">-</span></p>

<p><strong>📞 Telefone:</strong> <span id="shopPhone">-</span></p>

<p><strong>⭐ Avaliação:</strong> <span>5.0</span></p>

<p><strong>📦 Produtos:</strong> <span id="shopProducts">0</span></p>

</div>

<div class="shopButtons">

<button id="editShopBtn">

Editar Loja

</button>

<button id="shareShopBtn">

Partilhar Loja

</button>

</div>

</div>

</section>
<section class="shopProductsSection">

<h2 class="sectionTitle">

Produtos da Loja

</h2>

<div id="shopProductsGrid" class="shopProductsGrid">

</div>

</section>
</div>

<script type="module"

src="./js/merchant-shop.js">

</script>

</body>

</html>

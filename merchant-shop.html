 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* BANNER */
.banner{
height:120px;
background:linear-gradient(135deg,#ff6a00,#ff8c42);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
font-weight:bold;
}

/* SHOP CARD */
.shopCard{
background:white;
margin:-30px 15px 10px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

/* NAME */
.shopName{
font-size:20px;
font-weight:bold;
}

/* BADGE */
.badge{
background:#1aa34a;
color:white;
padding:3px 8px;
border-radius:12px;
font-size:12px;
margin-left:5px;
}

/* INFO */
.info{
font-size:13px;
color:#555;
margin-top:5px;
}

/* BUTTON */
.contactBtn{
margin-top:10px;
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
font-size:15px;
cursor:pointer;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

/* TEXT */
.name{
font-size:13px;
font-weight:bold;
margin-top:5px;
}

.price{
color:#ff6a00;
font-weight:bold;
font-size:14px;
}

</style>

</head>

<body>

<div id="banner" class="banner">Carregando...</div>

<div id="shopCard" class="shopCard"></div>

<div id="products" class="products"></div>

<script type="module">

import { db } from "./firebase.js"
import {
collection,getDocs,query,where,doc,getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const urlParams = new URLSearchParams(window.location.search)
const merchantId = urlParams.get("id")

let shopData=null

async function loadShop(){

/* 🔥 LOAD SHOP */
const userSnap = await getDoc(doc(db,"users",merchantId))
shopData = userSnap.data()

/* BANNER */
document.getElementById("banner").innerText = shopData?.shopName || "Loja"

/* LOAD PRODUCTS */
const q = query(
collection(db,"products"),
where("merchantId","==",merchantId)
)

const snap = await getDocs(q)

let count = snap.size

/* SHOP CARD */
document.getElementById("shopCard").innerHTML = `
<div class="shopName">
${shopData?.shopName || "Loja"}
<span class="badge">Verificado</span>
</div>

<div class="info">
${count} produtos disponíveis
</div>

<button class="contactBtn" onclick="contactShop()">
💬 Falar no WhatsApp
</button>
`

/* PRODUCTS */
let html=""

snap.forEach(docSnap=>{
const p = docSnap.data()

html += `
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0] || ''}">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
</div>
`
})

document.getElementById("products").innerHTML = html

}

/* OPEN PRODUCT */
window.openProduct = function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* WHATSAPP */
window.contactShop = function(){

if(!shopData?.whatsapp){
alert("Número indisponível ❌")
return
}

const msg = encodeURIComponent("Olá, vi sua loja e gostaria de mais informações.")

const url = "https://wa.me/" + shopData.whatsapp + "?text=" + msg

window.open(url,"_blank")
}

loadShop()

</script>

</body>
</html>

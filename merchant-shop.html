 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja do vendedor</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
}

.back{
margin-right:10px;
cursor:pointer;
}

/* SHOP HEADER */

.shopHeader{
background:white;
padding:20px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.shopHeader img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
}

.shopName{
font-size:26px;
font-weight:bold;
}

.verified{
color:green;
font-weight:bold;
}

.followBtn{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
font-size:18px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:15px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#ff6a00;
font-weight:bold;
}

/* REVIEWS */

.reviews{
padding:15px;
}

.review{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.star{
color:gold;
}

</style>

</head>

<body>

<div class="header">

<span class="back" onclick="history.back()">⬅</span>

Perfil vendedor

</div>


<div class="shopHeader">

<img id="shopPhoto">

<div class="shopName" id="shopName"></div>

<div class="verified" id="verified"></div>

<div class="stats">

<div id="productCount"></div>

<div id="followers"></div>

</div>

<button class="followBtn" onclick="followShop()">
❤️ Seguir loja
</button>

</div>


<h2 style="padding:15px">🔥 Produtos populares</h2>

<div id="productList" class="products"></div>


<h2 style="padding:15px">⭐ Avaliações</h2>

<div id="reviews" class="reviews"></div>


<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
query,
where,
getDocs,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const params=new URLSearchParams(window.location.search)

const merchantId=params.get("id")


/* LOAD MERCHANT */

async function loadMerchant(){

const snap=await getDoc(doc(db,"merchants",merchantId))

if(!snap.exists()) return

const data=snap.data()

document.getElementById("shopName").innerText=data.shopName

document.getElementById("shopPhoto").src=data.photo || ""

document.getElementById("followers").innerText=
(data.followers || 0)+" seguidores"

if(data.verified){

document.getElementById("verified").innerText="✔ Vendedor verificado"

}

}

loadMerchant()


/* FOLLOW SHOP */

window.followShop=async function(){

await addDoc(collection(db,"followers"),{

merchantId:merchantId,

time:Date.now()

})

alert("Você segue esta loja")

}


/* LOAD PRODUCTS */

async function loadProducts(){

const q=query(
collection(db,"products"),
where("merchantId","==",merchantId)
)

const snap=await getDocs(q)

const container=document.getElementById("productList")

container.innerHTML=""

let count=0

snap.forEach(docSnap=>{

const data=docSnap.data()

count++

const img=data.image || (data.images ? data.images[0] : "")

container.innerHTML+=`

<div class="product">

<img src="${img}">

<div>${data.name}</div>

<div class="price">${data.price} Kz</div>

</div>

`

})

document.getElementById("productCount").innerText=
count+" produtos"

}

loadProducts()


/* LOAD REVIEWS */

async function loadReviews(){

const q=query(
collection(db,"reviews"),
where("merchantId","==",merchantId)
)

const snap=await getDocs(q)

const container=document.getElementById("reviews")

container.innerHTML=""

snap.forEach(docSnap=>{

const data=docSnap.data()

let stars=""

for(let i=0;i<data.rating;i++){

stars+="⭐"

}

container.innerHTML+=`

<div class="review">

<div class="star">${stars}</div>

<div>${data.comment}</div>

</div>

`

})

}

loadReviews()

</script>

</body>

</html>

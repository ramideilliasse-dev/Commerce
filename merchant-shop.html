<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* BANNER */

.banner{
height:150px;
background:linear-gradient(45deg,#ff6a00,#ff9900);
}

/* SHOP HEADER */

.shopHeader{
background:white;
padding:15px;
margin-top:-50px;
border-radius:14px 14px 0 0;
}

.shopTop{
display:flex;
align-items:center;
gap:12px;
}

.shopTop img{
width:70px;
height:70px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
}

.shopName{
font-size:22px;
font-weight:bold;
}

.verified{
color:green;
font-weight:bold;
font-size:14px;
}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.followBtn{
background:#ff6a00;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.chatBtn{
background:#eee;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

/* SEARCH */

.search{
background:white;
padding:10px;
}

.search input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid #ddd;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
border-radius:10px;
padding:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#ff6a00;
font-weight:bold;
margin-top:5px;
text-align:center;
}

</style>

</head>

<body>


<div class="banner"></div>


<div class="shopHeader">

<div class="shopTop">

<img id="shopPhoto">

<div>

<div id="shopName" class="shopName"></div>

<div id="verified" class="verified"></div>

</div>

</div>


<div class="actions">

<button class="followBtn" onclick="followShop()">
Seguir loja
</button>

<button class="chatBtn" onclick="chatSeller()">
Discuter
</button>

</div>

</div>


<div class="search">

<input id="search" placeholder="Pesquisar produto nesta loja...">

</div>


<div id="productList" class="products"></div>



<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


const params=new URLSearchParams(window.location.search)

const merchantId=params.get("id")

let products=[]


/* LOAD SHOP */

async function loadShop(){

const snap=await getDoc(doc(db,"merchants",merchantId))

const data=snap.data()

document.getElementById("shopName").innerText=data.name

document.getElementById("shopPhoto").src=data.photo

if(data.verified){

document.getElementById("verified").innerText="✔ Vendedor verificado"

}

}

loadShop()


/* LOAD PRODUCTS */

async function loadProducts(){

const q=query(

collection(db,"products"),

where("merchantId","==",merchantId)

)

const snap=await getDocs(q)

const container=document.getElementById("productList")

container.innerHTML=""

products=[]

snap.forEach(docSnap=>{

const data=docSnap.data()

data.id=docSnap.id

products.push(data)

container.innerHTML+=productHTML(data)

})

}

loadProducts()


function productHTML(data){

return `

<div class="product" onclick="viewProduct('${data.id}')">

<img src="${data.image}">

<div class="price">${data.price} Kz</div>

</div>

`

}


window.viewProduct=function(id){

location.href="product.html?id="+id

}


/* SEARCH IN SHOP */

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase()

const container=document.getElementById("productList")

container.innerHTML=""

products.forEach(p=>{

if(p.name.toLowerCase().includes(value)){

container.innerHTML+=productHTML(p)

}

})

})


/* FOLLOW SHOP */

window.followShop=function(){

let follows=JSON.parse(localStorage.getItem("follows"))||[]

if(!follows.includes(merchantId)){

follows.push(merchantId)

localStorage.setItem("follows",JSON.stringify(follows))

alert("Loja seguida com sucesso")

}

}


/* CHAT SELLER */

window.chatSeller=function(){

location.href="chat.html?merchant="+merchantId

}

</script>

</body>

</html>

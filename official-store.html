 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Loja Oficial</title>

<link rel="stylesheet" href="official-store.css">

</head>

<body>

<header class="storeHeader">

<button id="backBtn">
←
</button>

<h2>
Loja Oficial
</h2>

</header>

<section class="storeBanner">

<img id="storeBanner">

</section>

<section class="storeProfile">

<img
id="storeLogo"
class="storeLogo">

<div class="storeInfo">

<h1 id="storeName"></h1>

<div class="verifiedRow">

<img
src="images/stores/meta-verified.png"
class="verifiedBadge">

<span>
Verificado
</span>

</div>

<p id="storeProducts">
0 produtos
</p>

</div>

</section>

<section class="storeSearch">

<input
id="searchInput"
type="text"
placeholder="Pesquisar nesta loja...">

</section>

<section
id="productsGrid"
class="productsGrid">

</section>

<script type="module"
src="./js/official-store.js">

</script>

</body>

</html>

 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Marchand</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#111;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.product{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

img{
border-radius:6px;
}

</style>

</head>
<body>

<h2 id="welcome"></h2>

<div id="dashboard">

<h3>Ajouter un produit</h3>

<input id="productName" placeholder="Nom du produit">

<input id="productPrice" placeholder="Prix">

<select id="productCategory">

<option value="">Choisir catégorie</option>
<option value="Electronique">Electronique</option>
<option value="Téléphone">Téléphone</option>
<option value="Vêtements">Vêtements</option>
<option value="Maison">Maison</option>
<option value="Voiture">Voiture</option>

</select>

<textarea id="productDescription" placeholder="Description"></textarea>

<label>Images produit</label>
<input type="file" id="productImages" multiple>

<label>Vidéo produit (optionnel)</label>
<input type="file" id="productVideo">

<button id="addBtn" onclick="addProduct()">
Ajouter produit
</button>

<hr>

<h3>Mes produits</h3>

<div id="myProducts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
getFirestore,
collection,
addDoc,
query,
where,
getDocs,
deleteDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
authDomain: "angcomerce-v1.firebaseapp.com",
projectId: "angcomerce-v1",

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser;
let merchantPhone="";

const welcome=document.getElementById("welcome");


/* ================= AUTH ================= */

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="merchant-register.html";
return;

}

currentUser=user;

welcome.innerText="Bienvenue "+user.email;

/* charger téléphone marchand */

const userSnap=await getDoc(doc(db,"users",user.uid));

if(userSnap.exists()){
merchantPhone=userSnap.data().phone || "";
}

loadMyProducts();

});


/* ================= ADD PRODUCT ================= */

window.addProduct = async function(){

const btn=document.getElementById("addBtn");

btn.disabled=true;
btn.innerText="Upload...";

const name=document.getElementById("productName").value;
const price=document.getElementById("productPrice").value;
const description=document.getElementById("productDescription").value;
const category=document.getElementById("productCategory").value;

const imageFiles=document.getElementById("productImages").files;
const videoFile=document.getElementById("productVideo").files[0];

if(!name || !price || !description || !category){

alert("Remplis tous les champs");

btn.disabled=false;
btn.innerText="Ajouter produit";

return;

}

try{

/* ================= UPLOAD IMAGES ================= */

const uploadPromises=[];

for(let i=0;i<imageFiles.length;i++){

const formData=new FormData();

formData.append("file",imageFiles[i]);
formData.append("upload_preset","angcomerce-upload");

uploadPromises.push(

fetch("https://api.cloudinary.com/v1_1/df2oxw2qp/image/upload",{

method:"POST",
body:formData

}).then(res=>res.json())

);

}

const uploadResults=await Promise.all(uploadPromises);

const imageUrls=uploadResults.map(data=>data.secure_url);


/* ================= UPLOAD VIDEO ================= */

let videoUrl="";

if(videoFile){

const formData=new FormData();

formData.append("file",videoFile);
formData.append("upload_preset","angcomerce-upload");

const videoUpload=await fetch(
"https://api.cloudinary.com/v1_1/df2oxw2qp/video/upload",
{
method:"POST",
body:formData
}
);

const videoData=await videoUpload.json();

videoUrl=videoData.secure_url;

}


/* ================= FIRESTORE ================= */

await addDoc(collection(db,"products"),{

name,
price:Number(price),
description,
category,
images:imageUrls,
video:videoUrl,
merchantId:currentUser.uid,
merchantPhone:merchantPhone,
createdAt:new Date()

});

alert("Produit ajouté avec succès");

loadMyProducts();

/* reset */

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productDescription").value="";
document.getElementById("productImages").value="";
document.getElementById("productVideo").value="";

}catch(error){

alert("Erreur : "+error.message);

}

btn.disabled=false;

btn.innerText="Ajouter produit";

};


/* ================= LOAD PRODUCTS ================= */

async function loadMyProducts(){

const q=query(

collection(db,"products"),
where("merchantId","==",currentUser.uid)

);

const snapshot=await getDocs(q);

const container=document.getElementById("myProducts");

container.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const productId=docSnap.id;

let imagesHTML="";

if(data.images){

data.images.forEach(img=>{
imagesHTML+=`<img src="${img}" width="70" style="margin:5px;">`;
});

}

container.innerHTML+=`

<div class="product">

<b>${data.name}</b>

<p>${data.description}</p>

<p><b>${data.price} Kz</b></p>

<p>Catégorie : ${data.category}</p>

<div>${imagesHTML}</div>

<button onclick="deleteProduct('${productId}')"
style="background:red">
Supprimer
</button>

</div>

`;

});

}


/* ================= DELETE ================= */

window.deleteProduct=async function(productId){

const confirmDelete=confirm("Supprimer ce produit ?");

if(!confirmDelete) return;

await deleteDoc(doc(db,"products",productId));

alert("Produit supprimé");

loadMyProducts();

}

</script>

</body>
</html>

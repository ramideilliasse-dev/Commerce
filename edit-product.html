 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Produto</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f6f7fb;
}
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:100;
}
.container{
max-width:700px;
margin:auto;
padding:15px;
}
.backBtn{
background:#111;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}
.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.imageBox{
display:flex;
justify-content:center;
margin-bottom:20px;
}
#productImage{
width:180px;
height:180px;
object-fit:cover;
border-radius:16px;
background:#eee;
border:4px solid #f3f3f3;
}
label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}
input,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
box-sizing:border-box;
font-size:15px;
}
textarea{
height:140px;
resize:none;
}
.preview{
display:flex;
gap:10px;
margin-top:15px;
}
.previewBox{
flex:1;
background:#f8f8f8;
padding:15px;
border-radius:12px;
text-align:center;
}
.previewBox b{
display:block;
margin-top:5px;
font-size:18px;
}
#previewFinal{
color:#1aa34a;
}
.saveBtn{
width:100%;
padding:16px;
margin-top:20px;
background:#1aa34a;
color:white;
border:none;
border-radius:14px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}
.saveBtn:disabled{
opacity:.7;
cursor:not-allowed;
}
/* TOAST */
.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}
.toast{
min-width:220px;
padding:14px 18px;
border-radius:14px;
color:white;
font-weight:bold;
animation:fade .3s ease;
}
.success{
background:#1aa34a;
}
.error{
background:#dc2626;
}
@keyframes fade{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>
<div class="header">
✏️ Editar Produto
</div>
<div class="container">

← Voltar
<div class="card">
<div class="imageBox">
<img id="productImage">
</div>

Nome do Produto
Preço (Kz)
Desconto (%)
<div class="preview">
<div class="previewBox">
Preço Original
<b id="previewPrice">
0 Kz
</b>
</div>
<div class="previewBox">
Preço Final
<b id="previewFinal">
0 Kz
</b>
</div>
</div>

Descrição

<textarea id="description"></textarea>

💾 Guardar Alterações

</button>
</div>
</div>
<div id="toastBox" class="toastBox"></div>
<script type="module">
import { db } from "./firebase.js"
import {
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
const productId =
new URLSearchParams(location.search)
.get("id")
 alert(
"URL:\n" +
location.href
)

alert(
"Product ID:\n" +
productId
)
const nameInput =
document.getElementById("name")
const priceInput =
document.getElementById("price")
const discountInput =
document.getElementById("discount")
const descriptionInput =
document.getElementById("description")
const saveBtn =
document.getElementById("saveBtn")
function showToast(
message,
type="success"
){
const box =
document.getElementById("toastBox")
const toast =
document.createElement("div")
toast.className =
"toast " + type
toast.innerText =
message
box.appendChild(toast)
setTimeout(()=>{
toast.remove()
},3000)
}
function updatePreview(){
const price =
Number(priceInput.value || 0)
const discount =
Number(discountInput.value || 0)
const finalPrice =
price -
(price * discount / 100)
document.getElementById(
"previewPrice"
).innerText =
price + " Kz"
document.getElementById(
"previewFinal"
).innerText =
Math.round(finalPrice)
+ " Kz"
}
priceInput.addEventListener(
"input",
updatePreview
)
discountInput.addEventListener(
"input",
updatePreview
)
async function loadProduct(){
if(!productId){
showToast(
"Produto não encontrado",
"error"
)
return
}
const snap =
await getDoc(
doc(db,"products",productId)
)
 alert(
"Document existe ?\n" +
snap.exists()
)
if(!snap.exists()){
showToast(
"Produto não encontrado",
"error"
)
return
}
const p = snap.data()

alert(
"Nome:\n" +
(p.name || "VIDE")
)

alert(
"Preço:\n" +
(p.price || 0)
)

alert(
"Imagem:\n" +
(p.images?.[0] || "SEM IMAGEM")
)

if(p.images && p.images.length > 0){
document.getElementById("productImage").src =
p.images[0]
}
nameInput.value =
p.name || ""
priceInput.value =
p.price || ""
discountInput.value =
p.discount || 0
descriptionInput.value =
p.description || ""
updatePreview()
}
loadProduct()
saveBtn.onclick =
async ()=>{
saveBtn.disabled = true
saveBtn.innerText =
"Guardando..."
try{
await updateDoc(
doc(
db,
"products",
productId
),
{
name:
nameInput.value.trim(),
price:
Number(
priceInput.value
),
discount:
Number(
discountInput.value
),
description:
descriptionInput.value.trim()
}
)
showToast(
"Produto atualizado ✅"
)
setTimeout(()=>{
location.href =
"merchant-dashboard.html"
},1000)
}catch(err){
console.error(err)
showToast(
"Erro ao atualizar",
"error"
)
saveBtn.disabled =
false
saveBtn.innerText =
"💾 Guardar Alterações"
}
}
</script>
</body>
</html>

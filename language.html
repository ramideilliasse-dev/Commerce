 <!DOCTYPE html>

<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Idioma</title>

<link rel="stylesheet"
href="language.css">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded"
rel="stylesheet">

</head>

<body>

<header class="header">

<button onclick="history.back()">

<span class="material-symbols-rounded">

arrow_back

</span>

</button>

<h2 data-i18n="language">Idioma</h2>

</header>

<div class="languages">

<div class="languageCard"
data-lang="pt">

<span class="flag">🇵🇹</span>

<div>

<h3 data-i18n="portuguese">Português</h3>

<p>Portugal / Angola</p>

</div>

</div>

<div class="languageCard"
data-lang="fr">

<span class="flag">🇫🇷</span>

<div>

<h3 data-i18n="french">Français</h3>

<p>France</p>

</div>

</div>

<div class="languageCard"
data-lang="en">

<span class="flag">🇬🇧</span>

<div>

<h3 data-i18n="english">English</h3>

<p>United Kingdom</p>

</div>

</div>

</div>

<script type="module"
src="./js/language.js">

</script>

</body>

</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HEADER */
.header{
background:#ff6a00;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* LIST */
#list{
padding:10px;
}

/* ITEM */
.item{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.left{
display:flex;
gap:10px;
align-items:center;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.texts{
display:flex;
flex-direction:column;
}

.name{
font-weight:bold;
}

.last{
font-size:13px;
color:#666;
}

.right{
text-align:right;
font-size:12px;
color:#888;
}

.badge{
background:red;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:11px;
margin-top:5px;
display:inline-block;
}
</style>
</head>

<body>

<div class="header">Mensagens 💬</div>

<div id="list"></div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const list = document.getElementById("list")

onAuthStateChanged(auth,(user)=>{

if(!user) return

const q = query(
collection(db,"conversations"),
where("participants","array-contains",user.uid)
)

onSnapshot(q,(snap)=>{

let html=""

snap.forEach(docSnap=>{

const c = docSnap.data()

/* 🔥 nom autre utilisateur */
let other = c.participants.find(p => p !== user.uid)

/* 🔴 messages non lus */
let unread = c.unread?.[user.uid] || 0

html += `
<div class="item" onclick="openChat('${docSnap.id}')">

<div class="left">
<div class="avatar">👤</div>

<div class="texts">
<div class="name">Vendedor</div>
<div class="last">${c.lastMessage || "Nova conversa"}</div>
</div>
</div>

<div class="right">
<div>${formatTime(c.lastMessageTime)}</div>
${unread > 0 ? `<div class="badge">${unread}</div>` : ""}
</div>

</div>
`

})

list.innerHTML = html

})

})

/* ⏰ FORMAT TEMPS */
function formatTime(t){
if(!t) return ""

let d = new Date(t)
return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})
}

/* 👉 OUVRIR CHAT */
window.openChat = (id)=>{
location.href = "chat.html?id=" + id
}

</script>

</body>
</html>

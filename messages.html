 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagens</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
font-size:18px;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
}

/* CHAT LIST */

.chatList{
padding:10px;
}

/* CHAT ITEM */

.chatItem{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

/* PHOTO */

.chatItem img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

/* CHAT INFO */

.chatInfo{
flex:1;
}

/* NAME */

.chatName{
font-size:20px;
font-weight:bold;
}

/* LAST MESSAGE */

.chatMsg{
font-size:17px;
color:#555;
margin-top:4px;
}

/* RIGHT */

.chatRight{
text-align:right;
}

/* TIME */

.time{
font-size:14px;
color:#777;
}

/* NOTIFICATION */

.badge{
background:red;
color:white;
font-size:13px;
padding:3px 7px;
border-radius:20px;
margin-top:6px;
display:inline-block;
}

</style>

</head>

<body>

<div class="header">
Mensagens
</div>

<div id="chatList" class="chatList"></div>


<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


async function loadChats(){

const snap = await getDocs(collection(db,"chats"))

const container = document.getElementById("chatList")

container.innerHTML=""

snap.forEach(doc=>{

const data = doc.data()

const time = new Date(data.lastTime || Date.now())

const hour = time.getHours()+":"+time.getMinutes()

container.innerHTML += `

<div class="chatItem" onclick="openChat('${data.merchantId}','${data.productId}')">

<img src="${data.merchantPhoto || ''}">

<div class="chatInfo">

<div class="chatName">
${data.merchantName || "Vendedor"}
</div>

<div class="chatMsg">
${data.lastMessage || "Nova conversa"}
</div>

</div>

<div class="chatRight">

<div class="time">
${hour}
</div>

${data.unread ? "<div class='badge'>Novo</div>" : ""}

</div>

</div>

`

})

}


/* OPEN CHAT */

window.openChat=function(merchant,product){

window.location.href="chat.html?merchant="+merchant+"&product="+product

}


loadChats()

</script>

</body>

</html>

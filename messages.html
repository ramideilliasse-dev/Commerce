 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
}

.header{
background:#202c33;
padding:15px;
font-size:20px;
font-weight:bold;
}

#list{
padding:10px;
}

.item{
background:#202c33;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.left{
display:flex;
gap:10px;
align-items:center;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
background:#555;
}

.texts{
display:flex;
flex-direction:column;
}

.name{font-weight:bold;}
.last{font-size:13px;color:#aaa;}

.right{
text-align:right;
font-size:12px;
color:#aaa;
}

.badge{
background:#00a884;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:11px;
margin-top:5px;
display:inline-block;
}
</style>

</head>

<body>

<div class="header">💬 Mensagens</div>
<div id="list"></div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
query,
where,
onSnapshot,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const list = document.getElementById("list")

onAuthStateChanged(auth, (user)=>{

if(!user){
list.innerHTML = "<p style='padding:10px'>Faça login ❌</p>"
return
}

const q = query(
collection(db,"conversations"),
where("participants","array-contains",user.uid)
)

onSnapshot(q, async (snap)=>{

let html=""

if(snap.empty){
html = "<p style='padding:10px'>Sem mensagens 💬</p>"
}

for(const docSnap of snap.docs){

const c = docSnap.data()

/* 🔥 VALIDATION */
if(!c.participants || c.participants.length !== 2) continue

let other = c.participants.find(p => p !== user.uid)
if(!other) continue

/* 🔥 LOAD USER */
let userData = {}
try{
const userSnap = await getDoc(doc(db,"users",other))
userData = userSnap.data() || {}
}catch(e){}

/* 🔴 UNREAD */
let unread = c.unread?.[user.uid] || 0

html += `
<div class="item" onclick="openChat('${other}')">

<div class="left">
<img class="avatar" src="${userData.photo || 'https://i.ibb.co/4pDNDk1/avatar.png'}">

<div class="texts">
<div class="name">${userData.shopName || userData.email || "Utilizador"}</div>
<div class="last">${c.lastMessage || "Nova conversa"}</div>
</div>
</div>

<div class="right">
<div>${formatTime(c.lastMessageTime)}</div>
${unread > 0 ? `<div class="badge">${unread}</div>` : ""}
</div>

</div>
`
}

list.innerHTML = html

})

})

function formatTime(t){
if(!t) return ""
let d = new Date(t)
return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})
}

/* 🔥 VERSION ULTRA STABLE */
window.openChat = (otherId)=>{

const user = auth.currentUser

if(!user){
alert("Login necessário ❌")
location.href="login.html"
return
}

/* 🔥 RECONSTRUCTION GARANTIE */
const chatId = [user.uid, otherId].sort().join("_")

location.href = "chat.html?id=" + chatId
}

</script>

</body>
</html>

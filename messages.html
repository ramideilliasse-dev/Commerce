 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
}

/* HEADER */
.header{
background:#202c33;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* LIST */
#list{
padding:10px;
}

/* ITEM */
.item{
background:#202c33;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.left{
display:flex;
gap:10px;
align-items:center;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.texts{
display:flex;
flex-direction:column;
}

.name{
font-weight:bold;
}

.last{
font-size:13px;
color:#aaa;
}

.right{
text-align:right;
font-size:12px;
color:#aaa;
}

.badge{
background:#00a884;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:11px;
margin-top:5px;
display:inline-block;
}
</style>

</head>

<body>

<div class="header">💬 Mensagens</div>

<div id="list"></div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const list = document.getElementById("list")

onAuthStateChanged(auth,(user)=>{

if(!user){
list.innerHTML = "<p style='padding:10px'>Faça login ❌</p>"
return
}

/* 🔥 RECUPERER CONVERSATIONS */
const q = query(
collection(db,"conversations"),
where("participants","array-contains",user.uid)
)

onSnapshot(q,(snap)=>{

let html=""

if(snap.empty){
html = "<p style='padding:10px'>Sem mensagens 💬</p>"
}

snap.forEach(docSnap=>{

const c = docSnap.data()

/* 🔥 AUTRE USER */
let other = c.participants.find(p => p !== user.uid)

/* 🔴 UNREAD */
let unread = c.unread?.[user.uid] || 0

html += `
<div class="item" onclick="openChat('${docSnap.id}')">

<div class="left">
<div class="avatar">👤</div>

<div class="texts">
<div class="name">Cliente</div>
<div class="last">${c.lastMessage || "Nova conversa"}</div>
</div>
</div>

<div class="right">
<div>${formatTime(c.lastMessageTime)}</div>
${unread > 0 ? `<div class="badge">${unread}</div>` : ""}
</div>

</div>
`
})

list.innerHTML = html

})

})

/* ⏰ TEMPS */
function formatTime(t){
if(!t) return ""
let d = new Date(t)
return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})
}

/* 🔥 FIX CRITIQUE ICI */
window.openChat = (id)=>{
location.href = "chat.html?id=" + id
}
</script>

</body>
</html>

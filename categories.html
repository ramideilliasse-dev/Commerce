 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categorias</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

/* CONTAINER */

.container{
padding:20px;
}

/* CATEGORY CARD */

.cat{
background:white;
padding:22px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
cursor:pointer;
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
transition:0.2s;
}

/* ICON */

.icon{
font-size:30px;
margin-right:15px;
}

/* HOVER EFFECT */

.cat:hover{
transform:scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* BACK BUTTON */

.back{
margin:15px;
display:inline-block;
background:#ff6a00;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>


<div class="header">
Categorias
</div>


<a href="index.html" class="back">← Voltar</a>


<div class="container">

<div class="cat" onclick="go('telefone')">
<span class="icon">📱</span>
Telefones
</div>

<div class="cat" onclick="go('roupas')">
<span class="icon">👕</span>
Roupas
</div>

<div class="cat" onclick="go('beleza')">
<span class="icon">💄</span>
Beleza
</div>

<div class="cat" onclick="go('eletronica')">
<span class="icon">💻</span>
Eletrónica
</div>

<div class="cat" onclick="go('casa')">
<span class="icon">🏠</span>
Casa
</div>

<div class="cat" onclick="go('auto')">
<span class="icon">🚗</span>
Auto & Moto
</div>

</div>


<script>

function go(cat){

window.location.href="index.html?cat="+cat

}

</script>


</body>
</html>

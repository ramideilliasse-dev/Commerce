 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
<title>Categorias</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{

background:white;

padding:22px;

box-shadow:0 2px 10px rgba(0,0,0,.05);

position:sticky;

top:0;

z-index:100;

}

.headerTitle{

font-size:30px;

font-weight:bold;

color:#111827;

margin-bottom:15px;

}

.searchBox{

display:flex;

align-items:center;

background:#f3f4f6;

border-radius:16px;

padding:14px 18px;

}

.searchBox input{

border:none;

background:none;

outline:none;

font-size:16px;

flex:1;

}

.container{

padding:18px;

}

.categoryCard{

position:relative;

height:110px;

border-radius:22px;

overflow:hidden;

margin-bottom:18px;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.25s;

}

.categoryCard:hover{

transform:translateY(-3px);

}

.categoryImage{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

object-fit:cover;

}

.categoryOverlay{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background:linear-gradient(
90deg,
rgba(0,0,0,.65),
rgba(0,0,0,.15)
);

}

.categoryContent{

position:relative;

z-index:2;

display:flex;

align-items:center;

height:100%;

padding:20px;

}

.categoryIcon{

width:58px;

height:58px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

background:white;

margin-right:16px;

flex-shrink:0;

}

.categoryTexts{

color:white;

flex:1;

}

.categoryTitle{

font-size:22px;

font-weight:bold;

margin-bottom:6px;

}

.categorySubtitle{

font-size:14px;

opacity:.9;

}

.categoryArrow{

font-size:30px;

color:white;

}
</style>

</head>

<body>


<div class="header">
Categorias
</div>


<a href="home.html" class="back">← Voltar</a>


<div class="container">

<div class="cat" onclick="go('telefone')">
<span class="icon">📱</span>
Telefones
</div>

<div class="cat" onclick="go('roupas')">
<span class="icon">👕</span>
Roupas
</div>

<div class="cat" onclick="go('beleza')">
<span class="icon">💄</span>
Beleza
</div>

<div class="cat" onclick="go('eletronica')">
<span class="icon">💻</span>
Eletrónica
</div>

<div class="cat" onclick="go('casa')">
<span class="icon">🏠</span>
Casa
</div>

<div class="cat" onclick="go('auto')">
<span class="icon">🚗</span>
Auto & Moto
</div>

</div>


<script>

function go(cat){

window.location.href="home.html?cat="+cat

}

</script>

<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Toma">

<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ff6a00">

<title>Categorias</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#f5f7fb;

color:#111827;

}

.header{

background:white;

padding:22px;

box-shadow:0 2px 12px rgba(0,0,0,.06);

position:sticky;

top:0;

z-index:100;

}

.headerTitle{

font-size:30px;

font-weight:700;

margin-bottom:18px;

}

.searchBox{

display:flex;

align-items:center;

background:#F3F4F6;

border-radius:18px;

padding:14px 18px;

gap:10px;

}

.searchBox input{

flex:1;

border:none;

background:none;

outline:none;

font-size:16px;

}

.container{

padding:20px;

}

.categoryCard{

position:relative;

height:120px;

border-radius:24px;

overflow:hidden;

margin-bottom:18px;

cursor:pointer;

box-shadow:0 12px 28px rgba(0,0,0,.08);

transition:.25s;

}

.categoryCard:hover{

transform:translateY(-4px);

}

.categoryImage{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

object-fit:cover;

}

.categoryOverlay{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background:linear-gradient(

90deg,

rgba(0,0,0,.72),

rgba(0,0,0,.20)

);

}

.categoryContent{

position:relative;

z-index:2;

height:100%;

display:flex;

align-items:center;

padding:20px;

}

.categoryIcon{

width:60px;

height:60px;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

margin-right:18px;

flex-shrink:0;

}

.categoryTexts{

flex:1;

color:white;

}

.categoryTitle{

font-size:22px;

font-weight:bold;

margin-bottom:6px;

}

.categorySubtitle{

font-size:14px;

opacity:.92;

}

.categoryArrow{

font-size:30px;

color:white;

}
</style>

</head>

<body>

<div class="header">

    <div class="headerTitle">

        Categorias

    </div>

    <div class="searchBox">

        <span>🔍</span>

        <input
        id="searchCategory"
        type="text"
        placeholder="Pesquisar categorias...">

    </div>

</div>

<div class="container">

</div>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.imageContainer{
width:100%;
height:300px;
background:#000;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
}

.product{
background:white;
padding:15px;
}

.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buyBtn{background:#1aa34a;color:white;}
.chatBtn{background:#075e54;color:white;}

.section{
padding:10px;
}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:140px;
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.cardPrice{
color:#ff6a00;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">Detalhes do produto</div>

<div id="productBox"></div>

<!-- SIMILAR -->
<div class="section">
<h3>Produtos similares</h3>
<div id="similar" class="grid"></div>
</div>

<!-- OTHERS -->
<div class="section">
<h3>Outros vendedores</h3>
<div id="others" class="grid"></div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId = localStorage.getItem("selectedProduct")

let currentProduct=null

async function loadProduct(){

if(!productId){
alert("Produto inválido ❌")
return
}

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

currentProduct = snap.data()

renderProduct()
loadSimilar()
loadOthers()

}

loadProduct()

/* RENDER */
function renderProduct(){

const img = currentProduct.images?.[0] || ""

document.getElementById("productBox").innerHTML = `

<div class="imageContainer">
<img class="mainImage" src="${img}">
</div>

<div class="product">

<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>

<div class="actions">
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
<button class="btn chatBtn" onclick="openChat()">💬 Chat</button>
</div>

</div>
`
}

/* 🔐 BUY FIX */
window.orderNow = async function(){

if(!auth.currentUser){
alert("Connexion requise ❌")
return
}

try{

await addDoc(collection(db,"orders"),{
productId,
productName: currentProduct.name,
price: currentProduct.price,
qty:1,
merchantId: currentProduct.merchantId,
clientId: auth.currentUser.uid,
date:Date.now()
})

alert("Pedido enviado ✅")

}catch(e){
console.error(e)
alert("Erro ❌")
}

}

/* 💬 CHAT FIX */
window.openChat = function(){

if(!auth.currentUser){
alert("Connexion requise ❌")
return
}

if(!currentProduct?.merchantId){
alert("Erro vendedor ❌")
return
}

location.href = "chat.html?merchant=" + currentProduct.merchantId

}

/* SIMILAR */
async function loadSimilar(){

if(!currentProduct?.category) return

const q = query(
collection(db,"products"),
where("category","==",currentProduct.category)
)

const snap = await getDocs(q)

let html=""

snap.forEach(docSnap=>{
const p = docSnap.data()

if(docSnap.id !== productId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0] || ''}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

document.getElementById("similar").innerHTML = html
}

/* OTHERS */
async function loadOthers(){

const snap = await getDocs(collection(db,"products"))

let html=""

snap.forEach(docSnap=>{
const p = docSnap.data()

if(p.merchantId !== currentProduct.merchantId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0] || ''}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

document.getElementById("others").innerHTML = html
}

/* OPEN */
window.openProduct = function(id){
localStorage.setItem("selectedProduct", id)
location.reload()
}

</script>

</body>
</html>

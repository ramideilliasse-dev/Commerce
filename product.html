 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.imageContainer{
width:100%;
height:300px;
background:#000;
overflow:hidden;
position:relative;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
cursor:zoom-in;
}

.zoomed{
transform:scale(1.8);
cursor:zoom-out;
}

/* GALLERY */
.gallery{
display:flex;
gap:8px;
padding:10px;
background:white;
overflow-x:auto;
}

.gallery img{
width:70px;
height:70px;
border-radius:8px;
opacity:0.6;
cursor:pointer;
}

.gallery img.active{
border:2px solid #ff6a00;
opacity:1;
}

/* PRODUCT */
.product{
background:white;
padding:15px;
}

.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buyBtn{background:#1aa34a;color:white;}
.chatBtn{background:#075e54;color:white;}

.section{padding:10px;}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:140px;
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.cardPrice{
color:#ff6a00;
font-weight:bold;
}

/* REVIEWS */
.review{
border-bottom:1px solid #eee;
padding:8px 0;
}

.stars{color:#FFD700;}
</style>
</head>

<body>

<div class="header">Detalhes do produto</div>

<div id="productBox"></div>

<div class="section">
<h3>Avaliações</h3>
<div id="avgRating"></div>
<div id="reviewsList"></div>
</div>

<div class="section">
<h3>Produtos similares</h3>
<div id="similar" class="grid"></div>
</div>

<div class="section">
<h3>Outros vendedores</h3>
<div id="others" class="grid"></div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId = localStorage.getItem("selectedProduct")

let currentProduct=null
let images=[]
let currentIndex=0
let zoom=false

async function loadProduct(){

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

currentProduct = snap.data()
images = currentProduct.images || []

renderProduct()
loadReviews()
loadSimilar()
loadOthers()

}

loadProduct()

/* RENDER */
function renderProduct(){

let main = images[0] || ""

document.getElementById("productBox").innerHTML = `

<div class="imageContainer">
<img id="mainImage" class="mainImage" src="${main}">
</div>

<div class="gallery">
${images.map((img,i)=>`
<img src="${img}" onclick="selectImage(${i})" class="${i===0?'active':''}">
`).join("")}
</div>

<div class="product">

<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>

<div class="actions">
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
<button class="btn chatBtn" onclick="openChat()">💬 Chat</button>
</div>

</div>
`

/* ZOOM */
const mainImg = document.getElementById("mainImage")

mainImg.onclick = () => {
zoom = !zoom
mainImg.classList.toggle("zoomed")
}

}

/* IMAGE SWITCH */
window.selectImage=function(i){
currentIndex=i
document.getElementById("mainImage").src=images[i]

document.querySelectorAll(".gallery img").forEach((img,index)=>{
img.classList.toggle("active", index===i)
})
}

/* ⭐ REVIEWS */
async function loadReviews(){

const q = query(
collection(db,"reviews"),
where("productId","==",productId)
)

const snap = await getDocs(q)

let total=0
let count=0
let html=""

snap.forEach(doc=>{
let r = doc.data()

total += r.rating
count++

html += `
<div class="review">
<div class="stars">${"⭐".repeat(r.rating)}</div>
<div>${r.comment || ""}</div>
</div>
`
})

let avg = count ? (total/count).toFixed(1) : 0

document.getElementById("avgRating").innerHTML =
`<b>${avg} ⭐ (${count} avaliações)</b>`

document.getElementById("reviewsList").innerHTML = html

}

/* 🟢 WHATSAPP ORDER */
window.orderNow = async function(){

if(!auth.currentUser){
alert("Connexion requise ❌")
return
}

try{

const merchantRef = doc(db,"users",currentProduct.merchantId)
const snap = await getDoc(merchantRef)

if(!snap.exists()){
alert("Vendedor não encontrado ❌")
return
}

const data = snap.data()
const phone = data.whatsapp

if(!phone){
alert("Vendedor sem WhatsApp ❌")
return
}

const msg = `
🛒 NOVO PEDIDO

Produto: ${currentProduct.name}
Preço: ${currentProduct.price} Kz

Cliente interessado ✔
`

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))

}catch(e){
alert("Erro ao enviar pedido ❌")
console.error(e)
}

}

/* CHAT */
window.openChat=function(){

if(!auth.currentUser){
alert("Connexion requise ❌")
return
}

location.href="chat.html?merchant="+currentProduct.merchantId
}

/* SIMILAR */
async function loadSimilar(){

if(!currentProduct?.category) return

const q=query(
collection(db,"products"),
where("category","==",currentProduct.category)
)

const snap=await getDocs(q)

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(docSnap.id !== productId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0] || ''}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

document.getElementById("similar").innerHTML=html
}

/* OTHERS */
async function loadOthers(){

const snap=await getDocs(collection(db,"products"))

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(p.merchantId !== currentProduct.merchantId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0] || ''}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

document.getElementById("others").innerHTML=html
}

/* OPEN */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.reload()
}

</script>

</body>
</html>

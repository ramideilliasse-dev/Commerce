 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product{
background:white;
padding:15px;
margin-bottom:10px;
}

.product img{
width:100%;
border-radius:10px;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.price{
color:#ff6a00;
font-size:22px;
font-weight:bold;
margin:8px 0;
}

.desc{
color:#555;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.shopBtn{
background:black;
color:white;
}

.buyBtn{
background:#1aa34a;
color:white;
}

.qty{
margin-top:10px;
}

.section{
padding:10px;
}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:150px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.cardPrice{
color:#ff6a00;
font-weight:bold;
}

.review{
background:white;
padding:10px;
margin-top:5px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
Detalhes do produto
</div>

<div id="productBox"></div>

<div class="section">
<h3>Produtos similares</h3>
<div class="grid" id="similar"></div>
</div>

<div class="section">
<h3>Outros produtos</h3>
<div class="grid" id="others"></div>
</div>

<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc,
collection,
getDocs,
addDoc,
updateDoc,
increment,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId=localStorage.getItem("selectedProduct")
let currentProduct=null

async function loadProduct(){

const ref=doc(db,"products",productId)
const snap=await getDoc(ref)

if(!snap.exists()){
alert("Produto não encontrado")
return
}

currentProduct=snap.data()

renderProduct(currentProduct)

loadSimilar()
loadOthers()
loadReviews()

}

loadProduct()

function renderProduct(p){

let badge = p.sales > 5 ? "🔥 Produto popular" : ""
const img = p.images && p.images.length ? p.images[0] : ""

let orderText = "Comprar"
if(p.category==="restaurant"){
orderText="Pedir comida 🍽️"
}

document.getElementById("productBox").innerHTML=`

<div class="product">

<img src="${img}">

<div class="name">${p.name}</div>

<div style="color:red;font-weight:bold;">${badge}</div>

<div class="price">${p.price} Kz</div>

<div class="desc">${p.description || ""}</div>

<div class="qty">
<label>Quantidade:</label>
<input type="number" id="qty" value="1" min="1" style="width:70px;padding:6px;">
</div>

<div class="actions">

<button class="btn shopBtn" onclick="openShop('${p.merchantId}')">
Ver loja
</button>

<button class="btn buyBtn" onclick="orderNow()">
${orderText}
</button>

</div>

<div style="margin-top:15px;">
<button onclick="addFavorite()" style="background:#ff4757;color:white;padding:10px;border:none;border-radius:8px;">
❤️ Favori
</button>
</div>

<div style="margin-top:20px;">

<h3>Avaliações</h3>

<input id="userRating" type="number" max="5" min="1" placeholder="Nota (1-5)" style="width:100%;padding:10px;margin-bottom:5px;">

<textarea id="userComment" placeholder="Comentário..." style="width:100%;padding:10px;"></textarea>

<button onclick="submitReview()" style="margin-top:5px;">
Enviar avaliação
</button>

<div id="reviewsList"></div>

</div>

</div>

`

}

/* SHOP */
window.openShop=function(id){
location.href="merchant-shop.html?id="+id
}

/* FAVORITE */
window.addFavorite=function(){

let favs=JSON.parse(localStorage.getItem("favorites")) || []

if(!favs.includes(productId)){
favs.push(productId)
}

localStorage.setItem("favorites", JSON.stringify(favs))

alert("Adicionado aos favoritos ❤️")

}

/* ORDER */
window.orderNow=function(){

const qty = parseInt(document.getElementById("qty").value) || 1

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

// vérifier si produit déjà dans panier
let existing = cart.find(item => item.id === productId)

if(existing){
existing.qty += qty
}else{
cart.push({
id: productId,
name: currentProduct.name,
price: currentProduct.price,
image: currentProduct.images ? currentProduct.images[0] : "",
qty: qty,
category: currentProduct.category
})
}

localStorage.setItem("cart", JSON.stringify(cart))

alert("Adicionado ao carrinho 🛒")

}

/* REVIEWS */
window.submitReview=async function(){

const rating=parseInt(document.getElementById("userRating").value)
const comment=document.getElementById("userComment").value

if(!rating){
alert("Coloque uma nota")
return
}

await addDoc(collection(db,"reviews"),{
productId:productId,
rating:rating,
comment:comment,
date:Date.now()
})

const ref=doc(db,"products",productId)

await updateDoc(ref,{
rating:increment(rating),
reviews:increment(1)
})

alert("Avaliação enviada")
loadReviews()

}

async function loadReviews(){

const snap=await getDocs(collection(db,"reviews"))

let html=""

snap.forEach(doc=>{

const r=doc.data()

if(r.productId===productId){

html+=`
<div class="review">
⭐ ${r.rating}/5<br>
${r.comment}
</div>
`

}

})

document.getElementById("reviewsList").innerHTML=html

}

/* SIMILAR */
async function loadSimilar(){

const q=query(
collection(db,"products"),
where("category","==",currentProduct.category)
)

const snap=await getDocs(q)

let html=""

snap.forEach(doc=>{

const p=doc.data()
const img = p.images && p.images.length ? p.images[0] : ""

html+=`
<div class="card" onclick="openProduct('${doc.id}')">
<img src="${img}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`

})

document.getElementById("similar").innerHTML=html

}

/* OTHERS */
async function loadOthers(){

const snap=await getDocs(collection(db,"products"))

let html=""

snap.forEach(doc=>{

const p=doc.data()
const img = p.images && p.images.length ? p.images[0] : ""

html+=`
<div class="card" onclick="openProduct('${doc.id}')">
<img src="${img}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`

})

document.getElementById("others").innerHTML=html

}

window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.reload()
}

</script>

</body>
</html>

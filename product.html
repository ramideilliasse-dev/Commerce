<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Produit</title>

<link rel="stylesheet" href="style.css">

<style>

.gallery img{
width:120px;
margin:5px;
border-radius:8px;
}

.mainImage{
width:300px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="name"></h2>

<img id="mainImage" class="mainImage">

<div class="gallery" id="gallery"></div>

<br>

<video id="video" width="300" controls></video>

<p id="price"></p>

<p id="description"></p>

<button id="whatsappBtn">
Contacter le marchand
</button>

</div>


<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


/* récupérer ID produit */

const params = new URLSearchParams(window.location.search);

const productId = params.get("id");


async function loadProduct(){

const snap = await getDoc(doc(db,"products",productId));

const data = snap.data();


document.getElementById("name").innerText = data.name;

document.getElementById("price").innerText = data.price + " Kz";

document.getElementById("description").innerText = data.description;


/* IMAGE PRINCIPALE */

if(data.images && data.images.length > 0){

document.getElementById("mainImage").src = data.images[0];

}


/* GALERIE */

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

data.images.forEach(img=>{

gallery.innerHTML += `

<img src="${img}" onclick="changeImage('${img}')">

`;

});


/* VIDEO */

if(data.video){

document.getElementById("video").src = data.video;

}


/* WHATSAPP */

const phone = data.merchantPhone;

const message = "Bonjour je veux acheter : " + data.name;

const url = "https://wa.me/"+phone+"?text="+encodeURIComponent(message);

document.getElementById("whatsappBtn").onclick = function(){

window.open(url);

}

}

window.changeImage=function(src){

document.getElementById("mainImage").src=src;

}

loadProduct();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* 🔥 IMAGE FULL */
.imageContainer{
position:relative;
width:100%;
height:350px;
overflow:hidden;
background:#000;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

/* 🔥 GALLERY */
.gallery{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
background:white;
}

.gallery img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
opacity:0.6;
}

.gallery img.active{
border:2px solid #ff6a00;
opacity:1;
}

/* 🔥 ZOOM FULLSCREEN */
.zoomBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.zoomBox img{
max-width:100%;
max-height:100%;
}

/* PRODUCT */
.product{
background:white;
padding:15px;
}

.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}
.desc{color:#555;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.shopBtn{background:black;color:white;}
.buyBtn{background:#1aa34a;color:white;}

.qty{margin-top:10px;}

</style>

</head>

<body>

<div class="header">Detalhes do produto</div>

<div id="productBox"></div>

<!-- 🔥 ZOOM -->
<div id="zoomBox" class="zoomBox" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script type="module">

import { db } from "./firebase.js"
import { doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId=localStorage.getItem("selectedProduct")

let images=[]
let currentIndex=0
let currentProduct=null

async function loadProduct(){

const ref=doc(db,"products",productId)
const snap=await getDoc(ref)

if(!snap.exists()){
alert("Produto não encontrado")
return
}

currentProduct=snap.data()
images = currentProduct.images || []

renderProduct()

}

loadProduct()

function renderProduct(){

let main = images[0] || ""

document.getElementById("productBox").innerHTML=`

<div class="imageContainer">

<img id="mainImage" class="mainImage" src="${main}" onclick="zoomImage()">

</div>

<div class="gallery">
${images.map((img,i)=>`
<img src="${img}" onclick="selectImage(${i})" class="${i===0?'active':''}">
`).join("")}
</div>

<div class="product">

<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>
<div class="desc">${currentProduct.description || ""}</div>

<div class="qty">
<label>Quantidade:</label>
<input type="number" id="qty" value="1" min="1">
</div>

<div class="actions">
<button class="btn shopBtn" onclick="openShop('${currentProduct.merchantId}')">Loja</button>
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
</div>

</div>

`

initSwipe()

}

/* 🔥 SELECT IMAGE */
window.selectImage=function(i){

currentIndex=i
document.getElementById("mainImage").src=images[i]

document.querySelectorAll(".gallery img").forEach((img,index)=>{
img.classList.toggle("active", index===i)
})

}

/* 🔥 SWIPE MOBILE */
function initSwipe(){

let startX=0

const img=document.getElementById("mainImage")

img.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

img.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX - endX > 50){
nextImage()
}

if(endX - startX > 50){
prevImage()
}

})

}

function nextImage(){
if(currentIndex < images.length-1){
selectImage(currentIndex+1)
}
}

function prevImage(){
if(currentIndex > 0){
selectImage(currentIndex-1)
}
}

/* 🔥 ZOOM */
window.zoomImage=function(){

const zoomBox=document.getElementById("zoomBox")
const zoomImg=document.getElementById("zoomImg")

zoomImg.src=images[currentIndex]

zoomBox.style.display="flex"

}

window.closeZoom=function(){
document.getElementById("zoomBox").style.display="none"
}

/* SHOP */
window.openShop=function(id){
location.href="merchant-shop.html?id="+id
}

/* ORDER */
window.orderNow=function(){

const qty = parseInt(document.getElementById("qty").value) || 1

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

let exist = cart.find(p => p.id === productId)

if(exist){
exist.qty += qty
}else{
cart.push({
id:productId,
name:currentProduct.name,
price:currentProduct.price,
image:images[0],
qty:qty,
merchantId:currentProduct.merchantId
})
}

localStorage.setItem("cart", JSON.stringify(cart))

alert("Adicionado ao carrinho 🛒")

}

</script>

</body>
</html>

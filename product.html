<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:16px;
font-size:22px;
font-weight:bold;
}

/* PRODUCT */

.productBox{
background:white;
margin:12px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.mainImg{
width:100%;
height:280px;
object-fit:cover;
border-radius:10px;
}

.gallery{
display:flex;
gap:10px;
margin-top:10px;
overflow:auto;
}

.gallery img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

/* INFO */

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.price{
color:#ff6a00;
font-size:24px;
font-weight:bold;
margin-top:6px;
}

.badge{
color:green;
font-weight:bold;
margin-top:4px;
}

/* BUTTONS */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.cartBtn{
background:#ff6a00;
color:white;
}

.chatBtn{
background:#333;
color:white;
}

.shopBtn{
background:#0a7cff;
color:white;
}

/* SIMILAR */

.sectionTitle{
padding:12px;
font-size:20px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.product h4{
margin:6px 0;
font-size:17px;
}

.priceSmall{
color:#ff6a00;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
Produto
</div>


<div id="productBox" class="productBox"></div>


<div class="sectionTitle">
Produtos semelhantes
</div>

<div id="similarProducts" class="products"></div>


<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const params=new URLSearchParams(window.location.search)

const productId=params.get("id")


/* LOAD PRODUCT */

async function loadProduct(){

const ref=doc(db,"products",productId)

const snap=await getDoc(ref)

const data=snap.data()

const container=document.getElementById("productBox")

const img=data.image || ""

container.innerHTML=`

<img class="mainImg" id="mainImg" src="${img}">

<div class="gallery">
<img src="${img}" onclick="changeImg('${img}')">
</div>

<div class="name">${data.name}</div>

<div class="price">${data.price} Kz</div>

${data.verified ? "<div class='badge'>✔ Vendedor verificado</div>" : ""}

<button class="btn cartBtn" onclick="addCart('${data.name}','${data.price}','${img}')">
🛒 Adicionar ao carrinho
</button>

<button class="btn chatBtn" onclick="chatSeller('${data.merchantId}')">
💬 Falar com vendedor
</button>

<button class="btn shopBtn" onclick="viewShop('${data.merchantId}')">
🏪 Ver loja
</button>

`

}


/* CHANGE IMAGE */

window.changeImg=function(src){

document.getElementById("mainImg").src=src

}


/* ADD CART */

window.addCart=function(name,price,image){

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({
name:name,
price:price,
image:image
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Produto adicionado ao carrinho")

}


/* CHAT */

window.chatSeller=function(id){

window.location.href="chat.html?merchant="+id

}


/* VIEW SHOP */

window.viewShop=function(id){

window.location.href="merchant-shop.html?id="+id

}


/* SIMILAR PRODUCTS */

async function loadSimilar(){

const snap=await getDocs(collection(db,"products"))

const container=document.getElementById("similarProducts")

snap.forEach(docSnap=>{

const data=docSnap.data()

const id=docSnap.id

container.innerHTML+=`

<div class="product" onclick="viewProduct('${id}')">

<img src="${data.image}">

<h4>${data.name}</h4>

<div class="priceSmall">${data.price} Kz</div>

</div>

`

})

}

window.viewProduct=function(id){

location.href="product.html?id="+id

}


loadProduct()
loadSimilar()

</script>

</body>

</html>

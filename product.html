 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* IMAGE */

.mainImg{
width:100%;
height:320px;
object-fit:cover;
background:white;
}

/* PHOTO VIDEO BAR */

.tabs{
display:flex;
justify-content:center;
gap:20px;
background:white;
padding:10px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.tab{
cursor:pointer;
padding:6px 10px;
border-radius:8px;
}

.active{
background:#eee;
}

/* INFO */

.info{
background:white;
margin-top:8px;
padding:15px;
}

.price{
font-size:26px;
color:#ff6a00;
font-weight:bold;
}

.desc{
margin-top:10px;
font-size:16px;
line-height:1.4;
}

/* BOTTOM BAR */

.bottomBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-top:1px solid #ddd;
}

.lojaBtn{
text-align:center;
font-size:14px;
cursor:pointer;
}

.chatBtn{
background:#eee;
border:none;
padding:12px 18px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

.orderBtn{
background:#ff6a00;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>


<img id="mainImg" class="mainImg">


<div class="tabs">

<div id="tabPhotos" class="tab active" onclick="showPhotos()">
Photos
</div>

<div id="tabVideo" class="tab" onclick="showVideo()">
Vídeo
</div>

</div>


<div class="info">

<div id="price" class="price"></div>

<div id="desc" class="desc"></div>

</div>



<div class="bottomBar">

<div class="lojaBtn" onclick="openShop()">
🏪<br>Loja
</div>

<button class="chatBtn" onclick="openChat()">
Discuter ici
</button>

<button class="orderBtn" onclick="orderProduct()">
Commander
</button>

</div>



<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


const params=new URLSearchParams(window.location.search)

const productId=params.get("id")

let merchantId=""

/* LOAD PRODUCT */

async function loadProduct(){

const ref=doc(db,"products",productId)

const snap=await getDoc(ref)

const data=snap.data()

merchantId=data.merchantId

document.getElementById("mainImg").src=data.image

document.getElementById("price").innerText=data.price+" Kz"

document.getElementById("desc").innerText=data.description

}

loadProduct()



/* PHOTOS TAB */

window.showPhotos=function(){

document.getElementById("tabPhotos").classList.add("active")

document.getElementById("tabVideo").classList.remove("active")

}



/* VIDEO TAB */

window.showVideo=function(){

document.getElementById("tabVideo").classList.add("active")

document.getElementById("tabPhotos").classList.remove("active")

alert("Video produto ainda não disponível")

}



/* OPEN SHOP */

window.openShop=function(){

location.href="merchant-shop.html?id="+merchantId

}



/* CHAT */

window.openChat=function(){

location.href="chat.html?merchant="+merchantId

}



/* ORDER */

window.orderProduct=function(){

let cart=JSON.parse(localStorage.getItem("cart"))||[]

cart.push(productId)

localStorage.setItem("cart",JSON.stringify(cart))

alert("Produto adicionado ao carrinho")

}

</script>

</body>

</html>

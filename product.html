<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.imageContainer{width:100%;height:350px;overflow:hidden;background:#000;}
.mainImage{width:100%;height:100%;object-fit:cover;}

.gallery{display:flex;gap:8px;padding:10px;overflow-x:auto;background:white;}
.gallery img{width:70px;height:70px;border-radius:8px;opacity:0.6;}
.gallery img.active{border:2px solid #ff6a00;opacity:1;}

.product{background:white;padding:15px;}
.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}

.actions{display:flex;gap:10px;margin-top:15px;}
.btn{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;}
.shopBtn{background:black;color:white;}
.buyBtn{background:#1aa34a;color:white;}
.chatBtn{background:#075e54;color:white;}

.stars{color:#FFD700;font-size:18px;}

.review{
border-bottom:1px solid #eee;
padding:8px 0;
}

/* SUPPORT */
.supportBtn{
position:fixed;
bottom:80px;
right:15px;
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
}

</style>
</head>

<body>

<div class="header">Detalhes do produto</div>
<div id="productBox"></div>

<!-- SUPPORT -->
<button class="supportBtn" onclick="contactSupport()">💬</button>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId = localStorage.getItem("selectedProduct")

let currentProduct=null
let images=[]

async function loadProduct(){

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

currentProduct = snap.data()
images = currentProduct.images || []

renderProduct()
loadReviews()

}

loadProduct()

function renderProduct(){

let main = images[0] || ""

document.getElementById("productBox").innerHTML = `

<div class="imageContainer">
<img class="mainImage" src="${main}">
</div>

<div class="product">

<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>

<div class="actions">
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
<button class="btn chatBtn" onclick="openChat()">💬 Chat</button>
</div>

<!-- ⭐ REVIEWS -->
<div style="margin-top:20px;">
<h3>Avaliações</h3>

<div id="avgRating"></div>
<div id="reviewsList"></div>

<button onclick="leaveReview()">⭐ Avaliar</button>

</div>

</div>
`
}

/* ⭐ LOAD REVIEWS */
async function loadReviews(){

const q = query(
collection(db,"reviews"),
where("productId","==",productId)
)

const snap = await getDocs(q)

let total=0
let count=0
let html=""

snap.forEach(doc=>{
let r = doc.data()

total += r.rating
count++

html += `
<div class="review">
<div class="stars">${"⭐".repeat(r.rating)}</div>
<div>${r.comment || ""}</div>
</div>
`
})

let avg = count ? (total/count).toFixed(1) : 0

document.getElementById("avgRating").innerHTML =
`<b>${avg} ⭐ (${count} avaliações)</b>`

document.getElementById("reviewsList").innerHTML = html

}

/* ⭐ ADD REVIEW */
window.leaveReview = async function(){

if(!auth.currentUser){
alert("Login necessário ❌")
return
}

let rating = prompt("Nota (1-5)")
if(!rating) return

rating = Math.max(1, Math.min(5, Number(rating)))

let comment = prompt("Comentário")

await addDoc(collection(db,"reviews"),{
productId,
userId: auth.currentUser.uid,
rating,
comment: comment || "",
date: Date.now()
})

alert("Obrigado ⭐")

loadReviews()

}

/* ORDER */
window.orderNow = async function(){

if(!auth.currentUser){
alert("Login ❌")
return
}

await addDoc(collection(db,"orders"),{
productId,
productName: currentProduct.name,
price: currentProduct.price,
qty:1,
merchantId: currentProduct.merchantId,
clientId: auth.currentUser.uid,
date:Date.now()
})

alert("Pedido enviado ✅")

}

/* CHAT */
window.openChat = function(){
location.href="chat.html?merchant="+currentProduct.merchantId
}

/* SUPPORT */
window.contactSupport = function(){

window.open(
"https://wa.me/244922623238?text=Preciso de ajuda",
"_blank"
)

}

</script>

</body>
</html>

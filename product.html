 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.imageContainer{
width:100%;
height:300px;
background:#000;
overflow:hidden;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

.fullscreen img{
max-width:100%;
max-height:100%;
}

.closeBtn{
position:absolute;
top:20px;
right:20px;
color:white;
font-size:30px;
cursor:pointer;
}

.navBtn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
cursor:pointer;
padding:10px;
}

.prev{left:10px;}
.next{right:10px;}

/* GALLERY */
.gallery{
display:flex;
gap:8px;
padding:10px;
background:white;
overflow-x:auto;
}

.gallery img{
width:70px;
height:70px;
border-radius:8px;
opacity:0.6;
cursor:pointer;
}

.gallery img.active{
border:2px solid #ff6a00;
opacity:1;
}

/* PRODUCT */
.product{
background:white;
padding:15px;
}

.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buyBtn{background:#1aa34a;color:white;}
.chatBtn{background:#075e54;color:white;}
.shopBtn{background:#ff6a00;color:white;} /* ✅ NEW */

/* SECTION */
.section{padding:10px;}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:140px;
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.cardPrice{
color:#ff6a00;
font-weight:bold;
}

.review{
border-bottom:1px solid #eee;
padding:8px 0;
}

.stars{color:#FFD700;}
</style>
</head>

<body>

<div class="header">Detalhes do produto</div>

<div id="productBox"></div>

<!-- FULLSCREEN -->
<div id="fullscreen" class="fullscreen">
<div class="closeBtn" onclick="closeFullscreen()">✕</div>
<div class="navBtn prev" onclick="prevImage()">‹</div>
<img id="fullscreenImg">
<div class="navBtn next" onclick="nextImage()">›</div>
</div>

<div class="section">
<h3>Avaliações</h3>
<div id="avgRating"></div>
<div id="reviewsList"></div>
</div>

<div class="section">
<h3>Produtos similares</h3>
<div id="similar" class="grid"></div>
</div>

<div class="section">
<h3>Outros vendedores</h3>
<div id="others" class="grid"></div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId = localStorage.getItem("selectedProduct")

let currentProduct=null
let images=[]
let currentIndex=0

async function loadProduct(){

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

currentProduct = snap.data()
images = currentProduct.images || []

renderProduct()
loadReviews()
loadSimilar()
loadOthers()

}

loadProduct()

/* RENDER */
function renderProduct(){

let main = images[0] || ""

document.getElementById("productBox").innerHTML = `

<div class="imageContainer">
<img class="mainImage" src="${main}" onclick="openFullscreen(0)">
</div>

<div class="gallery">
${images.map((img,i)=>`
<img src="${img}" onclick="selectImage(${i})" class="${i===0?'active':''}">
`).join("")}
</div>

<div class="product">

<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>

<div class="actions">
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
<button class="btn chatBtn" onclick="openChat()">💬 Chat</button>
<button class="btn shopBtn" onclick="openShop()">🏪 Ver Loja</button>
</div>

</div>
`
}

/* FULLSCREEN */
window.openFullscreen=function(i){
currentIndex=i
fullscreen.style.display="flex"
fullscreenImg.src=images[i]
}

window.closeFullscreen=function(){
fullscreen.style.display="none"
}

window.nextImage=function(){
currentIndex=(currentIndex+1)%images.length
fullscreenImg.src=images[currentIndex]
}

window.prevImage=function(){
currentIndex=(currentIndex-1+images.length)%images.length
fullscreenImg.src=images[currentIndex]
}

/* SELECT */
window.selectImage=function(i){
currentIndex=i
document.querySelector(".mainImage").src=images[i]
}

/* ⭐ REVIEWS */
async function loadReviews(){

const q = query(
collection(db,"reviews"),
where("productId","==",productId)
)

const snap = await getDocs(q)

let total=0
let count=0
let html=""

snap.forEach(doc=>{
let r = doc.data()
total += r.rating
count++

html += `
<div class="review">
<div class="stars">${"⭐".repeat(r.rating)}</div>
<div>${r.comment || ""}</div>
</div>
`
})

let avg = count ? (total/count).toFixed(1) : 0

avgRating.innerHTML = `<b>${avg} ⭐ (${count})</b>`
reviewsList.innerHTML = html

}

/* WHATSAPP */
window.orderNow = async function(){

if(!auth.currentUser){
alert("Connexion requise ❌")
return
}

const snap = await getDoc(doc(db,"users",currentProduct.merchantId))
const phone = snap.data()?.whatsapp

if(!phone){
alert("Sem WhatsApp ❌")
return
}

const msg = `🛒 Pedido\n${currentProduct.name}\n${currentProduct.price} Kz`

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))

}

/* CHAT */
window.openChat=function(){
location.href="chat.html?merchant="+currentProduct.merchantId
}

/* ✅ NEW : OPEN SHOP */
window.openShop=function(){
if(!currentProduct?.merchantId){
alert("Loja não encontrada ❌")
return
}
location.href="merchant-shop.html?id="+currentProduct.merchantId
}

/* SIMILAR */
async function loadSimilar(){

const q=query(
collection(db,"products"),
where("category","==",currentProduct.category)
)

const snap=await getDocs(q)

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(docSnap.id!==productId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0]}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

similar.innerHTML=html
}

/* OTHERS */
async function loadOthers(){

const snap=await getDocs(collection(db,"products"))

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(p.merchantId!==currentProduct.merchantId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0]}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

others.innerHTML=html
}

/* OPEN */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.reload()
}

</script>

</body>
</html>

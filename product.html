 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* IMAGE */

.productImg{
width:100%;
height:320px;
object-fit:cover;
background:white;
}

/* INFO */

.info{
background:white;
padding:15px;
margin-top:6px;
}

.name{
font-size:20px;
font-weight:bold;
color:black;
margin-bottom:6px;
}

.shop{
color:#0b6b3a;
font-weight:bold;
margin-bottom:8px;
}

.price{
color:#ff6a00;
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#444;
line-height:1.4;
}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:10px;
padding:12px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.shopBtn{
background:#eee;
}

.chatBtn{
background:#ddd;
}

.cartBtn{
background:black;
color:white;
}

.orderBtn{
background:#ff6a00;
color:white;
}

/* BOTTOM BAR */

.bottomBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
gap:10px;
padding:10px;
border-top:1px solid #ddd;
}

.bottomBar button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>


<img id="productImg" class="productImg">


<div class="info">

<div id="productName" class="name"></div>

<div id="shopName" class="shop"></div>

<div id="productPrice" class="price"></div>

<div id="productDesc" class="desc"></div>

</div>


<div class="bottomBar">

<button class="shopBtn" onclick="openShop()">
🏪 Loja
</button>

<button class="chatBtn" onclick="openChat()">
💬 Discuter
</button>

<button class="cartBtn" onclick="addCart()">
🛒 Panier
</button>

<button class="orderBtn" onclick="orderNow()">
⚡ Commander
</button>

</div>



<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


const params=new URLSearchParams(window.location.search)

const productId=params.get("id")

let merchantId=""

let productData={}


/* LOAD PRODUCT */

async function loadProduct(){

const ref=doc(db,"products",productId)

const snap=await getDoc(ref)

const data=snap.data()

productData=data

merchantId=data.merchantId

const img=data.image || (data.images ? data.images[0] : "")

document.getElementById("productImg").src=img

document.getElementById("productName").innerText=data.name

document.getElementById("shopName").innerText=data.shopName || "Loja"

document.getElementById("productPrice").innerText=data.price+" Kz"

document.getElementById("productDesc").innerText=data.description || ""

}

loadProduct()


/* OPEN SHOP */

window.openShop=function(){

location.href="merchant-shop.html?id="+merchantId

}


/* OPEN CHAT */

window.openChat=function(){

location.href="chat.html?merchant="+merchantId

}


/* ADD CART */

window.addCart=function(){

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({

id:productId,
name:productData.name,
price:productData.price,
image:productData.image

})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Produto adicionado ao carrinho")

}


/* ORDER */

window.orderNow=function(){

addCart()

location.href="cart.html"

}

</script>

</body>

</html>

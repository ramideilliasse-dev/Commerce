 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.imageContainer{
width:100%;
height:300px;
background:#000;
overflow:hidden;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
}

.gallery{
display:flex;
gap:8px;
padding:10px;
background:white;
overflow-x:auto;
}

.gallery img{
width:70px;
height:70px;
border-radius:8px;
opacity:0.6;
cursor:pointer;
}

.gallery img.active{
border:2px solid #ff6a00;
opacity:1;
}

.product{
background:white;
padding:15px;
}

.name{font-size:20px;font-weight:bold;}
.price{color:#ff6a00;font-size:22px;font-weight:bold;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buyBtn{background:#1aa34a;color:white;}
.chatBtn{background:#075e54;color:white;}
.shopBtn{background:#ff6a00;color:white;}

.section{padding:10px;}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.card{
min-width:140px;
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.cardPrice{
color:#ff6a00;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Detalhes do produto</div>

<div id="productBox"></div>

<div class="section">
<h3>Produtos similares</h3>
<div id="similar" class="grid"></div>
</div>

<div class="section">
<h3>Outros produtos</h3>
<div id="others" class="grid"></div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productId = localStorage.getItem("selectedProduct")

let currentProduct=null
let images=[]

/* LOAD */
async function loadProduct(){

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

currentProduct = snap.data()
images = currentProduct.images || []

renderProduct()
loadSimilar()
loadOthers()
}

loadProduct()

/* RENDER */
function renderProduct(){

let main = images[0] || ""

document.getElementById("productBox").innerHTML = `
<div class="imageContainer">
<img class="mainImage" src="${main}">
</div>

<div class="gallery">
${images.map((img,i)=>`
<img src="${img}" onclick="selectImage(${i})">
`).join("")}
</div>

<div class="product">
<div class="name">${currentProduct.name}</div>
<div class="price">${currentProduct.price} Kz</div>

<div class="actions">
<button class="btn buyBtn" onclick="orderNow()">Comprar</button>
<button class="btn chatBtn" onclick="contactSeller()">💬 Contatar vendedor</button>
<button class="btn shopBtn" onclick="openShop()">🏪 Ver Loja</button>
</div>
</div>
`
}

/* 🔥 CONTACT SELLER FINAL (STABLE VERSION) */
window.contactSeller = function(){

if(!auth.currentUser){
alert("Faz login primeiro ❌")
return
}

const merchantId = currentProduct.merchantId

if(!merchantId){
alert("Vendedor não encontrado ❌")
return
}

/* ✅ ENVOI SEULEMENT MERCHANT */
location.href = "chat.html?merchant=" + merchantId

}

/* IMAGE */
window.selectImage=function(i){
document.querySelector(".mainImage").src=images[i]
}

/* SHOP */
window.openShop=function(){
location.href="merchant-shop.html?id="+currentProduct.merchantId
}

/* WHATSAPP */
window.orderNow = async function(){

if(!auth.currentUser){
alert("Login necessário ❌")
return
}

const snap = await getDoc(doc(db,"users",currentProduct.merchantId))
const data = snap.data()

let phone = data?.whatsapp

if(!phone){
alert("Sem WhatsApp ❌")
return
}

phone = phone.replace(/\D/g,"")

const msg = `
🛒 Pedido
Produto: ${currentProduct.name}
Preço: ${currentProduct.price} Kz
`

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))
}

/* SIMILAR */
async function loadSimilar(){

const q=query(
collection(db,"products"),
where("category","==",currentProduct.category)
)

const snap=await getDocs(q)

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(docSnap.id!==productId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0]}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

similar.innerHTML=html
}

/* OTHERS */
async function loadOthers(){

const snap=await getDocs(collection(db,"products"))

let html=""

snap.forEach(docSnap=>{
const p=docSnap.data()

if(p.merchantId!==currentProduct.merchantId){
html+=`
<div class="card" onclick="openProduct('${docSnap.id}')">
<img src="${p.images?.[0]}">
<div>${p.name}</div>
<div class="cardPrice">${p.price} Kz</div>
</div>
`
}
})

others.innerHTML=html
}

/* OPEN PRODUCT */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.reload()
}

</script>

</body>
</html>

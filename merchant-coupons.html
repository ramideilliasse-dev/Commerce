 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cupons | Toma</title>

<link rel="stylesheet" href="merchant-dashboard-v2.css">

<link rel="stylesheet" href="merchant-coupons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

</head>

<body>

<div class="productsPage">

<header class="productsHeader">

<div class="leftHeader">

<a href="merchant-dashboard-v2.html" class="backButton">

<span class="material-symbols-rounded">

arrow_back

</span>

</a>

<div>

<h1>Cupons</h1>

<p>Crie promoções para aumentar as vendas.</p>

</div>

</div>

<button id="newCouponBtn" class="addProductBtn">

<span class="material-symbols-rounded">

add

</span>

Novo Cupom

</button>

</header>

<section class="couponForm">

<input

type="text"

id="couponCode"

placeholder="Código do cupom">

<input

type="number"

id="couponDiscount"

placeholder="Desconto (%)">

<input

type="date"

id="couponExpiration">

<button id="saveCouponBtn">

Guardar Cupom

</button>

</section>

<section

id="couponList"

class="couponList">

<div class="emptyCard">

<span class="material-symbols-rounded">

sell

</span>

<h2>

Nenhum cupom

</h2>

<p>

Os seus cupons aparecerão aqui.

</p>

</div>

</section>

</div>

<script type="module"

src="./js/merchant-coupons.js">

</script>

</body>

</html>

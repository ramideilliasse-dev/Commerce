 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Entrar</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#ff6a00,#ff3c00);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.tabs{
display:flex;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
cursor:pointer;
border-bottom:2px solid #ddd;
}

.active{
border-bottom:2px solid #ff6a00;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:bold;
cursor:pointer;
}

.small{
font-size:13px;
color:#777;
margin-top:10px;
}

.link{
margin-top:10px;
font-size:13px;
color:#ff6a00;
cursor:pointer;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>
</head>

<body>

<div class="card">

<div class="title">Shopping 🇦🇴</div>

<div class="tabs">
<div id="loginTab" class="tab active" onclick="switchTab('login')">Entrar</div>
<div id="registerTab" class="tab" onclick="switchTab('register')">Criar conta</div>
</div>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button id="actionBtn" onclick="handleAction()">Entrar</button>

<div class="small" id="msg"></div>

<!-- 🔥 GO MERCHANT -->
<div class="link" onclick="location.href='merchant-register.html'">
Criar conta comerciante 🏪
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js"

import {
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import {
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

let mode = "login"

/* SWITCH */
window.switchTab = function(tab){

mode = tab

loginTab.classList.remove("active")
registerTab.classList.remove("active")

if(tab==="login"){
loginTab.classList.add("active")
actionBtn.innerText="Entrar"
}else{
registerTab.classList.add("active")
actionBtn.innerText="Criar conta"
}

msg.innerText=""
}

/* 🔥 AUTO FIRESTORE SYSTEM */
async function ensureUser(user){

const ref = doc(db,"users",user.uid)
const snap = await getDoc(ref)

if(!snap.exists()){

await setDoc(ref,{
email:user.email,
role:"client",
createdAt:Date.now(),
approved:false,
blocked:false
})

console.log("User criado automaticamente 🔥")

}

}

/* ACTION */
window.handleAction = async function(){

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

if(!email || !password){
msg.innerText="Preencha todos os campos ❌"
return
}

try{

let cred

if(mode==="login"){

cred = await signInWithEmailAndPassword(auth,email,password)
msg.innerText="Login realizado ✅"

}else{

cred = await createUserWithEmailAndPassword(auth,email,password)

/* 🔥 CREATE USER */
await setDoc(doc(db,"users",cred.user.uid),{
email:cred.user.email,
role:"client",
createdAt:Date.now(),
approved:false,
blocked:false
})

msg.innerText="Conta criada com sucesso ✅"

}

/* 🔥 ALWAYS ENSURE USER EXISTS */
await ensureUser(cred.user)

/* REDIRECT */
setTimeout(()=>{
location.href="index.html"
},1000)

}catch(e){
msg.innerText="Erro: " + e.message
}

}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
margin-right:5px;
}

.delete{
background:red;
}

</style>

</head>

<body>

<h1>Painel Admin</h1>

<div class="box">

<h2>Marchands</h2>

<div id="merchantList"></div>

</div>

<div class="box">

<h2>Produits</h2>

<div id="productList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
authDomain: "angcomerce-v1.firebaseapp.com",
projectId: "angcomerce-v1"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


const ADMIN_EMAIL = "ramideilliiasse@gmail.com";


// sécurité admin
onAuthStateChanged(auth,(user)=>{

if(!user || user.email !== ADMIN_EMAIL){

alert("Acesso negado");

window.location.href="merchant-login.html";

}

});



// charger marchands
async function loadMerchants(){

const querySnapshot = await getDocs(collection(db,"merchants"));

const container = document.getElementById("merchantList");

container.innerHTML="";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.innerHTML=`

<p>

<b>${data.shopName}</b>  
${data.email}  
Status: ${data.status}

<br><br>

<button onclick="approveMerchant('${docSnap.id}')">
Aprovar
</button>

<button class="delete" onclick="deleteMerchant('${docSnap.id}')">
Excluir
</button>

</p>

<hr>

`;

container.appendChild(div);

});

}



// valider marchand
window.approveMerchant = async function(id){

await updateDoc(doc(db,"merchants",id),{

status:"approved"

});

alert("Marchand validé");

loadMerchants();

}



// supprimer marchand
window.deleteMerchant = async function(id){

await deleteDoc(doc(db,"merchants",id));

alert("Marchand supprimé");

loadMerchants();

}



// charger produits
async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

const container = document.getElementById("productList");

container.innerHTML="";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.innerHTML=`

<p>

<b>${data.name}</b>  
Preço: ${data.price}

<br><br>

<button class="delete" onclick="deleteProduct('${docSnap.id}')">
Excluir produto
</button>

</p>

<hr>

`;

container.appendChild(div);

});

}



// supprimer produit
window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Produit supprimé");

loadProducts();

}



loadMerchants();

loadProducts();

</script>

</body>
</html>

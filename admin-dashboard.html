 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
margin-right:5px;
}

.delete{
background:red;
}

.logout{
background:orange;
}

</style>

</head>

<body>

<h1>Painel Admin</h1>

<button class="logout" onclick="logout()">Logout</button>

<div class="box">

<h2>Marchands</h2>

<div id="merchantList"></div>

</div>

<div class="box">

<h2>Produits</h2>

<div id="productList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
authDomain: "angcomerce-v1.firebaseapp.com",
projectId: "angcomerce-v1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);



/* 🔐 VERIFICATION ADMIN VIA COLLECTION ADMINS */

onAuthStateChanged(auth, async (user)=>{

if(!user){

alert("Vous devez vous connecter");
window.location.href="merchant-login.html";
return;

}

/* vérifier si email existe dans admins */

const adminsRef = collection(db,"admins");
const snapshot = await getDocs(adminsRef);

let isAdmin=false;

snapshot.forEach(docSnap=>{

if(docSnap.data().email === user.email){
isAdmin=true;
}

});


if(!isAdmin){

alert("Accès refusé");

window.location.href="merchant-login.html";

return;

}

/* si admin → charger dashboard */

loadMerchants();
loadProducts();

});



/* LOGOUT */

window.logout = async function(){

await signOut(auth);

window.location.href="merchant-login.html";

}



/* ================= MARCHANDS ================= */

async function loadMerchants(){

const querySnapshot = await getDocs(collection(db,"merchants"));

const container = document.getElementById("merchantList");

container.innerHTML="";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.innerHTML=`

<p>

<b>${data.shopName}</b><br>
${data.email}<br>
Status: ${data.status}

<br><br>

<button onclick="approveMerchant('${docSnap.id}')">
Aprovar
</button>

<button class="delete" onclick="deleteMerchant('${docSnap.id}')">
Excluir
</button>

</p>

<hr>

`;

container.appendChild(div);

});

}



/* VALIDER MARCHAND */

window.approveMerchant = async function(id){

await updateDoc(doc(db,"merchants",id),{

status:"approved"

});

alert("Marchand validé");

loadMerchants();

}



/* SUPPRIMER MARCHAND */

window.deleteMerchant = async function(id){

await deleteDoc(doc(db,"merchants",id));

alert("Marchand supprimé");

loadMerchants();

}



/* ================= PRODUITS ================= */

async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

const container = document.getElementById("productList");

container.innerHTML="";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.innerHTML=`

<p>

<b>${data.name}</b><br>
Preço: ${data.price}

<br><br>

<button class="delete" onclick="deleteProduct('${docSnap.id}')">
Excluir produto
</button>

</p>

<hr>

`;

container.appendChild(div);

});

}



/* SUPPRIMER PRODUIT */

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Produit supprimé");

loadProducts();

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:black;color:white;padding:15px;text-align:center;
font-size:20px;font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.stat{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.tabs{display:flex;background:white;border-bottom:1px solid #ddd;}
.tab{flex:1;text-align:center;padding:12px;cursor:pointer;font-weight:bold;}
.active{background:#1aa34a;color:white;}

.filter{
padding:10px;
display:flex;
gap:5px;
flex-wrap:wrap;
}

.filter button{
background:#ddd;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.filter .activeFilter{
background:#1aa34a;
color:white;
}

.container{padding:10px;}

.card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.badge{
padding:3px 8px;
border-radius:6px;
color:white;
font-size:12px;
}

.green{background:#1aa34a;}
.red{background:red;}
.orange{background:orange;}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
margin-right:5px;
}

.approve{background:#1aa34a;color:white;}
.reject{background:red;color:white;}
.admin{background:black;color:white;}
.block{background:#ff4757;color:white;}
.unblock{background:#2ed573;color:white;}
</style>
</head>

<body>

<div class="header">Admin Dashboard 👑</div>

<div class="stats">
<div class="stat" id="totalUsers">👤 0</div>
<div class="stat" id="totalMerchants">🏪 0</div>
<div class="stat" id="totalOrders">🛒 0</div>
<div class="stat" id="totalRevenue">💰 0 Kz</div>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab(event,'users')">👤 Utilisateurs</div>
<div class="tab" onclick="showTab(event,'orders')">🛒 Commandes</div>
<div class="tab" onclick="showTab(event,'merchants')">🏪 Vendeurs</div>
</div>

<div class="filter" id="filters"></div>

<div class="container" id="content"></div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
getDocs,
getDoc,
doc,
updateDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUserData=null
let allUsers=[]

/* 🔐 AUTH FIX FINAL */
onAuthStateChanged(auth, async (user)=>{

if(!user){
alert("Session perdue ❌ reconnecte-toi")
location.href="login.html"
return
}

try{

const ref = doc(db,"users",user.uid)
const snap = await getDoc(ref)

if(!snap.exists()){
alert("Compte introuvable ❌")
location.href="index.html"
return
}

const data = snap.data()

console.log("UID:", user.uid)
console.log("ROLE:", data.role)

/* 🔥 CHECK ADMIN */
if(data.role !== "admin" && data.role !== "superadmin"){
alert("Acesso negado ❌")
location.href="index.html"
return
}

currentUserData = data

await loadStats()
loadUsers()

}catch(e){
console.error(e)
alert("Erro admin ❌")
location.href="index.html"
}

})

/* 📊 STATS */
async function loadStats(){

let usersSnap = await getDocs(collection(db,"users"))
let ordersSnap = await getDocs(collection(db,"orders"))

let totalUsers=0
let totalMerchants=0
let totalOrders=0
let totalRevenue=0

usersSnap.forEach(d=>{
totalUsers++
if(d.data().role==="merchant") totalMerchants++
})

ordersSnap.forEach(d=>{
let o=d.data()
totalOrders++
totalRevenue += (o.price||0)*(o.qty||1)
})

document.getElementById("totalUsers").innerText="👤 "+totalUsers
document.getElementById("totalMerchants").innerText="🏪 "+totalMerchants
document.getElementById("totalOrders").innerText="🛒 "+totalOrders
document.getElementById("totalRevenue").innerText="💰 "+totalRevenue+" Kz"

}

/* NAV */
window.showTab=function(e,tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

if(tab==="users") loadUsers()
if(tab==="orders") loadOrders()
if(tab==="merchants") loadMerchants()
}

/* USERS */
async function loadUsers(filter="all"){

const snap = await getDocs(collection(db,"users"))
allUsers=[]

snap.forEach(d=>{
allUsers.push({id:d.id,...d.data()})
})

renderFilters(filter)
renderUsers(filter)

}

function renderFilters(active){

let filters = ["all","client","merchant","pending","blocked"]

let html=""

filters.forEach(f=>{
html+=`<button class="${f===active?"activeFilter":""}" onclick="applyFilter('${f}')">${f}</button>`
})

document.getElementById("filters").innerHTML=html
}

window.applyFilter=function(f){
renderUsers(f)
renderFilters(f)
}

function renderUsers(filter){

let html=""

let users = allUsers.filter(u=>{
if(filter==="all") return true
if(filter==="client") return u.role==="client"
if(filter==="merchant") return u.role==="merchant"
if(filter==="pending") return !u.approved
if(filter==="blocked") return u.blocked===true
})

users.forEach(u=>{

let statusBadge = ""

if(u.blocked){
statusBadge = `<span class="badge red">Bloqué ❌</span>`
}else if(u.approved){
statusBadge = `<span class="badge green">Aprovado</span>`
}else{
statusBadge = `<span class="badge orange">Pendente</span>`
}

html+=`
<div class="card">
<b>${u.email}</b><br>
Role: ${u.role}<br>
${statusBadge}

<br>

<button class="approve" onclick="approve('${u.id}')">Aprovar</button>
<button class="reject" onclick="reject('${u.id}')">Recusar</button>

${u.blocked 
? `<button class="unblock" onclick="unblockUser('${u.id}')">Desbloquear</button>`
: `<button class="block" onclick="blockUser('${u.id}')">Bloquear</button>`
}

${currentUserData.role==="superadmin" 
? `<button class="admin" onclick="makeAdmin('${u.id}')">Admin</button>` 
: ""}

</div>
`
})

document.getElementById("content").innerHTML=html

}

/* ACTIONS */
window.approve = async function(id){
await updateDoc(doc(db,"users",id),{role:"merchant",approved:true})
loadUsers()
}

window.reject = async function(id){
await updateDoc(doc(db,"users",id),{role:"client",approved:false})
loadUsers()
}

window.blockUser = async function(id){
await updateDoc(doc(db,"users",id),{blocked:true})
alert("Utilisateur bloqué ❌")
loadUsers()
}

window.unblockUser = async function(id){
await updateDoc(doc(db,"users",id),{blocked:false})
alert("Utilisateur débloqué ✅")
loadUsers()
}

window.makeAdmin = async function(id){
await updateDoc(doc(db,"users",id),{role:"admin"})
loadUsers()
}

/* ORDERS */
async function loadOrders(){

document.getElementById("filters").innerHTML=""

const snap = await getDocs(collection(db,"orders"))

let html=""

snap.forEach(d=>{
let o=d.data()

html+=`
<div class="card">
<b>${o.productName}</b><br>
${o.qty} x ${o.price} Kz<br>
👤 ${o.clientName}<br>
📞 ${o.clientPhone}
</div>
`
})

document.getElementById("content").innerHTML=html

}

/* MERCHANTS */
async function loadMerchants(){

document.getElementById("filters").innerHTML=""

const q = query(collection(db,"users"), where("role","==","merchant"))
const snap = await getDocs(q)

let html=""

snap.forEach(d=>{
let m=d.data()

html+=`
<div class="card">
<b>${m.email}</b><br>
<span class="badge green">Ativo</span>
</div>
`
})

document.getElementById("content").innerHTML=html

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avaliar Produto</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.box{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

h2{
margin-top:0;
text-align:center;
}

.stars{
text-align:center;
font-size:40px;
margin:20px 0;
}

.stars span{
cursor:pointer;
color:#ddd;
transition:.2s;
}

.stars span.active{
color:#ff9800;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
resize:none;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff6a00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
}

.message{
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="box">

<h2>⭐ Avaliar Produto</h2>

<div class="stars" id="stars">

<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>

</div>

<textarea
id="comment"
placeholder="Escreva a sua opinião sobre o produto..."
></textarea>

<button id="sendBtn">
Enviar Avaliação
</button>

<div id="message" class="message"></div>

</div>

</div>

<script type="module">

import {
auth,
db
}
from "./firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
collection,
addDoc,
doc,
updateDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params =
new URLSearchParams(location.search);

const productId =
params.get("productId");

const orderId =
params.get("orderId");

const stars =
document.querySelectorAll("#stars span");

const commentInput =
document.getElementById("comment");

const sendBtn =
document.getElementById("sendBtn");

const message =
document.getElementById("message");

let rating = 0;
let currentUser = null;

/* ESTRELAS */

stars.forEach(star=>{

star.addEventListener("click",()=>{

rating =
Number(star.dataset.rate);

stars.forEach(s=>{

s.classList.toggle(
"active",
Number(s.dataset.rate) <= rating
);

});

});

});

/* AUTH */

onAuthStateChanged(auth,user=>{

if(!user){

location.href =
"login.html";

return;

}

currentUser = user;

});

/* ENVIAR */

sendBtn.addEventListener("click",sendReview);

async function sendReview(){

if(!currentUser){

alert("Faça login");

return;

}

if(!productId){

alert("Produto inválido");

return;

}

if(rating === 0){

alert("Escolha uma nota");

return;

}

sendBtn.disabled = true;

try{

await addDoc(
collection(db,"reviews"),
{
productId: productId,
orderId: orderId,
userId: currentUser.uid,
userName:
currentUser.displayName ||
"Cliente",
rating: rating,
comment:
commentInput.value.trim(),
createdAt:
Date.now()
}
);

if(orderId){

await updateDoc(
doc(db,"orders",orderId),
{
reviewed:true
}
);

}

message.style.color =
"#1aa34a";

message.innerHTML =
"✅ Avaliação enviada com sucesso";

setTimeout(()=>{

history.back();

},1500);

}
catch(err){

console.error(err);

message.style.color =
"red";

message.innerHTML =
"❌ Erro ao enviar avaliação";

}

sendBtn.disabled = false;

}

</script>

</body>
</html>

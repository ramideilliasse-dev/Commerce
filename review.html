 <!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avaliar produto</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.stars{
font-size:30px;
color:#ddd;
cursor:pointer;
}

.active{
color:orange;
}

textarea{
width:100%;
height:100px;
margin-top:10px;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="box">

<h2>Avaliar produto</h2>

<div id="stars">

<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>

</div>

<textarea id="comment" placeholder="Escreva seu comentário"></textarea>

<button onclick="sendReview()">

Enviar avaliação

</button>

</div>

</div>


<script type="module">

import { db } from "./firebase.js"

import {
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

let rating=0

window.rate=function(n){

rating=n

const stars=document.querySelectorAll("#stars span")

stars.forEach((s,i)=>{

s.classList.toggle("active",i<n)

})

}

window.sendReview=async function(){

const text=document.getElementById("comment").value

await addDoc(collection(db,"reviews"),{

rating:rating,
comment:text,
date:Date.now()

})

alert("Obrigado pela avaliação")

}

</script>

</body>

</html>

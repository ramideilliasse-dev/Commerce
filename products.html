 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Toma • Produtos</title>

<link
rel="stylesheet"
href="products.css">

</head>

<body>

<!-- Header -->
<header id="productsHeader">

<div class="topBar">

<button
id="backButton"
class="iconButton">

←

</button>

<div class="pageTitle">

Produtos

</div>

<button
id="filterButton"
class="iconButton">

⚙️

</button>

</div>

<div class="searchBox">

<span>

🔍

</span>

<input
id="searchInput"
type="text"
placeholder="Pesquisar produtos...">

</div>

</header>
<!-- Barre de recherche -->
<section id="searchSection"></section>

<!-- Filtres -->
<section id="filtersSection">

<div class="filterChip active" data-filter="all">

Todos

</div>

<div class="filterChip" data-filter="promo">

🔥 Promoções

</div>

<div class="filterChip" data-filter="new">

🆕

Novidades

</div>

<div class="filterChip" data-filter="top">

⭐ Mais vendidos

</div>

<div class="filterChip" data-filter="cheap">

💰 Menor preço

</div>

<div class="filterChip" data-filter="expensive">

💎 Maior preço

</div>

</section>
<!-- Informations catalogue -->
<section id="catalogInfo"></section>

<!-- Produits -->
<main id="productsGrid">

<!-- Les produits seront chargés automatiquement ici -->
<div class="productCard">

<div class="productImageBox">

<img
class="productImage"
src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<div class="productBadge">

Novo

</div>

<div class="favoriteBtn">

🤍

</div>

</div>

<div class="productInfo">

<div class="productName">

iPhone 15 Pro Max

</div>

<div class="productPrice">

950 000 Kz

</div>

<div class="productStore">

Nike Angola

<span class="storeBadge">

✔️

</span>

</div>

<button class="buyButton">

Ver produto

</button>

</div>

</div>
</main>
<!-- Loader -->
<div id="loader"></div>
<script>

document.querySelectorAll(".filterChip").forEach(chip=>{

chip.onclick=()=>{

document.querySelectorAll(".filterChip")

.forEach(c=>c.classList.remove("active"));

chip.classList.add("active");

};

});

</script>
<script type="module" src="./js/products-page.js"></script>
</body>

</html>

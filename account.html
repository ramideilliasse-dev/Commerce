 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Minha Conta</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#ff6a00;
color:white;
padding:18px;
font-size:24px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
font-size:20px;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
font-size:18px;
}

</style>
</head>

<body>

<header>Minha Conta</header>

<div class="container">

<div class="card" id="userInfo"></div>

<div class="card">
<button onclick="goCart()">🛒 Ver Carrinho</button>
</div>

<div class="card">
<button onclick="goMessages()">💬 Mensagens</button>
</div>

<div class="card">
<button onclick="logout()">🚪 Logout</button>
</div>

</div>

<script type="module">

import { auth } from "./firebase.js"

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("userInfo").innerHTML=`

Nome: ${user.email}

`

}

})

window.logout=function(){

signOut(auth)

location.href="index.html"

}

window.goCart=function(){
location.href="cart.html"
}

window.goMessages=function(){
location.href="messages.html"
}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Premium</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100dvh;
}

/* HEADER */
.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.name{font-weight:bold;}
.status{font-size:12px;color:#aaa}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:10px;
background:url('https://i.imgur.com/3QZQZ6F.png');
}

/* MESSAGES */
.msg{
max-width:75%;
padding:10px;
border-radius:10px;
margin-bottom:8px;
position:relative;
animation:fade 0.2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

.me{
background:#005c4b;
margin-left:auto;
border-bottom-right-radius:2px;
}

.other{
background:#202c33;
border-bottom-left-radius:2px;
}

.time{
font-size:10px;
opacity:0.7;
text-align:right;
margin-top:5px;
}

.read{color:#53bdeb;font-size:10px;margin-left:5px;}

.msg img{width:150px;border-radius:8px;margin-top:5px;}
audio{width:150px;margin-top:5px}

/* INPUT */
.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:25px;
border:none;
outline:none;
}

.btn{
background:#00a884;
border:none;
width:45px;height:45px;
border-radius:50%;
color:white;
font-size:18px;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00a884;
padding:10px 20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">👤</div>
<div>
<div class="name">Vendedor</div>
<div id="status" class="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<button onclick="send()" class="btn">➤</button>
</div>

<div id="popup" class="popup">Nova mensagem 💬</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const chatId = new URLSearchParams(location.search).get("id")

let user, merchant, messagesRef

/* 🔔 SON PREMIUM */
const audio = new Audio("https://actions.google.com/sounds/v1/notifications/message_new.ogg")

function notify(){
audio.currentTime=0
audio.play().catch(()=>{})

const popup=document.getElementById("popup")
popup.style.display="block"
setTimeout(()=>popup.style.display="none",3000)
}

/* AUTH */
onAuthStateChanged(auth, async (u)=>{

if(!u) return

user=u

const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

messagesRef = collection(db,"chats",chatId,"messages")

listen()

})

/* LISTEN */
function listen(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

snap.docChanges().forEach(change=>{
if(change.type==="added" && change.doc.data().senderId!==user.uid){
notify()
}
})

snap.forEach(d=>{
let m=d.data()
let isMe = m.senderId===user.uid

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
${m.image?`<img src="${m.image}">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:""}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read ? "✔✔" : "✔"}</span>` : ""}
</div>
</div>
`
})

chat.scrollTop=chat.scrollHeight

})

/* ONLINE */
onSnapshot(doc(db,"users",merchant),(snap)=>{
if(snap.exists()){
document.getElementById("status").innerText =
snap.data().online ? "🟢 online" : "offline"
}
})

}

/* SEND */
window.send=async function(){

const text=document.getElementById("text").value.trim()
if(!text) return

await addDoc(messagesRef,{
text,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid, merchant],
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

document.getElementById("text").value=""

}

</script>
</body>
</html>

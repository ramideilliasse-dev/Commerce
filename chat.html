 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat PRO</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
background:#ece5dd;
overflow:hidden;
}

/* HEADER */
.header{
background:#075e54;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.status{font-size:12px;opacity:0.8}

/* CHAT */
.chatArea{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
position:relative;
font-size:15px;
}

.me{background:#dcf8c6;margin-left:auto;}
.other{background:white;}

.msg img{width:140px;border-radius:8px;margin-top:5px;}
audio{width:150px;margin-top:5px;}

.tick{
font-size:11px;
text-align:right;
margin-top:3px;
}

/* INPUT */
.inputArea{
display:flex;
padding:10px;
background:white;
gap:5px;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
cursor:pointer;
}

.iconBtn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#eee;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>
⬅ Chat<br>
<span id="status" class="status">offline</span>
</div>
<div id="typing"></div>
</div>

<div id="chat" class="chatArea"></div>

<div class="inputArea">
<input id="text" placeholder="Mensagem...">
<input type="file" id="image" hidden>
<button class="iconBtn" onclick="pickImage()">📷</button>
<button class="iconBtn" id="recordBtn">🎤</button>
<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc, getDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

const merchant = new URLSearchParams(location.search).get("merchant")

let user, chatId, messagesRef, chatRef

/* AUTH */
onAuthStateChanged(auth, async(u)=>{

if(!u){
location.href="merchant-register.html"
return
}

user=u

chatId = user.uid+"_"+merchant
messagesRef = collection(db,"chats",chatId,"messages")
chatRef = doc(db,"chats",chatId)

/* ONLINE */
setDoc(chatRef,{online:true},{merge:true})

listenMessages()
listenStatus()

})

/* LISTEN MESSAGES */
function listenMessages(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

snap.forEach(async d=>{

let m=d.data()
let id=d.id
let isMe = m.sender===user.uid

/* MARK READ */
if(!isMe && !m.read){
await updateDoc(d.ref,{read:true})
}

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}"
onclick="showOptions('${id}')">

${m.deleted ? "<i>Mensagem apagada</i>" : ""}
${m.text || ""}
${m.image?`<img src="${m.image}">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:""}

<div class="tick">
${isMe ? (m.read ? "✔✔ azul":"✔✔") : ""}
</div>

</div>
`

})

chat.scrollTop=chat.scrollHeight

})

}

/* STATUS */
function listenStatus(){

onSnapshot(chatRef,(snap)=>{

if(!snap.exists()) return

const d=snap.data()

document.getElementById("status").innerText =
d.online ? "online" : "offline"

document.getElementById("typing").innerText =
d.typing ? "digitando..." : ""

})

}

/* SEND */
window.send=async function(){

const text=document.getElementById("text").value.trim()
if(!text) return

await addDoc(messagesRef,{
text, sender:user.uid, time:Date.now(), read:false
})

document.getElementById("text").value=""
setDoc(chatRef,{typing:false},{merge:true})

}

/* TYPING */
text.oninput=()=>{
setDoc(chatRef,{typing:true},{merge:true})

setTimeout(()=>{
setDoc(chatRef,{typing:false},{merge:true})
},1500)
}

/* DELETE OPTIONS */
window.showOptions = function(id){

let choice = prompt("1 Supprimer pour moi\n2 Supprimer pour tous")

if(choice=="1"){
deleteDoc(doc(db,"chats",chatId,"messages",id))
}

if(choice=="2"){
updateDoc(doc(db,"chats",chatId,"messages",id),{
deleted:true,text:""
})
}

}

/* IMAGE */
window.pickImage=()=>image.click()

image.onchange=async function(){

const file=this.files[0]

const form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",body:form
})

const data=await res.json()

await addDoc(messagesRef,{
image:data.secure_url,
sender:user.uid,
time:Date.now()
})

}

/* AUDIO HOLD */
let recorder,chunks=[]
const btn=document.getElementById("recordBtn")

btn.onmousedown=async()=>{

const stream=await navigator.mediaDevices.getUserMedia({audio:true})
recorder=new MediaRecorder(stream)

recorder.start()
btn.innerText="⏹"

recorder.ondataavailable=e=>chunks.push(e.data)
}

btn.onmouseup=()=>recorder.stop()

recorder?.onstop=uploadAudio

async function uploadAudio(){

const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",body:form
})

const data=await res.json()

await addDoc(messagesRef,{
audio:data.secure_url,
sender:user.uid,
time:Date.now()
})

btn.innerText="🎤"

}

</script>

</body>
</html>

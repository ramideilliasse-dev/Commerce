 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat WhatsApp PRO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100dvh;
}

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.status{font-size:12px;color:#aaa}

.chat{
flex:1;
overflow-y:auto;
padding:10px;

background:
linear-gradient(rgba(11,20,26,0.85), rgba(11,20,26,0.85)),
url('https://i.ibb.co/7QpKsCX/whatsapp-bg.png');

background-size:cover;
animation:moveBg 30s linear infinite;
}

@keyframes moveBg{
0%{background-position:0 0;}
100%{background-position:100% 100%;}
}

.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.time{font-size:10px;text-align:right;opacity:0.7;}
.read{color:#53bdeb}

.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:25px;
border:none;
}

.btn{
background:#00a884;
border:none;
width:45px;height:45px;
border-radius:50%;
color:white;
}

.icon{
background:#eee;
width:40px;height:40px;
border-radius:50%;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">👤</div>
<div>
<div>Chat</div>
<div id="status" class="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<input type="file" id="image" hidden>

<button class="icon" onclick="pickImage()">📷</button>
<button class="icon" id="recordBtn">🎤</button>
<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

const chatId = new URLSearchParams(location.search).get("id")

let user, merchant, messagesRef
let recorder, chunks=[]

const imageInput = document.getElementById("image")
const chatBox = document.getElementById("chat")

/* AUTH */
onAuthStateChanged(auth, async (u)=>{

if(!u){
alert("Login necessário ❌")
return
}

if(!chatId){
alert("Chat ID inválido ❌")
return
}

user=u

const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

messagesRef = collection(db,"chats",chatId,"messages")

try{
await updateDoc(doc(db,"users",user.uid),{online:true})
}catch(e){}

listen()

})

/* LISTEN */
function listen(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

chatBox.innerHTML=""

snap.forEach(d=>{
let m=d.data()
let id=d.id
let isMe = m.senderId===user.uid

if(!isMe && !m.read){
updateDoc(doc(db,"chats",chatId,"messages",id),{read:true})
}

chatBox.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
${m.image?`<img src="${m.image}" width="140">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:"}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read?"✔✔":"✔"}</span>`:""}
</div>
</div>
`
})

chatBox.scrollTop=chatBox.scrollHeight

})

}

/* ✅ SEND FIX */
window.send = async function(){

try{

if(!user || !messagesRef){
alert("Chat não pronto ❌")
return
}

let text = document.getElementById("text").value.trim()
if(!text) return

await addDoc(messagesRef,{
text,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid, merchant],
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

document.getElementById("text").value=""

}catch(e){
console.error(e)
alert("Erro ao enviar ❌")
}

}

/* ENTER SEND */
document.getElementById("text").addEventListener("keypress",(e)=>{
if(e.key==="Enter") send()
})

/* IMAGE */
window.pickImage = ()=>{
imageInput.click()
}

imageInput.onchange = async function(){

try{

const file=this.files[0]
if(!file) return

let form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:form
})

let data=await res.json()

if(!data.secure_url){
alert("Erro upload ❌")
return
}

await addDoc(messagesRef,{
image:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

}catch(e){
console.error(e)
alert("Erro imagem ❌")
}

}

/* AUDIO */
const btn=document.getElementById("recordBtn")

btn.addEventListener("touchstart", startRecord)
btn.addEventListener("touchend", stopRecord)
btn.addEventListener("mousedown", startRecord)
btn.addEventListener("mouseup", stopRecord)

async function startRecord(){

try{
const stream = await navigator.mediaDevices.getUserMedia({audio:true})

recorder = new MediaRecorder(stream)
chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.start()
btn.innerText="⏹"

}catch(e){
alert("Micro bloqueado ❌")
}

}

async function stopRecord(){

if(!recorder) return

recorder.stop()
btn.innerText="🎤"

recorder.onstop = async ()=>{

try{

let blob=new Blob(chunks,{type:"audio/webm"})

let form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",
body:form
})

let data=await res.json()

if(!data.secure_url){
alert("Erro áudio ❌")
return
}

await addDoc(messagesRef,{
audio:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

}catch(e){
console.error(e)
alert("Erro áudio ❌")
}

}

}

</script>

</body>
</html>

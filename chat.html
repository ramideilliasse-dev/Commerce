 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Debug</title>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white;display:flex;flex-direction:column;height:100vh;}
.header{background:#202c33;padding:10px;}
.chat{flex:1;overflow:auto;padding:10px;}
.msg{padding:10px;margin-bottom:8px;border-radius:10px;max-width:70%;}
.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}
.input{display:flex;padding:10px;background:#202c33;}
#text{flex:1;padding:10px;border-radius:20px;border:none;}
.btn{width:45px;height:45px;border-radius:50%;background:#00a884;color:white;border:none;}
.icon{width:40px;height:40px;border-radius:50%;}
</style>
</head>

<body>

<div class="header">Chat DEBUG</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<input type="file" id="image" hidden>

<button class="icon" onclick="pickImage()">📷</button>
<button class="icon" id="recordBtn">🎤</button>
<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

const chatId = new URLSearchParams(location.search).get("id")

let user=null
let merchant=null
let messagesRef=null

const chatBox=document.getElementById("chat")
const imageInput=document.getElementById("image")

alert("ChatID = " + chatId)

/* AUTH */
onAuthStateChanged(auth,(u)=>{

if(!u){
alert("❌ Utilisateur non connecté")
return
}

user=u

alert("✅ User connecté: " + user.uid)

if(!chatId){
alert("❌ ChatID manquant")
return
}

const parts=chatId.split("_")

if(parts.length!==2){
alert("❌ Mauvais format ChatID")
return
}

merchant=parts.find(p=>p!==user.uid)

alert("✅ Merchant trouvé: " + merchant)

messagesRef = collection(db,"chats",chatId,"messages")

alert("✅ messagesRef OK")

listen()

})

/* LISTEN */
function listen(){

if(!messagesRef){
alert("❌ messagesRef NULL")
return
}

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

chatBox.innerHTML=""

snap.forEach(d=>{
let m=d.data()
let isMe=m.senderId===user.uid

chatBox.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
${m.image?`<img src="${m.image}" width="120">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:"}
</div>
`
})

chatBox.scrollTop=chatBox.scrollHeight

})

}

/* SEND */
window.send=async function(){

alert("📤 Clique envoyer")

try{

if(!user){
alert("❌ user NULL")
return
}

if(!messagesRef){
alert("❌ messagesRef NULL")
return
}

let text=document.getElementById("text").value.trim()

if(!text){
alert("❌ message vide")
return
}

alert("🚀 Envoi en cours...")

await addDoc(messagesRef,{
text,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

alert("✅ Message envoyé")

await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid,merchant],
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

document.getElementById("text").value=""

}catch(e){
alert("❌ ERREUR: " + e.message)
console.error(e)
}

}

/* IMAGE */
window.pickImage=()=>{
imageInput.click()
}

imageInput.onchange=async function(){

alert("📷 Image sélectionnée")

try{

const file=this.files[0]
if(!file){
alert("❌ fichier vide")
return
}

let form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",body:form
})

let data=await res.json()

if(!data.secure_url){
alert("❌ upload échoué")
return
}

alert("✅ Image upload OK")

await addDoc(messagesRef,{
image:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

}catch(e){
alert("❌ erreur image: "+e.message)
}

}

/* AUDIO */
document.getElementById("recordBtn").onclick=async ()=>{

alert("🎤 Micro activé")

try{

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

const recorder=new MediaRecorder(stream)
let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=async ()=>{

alert("📤 Envoi audio")

let blob=new Blob(chunks,{type:"audio/webm"})

let form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",body:form
})

let data=await res.json()

await addDoc(messagesRef,{
audio:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

alert("✅ Audio envoyé")

}

recorder.start()

setTimeout(()=>{
recorder.stop()
},3000)

}catch(e){
alert("❌ erreur micro: "+e.message)
}

}

</script>

</body>
</html>

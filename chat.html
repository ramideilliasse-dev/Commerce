 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;border-radius:50%;
object-fit:cover;
}

.chat{flex:1;overflow-y:auto;padding:10px;}

.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.btn{
width:45px;height:45px;border-radius:50%;
background:#00a884;color:white;border:none;
}

img{max-width:150px;border-radius:10px;}
audio{width:150px;}
</style>
</head>

<body>

<div class="header">
<img id="avatar" class="avatar">
<div>
<div id="name">...</div>
<div id="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">

<input type="file" id="image" hidden>
<button onclick="pickImage()">📷</button>

<button onclick="recordAudio()">🎤</button>

<button class="btn" onclick="send()">➤</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

let user, merchant
const chatId = new URLSearchParams(location.search).get("id")

if(!chatId){
alert("Chat inválido ❌")
location.href="index.html"
}

/* AUTH */
auth.onAuthStateChanged(async u=>{

if(!u){
location.href="login.html"
return
}

user=u

const parts=chatId.split("_")

if(!parts.includes(user.uid)){
alert("Acesso negado ❌")
location.href="index.html"
return
}

merchant = parts[0]===user.uid?parts[1]:parts[0]

/* LOAD USER */
const snap = await db.collection("users").doc(merchant).get()
const data = snap.data()

name.innerText = data?.shopName || "User"
avatar.src = data?.photo || "https://i.ibb.co/4pDNDk1/avatar.png"

/* ONLINE */
db.collection("users").doc(merchant)
.onSnapshot(s=>{
let d=s.data()
status.innerText = d?.online ? "🟢 online" :
"visto " + new Date(d?.lastSeen||0).toLocaleTimeString()
})

/* SET ONLINE */
db.collection("users").doc(user.uid).set({
online:true,
lastSeen:Date.now()
},{merge:true})

listen()

})

/* LISTEN */
function listen(){

db.collection("chats").doc(chatId)
.collection("messages")
.orderBy("time")
.limit(50)
.onSnapshot(snap=>{

chat.innerHTML=""

snap.forEach(d=>{
let m=d.data()
let isMe=m.senderId===user.uid

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">

${m.text||""}
${m.image?`<img src="${m.image}">`:``}
${m.audio?`<audio controls src="${m.audio}"></audio>`:``}

<div>${new Date(m.time).toLocaleTimeString()}</div>

</div>
`
})

chat.scrollTop=chat.scrollHeight

})

}

/* SEND TEXT */
function send(){

let text=document.getElementById("text").value.trim()
if(!text) return

db.collection("chats").doc(chatId)
.collection("messages").add({
text,
senderId:user.uid,
time:Date.now()
})

updateConv(text)
text.value=""

}

/* IMAGE */
function pickImage(){
image.click()
}

image.onchange=async function(){

let file=this.files[0]

let form=new FormData()
form.append("file",file)
form.append("upload_preset","angcomerce-upload")

let res=await fetch("https://api.cloudinary.com/v1_1/dy9qnhimc/image/upload",{method:"POST",body:form})
let data=await res.json()

db.collection("chats").doc(chatId)
.collection("messages").add({
image:data.secure_url,
senderId:user.uid,
time:Date.now()
})

updateConv("📷 Image")

}

/* AUDIO */
let mediaRecorder, audioChunks=[]

async function recordAudio(){

let stream = await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder = new MediaRecorder(stream)

mediaRecorder.start()

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data)
}

mediaRecorder.onstop=async ()=>{

let blob=new Blob(audioChunks)
audioChunks=[]

let form=new FormData()
form.append("file",blob)
form.append("upload_preset","angcomerce-upload")

let res=await fetch("https://api.cloudinary.com/v1_1/dy9qnhimc/video/upload",{method:"POST",body:form})
let data=await res.json()

db.collection("chats").doc(chatId)
.collection("messages").add({
audio:data.secure_url,
senderId:user.uid,
time:Date.now()
})

updateConv("🎤 Audio")

}

/* stop après 3 sec */
setTimeout(()=>mediaRecorder.stop(),3000)

}

/* UPDATE CONVERSATION */
function updateConv(last){

db.collection("conversations").doc(chatId).set({
participants:[user.uid,merchant],
lastMessage:last,
lastMessageTime:Date.now(),
unread:{
[merchant]:firebase.firestore.FieldValue.increment(1)
}
},{merge:true})

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat PRO FIX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ece5dd;
height:100dvh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:#075e54;
color:white;
padding:12px;
}

/* CHAT */
.chatArea{
flex:1;
overflow-y:auto;
padding:10px;
padding-bottom:80px; /* 🔥 espace pour éviter que le input cache les messages */
}

/* MSG */
.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#dcf8c6;margin-left:auto;}
.other{background:white;}

.msg img{width:140px;border-radius:8px;margin-top:5px;}
audio{width:140px;margin-top:5px;}

/* INPUT FIXED */
.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
gap:5px;
padding:10px;
border-top:1px solid #ddd;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.btn, .iconBtn{
border:none;
border-radius:50%;
cursor:pointer;
}

.btn{
background:#25d366;
color:white;
width:45px;
height:45px;
}

.iconBtn{
background:#eee;
width:40px;
height:40px;
}
</style>
</head>

<body>

<div class="header">Chat</div>

<div id="chat" class="chatArea"></div>

<div class="inputArea">
<input id="text" placeholder="Mensagem...">
<input type="file" id="image" hidden>
<button class="iconBtn" onclick="pickImage()">📷</button>
<button class="iconBtn" id="recordBtn">🎤</button>
<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

const merchant = new URLSearchParams(location.search).get("merchant")

let user, chatId, messagesRef
let recorder, chunks=[]

/* AUTH */
onAuthStateChanged(auth,(u)=>{

if(!u){
alert("Login ❌")
return
}

if(!merchant){
alert("Erro chat ❌ merchant mancante")
return
}

user=u

chatId = user.uid+"_"+merchant
messagesRef = collection(db,"chats",chatId,"messages")

/* 🔥 créer chat doc (important pour rules) */
setDoc(doc(db,"chats",chatId),{
participants:[user.uid, merchant],
updatedAt:Date.now()
},{merge:true})

listen()

})

/* LISTEN */
function listen(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

snap.forEach(d=>{
let m=d.data()

let isMe = m.senderId===user.uid

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
${m.image?`<img src="${m.image}">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:""}
</div>
`
})

chat.scrollTop=chat.scrollHeight

})

}

/* SEND TEXT */
window.send=async function(){

const text=document.getElementById("text").value.trim()
if(!text) return

try{
await addDoc(messagesRef,{
text:text,
senderId:user.uid,
receiverId:merchant,
chatId:chatId,
time:Date.now(),
read:false
})
document.getElementById("text").value=""
}catch(e){
console.error(e)
alert("Erro envio ❌")
}

}

/* IMAGE */
window.pickImage=()=>image.click()

image.onchange=async function(){

const file=this.files[0]
if(!file) return

try{

const form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:form
})

const data=await res.json()

if(!data.secure_url){
alert("Erro upload ❌")
return
}

await addDoc(messagesRef,{
image:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId:chatId,
time:Date.now(),
read:false
})

}catch(e){
console.error(e)
alert("Erro imagem ❌")
}

}

/* AUDIO */
const btn=document.getElementById("recordBtn")

btn.onmousedown = async ()=>{

const stream = await navigator.mediaDevices.getUserMedia({audio:true})

recorder = new MediaRecorder(stream)
chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop = async ()=>{

try{

const blob=new Blob(chunks,{type:"audio/webm"})

const form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",
body:form
})

const data=await res.json()

await addDoc(messagesRef,{
audio:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId:chatId,
time:Date.now(),
read:false
})

}catch(e){
console.error(e)
alert("Erro áudio ❌")
}

}

recorder.start()
btn.innerText="⏹"

}

btn.onmouseup = ()=>{
if(recorder){
recorder.stop()
btn.innerText="🎤"
}
}

</script>
</body>
</html>

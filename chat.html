 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat vendedor</title>

<style>

body{
font-family:Arial;
margin:0;
background:#ece5dd;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:12px;
display:flex;
align-items:center;
}

.back{
margin-right:10px;
cursor:pointer;
font-size:22px;
}

.shopInfo{
display:flex;
align-items:center;
gap:10px;
}

.shopInfo img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

#shopName{
font-size:18px;
font-weight:bold;
}

/* CHAT */

.chatArea{
height:70vh;
overflow-y:auto;
padding:15px;
}

.msg{
max-width:75%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
font-size:18px;
}

.me{
background:#dcf8c6;
margin-left:auto;
}

.other{
background:white;
}

.msg img{
width:150px;
border-radius:8px;
margin-top:5px;
}

audio{
margin-top:5px;
width:180px;
}

.status{
font-size:12px;
text-align:right;
margin-top:5px;
}

/* INPUT */

.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
align-items:center;
gap:8px;
padding:10px;
border-top:1px solid #ddd;
}

#text{
flex:1;
padding:14px;
font-size:18px;
border-radius:25px;
border:1px solid #ccc;
}

.iconBtn{
background:#eee;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.sendBtn{
background:#25d366;
border:none;
color:white;
width:45px;
height:45px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<span class="back" onclick="history.back()">⬅</span>

<div class="shopInfo">

<img id="shopPhoto">

<div id="shopName">Vendedor</div>

</div>

</div>


<div id="chat" class="chatArea"></div>


<div class="inputArea">

<input id="text" placeholder="Escreva mensagem...">

<input type="file" id="image" accept="image/*" capture="environment" style="display:none">

<button class="iconBtn" onclick="camera()">📷</button>

<button class="iconBtn" id="recordBtn">🎤</button>

<button class="sendBtn" onclick="send()">➤</button>

</div>


<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
addDoc,
query,
orderBy,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params=new URLSearchParams(window.location.search)

const merchant=params.get("merchant")

const product=params.get("product")

const chatId=merchant+"_"+product

const chatRef=doc(db,"chats",chatId)

const messagesRef=collection(db,"chats",chatId,"messages")


/* LOAD SHOP */

async function loadShop(){

const snap=await getDoc(chatRef)

if(snap.exists()){

const data=snap.data()

document.getElementById("shopName").innerText=data.merchantName || "Vendedor"

document.getElementById("shopPhoto").src=data.merchantPhoto || ""

}

}

loadShop()


/* LOAD MESSAGES */

onSnapshot(query(messagesRef,orderBy("time")),snap=>{

const chat=document.getElementById("chat")

chat.innerHTML=""

snap.forEach(async docSnap=>{

const data=docSnap.data()

chat.innerHTML+=`

<div class="msg ${data.sender}">

${data.text || ""}

${data.image ? "<img src='"+data.image+"'>" : ""}

${data.audio ? "<audio controls src='"+data.audio+"'></audio>" : ""}

<div class="status">${data.read ? "✔✔" : "✔"}</div>

</div>

`

if(data.sender!="me"){

await updateDoc(docSnap.ref,{read:true})

}

})

chat.scrollTop=chat.scrollHeight

})


/* SEND TEXT */

window.send=async function(){

const text=document.getElementById("text").value.trim()

if(!text) return

await addDoc(messagesRef,{

text:text,

sender:"me",

time:Date.now(),

read:false

})

document.getElementById("text").value=""

}


/* ENTER KEY SEND */

document.getElementById("text").addEventListener("keypress",function(e){

if(e.key==="Enter"){

send()

}

})


/* CAMERA */

window.camera=function(){

document.getElementById("image").click()

}

document.getElementById("image").addEventListener("change",async function(){

const file=this.files[0]

if(!file) return

const form=new FormData()

form.append("file",file)

form.append("upload_preset","upload")

const res=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload",{

method:"POST",

body:form

})

const data=await res.json()

await addDoc(messagesRef,{

image:data.secure_url,

sender:"me",

time:Date.now(),

read:false

})

})


/* AUDIO RECORD */

let recorder

let chunks=[]

const btn=document.getElementById("recordBtn")

btn.onclick=async function(){

if(!recorder){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=uploadAudio

recorder.start()

btn.innerText="⏹"

}else{

recorder.stop()

recorder=null

btn.innerText="🎤"

}

}


async function uploadAudio(){

const blob=new Blob(chunks,{type:"audio/webm"})

chunks=[]

const form=new FormData()

form.append("file",blob)

form.append("upload_preset","upload")

const res=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/video/upload",{

method:"POST",

body:form

})

const data=await res.json()

await addDoc(messagesRef,{

audio:data.secure_url,

sender:"me",

time:Date.now(),

read:false

})

}

</script>

</body>

</html>

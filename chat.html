 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat DEBUG</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;border-radius:50%;
object-fit:cover;
}

.name{font-weight:bold}
.status{font-size:12px;color:#aaa}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.time{
font-size:10px;
text-align:right;
opacity:0.7;
}

.read{color:#53bdeb;}

.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.btn{
width:45px;height:45px;
border-radius:50%;
background:#00a884;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="header">
<img id="avatar" class="avatar" src="">
<div>
<div id="name" class="name">...</div>
<div id="status" class="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<button class="btn" onclick="send()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

let user, merchant
let chatId = new URLSearchParams(location.search).get("id")

/* 🔴 CHECK CHAT ID */
if(!chatId){
alert("❌ chatId manquant")
throw new Error("chatId manquant")
}

alert("📌 CHAT ID = " + chatId)
console.log("CHAT ID:", chatId)

/* AUTH */
auth.onAuthStateChanged(async u => {

if(!u){
alert("❌ Non connecté → login")
location.href="login.html"
return
}

user = u

alert("✅ USER connecté: " + user.uid)
console.log("USER UID:", user.uid)

/* 🔥 EXTRACTION MERCHANT */
const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

console.log("MERCHANT UID:", merchant)

if(!merchant){
alert("❌ Merchant introuvable")
return
}

alert("🏪 MERCHANT = " + merchant)

/* LOAD MERCHANT */
const snap = await db.collection("users").doc(merchant).get()

if(!snap.exists){
alert("❌ Merchant non trouvé en base")
}

const data = snap.data()

document.getElementById("name").innerText = data?.shopName || "Vendedor"
document.getElementById("avatar").src = data?.photo || "https://i.ibb.co/4pDNDk1/avatar.png"

/* ONLINE */
db.collection("users").doc(merchant)
.onSnapshot(s=>{
console.log("STATUS:", s.data())
document.getElementById("status").innerText =
s.data()?.online ? "🟢 online" : "offline"
})

/* SET ONLINE */
db.collection("users").doc(user.uid).set({online:true},{merge:true})

alert("🚀 Chat prêt")

listen()

})

/* LISTEN */
function listen(){

console.log("👂 Listening messages...")

db.collection("conversations").doc(chatId).set({
unread:{ [user.uid]:0 }
},{merge:true})

db.collection("chats").doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

console.log("📩 Messages count:", snap.size)

chat.innerHTML=""

/* DEBUG CHANGES */
snap.docChanges().forEach(change=>{
console.log("CHANGE:", change.type, change.doc.data())
})

snap.forEach(d=>{

let m=d.data()
let id=d.id
let isMe = m.senderId===user.uid

/* READ */
if(!isMe && !m.read){
db.collection("chats").doc(chatId)
.collection("messages").doc(id).update({read:true})
}

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text || ""}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read?"✔✔":"✔"}</span>` : ""}
</div>
</div>
`
})

chat.scrollTop = chat.scrollHeight

}, err=>{
console.error("❌ LISTEN ERROR:", err)
alert("Erreur lecture messages ❌")
})

}

/* SEND */
function send(){

let text = document.getElementById("text").value.trim()

if(!text){
alert("❌ Message vide")
return
}

console.log("📤 Envoi:", text)

db.collection("chats").doc(chatId)
.collection("messages").add({
text,
senderId:user.uid,
receiverId:merchant,
time:Date.now(),
read:false
})
.then(()=>{
alert("✅ Message envoyé")
console.log("Message OK")
})
.catch(e=>{
alert("❌ Erreur envoi")
console.error(e)
})

/* UPDATE CONVERSATION */
db.collection("conversations").doc(chatId).set({
participants:[user.uid, merchant],
lastMessage:text,
lastMessageTime:Date.now(),
unread:{
[merchant]: firebase.firestore.FieldValue.increment(1)
}
},{merge:true})

document.getElementById("text").value=""

}

</script>

</body>
</html>

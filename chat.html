 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat ULTRA PRO</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100dvh;
}

/* HEADER */
.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.name{font-weight:bold;}
.status{font-size:12px;color:#aaa}

/* CHAT PREMIUM */
.chat{
flex:1;
overflow-y:auto;
padding:10px;
position:relative;

/* 🔥 fond + overlay */
background:
linear-gradient(rgba(11,20,26,0.85), rgba(11,20,26,0.85)),
url('https://i.ibb.co/7QpKsCX/whatsapp-bg.png');

background-size:cover;
background-position:center;

/* animation */
animation: moveBg 25s linear infinite;
}

/* animation fond */
@keyframes moveBg{
0%{background-position:0% 0%;}
50%{background-position:100% 100%;}
100%{background-position:0% 0%;}
}

/* ✨ particules */
.chat::before{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
pointer-events:none;

background:radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:30px 30px;

animation: sparkle 12s linear infinite;
}

@keyframes sparkle{
0%{background-position:0 0;}
100%{background-position:200px 200px;}
}

/* MSG */
.msg{
max-width:75%;
padding:10px;
border-radius:10px;
margin-bottom:8px;
animation:fade 0.2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

.me{
background:#005c4b;
margin-left:auto;
border-bottom-right-radius:2px;
}

.other{
background:#202c33;
border-bottom-left-radius:2px;
}

.time{
font-size:10px;
opacity:0.7;
text-align:right;
margin-top:5px;
}

.read{color:#53bdeb;font-size:10px;margin-left:5px;}

.msg img{
width:150px;
border-radius:8px;
margin-top:5px;
}

audio{
width:150px;
margin-top:5px;
}

/* INPUT */
.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:25px;
border:none;
outline:none;
}

.btn{
background:#00a884;
border:none;
width:45px;height:45px;
border-radius:50%;
color:white;
font-size:18px;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00a884;
padding:10px 20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">👤</div>
<div>
<div class="name">Vendedor</div>
<div id="status" class="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<button onclick="send()" class="btn">➤</button>
</div>

<div id="popup" class="popup">Nova mensagem 💬</div>

<script type="module">

import { db, auth } from "./firebase.js"

/* 🔔 GLOBAL NOTIFICATIONS */
import { startNotifications } from "./notifications.js"
startNotifications()

import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const chatId = new URLSearchParams(location.search).get("id")

let user, merchant, messagesRef

/* 🔊 SON */
const audio = new Audio("https://actions.google.com/sounds/v1/notifications/message_new.ogg")

function notify(){
audio.currentTime=0
audio.play().catch(()=>{})

const popup=document.getElementById("popup")
popup.style.display="block"
setTimeout(()=>popup.style.display="none",3000)
}

/* AUTH */
onAuthStateChanged(auth, async (u)=>{

if(!u) return

user=u

const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

messagesRef = collection(db,"chats",chatId,"messages")

/* 🟢 ONLINE */
await updateDoc(doc(db,"users",user.uid),{online:true})

window.addEventListener("beforeunload",()=>{
updateDoc(doc(db,"users",user.uid),{online:false})
})

listen()

})

/* LISTEN */
function listen(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

/* 🔔 notification message */
snap.docChanges().forEach(change=>{
if(change.type==="added" && change.doc.data().senderId!==user.uid){
notify()
}
})

snap.forEach(d=>{

let m=d.data()
let id=d.id
let isMe = m.senderId===user.uid

/* ✔ mark read */
if(!isMe && !m.read){
updateDoc(doc(db,"chats",chatId,"messages",id),{read:true})
}

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">

${m.text||""}

${m.image ? `<img src="${m.image}" onerror="this.style.display='none'">` : ""}

${m.audio ? `<audio controls src="${m.audio}"></audio>` : ""}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read ? "✔✔" : "✔"}</span>` : ""}
</div>

</div>
`
})

chat.scrollTop=chat.scrollHeight

})

/* 🟢 ONLINE STATUS */
onSnapshot(doc(db,"users",merchant),(snap)=>{
if(snap.exists()){
document.getElementById("status").innerText =
snap.data().online ? "🟢 online" : "offline"
}
})

}

/* SEND */
window.send=async function(){

const text=document.getElementById("text").value.trim()
if(!text) return

await addDoc(messagesRef,{
text,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid, merchant],
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

document.getElementById("text").value=""

}

</script>

</body>
</html>

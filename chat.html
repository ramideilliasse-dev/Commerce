 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat WhatsApp PRO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100dvh;
}

/* HEADER */
.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.status{font-size:12px;color:#aaa}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:10px;

background:
linear-gradient(rgba(11,20,26,0.85), rgba(11,20,26,0.85)),
url('https://i.ibb.co/7QpKsCX/whatsapp-bg.png');

background-size:cover;
animation:moveBg 30s linear infinite;
}

@keyframes moveBg{
0%{background-position:0 0;}
100%{background-position:100% 100%;}
}

/* MSG */
.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.time{font-size:10px;text-align:right;opacity:0.7;}
.read{color:#53bdeb}

/* INPUT */
.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:25px;
border:none;
}

/* BUTTONS */
.btn{
background:#00a884;
border:none;
width:45px;height:45px;
border-radius:50%;
color:white;
}

.icon{
background:#eee;
width:40px;height:40px;
border-radius:50%;
}

/* typing */
.typing{
font-size:12px;
color:#53bdeb;
margin-left:10px;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">👤</div>
<div>
<div>Chat</div>
<div id="status" class="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div id="typing" class="typing"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">

<input type="file" id="image" hidden>

<button class="icon" onclick="pickImage()">📷</button>
<button class="icon" id="recordBtn">🎤</button>

<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection, addDoc, query, orderBy, onSnapshot,
doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import { startNotifications } from "./notifications.js"
startNotifications()

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

const chatId = new URLSearchParams(location.search).get("id")

if(!chatId){
alert("Chat ID manquant ❌")
}

let user, merchant, messagesRef
let recorder, chunks=[]

/* 🔊 SON */
const audioNotif = new Audio("https://actions.google.com/sounds/v1/notifications/message_new.ogg")

function notify(){
audioNotif.currentTime=0
audioNotif.play().catch(()=>{})
}

/* AUTH */
onAuthStateChanged(auth, async (u)=>{

if(!u) return

user=u

const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

messagesRef = collection(db,"chats",chatId,"messages")

await updateDoc(doc(db,"users",user.uid),{online:true})

listen()

})

/* LISTEN */
function listen(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

/* 🔔 notif */
snap.docChanges().forEach(change=>{
if(change.type==="added" && change.doc.data().senderId!==user.uid){
notify()
}
})

snap.forEach(d=>{

let m=d.data()
let id=d.id
let isMe = m.senderId===user.uid

/* ✔✔ lu */
if(!isMe && !m.read){
updateDoc(doc(db,"chats",chatId,"messages",id),{read:true})
}

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
${m.image?`<img src="${m.image}" width="140">`:""}
${m.audio?`<audio controls src="${m.audio}"></audio>`:"}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read?"✔✔":"✔"}</span>`:""}
</div>
</div>
`
})

chat.scrollTop=chat.scrollHeight

})

/* ONLINE */
onSnapshot(doc(db,"users",merchant),(snap)=>{
document.getElementById("status").innerText =
snap.data()?.online ? "🟢 online" : "offline"
})

}

/* ✅ SEND FIX COMPLET */
window.send = async function(){

try{

if(!user){
alert("Utilisateur non connecté ❌")
return
}

if(!messagesRef){
alert("Chat non prêt ❌")
return
}

let text=document.getElementById("text").value.trim()
if(!text) return

await addDoc(messagesRef,{
text,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid, merchant],
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

document.getElementById("text").value=""

}catch(e){
console.error(e)
alert("Erreur envoi ❌")
}

}

/* ENTER SEND */
document.getElementById("text").addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
send()
}
})

/* IMAGE */
window.pickImage=()=>image.click()

image.onchange=async function(){

const file=this.files[0]
if(!file) return

let form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",body:form
})

let data=await res.json()

await addDoc(messagesRef,{
image:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

}

/* AUDIO */
const btn=document.getElementById("recordBtn")

btn.onmousedown = async ()=>{

const stream = await navigator.mediaDevices.getUserMedia({audio:true})
recorder = new MediaRecorder(stream)

chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop = async ()=>{

let blob=new Blob(chunks,{type:"audio/webm"})

let form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",body:form
})

let data=await res.json()

await addDoc(messagesRef,{
audio:data.secure_url,
senderId:user.uid,
receiverId:merchant,
chatId,
time:Date.now(),
read:false
})

}

recorder.start()
btn.innerText="⏹"

}

btn.onmouseup = ()=>{
if(recorder){
recorder.stop()
btn.innerText="🎤"
}
}

/* TYPING */
const input=document.getElementById("text")

input.addEventListener("input", async ()=>{
await setDoc(doc(db,"typing",chatId),{
user:user.uid,
time:Date.now()
})
})

onSnapshot(doc(db,"typing",chatId),(snap)=>{
const t=snap.data()

if(t && t.user!==user.uid){
document.getElementById("typing").innerText="✍️ digitando..."
setTimeout(()=>document.getElementById("typing").innerText="",2000)
}
})

</script>

</body>
</html>

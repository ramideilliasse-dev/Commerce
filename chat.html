 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{font-family:Arial;margin:0;background:#ece5dd;}

.header{
background:#075e54;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{display:flex;gap:10px;align-items:center;}

.status{font-size:12px;opacity:0.8;}

.chatArea{
height:70vh;
overflow-y:auto;
padding:15px;
}

.msg{
max-width:75%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
font-size:16px;
}

.me{background:#dcf8c6;margin-left:auto;}
.other{background:white;}

.msg img{
width:150px;
border-radius:8px;
margin-top:5px;
}

audio{
width:150px;
margin-top:5px;
}

.msg .status{
font-size:11px;
text-align:right;
margin-top:5px;
color:#666;
}

.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
padding:10px;
gap:5px;
align-items:center;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.iconBtn{
background:#eee;
border:none;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.sendBtn{
background:#25d366;
color:white;
border:none;
width:45px;
height:45px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="left">
<span onclick="history.back()">⬅</span>
<div>
<div>Chat</div>
<div id="status" class="status">offline</div>
</div>
</div>
<div id="typingStatus"></div>
</div>

<div id="chat" class="chatArea"></div>

<div class="inputArea">
<input id="text" placeholder="Mensagem...">

<input type="file" id="image" hidden>

<button class="iconBtn" onclick="pickImage()">📷</button>
<button class="iconBtn" id="recordBtn">🎤</button>
<button class="sendBtn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
addDoc,
query,
orderBy,
onSnapshot,
doc,
setDoc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const CLOUD_NAME = "df2oxw2qp"
const UPLOAD_PRESET = "angcomerce-upload"

const params = new URLSearchParams(location.search)
const merchant = params.get("merchant")

let currentUser=null
let chatId=null
let messagesRef=null
let chatRef=null

let lastMessageTime = 0

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
location.href="merchant-register.html"
return
}

currentUser=user

/* 🔥 CHECK BLOCKED */
const userSnap = await getDoc(doc(db,"users",user.uid))
if(userSnap.data()?.blocked){
alert("Conta bloqueada ❌")
return
}

chatId = user.uid + "_" + merchant
messagesRef = collection(db,"chats",chatId,"messages")
chatRef = doc(db,"chats",chatId)

/* ONLINE */
setDoc(chatRef,{
online:true,
typing:false
},{merge:true})

listenMessages()
listenStatus()

})

/* 🔔 LISTEN MESSAGES */
function listenMessages(){

onSnapshot(query(messagesRef,orderBy("time")),(snap)=>{

const chat=document.getElementById("chat")
chat.innerHTML=""

let unread=0

snap.forEach(async docSnap=>{

const m=docSnap.data()
const isMe = m.sender === currentUser.uid

/* COUNT UNREAD */
if(!isMe && !m.read) unread++

/* MARK AS READ */
if(!isMe && !m.read){
await updateDoc(docSnap.ref,{read:true})
}

chat.innerHTML += `
<div class="msg ${isMe ? "me":"other"}">
${m.text || ""}
${m.image ? `<img src="${m.image}">` : ""}
${m.audio ? `<audio controls src="${m.audio}"></audio>` : ""}

<div class="status">
${isMe ? (m.read ? "✔✔":"✔") : ""}
</div>
</div>
`

})

/* 🔴 BADGE */
document.title = unread>0 ? "("+unread+") Chat" : "Chat"

chat.scrollTop=chat.scrollHeight

})

}

/* STATUS */
function listenStatus(){

onSnapshot(chatRef,(snap)=>{

if(!snap.exists()) return

const d = snap.data()

document.getElementById("status").innerText = d.online ? "online" : "offline"
document.getElementById("typingStatus").innerText = d.typing ? "digitando..." : ""

})

}

/* SEND */
window.send=async function(){

const text=document.getElementById("text").value.trim()

if(!text) return

/* 🛡️ ANTI SPAM */
const now = Date.now()
if(now - lastMessageTime < 1000){
alert("Trop rapide ⚠️")
return
}
lastMessageTime = now

if(text.length > 300){
alert("Message trop long ❌")
return
}

await addDoc(messagesRef,{
text:text,
sender:currentUser.uid,
time:Date.now(),
read:false
})

document.getElementById("text").value=""

setDoc(chatRef,{typing:false},{merge:true})

}

/* TYPING */
document.getElementById("text").addEventListener("input",()=>{

setDoc(chatRef,{typing:true},{merge:true})

setTimeout(()=>{
setDoc(chatRef,{typing:false},{merge:true})
},1500)

})

/* IMAGE */
window.pickImage=function(){
document.getElementById("image").click()
}

document.getElementById("image").addEventListener("change",async function(){

const file=this.files[0]
if(!file) return

const form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:form
})

const data=await res.json()

await addDoc(messagesRef,{
image:data.secure_url,
sender:currentUser.uid,
time:Date.now(),
read:false
})

})

/* AUDIO */
let recorder, chunks=[]
const recordBtn=document.getElementById("recordBtn")

recordBtn.onclick=async function(){

if(!recorder){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)
recorder.start()

recordBtn.innerText="⏹"

recorder.ondataavailable=e=>chunks.push(e.data)
recorder.onstop=uploadAudio

}else{

recorder.stop()
recorder=null
recordBtn.innerText="🎤"

}

}

async function uploadAudio(){

const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("file",blob)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
method:"POST",
body:form
})

const data=await res.json()

await addDoc(messagesRef,{
audio:data.secure_url,
sender:currentUser.uid,
time:Date.now(),
read:false
})

}

</script>

</body>
</html>

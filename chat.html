 <script>

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

let user, merchant
let chatId = new URLSearchParams(location.search).get("id")

if(!chatId){
alert("❌ chatId manquant")
throw new Error("chatId manquant")
}

console.log("📌 CHAT ID URL:", chatId)

/* AUTH */
auth.onAuthStateChanged(async u => {

if(!u){
alert("❌ Pas connecté → redirection login")
location.href="login.html"
return
}

user = u

alert("✅ USER connecté: " + user.uid)
console.log("👤 USER UID:", user.uid)

/* EXTRAIRE MERCHANT */
const parts = chatId.split("_")
merchant = parts.find(p => p !== user.uid)

console.log("🏪 MERCHANT UID:", merchant)

if(!merchant){
alert("❌ Merchant introuvable dans chatId")
return
}

/* LOAD MERCHANT DATA */
const snap = await db.collection("users").doc(merchant).get()

if(!snap.exists){
alert("❌ Merchant user n'existe pas en base")
}

const data = snap.data()

name.innerText = data?.shopName || "Vendedor"
avatar.src = data?.photo || "https://i.ibb.co/4pDNDk1/avatar.png"

/* ONLINE */
db.collection("users").doc(merchant)
.onSnapshot(s=>{
console.log("🟢 STATUS UPDATE:", s.data())
status.innerText = s.data()?.online ? "🟢 online" : "offline"
})

/* SET ONLINE */
db.collection("users").doc(user.uid).set({online:true},{merge:true})

alert("🚀 Chat prêt !")

listen()

})

/* LISTEN */
function listen(){

console.log("👂 LISTENING messages...")

db.collection("conversations").doc(chatId).set({
unread:{ [user.uid]:0 }
},{merge:true})

db.collection("chats").doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

console.log("📩 SNAPSHOT reçu:", snap.size)

chat.innerHTML=""

snap.docChanges().forEach(change=>{
console.log("🔄 CHANGE:", change.type, change.doc.data())
})

snap.forEach(d=>{

let m=d.data()
let id=d.id
let isMe = m.senderId===user.uid

if(!isMe && !m.read){
db.collection("chats").doc(chatId)
.collection("messages").doc(id).update({read:true})
}

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text || ""}
${m.image ? `<img src="${m.image}" width="140">` : ""}

<div class="time">
${new Date(m.time).toLocaleTimeString()}
${isMe ? `<span class="read">${m.read?"✔✔":"✔"}</span>` : ""}
</div>
</div>
`
})

chat.scrollTop = chat.scrollHeight

}, err => {
console.error("❌ ERREUR LISTEN:", err)
alert("Erreur lecture messages ❌")
})

}

/* SEND TEXT */
function send(){

let text = textInput().value.trim()

if(!text){
alert("❌ Message vide")
return
}

console.log("📤 Envoi message:", text)

db.collection("chats").doc(chatId)
.collection("messages").add({
text,
senderId:user.uid,
receiverId:merchant,
time:Date.now(),
read:false
})
.then(()=>{
console.log("✅ Message envoyé Firestore")
alert("✅ Message envoyé")
})
.catch(e=>{
console.error("❌ Erreur envoi:", e)
alert("❌ Erreur envoi message")
})

updateConversation(text)

textInput().value=""
}

/* IMAGE */
function pickImage(){
image.click()
}

image.onchange = async function(){

const file=this.files[0]
if(!file){
alert("❌ Aucun fichier")
return
}

console.log("📷 Upload image...")

let form=new FormData()
form.append("file",file)
form.append("upload_preset","angcomerce-upload")

let res=await fetch("https://api.cloudinary.com/v1_1/dy9qnhimc/image/upload",{method:"POST",body:form})
let data=await res.json()

if(!data.secure_url){
alert("❌ Upload échoué")
return
}

console.log("✅ Image URL:", data.secure_url)

db.collection("chats").doc(chatId)
.collection("messages").add({
image:data.secure_url,
senderId:user.uid,
receiverId:merchant,
time:Date.now(),
read:false
})

updateConversation("📷 Image")

}

/* UPDATE CONVERSATION */
function updateConversation(last){

console.log("🧠 Update conversation:", last)

db.collection("conversations").doc(chatId).set({
participants:[user.uid, merchant],
lastMessage:last,
lastMessageTime:Date.now(),
unread:{
[merchant]: firebase.firestore.FieldValue.increment(1)
}
},{merge:true})

}

/* HELP */
function textInput(){
return document.getElementById("text")
}

</script>

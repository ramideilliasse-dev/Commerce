 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;height:40px;border-radius:50%;
object-fit:cover;
}

.chat{flex:1;overflow-y:auto;padding:10px;}

.msg{
max-width:75%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.input{
display:flex;
gap:5px;
padding:10px;
background:#202c33;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.btn{
width:45px;height:45px;border-radius:50%;
background:#00a884;color:white;border:none;
}
</style>
</head>

<body>

<div class="header">
<img id="avatar" class="avatar">
<div>
<div id="name">...</div>
<div id="status">offline</div>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="text" placeholder="Mensagem...">
<button class="btn" onclick="send()">➤</button>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const chatId = new URLSearchParams(location.search).get("id")

if(!chatId){
alert("Chat inválido ❌")
location.href="index.html"
}

let user, merchant

onAuthStateChanged(auth, async (u)=>{

if(!u){
location.href="login.html"
return
}

user = u

const parts = chatId.split("_")

if(parts.length !== 2){
alert("Chat inválido ❌")
return
}

merchant = parts.find(p => p !== user.uid)

if(!merchant){
alert("Erro usuário ❌")
return
}

/* LOAD MERCHANT */
const snap = await getDoc(doc(db,"users",merchant))
const data = snap.data()

document.getElementById("name").innerText = data?.shopName || "User"
document.getElementById("avatar").src =
data?.photo || "https://i.ibb.co/4pDNDk1/avatar.png"

/* ONLINE */
onSnapshot(doc(db,"users",merchant),(s)=>{
let d=s.data()
document.getElementById("status").innerText =
d?.online ? "🟢 online" : "offline"
})

/* SET ONLINE */
await setDoc(doc(db,"users",user.uid),{
online:true
},{merge:true})

listen()

})

/* LISTEN */
function listen(){

const q = query(
collection(db,"chats",chatId,"messages"),
orderBy("time")
)

onSnapshot(q,(snap)=>{

const chat = document.getElementById("chat")
chat.innerHTML=""

snap.forEach(d=>{
let m=d.data()
let isMe = m.senderId === user.uid

chat.innerHTML+=`
<div class="msg ${isMe?"me":"other"}">
${m.text||""}
<div>${new Date(m.time).toLocaleTimeString()}</div>
</div>
`
})

chat.scrollTop = chat.scrollHeight

})

}

/* SEND */
window.send = async function(){

const input = document.getElementById("text")
const text = input.value.trim()

if(!text) return

await addDoc(collection(db,"chats",chatId,"messages"),{
text,
senderId:user.uid,
time:Date.now()
})

/* UPDATE CONVERSATION */
await setDoc(doc(db,"conversations",chatId),{
participants:[user.uid,merchant],
lastMessage:text,
lastMessageTime:Date.now(),
unread:{
[merchant]:1
}
},{merge:true})

input.value=""

}

</script>

</body>
</html>

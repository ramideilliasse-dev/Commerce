 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Chat AUTO PRO</title>
</head>

<body onload="alert('PAGE OK 🚀')">

<h2>Chat Auto</h2>

<button onclick="login()">Login test</button>

<div id="chat"></div>

<input id="text" placeholder="Mensagem...">
<button onclick="send()">Envoyer</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

alert("Firebase chargé 🚀")

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

alert("Firebase initialisé ✅")

/* 🔥 AUTO CHAT */
let chatId = null
let user, merchant

/* 🔥 LOGIN */
function login(){
auth.signInAnonymously()
.then(()=> alert("Connecté ✅"))
.catch(e=> alert("Erreur ❌ " + e.message))
}

/* AUTH */
auth.onAuthStateChanged(async u => {

alert("AUTH détecté 👤")

if(!u){
alert("Pas connecté ❌")
return
}

user = u

alert("User UID: " + user.uid)

/* 🔥 RÉCUPÉRER MERCHANT (IMPORTANT) */
const urlParams = new URLSearchParams(location.search)
merchant = urlParams.get("merchant")

if(!merchant){
merchant = "testMerchant" // fallback pour test
alert("Merchant AUTO: " + merchant)
}

/* 🔥 CRÉER CHAT ID */
chatId = user.uid + "_" + merchant

alert("chatId AUTO: " + chatId)

/* 🔥 CRÉER CONVERSATION */
await db.collection("conversations").doc(chatId).set({
participants:[user.uid, merchant],
createdAt: Date.now()
},{merge:true})

listen()

})

/* LISTEN */
function listen(){

alert("LISTEN START 🔥")

db.collection("chats").doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

alert("Messages reçus 📩")

const chat=document.getElementById("chat")
chat.innerHTML=""

snap.forEach(d=>{
let m=d.data()

chat.innerHTML += `
<div>
${m.text || ""}
</div>
`
})

})

}

/* SEND */
function send(){

alert("CLICK SEND 🚀")

if(!user){
alert("Pas connecté ❌")
return
}

let text=document.getElementById("text").value.trim()

if(!text){
alert("Message vide ❌")
return
}

db.collection("chats").doc(chatId)
.collection("messages").add({
text,
senderId:user.uid,
receiverId:merchant,
time:Date.now()
})

/* 🔥 UPDATE CONVERSATION */
db.collection("conversations").doc(chatId).set({
lastMessage:text,
lastMessageTime:Date.now()
},{merge:true})

alert("Message envoyé ✅")

document.getElementById("text").value=""

}

</script>

</body>
</html>

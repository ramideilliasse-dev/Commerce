 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Configurações</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.profile{
width:80px;
height:80px;
border-radius:50%;
display:block;
margin:auto;
cursor:pointer;
object-fit:cover;
background:#eee;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

input,textarea,select{
border:1px solid #ddd;
}

textarea{
min-height:100px;
resize:none;
}

.btn{
background:#1aa34a;
color:white;
}

.btnDanger{
background:red;
color:white;
}

.btnMerchant{
background:#ff6a00;
color:white;
font-weight:bold;
}

.guestTitle{
text-align:center;
font-size:14px;
margin-top:15px;
color:#555;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>
</head>

<body>

<div class="header" id="title">Configurações</div>

<div class="container">

<!-- PROFILE -->
<div class="card">

<img id="profilePic" class="profile">
<div style="
text-align:center;
margin-top:10px;
">

<div id="profileName"
style="
font-size:18px;
font-weight:bold;
">
Utilizador
</div>

<div id="profileEmail"
style="
font-size:13px;
color:#777;
">
email@email.com
</div>

</div>
<input type="file" id="upload" hidden>

<!-- 🔥 LOGIN / REGISTER -->
<div id="guestActions" style="display:none">

<div class="guestTitle">
Entre ou crie uma conta
</div>

<button class="btn" onclick="location.href='login.html'">
🔐 Entrar
</button>

<button class="btnMerchant" onclick="location.href='register.html'">
👤 Criar conta cliente
</button>

<button class="btn" onclick="location.href='merchant-register.html'">
🏪 Criar conta comerciante
</button>

</div>

</div>

<!-- LANGUAGE -->
<div class="card">
<label id="langLabel">Idioma</label>

<select id="langSelect">
<option value="pt">Português</option>
<option value="fr">Français</option>
<option value="en">English</option>
</select>

</div>

<!-- 🔥 MERCHANT -->
<div class="card" id="merchantCard">

<button class="btnMerchant" id="merchantBtn">
Devenir marchand 🏪
</button>

<!-- FORM -->
<div id="merchantForm" style="display:none;">

<input id="shopName" placeholder="Nome da loja">

<input id="whatsapp" placeholder="WhatsApp (244...)">

<textarea id="shopDesc"
placeholder="Descreva sua loja (produtos, qualidade, etc)">
</textarea>

<button class="btn" onclick="saveMerchantInfo()">
Salvar informações
</button>

</div>

</div>

<!-- PROVINCE -->
<div class="card" id="provinceCard" style="display:none;">

<label>📍 Província</label>

<select id="provinceSelect">

<option value="">Selecionar província</option>

<option>Luanda</option>
<option>Benguela</option>
<option>Huambo</option>
<option>Huíla</option>
<option>Bié</option>
<option>Malanje</option>
<option>Uíge</option>
<option>Cabinda</option>
<option>Zaire</option>
<option>Namibe</option>
<option>Cunene</option>
<option>Cuando Cubango</option>
<option>Moxico</option>
<option>Lunda Norte</option>
<option>Lunda Sul</option>
<option>Kwanza Norte</option>
<option>Kwanza Sul</option>
<option>Bengo</option>

</select>

<button class="btn" onclick="saveProvince()">
Salvar província
</button>

</div>
<div class="card">

<button class="btn"
onclick="location.href='my-orders.html'">

📦 Meus Pedidos

</button>

</div>
 <div class="card">

<button class="btn"
onclick="location.href='favorites.html'">

❤️ Favoritos

</button>

</div>
 <div class="card">

<h3>🔔 Notificações</h3>

<label>
<input type="checkbox"
id="promoNotif">
 Promoções
</label>

<br><br>

<label>
<input type="checkbox"
id="orderNotif">
 Pedidos
</label>

</div>
 <div class="card">

<h3>🌙 Modo Escuro</h3>

<label>

<input type="checkbox"
id="darkMode">

 Ativar

</label>

</div>
<!-- ACTIONS -->
<div class="card">

<button class="btn" onclick="contactSupport()" id="helpBtn">
Ajuda
</button>

<button class="btnDanger" onclick="deleteAccount()" id="deleteBtn">
Apagar conta
</button>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js"

import {
doc,
getDoc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
deleteUser,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const profilePic = document.getElementById("profilePic")
const upload = document.getElementById("upload")
const provinceCard = document.getElementById("provinceCard")
const provinceSelect = document.getElementById("provinceSelect")
const merchantForm = document.getElementById("merchantForm")

let currentUser = null

profilePic.onclick = ()=>{

if(currentUser){
upload.click()
}

}

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{

const guestActions =
document.getElementById("guestActions")

/* 🔥 USER NOT CONNECTED */
if(!user){

guestActions.style.display = "block"

profilePic.src =
"https://via.placeholder.com/80"

document.getElementById("merchantCard")
.style.display = "none"

document.getElementById("provinceCard")
.style.display = "none"

return

}

currentUser = user

const ref = doc(db,"users",user.uid)
const snap = await getDoc(ref)

const data = snap.data() || {}

profilePic.src =
data.photo || "https://via.placeholder.com/80"
document.getElementById("profileName").innerText =
data.name ||
user.displayName ||
"Utilizador"

document.getElementById("profileEmail").innerText =
user.email || ""
const merchantBtn =
document.getElementById("merchantBtn")

/* MERCHANT */
if(data.role === "merchant"){

merchantBtn.innerText =
"Painel da loja 🏪"

merchantBtn.onclick = ()=>{
location.href="merchant-dashboard.html"
}

provinceCard.style.display = "block"

merchantForm.style.display = "block"

/* LOAD DATA */
if(data.shopName){
document.getElementById("shopName").value =
data.shopName
}

if(data.whatsapp){
document.getElementById("whatsapp").value =
data.whatsapp
}

if(data.description){
document.getElementById("shopDesc").value =
data.description
}

if(data.province){
provinceSelect.value = data.province
}

}

/* REQUEST PENDING */
else if(data.requestMerchant){

merchantBtn.innerText =
"⏳ Demande en attente"

merchantBtn.disabled = true

merchantForm.style.display = "block"

}

/* NORMAL USER */
else{

merchantBtn.innerText =
"Devenir marchand 🏪"

merchantBtn.disabled = false

merchantBtn.onclick = becomeMerchant

}

})

/* SAVE MERCHANT INFO */
window.saveMerchantInfo = async function(){

const shopName =
document.getElementById("shopName")
.value.trim()

const whatsapp =
document.getElementById("whatsapp")
.value.trim()

const description =
document.getElementById("shopDesc")
.value.trim()

if(!shopName || !whatsapp){

showToast("⚠️ Preencha loja e WhatsApp","warning")

return

}

await updateDoc(doc(db,"users",currentUser.uid),{

shopName: shopName,
whatsapp: whatsapp,
description: description

})

showToast("✅ Informações salvas","success")

}

/* BECOME MERCHANT */
window.becomeMerchant = async function(){

if(!currentUser){

showToast("🔐 Faça login primeiro","warning")

location.href = "login.html"

return

}

await updateDoc(doc(db,"users",currentUser.uid),{

requestMerchant: true,
approved: false

})

showToast("✅ Pedido enviado ao administrador","success")

location.reload()

}

/* SAVE PROVINCE */
window.saveProvince = async function(){

const province = provinceSelect.value

if(!province){

showToast("⚠️ Selecione uma província","warning")

return

}

await updateDoc(doc(db,"users",currentUser.uid),{
province: province
})

showToast("✅ Província salva","success")

}

/* PHOTO */
upload.onchange = function(){

const file = this.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = async function(){

const base64 = reader.result

profilePic.src = base64

await updateDoc(doc(db,"users",currentUser.uid),{
photo: base64
})

showToast("✅ Foto atualizada","success")

}

reader.readAsDataURL(file)

}

/* SUPPORT */
window.contactSupport = function(){

window.open(
"https://wa.me/244922623238?text=Olá preciso de ajuda"
)

}

/* DELETE ACCOUNT */
window.deleteAccount = async function(){

if(!currentUser){

location.href = "login.html"

return

}

if(!confirm("Tem certeza?")) return

try{

await deleteDoc(doc(db,"users",currentUser.uid))

await deleteUser(currentUser)

alert("Conta apagada ✅")

location.href="index.html"

}catch(e){

showToast("❌ Ocorreu um erro","error")

console.error(e)

}

}
 const promoNotif =
document.getElementById("promoNotif")

const orderNotif =
document.getElementById("orderNotif")

if(promoNotif){

promoNotif.checked =
localStorage.getItem("promoNotif")
=== "true"

promoNotif.onchange = ()=>{

localStorage.setItem(
"promoNotif",
promoNotif.checked
)

}

}

if(orderNotif){

orderNotif.checked =
localStorage.getItem("orderNotif")
=== "true"

orderNotif.onchange = ()=>{

localStorage.setItem(
"orderNotif",
orderNotif.checked
)

}

}
 const darkMode =
document.getElementById("darkMode")

if(darkMode){

darkMode.checked =
localStorage.getItem("darkMode")
=== "true"

darkMode.onchange = ()=>{

localStorage.setItem(
"darkMode",
darkMode.checked
)

location.reload()

}

}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div style="
text-align:center;
padding:20px;
color:#888;
font-size:12px;
">

Toma 🇦🇴<br>
Versão 1.0.0

</div>
 <div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.profile{
width:80px;
height:80px;
border-radius:50%;
display:block;
margin:auto;
cursor:pointer;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

textarea{
border:1px solid #ddd;
}

.btn{background:#1aa34a;color:white;}
.btnDanger{background:red;color:white;}
.btnMerchant{background:#ff6a00;color:white;font-weight:bold;}
</style>
</head>

<body>

<div class="header" id="title">Configurações</div>

<div class="container">

<!-- PROFILE -->
<div class="card">
<img id="profilePic" class="profile">
<input type="file" id="upload" hidden>
</div>

<!-- LANGUAGE -->
<div class="card">
<label id="langLabel">Idioma</label>
<select id="langSelect">
<option value="pt">Português</option>
<option value="fr">Français</option>
<option value="en">English</option>
</select>
</div>

<!-- 🔥 MERCHANT -->
<div class="card" id="merchantCard">

<button class="btnMerchant" id="merchantBtn" onclick="becomeMerchant()">
Devenir marchand 🏪
</button>

<!-- 🔥 NOUVEAUX CHAMPS -->
<div id="merchantForm" style="display:none;">

<input id="shopName" placeholder="Nome da loja">
<input id="whatsapp" placeholder="WhatsApp (244...)">

<textarea id="shopDesc" placeholder="Descreva sua loja (produtos, qualidade, etc)"></textarea>

<button class="btn" onclick="saveMerchantInfo()">Salvar informações</button>

</div>

</div>

<!-- 🔥 PROVINCE -->
<div class="card" id="provinceCard" style="display:none;">
<label>📍 Província</label>

<select id="provinceSelect">
<option value="">Selecionar província</option>
<option>Luanda</option>
<option>Benguela</option>
<option>Huambo</option>
<option>Huíla</option>
<option>Bié</option>
<option>Malanje</option>
<option>Uíge</option>
<option>Cabinda</option>
<option>Zaire</option>
<option>Namibe</option>
<option>Cunene</option>
<option>Cuando Cubango</option>
<option>Moxico</option>
<option>Lunda Norte</option>
<option>Lunda Sul</option>
<option>Kwanza Norte</option>
<option>Kwanza Sul</option>
<option>Bengo</option>
</select>

<button class="btn" onclick="saveProvince()">Salvar província</button>
</div>

<!-- ACTIONS -->
<div class="card">
<button class="btn" onclick="contactSupport()" id="helpBtn">Ajuda</button>
<button class="btnDanger" onclick="deleteAccount()" id="deleteBtn">Apagar conta</button>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js"
import { doc, getDoc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { deleteUser, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const profilePic = document.getElementById("profilePic")
const upload = document.getElementById("upload")
const provinceCard = document.getElementById("provinceCard")
const provinceSelect = document.getElementById("provinceSelect")
const merchantForm = document.getElementById("merchantForm")

let currentUser = null

profilePic.onclick = ()=> upload.click()

/* 🔥 LOAD USER */
onAuthStateChanged(auth, async (user)=>{

if(!user) return

currentUser = user

const ref = doc(db,"users",user.uid)
const snap = await getDoc(ref)
const data = snap.data() || {}

profilePic.src = data.photo || "https://via.placeholder.com/80"

const merchantBtn = document.getElementById("merchantBtn")

/* ✅ SI MARCHAND */
if(data.role === "merchant"){

merchantBtn.innerText = "Painel da loja 🏪"
merchantBtn.onclick = ()=>location.href="merchant-dashboard.html"

provinceCard.style.display = "block"
merchantForm.style.display = "block"

/* LOAD DATA */
if(data.shopName) document.getElementById("shopName").value = data.shopName
if(data.whatsapp) document.getElementById("whatsapp").value = data.whatsapp
if(data.description) document.getElementById("shopDesc").value = data.description

if(data.province){
provinceSelect.value = data.province
}

}

/* ⏳ DEMANDE EN ATTENTE */
else if(data.requestMerchant){
merchantBtn.innerText = "⏳ Demande en attente"
merchantBtn.disabled = true
merchantForm.style.display = "block"
}

/* DEFAULT */
else{
merchantBtn.innerText = "Devenir marchand 🏪"
merchantBtn.disabled = false
merchantBtn.onclick = becomeMerchant
}

})

/* 🔥 SAVE MERCHANT INFO */
window.saveMerchantInfo = async function(){

const shopName = document.getElementById("shopName").value.trim()
const whatsapp = document.getElementById("whatsapp").value.trim()
const description = document.getElementById("shopDesc").value.trim()

if(!shopName || !whatsapp){
alert("Preencha nome da loja e WhatsApp ❌")
return
}

await updateDoc(doc(db,"users",currentUser.uid),{
shopName: shopName,
whatsapp: whatsapp,
description: description
})

alert("Informações salvas ✅")

}

/* 🔥 DEMANDE */
window.becomeMerchant = async function(){

await updateDoc(doc(db,"users",currentUser.uid),{
requestMerchant: true,
approved: false
})

alert("✅ Pedido enviado para admin")
location.reload()

}

/* PROVINCE */
window.saveProvince = async function(){
const province = provinceSelect.value
if(!province){ alert("Seleciona a província ❌"); return }

await updateDoc(doc(db,"users",currentUser.uid),{
province: province
})

alert("Província salva ✅")
}

/* PHOTO */
upload.onchange = function(){

const file = this.files[0]
const reader = new FileReader()

reader.onload = async function(){
const base64 = reader.result
profilePic.src = base64

await updateDoc(doc(db,"users",currentUser.uid),{
photo: base64
})

alert("Foto salva ✅")
}

reader.readAsDataURL(file)

}

/* SUPPORT */
window.contactSupport = function(){
window.open("https://wa.me/244922623238?text=Olá preciso de ajuda")
}

/* DELETE */
window.deleteAccount = async function(){

if(!confirm("Tem certeza?")) return

await deleteDoc(doc(db,"users",currentUser.uid))
await deleteUser(currentUser)

alert("Conta apagada ✅")
location.href="index.html"
}

</script>

</body>
</html>

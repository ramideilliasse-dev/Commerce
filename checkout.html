 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.header{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.item{
border-bottom:1px solid #eee;
padding:8px 0;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.info{
background:#eef7ee;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}

.total{
font-weight:bold;
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<div class="header">
Finalizar Pedido
</div>

<div class="container">

<div class="card">
<h3>Seus produtos</h3>
<div id="cartItems"></div>

<div class="total">
Total: <span id="totalPrice">0</span>
</div>
</div>

<div class="card">
<h3>Dados do cliente</h3>

<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço de entrega">
</div>

<div class="card">
<h3>Entrega</h3>

<select id="deliveryZone" onchange="calculateTotal()">
<option value="0">Retirada (Grátis)</option>
<option value="1000">Luanda Centro (1000 Kz)</option>
<option value="1500">Talatona / Kilamba (1500 Kz)</option>
<option value="2000">Fora de Luanda (2000 Kz)</option>
</select>

<div class="info">
Entrega: <b><span id="deliveryPrice">0</span> Kz</b>
</div>

</div>

<div class="card">
<h3>Forma de pagamento</h3>

<select id="paymentMethod" onchange="showPaymentInfo()">
<option value="mobile">Mobile Money</option>
<option value="bank">Transferência bancária</option>
</select>

<div id="paymentInfo" class="info"></div>

</div>

<button onclick="placeOrder()">
Confirmar Pedido
</button>

</div>


<script type="module">

import { db } from "./firebase.js"

import {
collection,
addDoc,
getDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


/* ✅ CORRECTION ICI */
let cart = JSON.parse(localStorage.getItem("cart") || "[]")


/* LOAD CART */
function loadCheckout(){

if(cart.length === 0){
alert("Carrinho vazio")
location.href="index.html"
return
}

let html=""
let subtotal=0

cart.forEach(item=>{

subtotal += item.price * item.qty

html += `
<div class="item">
${item.name} x${item.qty} - ${item.price * item.qty} Kz
</div>
`

})

document.getElementById("cartItems").innerHTML = html

calculateTotal()

}

loadCheckout()


/* TOTAL */
window.calculateTotal=function(){

let subtotal=0

cart.forEach(item=>{
subtotal += item.price * item.qty
})

const delivery = parseInt(document.getElementById("deliveryZone").value)

document.getElementById("deliveryPrice").innerText = delivery

const total = subtotal + delivery

document.getElementById("totalPrice").innerText = total + " Kz"

}


/* PAYMENT INFO */
window.showPaymentInfo=async function(){

if(cart.length === 0) return

const firstProduct = cart[0]

if(!firstProduct.merchantId) return

const ref=doc(db,"merchants",firstProduct.merchantId)
const snap=await getDoc(ref)

let merchant=snap.data()

let method=document.getElementById("paymentMethod").value

let html=""

if(method==="mobile"){
html=`📱 Envie para: <b>${merchant?.phone || "Sem número"}</b>`
}

if(method==="bank"){
html=`🏦 Banco: ${merchant?.bank || "N/A"}<br>Conta: ${merchant?.account || "N/A"}`
}

document.getElementById("paymentInfo").innerHTML=html

}

showPaymentInfo()


/* PLACE ORDER */
window.placeOrder=async function(){

const name=document.getElementById("clientName").value
const phone=document.getElementById("clientPhone").value
const address=document.getElementById("clientAddress").value
const payment=document.getElementById("paymentMethod").value

const delivery = parseInt(document.getElementById("deliveryZone").value)

if(!name || !phone || !address){
alert("Preencha todos os campos")
return
}

/* 🔥 ENVOYER CHAQUE PRODUIT */
for(const item of cart){

if(!item.merchantId){
alert("Erro: produto sem vendedor")
return
}

await addDoc(collection(db,"orders"),{

productId:item.id,
productName:item.name,
price:item.price,
qty:item.qty,

clientName:name,
clientPhone:phone,
clientAddress:address,

paymentMethod:payment,
deliveryPrice:delivery,

merchantId:item.merchantId,

status:"pendente",
seen:false,

date:Date.now()

})

}

/* RESET */
localStorage.removeItem("cart")

alert("Pedido enviado com sucesso 🚀")

location.href="index.html"

}

</script>

</body>

</html>

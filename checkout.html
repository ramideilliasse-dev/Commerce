<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.item{
border-bottom:1px solid #eee;
padding:8px 0;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">Finalizar Pedido</div>

<div class="container">

<div class="card">
<h3>Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>

<div class="card">
<h3>Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">
</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<!-- 🔥 SCRIPT SIMPLE + FIREBASE -->
<script>

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
 alert("CART: " + JSON.stringify(cart))
console.log("Cart:", cart)

/* LOAD CART */
function loadCart(){

if(cart.length === 0){
alert("Carrinho vazio")
return
}

let html=""
let total=0

cart.forEach(item=>{
total += item.price * item.qty

html += `
<div class="item">
${item.name} x${item.qty} = ${item.price * item.qty} Kz
</div>
`
})

document.getElementById("cartItems").innerHTML = html
document.getElementById("totalPrice").innerText = total + " Kz"

}

loadCart()

/* CLICK BUTTON */
document.getElementById("confirmBtn").addEventListener("click", function(){

alert("Clique OK ✅")

placeOrder()

})

/* FIREBASE IMPORT DYNAMIQUE */
async function placeOrder(){

try{

const name=document.getElementById("clientName").value
const phone=document.getElementById("clientPhone").value
const address=document.getElementById("clientAddress").value

if(!name || !phone || !address){
alert("Preencha todos os campos")
return
}

/* 🔥 GROUPE PAR VENDEUR */
let vendors = {}

cart.forEach(item=>{
if(!vendors[item.merchantId]){
vendors[item.merchantId] = []
}
vendors[item.merchantId].push(item)
})

/* 🔥 POUR CHAQUE VENDEUR */
for(const merchantId in vendors){

const ref=doc(db,"merchants",merchantId)
const snap=await getDoc(ref)

if(!snap.exists()){
alert("Vendedor não encontrado ❌")
continue
}

const merchant = snap.data()
const items = vendors[merchantId]

/* MESSAGE */
let message = `🛒 NOVO PEDIDO\n\n`

items.forEach(i=>{
message += `• ${i.name} x${i.qty} - ${i.price*i.qty} Kz\n`
})

message += `\n👤 Cliente: ${name}`
message += `\n📞 Tel: ${phone}`
message += `\n📍 Endereço: ${address}`

const url = `https://wa.me/${merchant.phone}?text=${encodeURIComponent(message)}`

/* 🔥 OUVRIR WHATSAPP */
window.open(url, "_blank")

}

/* RESET */
localStorage.removeItem("cart")

alert("Redirecionando para WhatsApp 🚀")

}catch(e){
console.error(e)
alert("Erro ❌")
}

}
</script>

</body>
</html>

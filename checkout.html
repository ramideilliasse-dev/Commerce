 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* CARD PRO */
.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:16px;
background:#1aa34a;
color:white;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* TOTAL */
.total{
font-weight:bold;
margin-top:15px;
font-size:18px;
text-align:right;
}

/* LOADER */
#loaderOverlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
color:white;
}

.loader{
width:50px;height:50px;
border:5px solid #fff;
border-top:5px solid #1aa34a;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="header">Finalizar Pedido</div>

<div class="container">

<div class="card">
<h3>🛒 Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>

<div class="card">
<h3>👤 Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">
</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<div id="loaderOverlay">
<div class="loader"></div>
<p>Enviando pedido...</p>
</div>

<script type="module">

import { db } from "./firebase.js"
import {
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

/* DOM */
const cartItems = document.getElementById("cartItems")
const totalPrice = document.getElementById("totalPrice")
const confirmBtn = document.getElementById("confirmBtn")

const clientName = document.getElementById("clientName")
const clientPhone = document.getElementById("clientPhone")
const clientAddress = document.getElementById("clientAddress")

const loader = document.getElementById("loaderOverlay")

/* CART */
let cart = JSON.parse(localStorage.getItem("cart") || "[]")

function loadCart(){

if(cart.length === 0){
alert("Carrinho vazio ❌")
location.href="index.html"
return
}

let html=""
let total=0

cart.forEach(item=>{

const price = Number(item.price) || 0
const qty = item.qty || 1

total += price * qty

html += `
<div class="item">
<span>${item.name} x${qty}</span>
<span>${price * qty} Kz</span>
</div>
`
})

cartItems.innerHTML = html
totalPrice.innerText = total + " Kz"
}

loadCart()

confirmBtn.onclick = placeOrder

/* 🚀 MULTI-VENDOR ORDER */
async function placeOrder(){

if(confirmBtn.disabled) return

const name = clientName.value.trim()
const phone = clientPhone.value.trim()
const address = clientAddress.value.trim()

if(!name || !phone || !address){
alert("Preencha todos os campos ❌")
return
}

confirmBtn.disabled = true
confirmBtn.innerText = "Enviando..."
loader.style.display = "flex"

/* 🔥 GROUP BY MERCHANT */
let grouped = {}

cart.forEach(item=>{

if(!item.merchantId) return

if(!grouped[item.merchantId]){
grouped[item.merchantId] = []
}

grouped[item.merchantId].push(item)

})

let success = false

for(const merchantId in grouped){

const items = grouped[merchantId]

const snap = await getDoc(doc(db,"users",merchantId))
if(!snap.exists()) continue

const merchant = snap.data()

/* 🔐 sécurité */
if(!merchant.approved || merchant.blocked) continue

/* 💰 total */
let total = 0
items.forEach(i=> total += i.price * i.qty)

/* 💾 SAVE ORDER (IMPORTANT POUR DASHBOARD) */
await addDoc(collection(db,"orders"),{

merchantId: merchantId,
items: items,
total: total,

clientName: name,
clientPhone: phone,
clientAddress: address,

status: "pending",
seen: false,
createdAt: Date.now()

})

success = true
}

/* RESULT */
loader.style.display = "none"

if(success){

localStorage.removeItem("cart")

confirmBtn.innerText = "✔ Pedido enviado"

setTimeout(()=>{
location.href="success.html"
},1000)

}else{

alert("Erro: nenhum vendedor recebeu ❌")

confirmBtn.disabled = false
confirmBtn.innerText = "Confirmar Pedido"
}

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Checkout</title>

<style>
body{font-family:Arial;margin:0;background:#f6f7fb;}

.header{
background:#111;color:white;padding:18px;text-align:center;
font-size:20px;font-weight:bold;
}

.container{max-width:600px;margin:auto;padding:15px;}

.card{
background:white;padding:18px;border-radius:16px;margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.item{
display:flex;justify-content:space-between;
padding:10px 0;border-bottom:1px solid #eee;font-size:14px;
}

input{
width:100%;padding:14px;margin-top:10px;
border-radius:12px;border:1px solid #ddd;
}

button{
width:100%;padding:16px;background:#1aa34a;color:white;
border:none;border-radius:14px;font-size:18px;font-weight:bold;
cursor:pointer;
}

.total{
font-weight:bold;margin-top:15px;font-size:18px;text-align:right;
}

#loaderOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
align-items:center;justify-content:center;z-index:9999;
flex-direction:column;color:white;
}

.loader{
width:50px;height:50px;border:5px solid #fff;
border-top:5px solid #1aa34a;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
 /* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
html,
body{
    height:100%;
    overflow-x:hidden;
    overscroll-behavior:none;
}

body{
    position:relative;
}
input{
    font-size:16px;
}
</style>
</head>

<body>

<div class="header">Finalizar Pedido</div>

<div class="container">

<div class="card">
<h3>🛒 Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>
<input
id="couponCode"
placeholder="Código Promocional (Opcional)"
>

<button
type="button"
onclick="applyCoupon()"
style="
margin-top:10px;
background:#ff6a00;
">
Aplicar Cupom
</button>

<div
id="couponInfo"
style="
margin-top:10px;
font-weight:bold;
color:#1aa34a;
">
</div>
<div class="card">
<h3>👤 Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">

</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<div id="loaderOverlay">
<div class="loader"></div>
<p>Enviando pedido...</p>
</div>

<script type="module">
alert("Module OK");
import {
collection,
addDoc,
doc,
getDoc,
getDocs,
query,
where,
updateDoc
}
 from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
alert("Checkout chargé");
/* DOM */
const cartItems = document.getElementById("cartItems")
const totalPrice = document.getElementById("totalPrice")
const confirmBtn = document.getElementById("confirmBtn")

const clientName = document.getElementById("clientName")
const clientPhone = document.getElementById("clientPhone")
const clientAddress = document.getElementById("clientAddress")

const loader = document.getElementById("loaderOverlay")

/* CART */

let appliedCoupon = null
let discountAmount = 0

let cart = JSON.parse(
localStorage.getItem("checkoutCart") ||
localStorage.getItem("cart") ||
"[]"
)
alert(
"Panier :\n\n" +
JSON.stringify(cart, null, 2)
);
function loadCart(){

if(cart.length === 0){
showToast("⚠️ Carrinho vazio","warning")
location.href="index.html"
return
}

let total=0
let html=""

cart.forEach(item=>{
const price = Number(item.price) || 0
const qty = item.qty || 1

total += price * qty

html += `
<div class="item">
<span>${item.name} x${qty}</span>
<span>${price * qty} Kz</span>
</div>
`
})

cartItems.innerHTML = html
const finalTotal =
Math.max(
0,
total - discountAmount
)

totalPrice.innerText =
finalTotal + " Kz"
}

loadCart()

confirmBtn.onclick = placeOrder
window.applyCoupon = async function(){

const code =
document.getElementById("couponCode")
.value.trim()
.toUpperCase()

if(!code){

showToast("Digite um cupom","warning")
return

}

const q = query(
collection(db,"merchantCoupons"),
where("code","==",code)
)

const snap = await getDocs(q)

if(snap.empty){

showToast("Cupom inválido","error")
return

}

const coupon =
snap.docs[0].data()
const merchantIds =
[
...new Set(
cart.map(i => i.merchantId)
)
]

if(
merchantIds.length > 1
){

showToast(
"Os cupons funcionam apenas para uma loja",
"warning"
)

return

}

if(
coupon.merchantId !== merchantIds[0]
){

showToast(
"Este cupom não pertence a esta loja",
"error"
)

return

}
if(!coupon.active){

showToast("Cupom desativado","error")
return

}

let total = 0

cart.forEach(item=>{

total +=
(Number(item.price)||0)
*
(item.qty||1)

})

discountAmount =
Math.round(
total *
coupon.discount / 100
)

appliedCoupon = coupon

document.getElementById(
"couponInfo"
).innerHTML =

`✅ ${coupon.code}
(-${coupon.discount}%)
Economia:
${discountAmount} Kz`

showToast(
"Cupom aplicado",
"success"
)

loadCart()

}
/* 🚀 VERSION STABLE */
async function placeOrder(){

if(confirmBtn.disabled) return

const name = clientName.value.trim()
const phone = clientPhone.value.trim()
const address = clientAddress.value.trim()

if(!name || !phone || !address){
showToast("Preencha todos os campos","warning")
return
}

confirmBtn.disabled = true
confirmBtn.innerText = "Enviando..."
loader.style.display = "flex"

/* 🔥 VALIDATION PRODUITS */
let validCart = []

for(const item of cart){

try{
const snap = await getDoc(doc(db,"products", item.id))
if(!snap.exists()) continue

const p = snap.data()

if(!p.merchantId) continue
if(
Number(p.stock || 0) < item.qty
)

loader.style.display="none"

showToast(
`${p.name} sem stock suficiente`,
"error"
)

confirmBtn.disabled=false
confirmBtn.innerText="Confirmar Pedido"

return

}
validCart.push({
id: item.id,
name: p.name,
price: Number(p.price) || 0,
qty: item.qty || 1,
merchantId: p.merchantId
})

}catch(e){
console.log("Erro produto:", e)
}
}

/* ❌ SI VIDE */
if(validCart.length === 0){
loader.style.display="none"
showToast("⚠️ Carrinho vazio","warning")
confirmBtn.disabled=false
confirmBtn.innerText="Confirmar Pedido"
return
}

/* 🔥 GROUP */
let grouped = {}

validCart.forEach(item=>{
if(!grouped[item.merchantId]){
grouped[item.merchantId] = []
}
grouped[item.merchantId].push(item)
})

let success = false

/* 🔥 SAVE */
for(const merchantId in grouped){

try{



const items = grouped[merchantId]



const userRef = doc(db,"users", merchantId)


const userSnap = await getDoc(userRef)



if(!userSnap.exists()){


continue

}

const userData = userSnap.data()



let total = 0

items.forEach(i=>{

total += i.price * i.qty

})

let finalTotal = total

if(
appliedCoupon &&
appliedCoupon.merchantId === merchantId
){

finalTotal =
total -
Math.round(
total *
appliedCoupon.discount / 100
)

}


await addDoc(collection(db,"orders"),{

userId: auth.currentUser.uid,

merchantId: merchantId,
items: items,
total: finalTotal,

clientName: name,
clientPhone: phone,
clientAddress: address,

status: "pending",
seen: false,
createdAt: Date.now(),

couponCode:
appliedCoupon?.code || "",

influencerName:
appliedCoupon?.influencerName || "",

discount:
appliedCoupon?.discount || 0,

commission:
appliedCoupon?.commission || 0,

couponMerchantId:
appliedCoupon?.merchantId || "",

couponActive:
appliedCoupon ? true : false,
})
for(const item of items){

const productRef =
doc(db,"products",item.id)

const productSnap =
await getDoc(productRef)

if(productSnap.exists()){

const productData =
productSnap.data()

const currentStock =
Number(productData.stock || 0)

await updateDoc(productRef,{

stock:
Math.max(
0,
currentStock - item.qty
)

})

}

}

success = true
}catch(err){

console.log("Erro order:", err)

showToast("❌ Erro ao enviar pedido","error")

}

}
/* RESULT */
loader.style.display = "none"

if(success){

localStorage.removeItem("cart")

showToast("✅ Pedido enviado com sucesso","success")

confirmBtn.innerText = "✔ Pedido enviado"

localStorage.removeItem("checkoutCart")

setTimeout(()=>{
window.location.href = "./success.html"
},1500)
}else{

showToast("❌ Nenhum vendedor encontrado","error")

confirmBtn.disabled = false
confirmBtn.innerText = "Confirmar Pedido"

}

}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let currentUser = null

onAuthStateChanged(auth,(user)=>{
currentUser = user
})

let cart = JSON.parse(localStorage.getItem("checkoutCart") || "[]")

function loadCart(){

if(cart.length === 0){
location.href="index.html"
return
}

let html=""
let total=0

cart.forEach(item=>{
total += item.price * item.qty

html += `
<div class="item">
${item.name} x${item.qty} = ${item.price * item.qty} Kz
</div>
`
})

cartItems.innerHTML = html
totalPrice.innerText = total + " Kz"

}

loadCart()

confirmBtn.addEventListener("click", placeOrder)

/* 🔥 FIX TOTAL */
async function placeOrder(){

try{

const name=clientName.value.trim()
const phone=clientPhone.value.trim()
const address=clientAddress.value.trim()

if(!name || !phone || !address){
alert("Preencha todos os campos ❌")
return
}

if(cart.length === 0) return

let grouped = {}

cart.forEach(item => {

if(!item.merchantId) return

if(!grouped[item.merchantId]){
grouped[item.merchantId] = []
}

grouped[item.merchantId].push(item)

})

let successCount = 0

for(const merchantId in grouped){

let items = grouped[merchantId]

/* ✅ FIX: USERS (NOT merchants) */
const snap = await getDoc(doc(db,"users",merchantId))

if(!snap.exists()){
console.warn("Vendedor não encontrado:", merchantId)
continue
}

const merchant = snap.data()

let sellerPhone = merchant?.whatsapp || ""

/* 🔥 CLEAN NUMBER */
sellerPhone = sellerPhone.replace(/\D/g,"")

if(!sellerPhone || sellerPhone.length < 9){
console.warn("Número inválido:", sellerPhone)
continue
}

/* MESSAGE PRO */
let message = "🛒 *NOVO PEDIDO*\n\n"

items.forEach(p=>{
message += `• ${p.name} x${p.qty} = ${p.price * p.qty} Kz\n`
})

message += `\n👤 Cliente: ${name}`
message += `\n📞 ${phone}`
message += `\n📍 ${address}`

let url = "https://wa.me/" + sellerPhone + "?text=" + encodeURIComponent(message)

/* OPEN WHATSAPP */
window.open(url, "_blank")

successCount++

/* SAVE DB */
for(const item of items){

await addDoc(collection(db,"orders"),{

productId:item.id,
productName:item.name,
price:item.price,
qty:item.qty,

clientName:name,
clientPhone:phone,
clientAddress:address,

merchantId:merchantId,

status:"pendente",
seen:false,

date:Date.now()

})

}

}

/* ✅ SUCCESS ONLY IF SENT */
if(successCount > 0){

localStorage.removeItem("cart")
localStorage.removeItem("checkoutCart")

alert("Pedido enviado com sucesso 🚀")

location.href="index.html"

}else{

alert("Erro: nenhum vendedor recebeu o pedido ❌")

}

}catch(e){

console.error("Erro global:", e)
alert("Erro ao finalizar pedido ❌")

}

}

</script>

body{font-family:Arial;margin:0;background:#f6f7fb;}

.header{

.container{max-width:600px;margin:auto;padding:15px;}

.card{
background:white;padding:18px;border-radius:16px;margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.item{
display:flex;justify-content:space-between;
padding:10px 0;border-bottom:1px solid #eee;font-size:14px;
}

input{
width:100%;padding:14px;margin-top:10px;
border-radius:12px;border:1px solid #ddd;
}

button{
width:100%;padding:16px;background:#1aa34a;color:white;
border:none;border-radius:14px;font-size:18px;font-weight:bold;
cursor:pointer;
}

.total{
font-weight:bold;margin-top:15px;font-size:18px;text-align:right;
}

#loaderOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
align-items:center;justify-content:center;z-index:9999;
flex-direction:column;color:white;
}

.loader{
width:50px;height:50px;border:5px solid #fff;
border-top:5px solid #1aa34a;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
 /* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
html,
body{
    height:100%;
    overflow-x:hidden;
    overscroll-behavior:none;
}

body{
    position:relative;
}
input{
    font-size:16px;
}

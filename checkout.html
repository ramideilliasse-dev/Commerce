<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.item{
border-bottom:1px solid #eee;
padding:8px 0;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">Finalizar Pedido</div>

<div class="container">

<div class="card">
<h3>Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>

<div class="card">
<h3>Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">
</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<!-- ✅ SCRIPT CORRIGÉ -->
<script type="module">

import { db } from "./firebase.js"

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

/* ✅ BON PANIER */
let cart = JSON.parse(localStorage.getItem("checkoutCart") || "[]")

console.log("Cart:", cart)

/* LOAD */
function loadCart(){

if(cart.length === 0){
alert("Carrinho vazio ❌")
location.href="index.html"
return
}

let html=""
let total=0

cart.forEach(item=>{
total += item.price * item.qty

html += `
<div class="item">
${item.name} x${item.qty} = ${item.price * item.qty} Kz
</div>
`
})

document.getElementById("cartItems").innerHTML = html
document.getElementById("totalPrice").innerText = total + " Kz"

}

loadCart()

/* CLICK */
document.getElementById("confirmBtn").addEventListener("click", placeOrder)

/* ORDER */
async function placeOrder(){

try{

const name=document.getElementById("clientName").value
const phone=document.getElementById("clientPhone").value
const address=document.getElementById("clientAddress").value

if(!name || !phone || !address){
alert("Preencha todos os campos")
return
}

if(cart.length === 0){
alert("Carrinho vazio ❌")
return
}

/* 🔥 ENVOYER */
for(const item of cart){

if(!item.merchantId || item.merchantId==="unknown"){
alert("Produto sem vendedor ❌")
return
}

await addDoc(collection(db,"orders"),{

productId:item.id,
productName:item.name,
price:item.price,
qty:item.qty,

clientName:name,
clientPhone:phone,
clientAddress:address,

merchantId:item.merchantId,

status:"pendente",
seen:false,

date:Date.now()

})

}

/* RESET */
localStorage.removeItem("cart")
localStorage.removeItem("checkoutCart")

alert("Pedido enviado com sucesso 🚀")

location.href="index.html"

}catch(e){

console.error("ERRO REAL:", e)
alert("Erro: " + e.message)

}

}

</script>

</body>
</html>

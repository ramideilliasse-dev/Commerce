 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">
 <title>Checkout</title>

<style>
body{font-family:Arial;margin:0;background:#f6f7fb;}

.header{
background:#111;color:white;padding:18px;text-align:center;
font-size:20px;font-weight:bold;
}

.container{max-width:600px;margin:auto;padding:15px;}

.card{
background:white;padding:18px;border-radius:16px;margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.item{
display:flex;justify-content:space-between;
padding:10px 0;border-bottom:1px solid #eee;font-size:14px;
}

input{
width:100%;padding:14px;margin-top:10px;
border-radius:12px;border:1px solid #ddd;
}

button{
width:100%;padding:16px;background:#1aa34a;color:white;
border:none;border-radius:14px;font-size:18px;font-weight:bold;
cursor:pointer;
}

.total{
font-weight:bold;margin-top:15px;font-size:18px;text-align:right;
}

#loaderOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
align-items:center;justify-content:center;z-index:9999;
flex-direction:column;color:white;
}

.loader{
width:50px;height:50px;border:5px solid #fff;
border-top:5px solid #1aa34a;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
 /* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>
</head>

<body>

<div class="header">Finalizar Pedido</div>

<div class="container">

<div class="card">
<h3>🛒 Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>

<div class="card">
<h3>👤 Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">
</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<div id="loaderOverlay">
<div class="loader"></div>
<p>Enviando pedido...</p>
</div>

<script type="module">

import { db } from "./firebase.js"
import {
collection, addDoc, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

/* DOM */
const cartItems = document.getElementById("cartItems")
const totalPrice = document.getElementById("totalPrice")
const confirmBtn = document.getElementById("confirmBtn")

const clientName = document.getElementById("clientName")
const clientPhone = document.getElementById("clientPhone")
const clientAddress = document.getElementById("clientAddress")

const loader = document.getElementById("loaderOverlay")

/* CART */
let cart = JSON.parse(
localStorage.getItem("checkoutCart") ||
localStorage.getItem("cart") ||
"[]"
)

function loadCart(){

if(cart.length === 0){
showToast("⚠️ Carrinho vazio","warning")
location.href="index.html"
return
}

let total=0
let html=""

cart.forEach(item=>{
const price = Number(item.price) || 0
const qty = item.qty || 1

total += price * qty

html += `
<div class="item">
<span>${item.name} x${qty}</span>
<span>${price * qty} Kz</span>
</div>
`
})

cartItems.innerHTML = html
totalPrice.innerText = total + " Kz"
}

loadCart()

confirmBtn.onclick = placeOrder

/* 🚀 VERSION STABLE */
async function placeOrder(){

if(confirmBtn.disabled) return

const name = clientName.value.trim()
const phone = clientPhone.value.trim()
const address = clientAddress.value.trim()

if(!name || !phone || !address){
showToast("Preencha todos os campos","warning")
return
}

confirmBtn.disabled = true
confirmBtn.innerText = "Enviando..."
loader.style.display = "flex"

/* 🔥 VALIDATION PRODUITS */
let validCart = []

for(const item of cart){

try{
const snap = await getDoc(doc(db,"products", item.id))
if(!snap.exists()) continue

const p = snap.data()

if(!p.merchantId) continue

validCart.push({
id: item.id,
name: p.name,
price: Number(p.price) || 0,
qty: item.qty || 1,
merchantId: p.merchantId
})

}catch(e){
console.log("Erro produto:", e)
}
}

/* ❌ SI VIDE */
if(validCart.length === 0){
loader.style.display="none"
showToast("⚠️ Carrinho vazio","warning")
confirmBtn.disabled=false
confirmBtn.innerText="Confirmar Pedido"
return
}

/* 🔥 GROUP */
let grouped = {}

validCart.forEach(item=>{
if(!grouped[item.merchantId]){
grouped[item.merchantId] = []
}
grouped[item.merchantId].push(item)
})

let success = false

/* 🔥 SAVE */
for(const merchantId in grouped){

try{

alert("MERCHANT ID: " + merchantId)

const items = grouped[merchantId]

alert("ITEMS OK: " + items.length)

const userRef = doc(db,"users", merchantId)

alert("USER REF OK")

const userSnap = await getDoc(userRef)

alert("GET USER OK")

alert("USER EXISTS: " + userSnap.exists())

if(!userSnap.exists()){

alert("UTILISATEUR INTROUVABLE DANS USERS")

continue

}

const userData = userSnap.data()

alert("ROLE: " + userData.role)

let total = 0

items.forEach(i=>{

total += i.price * i.qty

})

alert("TOTAL: " + total)

await addDoc(collection(db,"orders"),{

merchantId: merchantId,
items: items,
total: total,

clientName: name,
clientPhone: phone,
clientAddress: address,

status: "pending",
seen: false,
createdAt: Date.now()

})

alert("ORDER SAVED OK")

success = true

}catch(err){

alert("ERRO ORDER: " + err.message)

console.log(err)

}

}
/* RESULT */
loader.style.display = "none"

if(success){

localStorage.removeItem("cart")

confirmBtn.innerText = "✔ Pedido enviado"

setTimeout(()=>{
window.location.href = "./success.html"
},1000)

}else{

showToast("❌ Nenhum vendedor encontrado","error")

confirmBtn.disabled = false
confirmBtn.innerText = "Confirmar Pedido"

}

}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
<script>
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/service-worker.js")

.then(() => {
console.log("SW OK")
})

.catch(err => {
console.log("SW ERROR", err)
})

})

}
</script>
</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">

<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ff6a00">

<title>Finalizar Pedido</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#f5f6fb;

color:#222;

padding-bottom:120px;

}

/*=========================
HEADER
=========================*/

.header{

position:fixed;

top:0;

left:0;

right:0;

height:72px;

background:white;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

font-weight:bold;

box-shadow:0 5px 20px rgba(0,0,0,.08);

z-index:1000;

}

.backBtn{

position:absolute;

left:18px;

font-size:26px;

cursor:pointer;

}

/*=========================
CONTAINER
=========================*/

.container{

max-width:900px;

margin:auto;

padding:90px 15px 30px;

}

/*=========================
CARDS
=========================*/

.card{

background:white;

border-radius:18px;

padding:18px;

margin-bottom:18px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}

.cardTitle{

font-size:19px;

font-weight:bold;

margin-bottom:18px;

display:flex;

align-items:center;

gap:8px;

}

/*=========================
INPUTS
=========================*/

input,

select,

textarea{

width:100%;

margin-top:12px;

padding:15px;

border-radius:14px;

border:1px solid #ddd;

font-size:16px;

outline:none;

background:white;

transition:.25s;

}

input:focus,

select:focus,

textarea:focus{

border-color:#ff6a00;

box-shadow:0 0 0 3px rgba(255,106,0,.12);

}

textarea{

resize:none;

min-height:90px;

}

/*=========================
PRODUCTOS
=========================*/

.checkoutItem{

display:flex;

gap:12px;

padding:12px 0;

border-bottom:1px solid #eee;

}

.checkoutItem:last-child{

border:none;

}

.checkoutImage{

width:80px;

height:80px;

border-radius:12px;

object-fit:cover;

background:#f2f2f2;

}

.checkoutInfo{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

}

.checkoutName{

font-size:15px;

font-weight:bold;

margin-bottom:6px;

}

.checkoutQty{

font-size:14px;

color:#666;

}

.checkoutSubtotal{

margin-top:8px;

font-size:16px;

font-weight:bold;

color:#16a34a;

}

/*=========================
TOTAL
=========================*/

.totalBox{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:18px;

padding-top:15px;

border-top:2px dashed #ddd;

font-size:20px;

font-weight:bold;

}

/*=========================
BOTÃO
=========================*/

.confirmBtn{

width:100%;

height:58px;

border:none;

border-radius:18px;

background:linear-gradient(135deg,#16a34a,#1ec95b);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.confirmBtn:active{

transform:scale(.98);

}

/*=========================
LOADER
=========================*/

#loaderOverlay{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.65);

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:99999;

color:white;

}

.loader{

width:60px;

height:60px;

border-radius:50%;

border:6px solid rgba(255,255,255,.25);

border-top:6px solid white;

animation:spin 1s linear infinite;

margin-bottom:18px;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

/*=========================
RESPONSIVE
=========================*/

@media(max-width:600px){

.container{

padding:85px 12px 20px;

}

.card{

padding:15px;

}

.checkoutImage{

width:70px;

height:70px;

}

}

</style>

</head>

<body>

<div class="header">

<div class="backBtn"
onclick="history.back()">

←

</div>

Finalizar Pedido

</div>

<div class="container">

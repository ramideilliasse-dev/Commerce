 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* CARD */

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

/* BUTTON */

button{
width:100%;
padding:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

/* INFO BOX */

.info{
background:#eef7ee;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
Finalizar Pedido
</div>

<div class="container">

<div class="card" id="productBox"></div>

<div class="card">

<h3>Dados do cliente</h3>

<input id="clientName" placeholder="Seu nome">

<input id="clientPhone" placeholder="Telefone">

<input id="clientAddress" placeholder="Endereço de entrega">

</div>

<div class="card">

<h3>Forma de pagamento</h3>

<select id="paymentMethod" onchange="showPaymentInfo()">
<option value="mobile">Mobile Money</option>
<option value="bank">Transferência bancária</option>
</select>

<div id="paymentInfo" class="info"></div>

</div>

<button onclick="placeOrder()">
Confirmar Pedido
</button>

</div>


<script type="module">

import { db } from "./firebase.js"

import {
collection,
addDoc,
getDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


const product=JSON.parse(localStorage.getItem("checkoutProduct"))

const productBox=document.getElementById("productBox")

productBox.innerHTML=`
<img src="${product.images[0]}">
<h3>${product.name}</h3>
<p><b>${product.price} Kz</b></p>
`


/* PAYMENT INFO */

window.showPaymentInfo=async function(){

const method=document.getElementById("paymentMethod").value

const ref=doc(db,"merchants",product.merchantId)
const snap=await getDoc(ref)

let merchant=snap.data()

let html=""

if(method==="mobile"){

html=`
📱 Envie o pagamento para:<br>
<b>${merchant.phone || "Sem número"}</b>
`
}

if(method==="bank"){

html=`
🏦 Banco: ${merchant.bank || "N/A"}<br>
Conta: ${merchant.account || "N/A"}
`
}

document.getElementById("paymentInfo").innerHTML=html

}

showPaymentInfo()


/* PLACE ORDER */

window.placeOrder=async function(){

const name=document.getElementById("clientName").value
const phone=document.getElementById("clientPhone").value
const address=document.getElementById("clientAddress").value
const payment=document.getElementById("paymentMethod").value

if(!name || !phone || !address){
alert("Preencha todos os campos")
return
}

const orderId="CMD"+Date.now()

await addDoc(collection(db,"orders"),{

orderId,

productId:product.id,
productName:product.name,
price:product.price,

clientName:name,
clientPhone:phone,
clientAddress:address,

paymentMethod:payment,

merchantId:product.merchantId,

/* NOUVEAU */
status:"pendente",
seen:false,

date:Date.now()

})

alert("Pedido enviado com sucesso ✔")

localStorage.removeItem("checkoutProduct")

location.href="index.html"

}

</script>

</body>

</html>

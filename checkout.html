 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout DEBUG</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.item{
border-bottom:1px solid #eee;
padding:8px 0;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">Finalizar Pedido (DEBUG)</div>

<div class="container">

<div class="card">
<h3>Seus produtos</h3>
<div id="cartItems"></div>
<div class="total">Total: <span id="totalPrice">0</span></div>
</div>

<div class="card">
<h3>Dados do cliente</h3>
<input id="clientName" placeholder="Seu nome">
<input id="clientPhone" placeholder="Telefone">
<input id="clientAddress" placeholder="Endereço">
</div>

<button id="confirmBtn">Confirmar Pedido</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

/* 🔥 DEBUG USER */
onAuthStateChanged(auth,(user)=>{
if(!user){
alert("❌ USER NON CONNECTÉ")
}else{
alert("✅ USER OK: " + user.uid)
}
})

/* PANIER */
let cart = JSON.parse(localStorage.getItem("checkoutCart") || "[]")

/* LOAD */
function loadCart(){

if(cart.length === 0){
alert("Carrinho vazio ❌")
location.href="index.html"
return
}

let html=""
let total=0

cart.forEach(item=>{
total += item.price * item.qty

html += `
<div class="item">
${item.name} x${item.qty} = ${item.price * item.qty} Kz
</div>
`
})

document.getElementById("cartItems").innerHTML = html
document.getElementById("totalPrice").innerText = total + " Kz"

}

loadCart()

/* CLICK */
document.getElementById("confirmBtn").addEventListener("click", placeOrder)

/* ORDER */
async function placeOrder(){

try{

alert("🚀 START ORDER")

const name=document.getElementById("clientName").value
const phone=document.getElementById("clientPhone").value
const address=document.getElementById("clientAddress").value

if(!name || !phone || !address){
alert("❌ Champs manquants")
return
}

alert("✅ Champs OK")

/* GROUP */
let grouped = {}

cart.forEach(item => {

if(!item.merchantId){
alert("❌ merchantId manquant sur produit: " + item.name)
return
}

if(!grouped[item.merchantId]){
grouped[item.merchantId] = []
}

grouped[item.merchantId].push(item)

})

alert("📦 GROUP OK: " + Object.keys(grouped).length + " vendeurs")

/* LOOP MERCHANT */
for(const merchantId in grouped){

alert("👤 Merchant: " + merchantId)

let items = grouped[merchantId]

/* GET MERCHANT */
try{

const ref = doc(db,"merchants",merchantId)
const snap = await getDoc(ref)

if(!snap.exists()){
alert("❌ Merchant introuvable: " + merchantId)
}else{
alert("✅ Merchant trouvé")
}

let merchant = snap.data()

/* WHATSAPP */
let sellerPhone = merchant?.phone || ""

if(sellerPhone){
alert("📞 WhatsApp OK")
}

}catch(e){
alert("❌ ERRO GET MERCHANT: " + e.message)
}

/* SAVE ORDERS */
for(const item of items){

try{

alert("💾 Envoi produit: " + item.name)

await addDoc(collection(db,"orders"),{

productId:item.id,
productName:item.name,
price:item.price,
qty:item.qty,

clientName:name,
clientPhone:phone,
clientAddress:address,

merchantId:merchantId,

status:"pendente",
seen:false,

date:Date.now()

})

alert("✅ OK Firestore produit: " + item.name)

}catch(e){

alert("🔥 ERRO FIRESTORE: " + e.message)
console.error(e)

}

}

}

/* SUCCESS */
alert("🎉 FIN PROCESS")

localStorage.removeItem("cart")
localStorage.removeItem("checkoutCart")

location.href="index.html"

}catch(e){

alert("🔥 ERRO GLOBAL: " + e.message)
console.error(e)

}

}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#ff6a00">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<title>Adicionar Produto</title>

<link
rel="manifest"
href="/manifest.json">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:Arial,sans-serif;

background:#f5f5f5;

color:#222;

padding-bottom:120px;

}

/* ===============================
HEADER
=============================== */

.header{

position:sticky;

top:0;

z-index:500;

height:65px;

background:#ff6a00;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:22px;

font-weight:bold;

box-shadow:0 4px 10px rgba(0,0,0,.15);

}

.backBtn{

position:absolute;

left:15px;

width:42px;

height:42px;

border:none;

border-radius:50%;

background:white;

color:#ff6a00;

font-size:22px;

cursor:pointer;

}

/* ===============================
CONTAINER
=============================== */

.container{

max-width:700px;

margin:auto;

padding:15px;

}

/* ===============================
CARD
=============================== */

.card{

background:white;

border-radius:18px;

padding:18px;

margin-bottom:18px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}

.cardTitle{

font-size:18px;

font-weight:bold;

margin-bottom:15px;

color:#ff6a00;

}

/* ===============================
INPUTS
=============================== */

input,
textarea,
select{

width:100%;

padding:14px;

margin-bottom:14px;

border:1px solid #ddd;

border-radius:12px;

font-size:15px;

outline:none;

transition:.25s;

}

input:focus,
textarea:focus,
select:focus{

border-color:#ff6a00;

box-shadow:0 0 0 3px rgba(255,106,0,.15);

}

textarea{

resize:none;

min-height:130px;

}

/* ===============================
DESCRIPTION
=============================== */

.counter{

text-align:right;

font-size:12px;

color:#666;

margin-top:-8px;

margin-bottom:12px;

}

/* ===============================
UPLOAD
=============================== */

.uploadBox{

border:2px dashed #ff6a00;

border-radius:16px;

padding:30px;

text-align:center;

cursor:pointer;

background:#fffaf6;

transition:.3s;

}

.uploadBox:hover{

background:#fff2e8;

}

.uploadIcon{

font-size:45px;

margin-bottom:10px;

}

.uploadText{

font-size:15px;

color:#666;

}

/* ===============================
PREVIEW
=============================== */

.preview{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-top:15px;

}

.preview img{

width:100%;

aspect-ratio:1;

object-fit:cover;

border-radius:12px;

}

/* ===============================
LOADER
=============================== */

.progressBox{

display:none;

margin-top:20px;

height:12px;

background:#eee;

border-radius:20px;

overflow:hidden;

}

.progressBar{

height:100%;

width:0%;

background:#1aa34a;

transition:.25s;

}

.loadingText{

margin-top:10px;

font-size:13px;

text-align:center;

color:#666;

}

/* ===============================
BUTTON
=============================== */

.publishBtn{

position:fixed;

left:15px;

right:15px;

bottom:15px;

height:58px;

border:none;

border-radius:16px;

background:#ff6a00;

color:white;

font-size:19px;

font-weight:bold;

cursor:pointer;

box-shadow:0 8px 20px rgba(255,106,0,.35);

}

/* ===============================
TOAST
=============================== */

.toastBox{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

display:flex;

flex-direction:column;

gap:10px;

z-index:99999;

}

</style>

</head>
<body>

<!-- ===============================
HEADER
=============================== -->

<div class="header">

<button
class="backBtn"
onclick="history.back()">

←

</button>

Adicionar Produto

</div>

<!-- ===============================
CONTAINER
=============================== -->

<div class="container">

<!-- ===============================
INFORMAÇÕES
=============================== -->

<div class="card">

<div class="cardTitle">

Informações do Produto

</div>

<input

id="productName"

placeholder="Nome do produto"

maxlength="120">

<input

id="productPrice"

type="number"

placeholder="Preço (Kz)"

min="1">

<input

id="productStock"

type="number"

placeholder="Quantidade em stock"

min="0">

<select id="productCategory">

<option value="">

Selecionar categoria

</option>

<option value="Alimentação">

🍚 Alimentação

</option>

<option value="Eletrónica">

📱 Eletrónica

</option>

<option value="Moda">

👕 Moda

</option>

<option value="Beleza">

💄 Beleza

</option>

<option value="Casa">

🏠 Casa

</option>

<option value="Auto">

🚗 Auto

</option>

</select>

<select id="productProvince">

<option value="">

Selecionar província

</option>

<option>Luanda</option>

<option>Benguela</option>

<option>Huambo</option>

<option>Huíla</option>

<option>Bié</option>

<option>Malanje</option>

<option>Cabinda</option>

<option>Uíge</option>

<option>Zaire</option>

<option>Namibe</option>

<option>Cunene</option>

<option>Moxico</option>

<option>Lunda Norte</option>

<option>Lunda Sul</option>

<option>Kwanza Norte</option>

<option>Kwanza Sul</option>

<option>Bengo</option>

</select>

<textarea

id="productDescription"

maxlength="1000"

placeholder="Descrição completa do produto">

</textarea>

<div class="counter">

<span id="descriptionCounter">

0

</span>

/1000

</div>

</div>

<!-- ===============================
IMAGENS
=============================== -->

<div class="card">

<div class="cardTitle">

Fotos do Produto

</div>

<label

for="productImages"

class="uploadBox">

<div class="uploadIcon">

📷

</div>

<div class="uploadText">

Toque para selecionar até 6 imagens

</div>

</label>

<input

id="productImages"

type="file"

accept="image/*"

multiple

hidden>

<div

id="previewImages"

class="preview">

</div>

</div>

<!-- ===============================
PROGRESSO
=============================== -->

<div class="card">

<div

id="progressBox"

class="progressBox">

<div

id="progressBar"

class="progressBar">

</div>

</div>

<div

id="loadingText"

class="loadingText">

</div>

</div>

</div>

<!-- ===============================
BOTÃO
=============================== -->

<button

id="publishBtn"

class="publishBtn">

🚀 Publicar Produto

</button>

<!-- ===============================
TOAST
=============================== -->

<div

id="toastBox"

class="toastBox">

</div>
<!-- ===============================
LOADER OVERLAY
=============================== -->

<div

id="loaderOverlay"

style="
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(4px);
justify-content:center;
align-items:center;
z-index:999999;
">

<div

style="
width:280px;
background:white;
padding:30px;
border-radius:18px;
text-align:center;
">

<div

style="
width:50px;
height:50px;
margin:auto;
border:5px solid #eee;
border-top:5px solid #ff6a00;
border-radius:50%;
animation:spin 1s linear infinite;
">

</div>

<p

style="
margin-top:18px;
font-size:15px;
font-weight:bold;
">

A publicar produto...

</p>

</div>

</div>

<style>

@keyframes spin{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

</style>

<!-- ===============================
ADD PRODUCT JS
=============================== -->

<script

type="module"

src="./js/add-product.js">

</script>

<!-- ===============================
SERVICE WORKER
=============================== -->

<script>

window.addEventListener("load",()=>{

if("serviceWorker" in navigator){

navigator.serviceWorker

.register("/service-worker.js")

.then(()=>{

console.log("✅ Service Worker OK");

})

.catch(console.error);

}

});

</script>

</body>

</html>

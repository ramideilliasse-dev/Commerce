 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Produto</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
.header{
background:#ff6a00;color:white;padding:18px;
font-size:20px;font-weight:bold;text-align:center;position:relative;
}
.backBtn{
position:absolute;left:10px;top:15px;background:white;
color:#ff6a00;border:none;padding:6px 12px;border-radius:20px;
cursor:pointer;
}
.container{max-width:600px;margin:auto;padding:20px;}
.card{
background:white;padding:20px;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);margin-bottom:15px;
}
input,textarea,select{
width:100%;padding:12px;border-radius:8px;
border:1px solid #ddd;margin-bottom:12px;
}
button{
width:100%;padding:14px;background:#ff6a00;
color:white;border:none;font-size:18px;border-radius:10px;
}
.preview{display:flex;gap:10px;flex-wrap:wrap;}
.preview img{
width:90px;height:90px;object-fit:cover;border-radius:8px;
}
.progressBox{
display:none;margin-top:15px;background:#eee;
border-radius:20px;overflow:hidden;height:12px;
}
.progressBar{height:100%;width:0%;background:#1aa34a;}
.loadingText{text-align:center;font-size:13px;margin-top:8px;}
</style>

</head>

<body>

<div class="header">
<button class="backBtn" onclick="goBack()">← Voltar</button>
Publicar produto
</div>

<div class="container">

<div class="card">
<input id="nameInput" placeholder="Nome do produto">
<input id="priceInput" type="number" placeholder="Preço">
<textarea id="descriptionInput" placeholder="Descrição"></textarea>
</div>

<div class="card">
<input type="file" id="images" multiple accept="image/*">
<div id="imagePreview" class="preview"></div>
</div>

<button id="publishBtn">Publicar</button>

<div id="progressBox" class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>
<div id="loadingText"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const auth = firebase.auth()

/* VARIABLES */
const imageInput = document.getElementById("images")
const preview = document.getElementById("imagePreview")
const progressBox = document.getElementById("progressBox")
const progressBar = document.getElementById("progressBar")
const loadingText = document.getElementById("loadingText")
const publishBtn = document.getElementById("publishBtn")

let imageFiles = []

/* LOGIN AUTO TEST */
auth.signInAnonymously()

/* IMAGE PREVIEW */
imageInput.onchange = function(){
imageFiles = [...this.files]
preview.innerHTML=""

imageFiles.forEach(file=>{
preview.innerHTML += `<img src="${URL.createObjectURL(file)}">`
})
}

/* UPLOAD */
async function upload(file){

let form = new FormData()
form.append("file", file)
form.append("upload_preset","angcomerce-upload")

let res = await fetch("https://api.cloudinary.com/v1_1/dy9qnhimc/image/upload",{
method:"POST",
body:form
})

let data = await res.json()

console.log("UPLOAD RESULT:", data)

if(!data.secure_url){
throw new Error("Upload falhou")
}

return data.secure_url
}

/* PUBLISH */
publishBtn.onclick = async function(){

try{

let user = auth.currentUser

if(!user){
alert("Login necessário ❌")
return
}

let name = nameInput.value.trim()
let price = priceInput.value

if(!name || !price){
alert("Preencha dados ❌")
return
}

if(imageFiles.length === 0){
alert("Adicione imagem ❌")
return
}

/* 🔥 CHECK USER ROLE */
let snap = await db.collection("users").doc(user.uid).get()
let data = snap.data()

if(!data){
alert("User não existe no Firestore ❌")
return
}

if(data.role !== "merchant"){
alert("Não é vendedor ❌")
return
}

/* PROGRESS */
progressBox.style.display="block"
progressBar.style.width="20%"
loadingText.innerText="Upload..."

let urls=[]

for(let file of imageFiles){
let url = await upload(file)
urls.push(url)
}

/* SAVE */
progressBar.style.width="90%"
loadingText.innerText="Salvando..."

await db.collection("products").add({
name,
price:Number(price),
description:descriptionInput.value,
images:urls,
merchantId:user.uid,
shopName:data.shopName || "Loja",
created:Date.now()
})

progressBar.style.width="100%"
loadingText.innerText="Finalizado ✔"

alert("Produto publicado ✔")

}catch(e){
console.error(e)
alert("Erro ao publicar ❌\n" + e.message)
}

}

/* BACK */
function goBack(){
location.href="merchant-shop.html"
}

</script>

</body>
</html>

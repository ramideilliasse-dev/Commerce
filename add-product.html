<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Produto</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
text-align:center;
position:relative;
}

.backBtn{
position:absolute;
left:10px;
top:15px;
background:white;
color:#ff6a00;
border:none;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input,textarea,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:12px;
}

textarea{min-height:100px;}

button{
width:100%;
padding:14px;
background:#ff6a00;
color:white;
border:none;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img,
.preview video{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.progressBox{
display:none;
margin-top:15px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progressBar{
height:10px;
width:0%;
background:#1aa34a;
transition:width 0.4s ease;
}
</style>

</head>

<body>

<div class="header">
<button class="backBtn" onclick="goBack()">← Voltar</button>
Publicar novo produto
</div>

<div class="container">

<div class="card">
<label>Nome do produto</label>
<input id="name">

<label>Preço (Kz)</label>
<input id="price" type="number">

<label>Categoria</label>
<select id="category">
<option value="telefone">Telefones</option>
<option value="roupas">Roupas</option>
<option value="beleza">Beleza</option>
<option value="eletronica">Eletrónica</option>
<option value="casa">Casa</option>
<option value="auto">Auto</option>
<option value="restaurant">🍽️ Restaurante</option>
</select>

<label>Descrição</label>
<textarea id="description"></textarea>
</div>

<div class="card">
<label>Imagens do produto</label>
<input type="file" id="images" multiple accept="image/*">
<div class="preview" id="imagePreview"></div>
</div>

<div class="card">
<label>Vídeo do produto (opcional)</label>
<input type="file" id="video" accept="video/*">
<div class="preview" id="videoPreview"></div>
</div>

<button id="publishBtn" onclick="publishProduct()">Publicar produto</button>

<div class="progressBox" id="progressBox">
<div class="progressBar" id="progressBar"></div>
</div>

</div>

<script type="module">

import { db, auth } from "./firebase.js"
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

let imageFiles=[]
let videoFile=null
let isPublishing=false

/* BACK */
window.goBack=function(){
location.href="merchant-shop.html"
}

/* IMAGE PREVIEW */
images.onchange=function(){
imageFiles=[...this.files]
imagePreview.innerHTML=""
imageFiles.forEach(file=>{
imagePreview.innerHTML+=`<img src="${URL.createObjectURL(file)}">`
})
}

/* VIDEO PREVIEW */
video.onchange=function(){
videoFile=this.files[0]
videoPreview.innerHTML=""
if(videoFile){
videoPreview.innerHTML=`<video src="${URL.createObjectURL(videoFile)}" controls></video>`
}
}

/* CLOUDINARY FIXED */
async function uploadFile(file,type="image"){

try{

const form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`

const res=await fetch(url,{
method:"POST",
body:form
})

const data=await res.json()

if(!data.secure_url){
throw new Error("Upload falhou")
}

return data.secure_url

}catch(e){
console.error("UPLOAD ERROR:", e)
throw e
}

}

/* PROGRESS */
function updateProgress(p){
progressBox.style.display="block"
progressBar.style.width=p+"%"
}

/* PUBLISH */
window.publishProduct=async function(){

if(isPublishing) return

const name=nameInput.value.trim()
const price=priceInput.value
const category=categoryInput.value
const description=descriptionInput.value

if(!name || !price){
alert("Preencha nome e preço ❌")
return
}

if(imageFiles.length===0){
alert("Adicione pelo menos 1 imagem ❌")
return
}

const user=auth.currentUser
if(!user){
alert("Login necessário ❌")
return
}
/* 🔒 CHECK ROLE MERCHANT */
const userRef = doc(db,"users",user.uid)
const userSnap = await getDoc(userRef)

if(userSnap.data()?.role !== "merchant"){
alert("Apenas vendedores autorizados ❌")
btn.disabled=false
btn.innerText="Publicar produto"
isPublishing=false
return
}
isPublishing=true
publishBtn.disabled=true
publishBtn.innerText="Publicando..."

try{

updateProgress(10)

/* UPLOAD IMAGES */
let imageUrls=[]
let count=0

for(const file of imageFiles){

const url=await uploadFile(file,"image")
imageUrls.push(url)

count++
updateProgress(10 + (count/imageFiles.length)*60)
}

/* VIDEO */
let videoUrl=""
if(videoFile){
updateProgress(80)
videoUrl=await uploadFile(videoFile,"video")
}

updateProgress(90)

/* SAVE FIRESTORE */
await addDoc(collection(db,"products"),{

name,
price:Number(price),
category,
description,
images:imageUrls,
video:videoUrl,

merchantId:user.uid,
created:Date.now(),

sales:0

})

updateProgress(100)

publishBtn.innerText="Publicado ✔"

setTimeout(()=>{
alert("Produto publicado ✔")
location.href="merchant-shop.html?id="+user.uid
},800)

}catch(e){

console.error("ERRO:", e)
alert("Erro ao publicar ❌")

publishBtn.disabled=false
publishBtn.innerText="Publicar produto"
isPublishing=false

}

}

</script>

</body>
</html>

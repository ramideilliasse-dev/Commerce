 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Produto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
text-align:center;
position:relative;
}

.backBtn{
position:absolute;
left:10px;
top:15px;
background:white;
color:#ff6a00;
border:none;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* CONTAINER */

.container{
max-width:600px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input,textarea,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:12px;
}

textarea{
min-height:100px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:#ff6a00;
color:white;
border:none;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

/* PREVIEW */

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img,
.preview video{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

/* LOADING BAR */

.progressBox{
display:none;
margin-top:15px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progressBar{
height:10px;
width:0%;
background:#1aa34a;
transition:width 0.4s ease;
}

</style>

</head>

<body>

<div class="header">

<button class="backBtn" onclick="goBack()">
← Voltar
</button>

Publicar novo produto

</div>

<div class="container">

<div class="card">

<label>Nome do produto</label>
<input id="name">

<label>Preço (Kz)</label>
<input id="price" type="number">

<label>Categoria</label>

<select id="category">
<option value="telefone">Telefones</option>
<option value="roupas">Roupas</option>
<option value="beleza">Beleza</option>
<option value="eletronica">Eletrónica</option>
<option value="casa">Casa</option>
<option value="auto">Auto</option>
<option value="restaurant">🍽️ Restaurante</option>
</select>

<label>Descrição</label>
<textarea id="description"></textarea>

</div>

<div class="card">

<label>Imagens do produto</label>

<input type="file" id="images" multiple accept="image/*">

<div class="preview" id="imagePreview"></div>

</div>

<div class="card">

<label>Vídeo do produto (opcional)</label>

<input type="file" id="video" accept="video/*">

<div class="preview" id="videoPreview"></div>

</div>

<button id="publishBtn" onclick="publishProduct()">
Publicar produto
</button>

<!-- PROGRESS BAR -->
<div class="progressBox" id="progressBox">
<div class="progressBar" id="progressBar"></div>
</div>

</div>


<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


let imageFiles=[]
let videoFile=null
let isPublishing=false


/* BACK BUTTON SMART */
window.goBack=function(){

const shopId = localStorage.getItem("shopId")

if(shopId){
location.href="merchant-shop.html?id="+shopId
}else{
location.href="merchant-shop.html"
}

}


/* IMAGE PREVIEW */

document.getElementById("images").addEventListener("change",function(){

imageFiles=[...this.files]

const preview=document.getElementById("imagePreview")
preview.innerHTML=""

imageFiles.forEach(file=>{

const url=URL.createObjectURL(file)
preview.innerHTML+=`<img src="${url}">`

})

})


/* VIDEO PREVIEW */

document.getElementById("video").addEventListener("change",function(){

videoFile=this.files[0]

const preview=document.getElementById("videoPreview")
preview.innerHTML=""

if(videoFile){

const url=URL.createObjectURL(videoFile)
preview.innerHTML=`<video src="${url}" controls></video>`

}

})


/* CLOUDINARY */

async function uploadFile(file){

const cloudName="df2oxw2qp"
const uploadPreset="angcomerce-upload"

const formData=new FormData()

formData.append("file",file)
formData.append("upload_preset",uploadPreset)

const res=await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`,{
method:"POST",
body:formData
})

const data=await res.json()

return data.secure_url

}


/* PROGRESS */

function updateProgress(percent){

const box=document.getElementById("progressBox")
const bar=document.getElementById("progressBar")

box.style.display="block"
bar.style.width=percent+"%"

}


/* PUBLISH */

window.publishProduct=async function(){

if(isPublishing) return

const btn=document.getElementById("publishBtn")
btn.disabled=true
btn.innerText="Publicando..."

isPublishing=true

const name=document.getElementById("name").value
const price=document.getElementById("price").value
const category=document.getElementById("category").value
const description=document.getElementById("description").value

if(!name || !price){
alert("Preencha nome e preço")
btn.disabled=false
btn.innerText="Publicar produto"
isPublishing=false
return
}

const user=auth.currentUser

if(!user){
alert("Precisa fazer login")
return
}

updateProgress(10)

/* UPLOAD IMAGES */

let imageUrls=[]
let count=0

for(const file of imageFiles){

const url=await uploadFile(file)
imageUrls.push(url)

count++
let percent=10 + (count/imageFiles.length)*60
updateProgress(percent)

}


/* VIDEO */

let videoUrl=""

if(videoFile){
updateProgress(80)
videoUrl=await uploadFile(videoFile)
}

updateProgress(90)

/* SAVE */

await addDoc(collection(db,"products"),{

name,
price,
category,
description,
images:imageUrls,
video:videoUrl,

merchantId:user.uid,
merchantEmail:user.email, // 🔥 IMPORTANT

created:Date.now(),

sales:0,
rating:0,
reviews:0,
popular:false

})
updateProgress(100)

btn.innerText="Publicado ✔"

setTimeout(()=>{
alert("Produto publicado com sucesso ✔")
location.href="merchant-shop.html"
},800)

}

</script>

</body>
</html>

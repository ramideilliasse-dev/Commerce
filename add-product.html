 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Produto</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.header{
background:#ff6a00;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
text-align:center;
position:relative;
}

.backBtn{
position:absolute;
left:10px;
top:15px;
background:white;
color:#ff6a00;
border:none;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

label{font-weight:bold;margin-bottom:6px;display:block;}

input,textarea,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:12px;
}

textarea{min-height:100px;}

button{
width:100%;
padding:14px;
background:#ff6a00;
color:white;
border:none;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

/* PREVIEW */
.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

/* 🔥 PROGRESS PRO */
.progressBox{
display:none;
margin-top:15px;
background:#eee;
border-radius:20px;
overflow:hidden;
height:12px;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#1aa34a,#4cff88);
transition:width 0.3s ease;
}

/* TEXT LOADING */
.loadingText{
text-align:center;
font-size:13px;
margin-top:8px;
color:#555;
}
</style>

</head>

<body>

<div class="header">
<button class="backBtn" onclick="goBack()">← Voltar</button>
Publicar novo produto
</div>

<div class="container">

<div class="card">
<label>Nome do produto</label>
<input id="nameInput">

<label>Preço (Kz)</label>
<input id="priceInput" type="number">

<label>Categoria</label>
<select id="categoryInput">
<option value="telefone">Telefones</option>
<option value="roupas">Roupas</option>
<option value="beleza">Beleza</option>
<option value="eletronica">Eletrónica</option>
<option value="casa">Casa</option>
<option value="auto">Auto</option>
<option value="restaurant">🍽️ Restaurante</option>
</select>

<label>Descrição</label>
<textarea id="descriptionInput"></textarea>
</div>

<div class="card">
<label>Imagens do produto</label>
<input type="file" id="images" multiple accept="image/*">
<div class="preview" id="imagePreview"></div>
</div>

<button id="publishBtn" onclick="publishProduct()">Publicar produto</button>

<div class="progressBox" id="progressBox">
<div class="progressBar" id="progressBar"></div>
</div>
<div class="loadingText" id="loadingText"></div>

</div>

<script type="module">

import { db, auth } from "./firebase.js"
import { collection, addDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const CLOUD_NAME="df2oxw2qp"
const UPLOAD_PRESET="angcomerce-upload"

let imageFiles=[]
let isPublishing=false

window.goBack=function(){
location.href="merchant-shop.html"
}

/* IMAGE PREVIEW */
images.onchange=function(){
imageFiles=[...this.files]
imagePreview.innerHTML=""
imageFiles.forEach(file=>{
imagePreview.innerHTML+=`<img src="${URL.createObjectURL(file)}">`
})
}

/* UPLOAD */
async function uploadFile(file){
const form=new FormData()
form.append("file",file)
form.append("upload_preset",UPLOAD_PRESET)

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:form
})

const data=await res.json()
if(!data.secure_url) throw new Error("Upload falhou")

return data.secure_url
}

/* PROGRESS */
function updateProgress(p,text=""){
progressBox.style.display="block"
progressBar.style.width=p+"%"
loadingText.innerText=text
}

/* PUBLISH */
window.publishProduct=async function(){

if(isPublishing) return

const name=document.getElementById("nameInput").value.trim()
const price=document.getElementById("priceInput").value
const category=document.getElementById("categoryInput").value
const description=document.getElementById("descriptionInput").value

if(!name || !price){
alert("Preencha nome e preço ❌")
return
}

if(imageFiles.length===0){
alert("Adicione pelo menos 1 imagem ❌")
return
}

const user=auth.currentUser
if(!user){
alert("Login necessário ❌")
return
}

/* 🔒 ROLE CHECK */
const userSnap = await getDoc(doc(db,"users",user.uid))
if(userSnap.data()?.role !== "merchant"){
alert("Apenas vendedores autorizados ❌")
return
}

/* 🔥 LOCK BUTTON */
isPublishing=true
publishBtn.disabled=true
publishBtn.innerText="Publicando..."

try{

updateProgress(10,"Preparando...")

let imageUrls=[]
let count=0

for(const file of imageFiles){

const url=await uploadFile(file)
imageUrls.push(url)

count++
updateProgress(10 + (count/imageFiles.length)*70,"Upload imagens...")
}

updateProgress(90,"Salvando produto...")

await addDoc(collection(db,"products"),{
name,
price:Number(price),
category,
description,
images:imageUrls,
merchantId:user.uid,
created:Date.now(),
sales:0
})

updateProgress(100,"Finalizado ✔")

publishBtn.innerText="Publicado ✔"

setTimeout(()=>{
alert("Produto publicado ✔")
location.href="merchant-shop.html?id="+user.uid
},1000)

}catch(e){

console.error(e)
alert("Erro ao publicar ❌")

publishBtn.disabled=false
publishBtn.innerText="Publicar produto"
isPublishing=false

}

}

</script>

</body>
</html>

<script type="module">
import { generateSocialCard }
from "/js/social-card.js"
 import { generateSocialImage }
from "/js/social-image-generator.js"

 import { exportSocialImage }
from "/js/export-social-image.js"
 import { uploadSocialImage }
from "/js/upload-social-image.js"
import { initializeApp }

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

// ================= FIREBASE =================

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};    


const app = initializeApp(firebaseConfig)

const db = getFirestore(app)

// ================= PARAMS =================

const params =
new URLSearchParams(window.location.search)

const id = params.get("id")

if(id){

loadProduct(id)

}

// ================= LOAD PRODUCT =================

async function loadProduct(id){

try{

const snap =
await getDoc(doc(db,"products",id))

if(!snap.exists()){

window.location.href = "/"

return

}

const product = snap.data()

// ================= META =================
updateMeta(product)

setTimeout(()=>{

window.location.href =
"/product.html?id=" + id

},500)
if(uploadedImage){

setMeta(
"og:image",
uploadedImage
)

setMeta(
"twitter:image",
uploadedImage
)

}
console.log(uploadedImage)
updateMeta(product)

// ================= REDIRECT =================

setTimeout(()=>{

window.location.href =
"/product.html?id=" + id

},500)

}catch(e){

console.error(e)

}

}

// ================= META =================

function updateMeta(product){

const originalImage =
product.images?.[0] || ""

// ================= CLOUDINARY OPTIMIZATION =================

let image = originalImage

if(originalImage.includes("cloudinary")){

image = originalImage.replace(
"/upload/",
"/upload/w_1200,h_630,c_fill,q_auto,f_auto/"
)

}

const price =
(product.price || 0) + " Kz"

const description =
(product.description || "")
.substring(0,150)

// ================= TITLE =================

document.title =
product.name || "Toma"

// ================= BASIC =================

setMeta("og:title", product.name)

setMeta(
"og:description",
description
)

setMeta(
"og:image",
image
)
setMeta(
"og:image:width",
"1200"
)

setMeta(
"og:image:height",
"630"
)
setMeta(
"og:url",
window.location.href
)

setMeta(
"og:type",
"product"
)

// ================= PRODUCT =================

setMeta(
"product:price:amount",
product.price || 0
)

setMeta(
"product:price:currency",
"AOA"
)

// ================= TWITTER =================

setMeta(
"twitter:title",
product.name
)

setMeta(
"twitter:description",
description
)

setMeta(
"twitter:image",
image
)

// ================= EXTRA =================

setMeta(
"description",
description
)
setMeta(
"og:site_name",
"Toma"
)

setMeta(
"twitter:card",
"summary_large_image"
)
}
// ================= SET META =================

function setMeta(property, content){

let element = document.querySelector(
`meta[property="${property}"]`
)

if(!element){

element = document.createElement("meta")

element.setAttribute("property", property)

document.head.appendChild(element)

}

element.setAttribute("content", content)

}

</script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

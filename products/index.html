 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Toma Produto</title>

<meta property="og:type" content="product">

<meta property="og:site_name" content="Toma">

<meta name="twitter:card"
content="summary_large_image">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

// ================= FIREBASE =================

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};    


const app = initializeApp(firebaseConfig)

const db = getFirestore(app)

// ================= PARAMS =================

const params =
new URLSearchParams(window.location.search)

const id = params.get("id")

if(id){

loadProduct(id)

}

// ================= LOAD PRODUCT =================

async function loadProduct(id){

try{

const snap =
await getDoc(doc(db,"products",id))

if(!snap.exists()){

window.location.href = "/"

return

}

const product = snap.data()

// ================= META =================

updateMeta(product)

// ================= REDIRECT =================

setTimeout(()=>{

window.location.href =
"/product.html?id=" + id

},500)

}catch(e){

console.error(e)

}

}

// ================= META =================

function updateMeta(product){

document.title =
product.name || "Toma"

setMeta("og:title", product.name)

setMeta(
"og:description",
product.description || ""
)

setMeta(
"og:image",
product.images?.[0] || ""
)

setMeta(
"og:url",
window.location.href
)

setMeta(
"twitter:title",
product.name
)

setMeta(
"twitter:description",
product.description || ""
)

setMeta(
"twitter:image",
product.images?.[0] || ""
)

}

// ================= SET META =================

function setMeta(property, content){

let element = document.querySelector(
`meta[property="${property}"]`
)

if(!element){

element = document.createElement("meta")

element.setAttribute("property", property)

document.head.appendChild(element)

}

element.setAttribute("content", content)

}

</script>

</head>

<body>

<p>Carregando produto...</p>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f9f9ff;
color:#222;
}

/* HEADER */
.header{
background:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
position:relative;
}

/* ADMIN BUTTON */
.adminBtn{
position:absolute;
right:15px;
top:12px;
background:#7c3aed;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
cursor:pointer;
display:none;
}

/* CONTAINER */
.container{
padding:10px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* IMAGE */
.imageContainer{
width:100%;
height:320px;
background:#eee;
overflow:hidden;
}

.mainImage{
width:100%;
height:100%;
object-fit:cover;
}

/* GALLERY */
.gallery{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
background:#fafafa;
}

.gallery img{
width:70px;
height:70px;
border-radius:10px;
opacity:0.6;
cursor:pointer;
}

.gallery img.active{
border:2px solid #7c3aed;
opacity:1;
}

/* INFO */
.info{
padding:15px;
}

.name{
font-size:20px;
font-weight:bold;
}

.price{
color:#7c3aed;
font-size:22px;
font-weight:bold;
margin-top:5px;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.buyBtn{background:#22c55e;color:white;}
.whatsBtn{background:#7c3aed;color:white;}
.shopBtn{background:#f97316;color:white;}

/* SECTION */
.section{
padding:10px;
}

.grid{
display:flex;
gap:10px;
overflow-x:auto;
}

.smallCard{
min-width:140px;
background:white;
border-radius:12px;
padding:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
cursor:pointer;
}

.smallCard img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal img{
max-width:100%;
max-height:100%;
}

.close{
position:absolute;
top:15px;
right:15px;
font-size:30px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
Detalhes do produto
<button id="adminBtn" class="adminBtn">Admin</button>
</div>

<div class="container">

<div class="card">

<div class="imageContainer">
<img id="mainImage" class="mainImage" src="">
</div>

<div id="gallery" class="gallery"></div>

<div class="info">
<div id="name" class="name"></div>
<div id="price" class="price"></div>

<div class="actions">
<button class="btn buyBtn" onclick="buy()">Comprar</button>
<button class="btn whatsBtn" onclick="whatsapp()">WhatsApp</button>
<button class="btn shopBtn" onclick="openShop()">Loja</button>
</div>
</div>

</div>

</div>

<div class="section">
<h3>Produtos similares</h3>
<div id="similar" class="grid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
<span class="close">✖</span>
<img id="modalImg">
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc,getDoc,
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const productId = localStorage.getItem("selectedProduct")

let product = null
let images = []
let index = 0

/* ADMIN BUTTON LOGIC */
onAuthStateChanged(auth, async (user)=>{

if(!user) return

const snap = await getDoc(doc(db,"users",user.uid))
const role = snap.data()?.role

if(role === "admin" || role === "superadmin"){
const btn = document.getElementById("adminBtn")
btn.style.display = "block"
btn.onclick = ()=>location.href="admin-dashboard.html"
}

})

/* LOAD */
async function load(){

if(!productId){
alert("Produto inválido ❌")
return
}

const snap = await getDoc(doc(db,"products",productId))

if(!snap.exists()){
alert("Produto não encontrado ❌")
return
}

product = snap.data()
images = product.images || []

render()
loadSimilar()
}

load()

/* RENDER */
function render(){

document.getElementById("name").innerText = product.name
document.getElementById("price").innerText = product.price + " Kz"

setImage(0)

let gal = document.getElementById("gallery")
gal.innerHTML = images.map((img,i)=>`
<img src="${img}" onclick="setImage(${i})">
`).join("")
}

/* IMAGE */
window.setImage = function(i){
index = i
document.getElementById("mainImage").src = images[i]
}

/* SWIPE */
let startX = 0

document.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX
})

document.addEventListener("touchend",e=>{
let endX = e.changedTouches[0].clientX

if(endX < startX - 50) next()
if(endX > startX + 50) prev()
})

function next(){
index = (index + 1) % images.length
setImage(index)
}

function prev(){
index = (index - 1 + images.length) % images.length
setImage(index)
}

/* ZOOM */
const mainImg = document.getElementById("mainImage")

mainImg.onclick = ()=>{
document.getElementById("modal").style.display="flex"
document.getElementById("modalImg").src = mainImg.src
}

window.closeModal = function(){
document.getElementById("modal").style.display="none"
}

/* WHATSAPP */
window.whatsapp = async function(){

const user = auth.currentUser

if(!user){
alert("Login necessário ❌")
location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",product.merchantId))
const data = snap.data()

let phone = data?.whatsapp

if(!phone){
alert("Sem WhatsApp ❌")
return
}

phone = phone.replace(/\D/g,"")

const msg = `Olá, estou interessado no produto: ${product.name} - ${product.price} Kz`

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))
}

/* SHOP */
window.openShop = function(){
location.href="merchant-shop.html?id="+product.merchantId
}

/* BUY */
window.buy = function(){
whatsapp()
}

/* SIMILAR */
async function loadSimilar(){

const q=query(
collection(db,"products"),
where("category","==",product.category)
)

const snap=await getDocs(q)

let html=""

snap.forEach(d=>{
let p=d.data()

if(d.id !== productId){
html+=`
<div class="smallCard" onclick="openProduct('${d.id}')">
<img src="${p.images?.[0]}">
<div>${p.name}</div>
<div>${p.price} Kz</div>
</div>
`
}
})

document.getElementById("similar").innerHTML = html
}

/* OPEN */
window.openProduct = function(id){
localStorage.setItem("selectedProduct",id)
location.reload()
}

</script>

</body>
</html>

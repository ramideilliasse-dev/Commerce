 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f9f9ff;
color:#222;
}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
color:#cc5500;
}

.headerRight{
display:flex;
gap:8px;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:#ff6a00;
color:white;
border-radius:20px;
}

.adminBtn{
background:#111;
color:white;
border-radius:8px;
display:none;
}

.cartIcon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cartBadge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
position:absolute;
top:-6px;
right:-8px;
}

/* SEARCH */
.topBar{
position:fixed;
top:60px;
left:0;
right:0;
background:white;
padding:10px;
display:flex;
gap:8px;
z-index:999;
}

.topBar input,
.topBar select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* BANNER */
.banner{
margin-top:120px;
height:180px;
border-radius:12px;
margin-left:10px;
margin-right:10px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
opacity:0;
transition:opacity 0.8s;
}

.banner img.active{
opacity:1;
}

/* PRODUCTS */
.products{
column-count:2;
column-gap:10px;
padding:10px;
padding-bottom:90px;
}

.product{
background:white;
border-radius:14px;
margin-bottom:10px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
cursor:pointer;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-weight:bold;
font-size:14px;
}

.price{
color:#ff6a00;
font-weight:bold;
margin-top:3px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

.desc{
font-size:12px;
color:#666;
margin-top:3px;
}

.province{
font-size:11px;
color:#1aa34a;
margin-top:5px;
}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d4f8d4;
display:flex;
justify-content:space-around;
padding:8px;
font-size:13px;
border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">

<button onclick="location.href='settings.html'">⚙️</button>
<button onclick="location.href='guide.html'">📘</button>

<button id="adminBtn" class="adminBtn">Admin</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<div class="topBar">
<input id="search" placeholder="Procurar produto...">

<select id="provinceFilter">
<option value="">Todas províncias</option>
<option>Luanda</option>
<option>Benguela</option>
<option>Huambo</option>
<option>Huíla</option>
<option>Bié</option>
<option>Cabinda</option>
<option>Uíge</option>
<option>Malanje</option>
<option>Namibe</option>
<option>Cunene</option>
<option>Moxico</option>
<option>Zaire</option>
</select>
</div>

<div id="banner" class="banner"></div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

/* CART */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let total=0
cart.forEach(i=> total += i.qty || 1)
cartCount.innerText = total
}
updateCartCount()

/* ACCOUNT + ADMIN */
onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",user.uid))
let role = snap.data()?.role

if(role === "admin" || role === "superadmin"){
adminBtn.style.display="block"
adminBtn.onclick=()=>location.href="admin-dashboard.html"
}

if(role === "merchant"){
accountButton.innerText="Minha Loja 🏪"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}else{
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"
}

})

/* PRODUCTS */
let products=[]

function productHTML(p){
const img = p.images?.[0] || "https://via.placeholder.com/300"
const desc = (p.description || "").slice(0,30)

return `
<div class="product" onclick="openProduct('${p.id}')">
<div style="position:relative">
<img src="${img}">
<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>
<div class="province">📍 ${p.province || "Angola"}</div>
</div>
</div>
`
}

async function loadProducts(){
const snap=await getDocs(collection(db,"products"))

products=[]
snap.forEach(d=>{
let p=d.data()
p.id=d.id
products.push(p)
})

applyFilters()
loadBanner()
}

/* 🔥 BANNER AVEC AUTOPLAY + SWIPE */
let bannerItems=[]
let currentIndex=0
let timer=null

async function loadBanner(){

try{

const snap = await getDoc(doc(db,"promoBanner","main"))

if(!snap.exists()){
alert("❌ Bannière promo introuvable (promoBanner/main)")
return
}

const data = snap.data()

bannerItems = data.items || []

if(!bannerItems.length){
alert("⚠️ Aucun produit ajouté dans la bannière promo")
return
}

/* 🔥 construire images */
banner.innerHTML = bannerItems.map((item,i)=>{

let img = item.image || item.img || ""

return `<img src="${img}" class="${i===0?'active':''}">`

}).join("")

alert("✅ Bannière promo chargée avec succès")

startAutoplay()
enableSwipe()

}catch(e){

alert("🔥 Erreur bannière : " + e.message)

}

}
/* SWIPE */
function enableSwipe(){

let startX=0

banner.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX
})

banner.addEventListener("touchend",e=>{
let endX = e.changedTouches[0].clientX

if(endX < startX - 50){
let next = (currentIndex+1)%bannerItems.length
showSlide(next)
startAutoplay()
}

if(endX > startX + 50){
let prev = (currentIndex-1+bannerItems.length)%bannerItems.length
showSlide(prev)
startAutoplay()
}
})

}

/* FILTER */
function applyFilters(){

let filtered = products

const text = search.value.toLowerCase()
const province = provinceFilter.value

if(text){
filtered = filtered.filter(p =>
(p.name||"").toLowerCase().includes(text)
)
}

if(province){
filtered = filtered.filter(p =>
p.province === province
)
}

renderProducts(filtered)
}

search.addEventListener("input", applyFilters)
provinceFilter.addEventListener("change", applyFilters)

function renderProducts(list){
productList.innerHTML = list.map(p=>productHTML(p)).join("")
}

/* ACTIONS */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){ exist.qty++ }
else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()
}

loadProducts()

</script>

</body>
</html>

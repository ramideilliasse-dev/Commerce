 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f9f9ff;
color:#222;
}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
color:#7c3aed;
}

.headerRight{
display:flex;
gap:8px;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:#7c3aed;
color:white;
border-radius:20px;
}

/* ADMIN */
.adminBtn{
background:#111;
color:white;
border-radius:8px;
display:none;
}

/* CART */
.cartIcon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cartBadge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
position:absolute;
top:-6px;
right:-8px;
}

/* SEARCH + FILTER */
.topBar{
position:fixed;
top:60px;
left:0;
right:0;
background:white;
padding:10px;
display:flex;
gap:8px;
z-index:999;
}

.topBar input,
.topBar select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* 🔥 BANNER ANIMÉ */
.banner{
margin-top:120px;
height:180px;
border-radius:12px;
margin-left:10px;
margin-right:10px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
opacity:0;
transition:opacity 0.8s;
}

.banner img.active{
opacity:1;
}

/* PRODUCTS */
.products{
column-count:2;
column-gap:10px;
padding:10px;
padding-bottom:90px;
}

.product{
background:white;
border-radius:14px;
margin-bottom:10px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
cursor:pointer;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

/* INFO */
.info{
padding:10px;
}

.name{
font-weight:bold;
font-size:14px;
}

/* 🔥 PRIX ORANGE ANIMÉ */
.price{
color:#ff6a00;
font-weight:bold;
margin-top:3px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

.desc{
font-size:12px;
color:#666;
margin-top:3px;
}

/* 🔥 PROVINCE VERTE */
.province{
font-size:11px;
color:#1aa34a;
margin-top:5px;
}

/* 🔥 PANIER VERT */
.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:8px;
font-size:13px;
border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">

<button onclick="location.href='settings.html'">⚙️</button>
<button onclick="location.href='guide.html'">📘</button>

<button id="adminBtn" class="adminBtn">Admin</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<!-- SEARCH + FILTER -->
<div class="topBar">
<input id="search" placeholder="Procurar produto...">

<select id="provinceFilter">
<option value="">Todas províncias</option>
<option>Luanda</option>
<option>Benguela</option>
<option>Huambo</option>
<option>Huíla</option>
<option>Bié</option>
<option>Cabinda</option>
<option>Uíge</option>
<option>Malanje</option>
<option>Namibe</option>
<option>Cunene</option>
<option>Moxico</option>
<option>Zaire</option>
</select>
</div>

<!-- 🔥 BANNER PRODUITS -->
<div id="banner" class="banner"></div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc, query, where } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

/* CART */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let total=0
cart.forEach(i=> total += i.qty || 1)
cartCount.innerText = total
}
updateCartCount()

/* ACCOUNT + ADMIN */
onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",user.uid))
let role = snap.data()?.role

if(role === "admin" || role === "superadmin"){
adminBtn.style.display="block"
adminBtn.onclick=()=>location.href="admin-dashboard.html"
}

if(role === "merchant"){
accountButton.innerText="Minha Loja 🏪"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}else{
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"
}

})

/* PRODUCTS */
let products=[]

function productHTML(p){
const img = p.images?.[0] || "https://via.placeholder.com/300"
const desc = (p.description || "").slice(0,30)

return `
<div class="product" onclick="openProduct('${p.id}')">

<div style="position:relative">
<img src="${img}">
<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>
<div class="province">📍 ${p.province || "Angola"}</div>
</div>

</div>
`
}

async function loadProducts(){
const snap=await getDocs(collection(db,"products"))

products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
})

applyFilters()
loadBanner()
}

/* 🔥 BANNER ADMIN */
async function loadBanner(){

// produits marqués promo = true
const q = query(collection(db,"products"), where("promo","==",true))
const snap = await getDocs(q)

let imgs = []

snap.forEach(d=>{
let p = d.data()
if(p.images?.[0]) imgs.push(p.images[0])
})

if(imgs.length === 0) return

banner.innerHTML = imgs.map((img,i)=>
`<img src="${img}" class="${i===0?'active':''}">`
).join("")

let i=0
setInterval(()=>{
let all = banner.querySelectorAll("img")
all.forEach(el=>el.classList.remove("active"))
i = (i+1)%all.length
all[i].classList.add("active")
},3000)

}

/* FILTER */
function applyFilters(){

let filtered = products

const text = search.value.toLowerCase()
const province = provinceFilter.value

if(text){
filtered = filtered.filter(p =>
(p.name||"").toLowerCase().includes(text)
)
}

if(province){
filtered = filtered.filter(p =>
p.province === province
)
}

renderProducts(filtered)
}

search.addEventListener("input", applyFilters)
provinceFilter.addEventListener("change", applyFilters)

function renderProducts(list){
productList.innerHTML = list.map(p=>productHTML(p)).join("")
}

/* ACTIONS */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){ exist.qty++ }
else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()

}

/* LOAD */
loadProducts()

</script>

</body>
</html>

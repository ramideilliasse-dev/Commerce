 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngoShop</title>

<style>
body{font-family:Arial;margin:0;background:#f9f9ff;color:#222;}

.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{font-size:26px;font-weight:bold;}
.logo span{color:#ff6a00;font-size:30px;}

.headerRight{display:flex;gap:6px;align-items:center;}

.iconBtn{
background:#f1f1f1;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
position:relative;
}

.cartBadge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

.accountBtn{
background:#ff6a00;
color:white;
border-radius:20px;
border:none;
padding:6px 12px;
}

.adminBtn{
background:black;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
display:none;
}

/* BANNER */
.banner{
margin-top:120px;
height:200px;
border-radius:12px;
margin:10px;
overflow:hidden;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:0.6s;
}

.slide.active{opacity:1;}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
color:white;
}

/* PRODUCTS */
.products{
column-count:2;
padding:10px;
padding-bottom:80px;
}

.product{
background:white;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
cursor:pointer;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{padding:10px;}
.name{font-weight:bold;font-size:14px;}
.desc{font-size:12px;color:#666;}
.priceP{color:#ff6a00;}
.province{color:#1aa34a;font-size:11px;}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:34px;height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d4f8d4;
display:flex;
justify-content:space-around;
padding:8px;
}
</style>
</head>

<body>

<div class="header">

<div class="logo"><span>A</span>ngoShop 🇦🇴</div>

<div class="headerRight">

<button class="iconBtn" onclick="location.href='cart.html'">
🛒 <span id="cartCount" class="cartBadge">0</span>
</button>

<button class="iconBtn" onclick="location.href='guide.html'">📘</button>
<button class="iconBtn" onclick="location.href='settings.html'">⚙️</button>

<button id="adminBtn" class="adminBtn">Admin</button>
<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<div id="banner" class="banner"></div>
<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠 Inicio</div>
<div onclick="location.href='categories.html'">📦 Categorias</div>
<div onclick="location.href='cart.html'">🛒 Carrinho</div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
collection,getDocs,doc,getDoc,query,where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const adminBtn = document.getElementById("adminBtn")
const accountButton = document.getElementById("accountButton")
const cartCount = document.getElementById("cartCount")
const banner = document.getElementById("banner")

let products=[]
let currentSlide=0
let slides=[]
let autoTimer=null

/* CART COUNT */
function updateCartCount(){
let cart=JSON.parse(localStorage.getItem("cart")||"[]")
let total=cart.reduce((a,b)=>a+(b.qty||1),0)
cartCount.innerText=total
}
updateCartCount()

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",user.uid))
const data = snap.data() || {}

const role = (data.role || "").toLowerCase()

if(role==="admin"||role==="superadmin"){
adminBtn.style.display="block"
adminBtn.onclick=()=>location.href="admin-dashboard.html"
}

if(role==="merchant"){
const q=query(collection(db,"orders"),
where("merchantId","==",user.uid),
where("seen","==",false))

const ordersSnap=await getDocs(q)
let count=ordersSnap.size

accountButton.innerText = count>0 ? `Minha Loja (${count})` : "Minha Loja"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
return
}

accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"

})

/* LOAD PRODUCTS */
async function loadProducts(){

const productSnap = await getDocs(collection(db,"products"))
const userSnap = await getDocs(collection(db,"users"))

let usersMap={}
userSnap.forEach(u=>usersMap[u.id]=u.data())

products=[]

productSnap.forEach(d=>{
let p=d.data()
p.id=d.id

let m=usersMap[p.merchantId]

if(m && m.role==="merchant" && m.approved && !m.blocked){
products.push(p)
}
})

renderProducts(products)
loadBanner()
}

/* BANNER */
async function loadBanner(){

const snap = await getDoc(doc(db,"promoBanner","main"))
if(!snap.exists()) return

let items = snap.data().items || []

let html=""
let index=0

items.forEach(item=>{
let p=products.find(x=>x.id===item.id)
if(!p) return

let img=p.images?.[0]||"https://via.placeholder.com/400"

html+=`
<div class="slide ${index===0?'active':''}">
<img src="${img}">
<div class="overlay">
<div>${p.name}</div>
<div>${p.price} Kz</div>
</div>
</div>
`
index++
})

banner.innerHTML=html
slides=document.querySelectorAll(".slide")

startAutoSlide()
enableSwipe()
}

/* AUTOPLAY */
function startAutoSlide(){
clearInterval(autoTimer)
if(slides.length<=1) return

autoTimer=setInterval(()=>{
goToSlide((currentSlide+1)%slides.length)
},3000)
}

function goToSlide(i){
slides.forEach(s=>s.classList.remove("active"))
currentSlide=i
slides[i]?.classList.add("active")
}

/* 🔥 SWIPE iPhone FIX */
function enableSwipe(){

let startX=0
let endX=0

banner.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

banner.addEventListener("touchmove",e=>{
endX=e.touches[0].clientX
})

banner.addEventListener("touchend",()=>{
if(!startX || !endX) return

let diff = startX - endX

if(diff > 50){
goToSlide((currentSlide+1)%slides.length)
startAutoSlide()
}

if(diff < -50){
goToSlide((currentSlide-1+slides.length)%slides.length)
startAutoSlide()
}

startX=0
endX=0
})

}

/* PRODUCTS */
function renderProducts(list){

if(list.length===0){
productList.innerHTML="⚠️ Aucun produit"
return
}

let html=""

list.forEach(p=>{

let img=p.images?.[0]||"https://via.placeholder.com/300"
let desc=(p.description||"").split("\n")[0]

html+=`
<div class="product" onclick="openProduct('${p.id}')">

<div style="position:relative">
<img src="${img}">
<div class="cartBtn" onclick="event.stopPropagation();addToCart('${p.id}')">🛒</div>
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="desc">${desc}</div>
<div class="priceP">${p.price} Kz</div>
<div class="province">📍 ${p.province || "Angola"}</div>
</div>

</div>
`
})

productList.innerHTML=html
}

/* ACTIONS */
window.openProduct=id=>{
localStorage.setItem("selectedProduct",id)
location.href="product.html"
}

window.addToCart=id=>{

let cart=JSON.parse(localStorage.getItem("cart")||[])
let product=products.find(p=>p.id===id)

if(!product) return

let exist=cart.find(p=>p.id===id)

if(exist){exist.qty++}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.images?.[0]||"",
qty:1,
merchantId:product.merchantId
})
}

localStorage.setItem("cart",JSON.stringify(cart))
updateCartCount()
alert("🛒 Ajouté")
}

/* LOAD */
loadProducts()

</script>

</body>
</html>

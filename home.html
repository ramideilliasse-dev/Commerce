 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f9f9ff;
color:#222;
}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
color:#cc5500;
}

.headerRight{
display:flex;
gap:8px;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:#ff6a00;
color:white;
border-radius:20px;
}

.adminBtn{
background:#111;
color:white;
border-radius:8px;
display:none;
}

.cartIcon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cartBadge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
position:absolute;
top:-6px;
right:-8px;
}

/* SEARCH */
.topBar{
position:fixed;
top:60px;
left:0;
right:0;
background:white;
padding:10px;
display:flex;
gap:8px;
z-index:999;
}

/* 🔥 BANNER PREMIUM */
.banner{
margin-top:120px;
height:200px;
border-radius:12px;
margin:10px;
overflow:hidden;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:0.8s;
display:flex;
align-items:flex-end;
}

.slide.active{
opacity:1;
}

.slide img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* overlay */
.overlay{
position:relative;
z-index:2;
background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
width:100%;
padding:15px;
color:white;
}

.title{
font-size:16px;
font-weight:bold;
}

.price{
color:#ff6a00;
font-weight:bold;
margin-top:5px;
}

.buyBtn{
margin-top:8px;
background:#1aa34a;
color:white;
padding:6px 12px;
border-radius:8px;
display:inline-block;
}

/* PRODUCTS */
.products{
column-count:2;
padding:10px;
}

.product{
background:white;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{padding:10px;}
.name{font-weight:bold;font-size:14px;}

.priceP{
color:#ff6a00;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}50%{opacity:0.5;}100%{opacity:1;}
}

.province{color:#1aa34a;font-size:11px;}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d4f8d4;
display:flex;
justify-content:space-around;
padding:8px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">
<button onclick="location.href='settings.html'">⚙️</button>
<button onclick="location.href='guide.html'">📘</button>
<button id="adminBtn" class="adminBtn">Admin</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒 <span id="cartCount" class="cartBadge">0</span>
</div>

<button id="accountButton" class="accountBtn">...</button>
</div>
</div>

<div id="banner" class="banner"></div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠 Inicio</div>
<div onclick="location.href='categories.html'">📦 Categorias</div>
<div onclick="location.href='cart.html'">🛒 Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

/* 🔥 BANNER PREMIUM */
let bannerItems=[]
let currentIndex=0
let timer=null

async function loadBanner(){

const snap = await getDoc(doc(db,"promoBanner","main"))

if(!snap.exists()){
alert("❌ Banner introuvable")
return
}

bannerItems = snap.data().items || []

if(!bannerItems.length){
alert("⚠️ Banner vide")
return
}

let slidesHTML = ""

for(let i=0;i<bannerItems.length;i++){

let item = bannerItems[i]

/* 🔥 récupérer produit automatiquement */
let productSnap = await getDoc(doc(db,"products",item.id))

if(!productSnap.exists()) continue

let p = productSnap.data()

let img = p.images?.[0] || "https://via.placeholder.com/400"

slidesHTML += `
<div class="slide ${i===0?'active':''}" onclick="openProduct('${item.id}')">

<img src="${img}">

<div class="overlay">
<div class="title">${p.name || ""}</div>
<div class="price">${p.price || 0} Kz</div>
<div class="buyBtn">Comprar</div>
</div>

</div>
`
}

banner.innerHTML = slidesHTML

startAutoplay()
enableSwipe()

alert("✅ Banner PREMIUM OK")

}

/* autoplay */
function startAutoplay(){
clearInterval(timer)
timer = setInterval(()=>{
showSlide((currentIndex+1)%bannerItems.length)
},3000)
}

function showSlide(i){
let slides = document.querySelectorAll(".slide")
slides.forEach(s=>s.classList.remove("active"))
currentIndex=i
slides[i].classList.add("active")
}

/* swipe */
function enableSwipe(){
let startX=0

banner.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

banner.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX

if(endX < startX-50){
showSlide((currentIndex+1)%bannerItems.length)
startAutoplay()
}

if(endX > startX+50){
showSlide((currentIndex-1+bannerItems.length)%bannerItems.length)
startAutoplay()
}
})
}

/* OPEN PRODUCT */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* LOAD */
loadBanner()

</script>

</body>
</html>

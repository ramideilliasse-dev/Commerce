 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toma">

<title>Toma</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff6a00">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
color:#222;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
right:0;
background:#ff6a00;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.logo{
font-size:26px;
font-weight:bold;
color:white;
}

.headerRight{
display:flex;
gap:8px;
}

.iconBtn{
background:white;
border:none;
padding:10px 12px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.adminBtn{
background:black;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
display:none;
}

/* SLIDER */

.promoSlider{
margin-top:95px;
width:calc(100% - 20px);
height:220px;
margin-left:10px;
margin-right:10px;
border-radius:20px;
overflow:hidden;
position:relative;
background:#ddd;
}

.promoSlide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s ease;
}

.promoSlide.active{
opacity:1;
z-index:2;
}

.promoSlide img{
width:100%;
height:100%;
object-fit:cover;
}

.promoText{
position:absolute;
left:0;
right:0;
bottom:0;
padding:15px;
color:white;
font-size:18px;
font-weight:bold;
background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

/* PRODUCTS */

.products{
column-count:2;
column-gap:10px;
padding:10px;
padding-bottom:90px;
}

.product{
background:white;
border-radius:16px;
margin-bottom:10px;
overflow:hidden;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-size:16px;
font-weight:bold;
margin-bottom:4px;
}

.desc{
font-size:12px;
color:#666;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.priceP{
color:#ff6a00;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.province{
color:#1aa34a;
font-size:12px;
margin-top:4px;
}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#16a34a;
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
z-index:1000;
}

.navItem{
flex:1;
text-align:center;
font-size:13px;
color:#444;
position:relative;
}

.bottomBadge{
position:absolute;
top:-2px;
right:28%;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

/* TOAST */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
padding:14px 18px;
border-radius:14px;
color:white;
font-weight:bold;
animation:fade .3s;
}

.toast.success{
background:#16a34a;
}

.toast.warning{
background:#ff6a00;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">Toma 🇦🇴</div>

<div class="headerRight">

<button class="iconBtn"
onclick="location.href='search.html'">
🔎
</button>

<button class="iconBtn"
onclick="location.href='guide.html'">
📘
</button>

<button id="adminBtn"
class="adminBtn">
Admin
</button>

</div>

</div>

<!-- SLIDER -->

<div id="promoSlider"
class="promoSlider">
</div>

<!-- PRODUCTS -->

<div id="productList"
class="products">
</div>

<!-- NAV -->

<div class="nav">

<div class="navItem"
onclick="location.href='index.html'">
🏠<br>
Inicio
</div>

<div class="navItem"
onclick="location.href='categories.html'">
📦<br>
Categorias
</div>

<div class="navItem"
onclick="location.href='cart.html'">
🛒<br>
Carrinho

<div id="bottomCartCount"
class="bottomBadge">
0
</div>

</div>

<div class="navItem"
onclick="location.href='settings.html'">
⚙️<br>
Conta
</div>

</div>

<div id="toastBox"
class="toastBox">
</div>

<script type="module">

import { db, auth } from "./firebase.js"

import {
collection,
getDocs,
doc,
getDoc,
query,
limit
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

/* ELEMENTS */

const adminBtn =
document.getElementById("adminBtn")

const productList =
document.getElementById("productList")

const promoSlider =
document.getElementById("promoSlider")

const cartBadge =
document.getElementById("bottomCartCount")

/* VARIABLES */

let products = []

let currentPromo = 0

let promoInterval = null

/* CART */

function getCart(){

try{
return JSON.parse(
localStorage.getItem("cart") || "[]"
)
}catch{
return []
}

}

function updateCartCount(){

const cart = getCart()

const total =
cart.reduce((a,b)=>a+(b.qty||1),0)

cartBadge.innerText = total

}

updateCartCount()

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user) return

const snap = await getDoc(
doc(db,"users",user.uid)
)

const data = snap.data() || {}

const role =
(data.role || "").toLowerCase()

if(
role==="admin" ||
role==="superadmin"
){
adminBtn.style.display = "block"

adminBtn.onclick = ()=>{
location.href =
"admin-dashboard.html"
}
}

})

/* PRODUCTS */

async function loadProducts(){

try{

const qProducts = query(
collection(db,"products"),
limit(20)
)

const productSnap =
await getDocs(qProducts)

const userSnap =
await getDocs(collection(db,"users"))

let usersMap = {}

userSnap.forEach(u=>{

usersMap[u.id] = u.data()

})

products = []

productSnap.forEach(d=>{

let p = d.data()

p.id = d.id

let merchant =
usersMap[p.merchantId]

if(
merchant &&
merchant.role==="merchant" &&
merchant.approved &&
!merchant.blocked
){
products.push(p)
}

})

renderProducts(products)

}catch(err){

console.log(err)

showToast(
"Erro ao carregar produtos",
"warning"
)

}

}

/* RENDER PRODUCTS */

function renderProducts(list){

let html = ""

list.forEach(p=>{

let img =
p.images?.[0] ||
"https://via.placeholder.com/300"

let desc =
(p.description || "").trim()

html += `

<div class="product"
onclick="openProduct('${p.id}')">

<div style="position:relative;">

<img src="${img}">

<div class="cartBtn"
onclick="event.stopPropagation();addToCart('${p.id}')">
🛒
</div>

</div>

<div class="info">

<div class="name">
${p.name}
</div>

<div class="desc">
${desc}
</div>

<div class="priceP">
${p.price} Kz
</div>

<div class="province">
📍 ${p.province || "Angola"}
</div>

</div>

</div>

`

})

productList.innerHTML = html

}

/* PRODUCT PAGE */

window.openProduct = (id)=>{

localStorage.setItem(
"selectedProduct",
id
)

location.href = "product.html"

}

/* ADD TO CART */

window.addToCart = (id)=>{

if(!auth.currentUser){

showToast(
"Faça login primeiro",
"warning"
)

location.href = "login.html"

return

}

let cart = getCart()

let product =
products.find(p=>p.id===id)

if(!product) return

let exist =
cart.find(p=>p.id===id)

if(exist){
exist.qty++
}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.images?.[0] || "",
qty:1
})

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
)

updateCartCount()

showToast(
"Produto adicionado",
"success"
)

}

/* PROMO SLIDER */

async function loadPromoSlider(){

try{

const snap = await getDoc(
doc(db,"promoBanner","main")
)

if(!snap.exists()) return

const data = snap.data()

const images =
data.customImages || []

const message =
data.message || ""

if(images.length === 0){

promoSlider.style.display = "none"

return

}

promoSlider.innerHTML =
images.map((img,i)=>`

<div class="promoSlide ${i===0?'active':''}">

<img src="${img}">

<div class="promoText">
${message}
</div>

</div>

`).join("")

const slides =
document.querySelectorAll(".promoSlide")

clearInterval(promoInterval)

promoInterval = setInterval(()=>{

slides[currentPromo]
.classList.remove("active")

currentPromo++

if(currentPromo >= slides.length){
currentPromo = 0
}

slides[currentPromo]
.classList.add("active")

},3000)

}catch(err){

console.log(err)

}

}

/* TOAST */

function showToast(message,type="success"){

const box =
document.getElementById("toastBox")

const toast =
document.createElement("div")

toast.className =
"toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},3000)

}

/* START */

loadPromoSlider()
loadProducts()

</script>

</body>
</html>

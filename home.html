 /* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);

.toast{

}

.toast.success{

}

.toast.error{

}

.toast.warning{

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}

<script type="module">
alert("HOME SCRIPT START");
import { db, auth } from "./firebase.js"

import {
  collection,
  getDocs,
  doc,
  getDoc,
  query,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"


const adminBtn = document.getElementById("adminBtn")
const shopNav = document.getElementById("shopNav")
const productList = document.getElementById("productList")
const promoSlider = document.getElementById("promoSlider")

let products = []
let currentPromo = 0
let promoInterval = null


/* ================= CART ================= */

function getCart(){

  try{
    return JSON.parse(localStorage.getItem("cart") || "[]")
  }catch{
    return []
  }

}

function updateCartCount(){

  const cart = getCart()

  const total = cart.reduce((a,b)=>a+(b.qty || 1),0)

  const badge =
  document.getElementById("bottomCartCount")

  if(badge){
    badge.innerText = total
  }

}

updateCartCount()

window.addEventListener("storage",()=>{
  updateCartCount()
})


/* ================= AUTH ================= */

onAuthStateChanged(auth, async (user)=>{

  if(!user) return

  try{

    const snap =
    await getDoc(doc(db,"users",user.uid))

    const data = snap.data() || {}

    const role =
    (data.role || "").toLowerCase()

    if(
      role === "admin" ||
      role === "superadmin"
    ){

      adminBtn.style.display = "block"

      adminBtn.onclick = ()=>{
        location.href = "admin-dashboard.html"
      }

    }

    if(role === "merchant"){

      shopNav.style.display = "block"

      shopNav.onclick = ()=>{
        location.href = "merchant-dashboard.html"
      }

    }

  }catch(err){

    console.log(err)

  }

})


/* ================= LOAD PRODUCTS ================= */

async function loadProducts(){
alert("loadProducts démarré");
  try{

    const qProducts = query(
      collection(db,"products"),
      limit(50)
    )

    const productSnap =
    await getDocs(qProducts)
alert("Produits trouvés : " + productSnap.size);
    products = []

    productSnap.forEach(docSnap=>{

      const p = docSnap.data()

      p.id = docSnap.id

      products.push(p)

    })

    if(products.length === 0){

      productList.innerHTML = `
      <div style="
        padding:30px;
        text-align:center;
        color:#777;
        font-size:15px;
      ">
        Nenhum produto disponível
      </div>
      `

      return

    }

    renderProducts(products)

renderTopProducts()

loadBestSellers()

renderRecommendedProducts()

renderCategorySection(
"Alimentação",
"foodProducts"
)

renderCategorySection(
"Eletrónica",
"electronicsProducts"
)

renderCategorySection(
"Moda",
"fashionProducts"
)

renderCategorySection(
"Beleza",
"beautyProducts"
)

renderCategorySection(
"Casa",
"homeProducts"
)

renderCategorySection(
"Auto",
"autoProducts"
)
  }catch(error){
alert(
"ERREUR FIRESTORE : " +
error.message
);
    console.log(error)

    productList.innerHTML = `
    <div style="
      padding:30px;
      text-align:center;
      color:red;
      font-size:15px;
    ">
      Erro ao carregar produtos
    </div>
    `

    showToast(
      "Erro ao carregar produtos",
      "error"
    )

  }

}


/* ================= RENDER PRODUCTS ================= */

function renderProducts(list){

  let html = ""

  list.forEach(p=>{
const favorites = getFavorites()

const isFavorite =
favorites.includes(p.id)
    let img =
    "https://via.placeholder.com/300"

    if(
      Array.isArray(p.images) &&
      p.images.length > 0
    ){
      img = p.images[0]
    }

    const desc =
    (p.description || "").trim()

    html += `
    <div class="product"
      onclick="openProduct('${p.id}')">

      <div style="position:relative">

        ${p.discount ? `
<div style="
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:4px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
z-index:5;
">
-${p.discount}%
</div>
` : p.isNew ? `
<div style="
position:absolute;
top:8px;
left:8px;
background:#1aa34a;
color:white;
padding:4px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
z-index:5;
">
🆕 NOVO
</div>
` : ""}

        <img
          src="${img}"
          loading="lazy"
          onerror="this.src='https://via.placeholder.com/300'"
        >
<div
onclick="event.stopPropagation();toggleFavorite('${p.id}')"
style="
position:absolute;
top:8px;
right:8px;
background:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
z-index:10;
">
${isFavorite ? "❤️" : "🤍"}
</div>
        <button class="cartBtn"
onclick="event.stopPropagation(); addToCart('${p.id}')">
🛒
</button>
      </div>

      <div class="info">

        <div class="name">
          ${p.name || ""}
        </div>
<div style="
display:flex;
align-items:center;
gap:5px;
margin-top:4px;
font-size:12px;
color:#f59e0b;
">
⭐⭐⭐⭐⭐
<span style="
color:#666;
font-size:11px;
">
(${p.rating || "5.0"})
</span>
</div>
        <div class="desc">
          ${desc}
        </div>

        <div class="priceP">

          ${p.oldPrice ? `
          <span style="
            text-decoration:line-through;
            color:#888;
            font-size:12px;
            margin-right:5px;
          ">
            ${p.oldPrice} Kz
          </span>
          ` : ""}

          ${Number(p.price || 0)} Kz

        </div>

        <div class="province">
          📍 ${p.province || "Angola"}
        </div>

      </div>

    </div>
    `

  })

  productList.innerHTML = html

}
function renderTopProducts(){

const container =
document.getElementById("topProducts")

if(!container) return

let sorted = [...products]

sorted.sort((a,b)=>{
return (b.views || 0) - (a.views || 0)
})

sorted = sorted.slice(0,10)

container.innerHTML = sorted.map(p=>`

<div class="topCard"
onclick="openProduct('${p.id}')">

<div style="position:relative">

<div class="topBadge">
🔥 TOP
</div>

<img src="${p.images?.[0] || ''}">

</div>

<div class="topInfo">

<div class="topName">
${p.name}
</div>

<div class="topPrice">
${p.price} Kz
</div>

</div>

</div>

`).join("")

}

/* ================= PRODUCT ================= */

window.openProduct = (id)=>{

  localStorage.setItem(
    "selectedProduct",
    id
  )

  location.href =
    "product.html?id=" + id

}


/* ================= CART ================= */

window.addToCart = (id) => {

event.stopPropagation()

if(!auth.currentUser){

showToast("🔐 Faça login primeiro","warning")

setTimeout(()=>{
location.href = "login.html"
},800)

return

}

const product = products.find(p => p.id === id)

if(!product){

showToast("❌ Produto não encontrado","error")

return

}

let cart = getCart()

const exist = cart.find(p => p.id === id)

if(exist){

exist.qty += 1

}else{

cart.push({

id: product.id,
name: product.name || "",
price: Number(product.price || 0),
image: product.images?.[0] || "",
qty: 1,
merchantId: product.merchantId || ""

})

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
)

updateCartCount()

window.dispatchEvent(new Event("storage"))

showToast(
"🛒 Produto adicionado ao carrinho",
"success"
)

}
/* ================= PROMO ================= */

async function loadPromoSlider(){

  try{

    const snap = await getDoc(
      doc(db,"promoBanner","main")
    )

    if(!snap.exists()) return

    const data = snap.data()

    const images =
    data.customImages || []

    const message =
    data.message || ""

    if(images.length === 0){

      promoSlider.style.display = "none"

      return

    }

    promoSlider.innerHTML =
    images.map((img,i)=>`

      <div class="promoSlide ${i===0 ? 'active' : ''}">

        <img src="${img}">

        <div class="promoText">
          ${message}
        </div>

      </div>

    `).join("")

    const slides =
    document.querySelectorAll(".promoSlide")

    if(slides.length <= 1) return

    clearInterval(promoInterval)

    promoInterval = setInterval(()=>{

      slides[currentPromo]
      .classList.remove("active")

      currentPromo++

      if(currentPromo >= slides.length){
        currentPromo = 0
      }

      slides[currentPromo]
      .classList.add("active")

    },3000)

  }catch(err){

    console.log(err)

  }

}


/* ================= START ================= */

window.addEventListener("load",()=>{

  loadPromoSlider()

  loadProducts()

})


/* ================= TOAST ================= */

function showToast(
  message,
  type="success"
){

  const box =
  document.getElementById("toastBox")

  const toast =
  document.createElement("div")

  toast.className =
  "toast " + type

  toast.innerText = message

  box.appendChild(toast)

  setTimeout(()=>{
    toast.remove()
  },4000)

}
/* ================= FAVORITES ================= */

function getFavorites(){

try{
return JSON.parse(
localStorage.getItem("favorites") || "[]"
)
}catch{
return []
}

}

window.toggleFavorite = function(productId){

let favorites = getFavorites()

const index =
favorites.indexOf(productId)

if(index > -1){

favorites.splice(index,1)

showToast(
"💔 Removido dos favoritos",
"warning"
)

}else{

favorites.push(productId)

showToast(
"❤️ Adicionado aos favoritos",
"success"
)

}

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
)

loadProducts()

}
 function loadBestSellers(){

const best =
[...products]
.sort((a,b)=>
(b.salesCount || 0) -
(a.salesCount || 0)
)
.slice(0,10)

const container =
document.getElementById("bestSellers")

container.innerHTML =
best.map(p=>`

<div
class="bestSellerCard"
onclick="openProduct('${p.id}')"
>

src="${p.images?.[0] || ''}"
loading="lazy"
>

<div class="bestSellerInfo">

<div class="bestSellerName">
${p.name}
</div>

<div class="bestSellerPrice">
${p.price} Kz
</div>

</div>

</div>

`).join("")

}
 
 function renderRecommendedProducts(){

function renderCategorySection(
category,
containerId
){

const container =
document.getElementById(containerId)

if(!container) return

const categoryProducts =
products
.filter(p =>
(p.category || "")
.toLowerCase() ===
category.toLowerCase()
)
.slice(0,10)

container.innerHTML =
categoryProducts.map(p => `

<div class="topCard"
onclick="openProduct('${p.id}')">

<img
src="${p.images?.[0] || ''}"
loading="lazy"
>

<div class="topInfo">

<div class="topName">
${p.name}
</div>

<div class="topPrice">
${p.price} Kz
</div>

</div>

</div>

`).join("")

}
 window.openCategory = function(category){

localStorage.setItem(
"selectedCategory",
category
)

location.href =
"categories.html?category=" +
encodeURIComponent(category)

}

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{font-size:20px;font-weight:bold;}

.headerRight{display:flex;gap:8px;align-items:center;}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:black;color:white;
border-radius:15px;
}

.cartIcon{position:relative;cursor:pointer;font-size:20px;}

.cartBadge{
background:red;color:white;border-radius:50%;
padding:2px 6px;font-size:11px;
position:absolute;top:-6px;right:-8px;
}

.searchBox{
position:fixed;top:60px;left:0;right:0;
background:white;padding:8px;z-index:999;
}

.searchBox input{
width:100%;
padding:10px;border-radius:15px;border:1px solid #ddd;
}

.banner{
margin-top:110px;
background:#ff6a00;color:white;
padding:10px;text-align:center;font-weight:bold;
}

.products{
column-count:2;
column-gap:10px;
padding:10px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:10px;
break-inside:avoid;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
overflow:hidden;
cursor:pointer;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{padding:8px;}

.name{font-weight:bold;}
.price{color:#ff6a00;font-weight:bold;}
.desc{font-size:12px;color:#555;}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:32px;height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.nav{
position:fixed;
bottom:0;left:0;right:0;
background:white;
display:flex;
justify-content:space-around;
padding:8px;
border-top:1px solid #ddd;
font-size:13px;
}

.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:8px 12px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">

<button onclick="location.href='settings.html'">⚙️</button>
<button onclick="location.href='guide.html'">📘</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<!-- SEARCH -->
<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
</div>

<!-- BANNER -->
<div class="banner">
🔥 Promoções hoje • Entrega rápida 🚀
</div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='messages.html'">💬<br>Mensagens</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let products=[]

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}

/* CART COUNT */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let total=0
cart.forEach(i=> total += i.qty || 1)
document.getElementById("cartCount").innerText = total
}
updateCartCount()

/* 🔥 ACCOUNT BUTTON FIX */
const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

try{

const snap = await getDoc(doc(db,"users",user.uid))

/* 🔥 FALLBACK ADMIN SI BUG FIRESTORE */
let role = "client"

if(snap.exists()){
role = snap.data().role || "client"
}else{
/* ⚠️ IMPORTANT: fallback si doc supprimé */
console.warn("User doc introuvable ⚠️")
}

/* 🔥 FORCE ADMIN SI TU VEUX (OPTIONNEL) */
// if(user.email === "TON_EMAIL_ADMIN@gmail.com"){
// role = "superadmin"
// }

if(role === "admin" || role === "superadmin"){
accountButton.innerText="Admin 👑"
accountButton.onclick=()=>location.href="admin-dashboard.html"
}
else if(role === "merchant"){
accountButton.innerText="Minha Loja 🏪"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}
else{
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"
}

}catch(e){
console.error(e)
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"
}

})

/* PRODUCT UI */
function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"
const desc = (p.description || "").split(" ").slice(0,5).join(" ")

return `
<div class="product" onclick="openProduct('${p.id}')">

<div style="position:relative">

<img src="${img}">

<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>

</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>
</div>

</div>
`
}

/* LOAD PRODUCTS */
async function loadProducts(){

const snap=await getDocs(collection(db,"products"))

products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
})

renderProducts(products)

}

/* RENDER */
function renderProducts(list){
document.getElementById("productList").innerHTML =
list.map(p=>productHTML(p)).join("")
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
let val = e.target.value.toLowerCase()

let filtered = products.filter(p =>
(p.name||"").toLowerCase().includes(val)
)

renderProducts(filtered)
})

/* OPEN PRODUCT */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

/* ADD TO CART 🔥 */
window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

const product = products.find(p => p.id === id)
if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){
exist.qty++
}else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1,
merchantId: product.merchantId || "" /* IMPORTANT */
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()
showToast("Adicionado 🛒")

}

loadProducts()

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Angola</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0f1720;
color:white;
}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:#1f2a33;
padding:10px;
display:flex;justify-content:space-between;align-items:center;
z-index:1000;
}

.logo{font-size:20px;font-weight:bold;color:#00a884;}

.headerRight{display:flex;gap:8px;align-items:center;}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:#00a884;
color:white;
border-radius:20px;
}

/* CART */
.cartIcon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cartBadge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:11px;
position:absolute;
top:-6px;
right:-8px;
}

/* SEARCH */
.searchBox{
position:fixed;
top:60px;
left:0;
right:0;
background:#1f2a33;
padding:10px;
z-index:999;
}

.searchBox input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
background:#0f1720;
color:white;
}

/* BANNER */
.banner{
margin-top:110px;
background:#00a884;
padding:12px;
text-align:center;
font-weight:bold;
}

/* PRODUCTS GRID */
.products{
column-count:2;
column-gap:10px;
padding:10px;
padding-bottom:90px;
}

/* PRODUCT CARD */
.product{
background:#1f2a33;
border-radius:14px;
margin-bottom:10px;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.product:hover{
transform:scale(1.02);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

/* INFO */
.info{
padding:10px;
}

.name{
font-weight:bold;
font-size:14px;
}

.price{
color:#00e676;
font-weight:bold;
margin-top:3px;
}

.desc{
font-size:12px;
color:#aaa;
margin-top:3px;
}

/* 🔥 PROVINCE */
.province{
font-size:11px;
color:#00a884;
margin-top:5px;
}

/* CART BTN */
.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#00a884;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1f2a33;
display:flex;
justify-content:space-around;
padding:8px;
font-size:13px;
border-top:1px solid #333;
}

.nav div{
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">
<button onclick="location.href='settings.html'">⚙️</button>
<button onclick="location.href='guide.html'">📘</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<button id="accountButton" class="accountBtn">...</button>
</div>
</div>

<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
</div>

<div class="banner">
🔥 Promoções hoje • Entrega rápida 🚀
</div>

<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

/* CART */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let total=0
cart.forEach(i=> total += i.qty || 1)
document.getElementById("cartCount").innerText = total
}
updateCartCount()

window.addEventListener("focus", updateCartCount)

/* ACCOUNT */
const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",user.uid))
let role = snap.exists() ? snap.data().role : "client"

if(role === "merchant"){
accountButton.innerText="Minha Loja 🏪"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
}
else{
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"
}

})

/* PRODUCTS */
let products=[]

function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"
const desc = (p.description || "").split(" ").slice(0,5).join(" ")

return `
<div class="product" onclick="openProduct('${p.id}')">

<div style="position:relative">
<img src="${img}">
<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${desc}</div>

<div class="province">
📍 ${p.province || "Angola"}
</div>

</div>

</div>
`
}

async function loadProducts(){

const snap=await getDocs(collection(db,"products"))

products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
})

renderProducts(products)
}

function renderProducts(list){
document.getElementById("productList").innerHTML =
list.map(p=>productHTML(p)).join("")
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
let val = e.target.value.toLowerCase()
let filtered = products.filter(p =>
(p.name||"").toLowerCase().includes(val)
)
renderProducts(filtered)
})

/* ACTIONS */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){ exist.qty++ }
else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()

}

/* LOAD */
loadProducts()

</script>

</body>
</html>

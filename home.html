 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Online Angola</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{font-size:20px;font-weight:bold;}

.headerRight{
display:flex;
gap:8px;
align-items:center;
}

/* BUTTONS */
.topBtn{
background:#f1f1f1;
border:none;
padding:5px 8px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* CART */
.cartIcon{position:relative;cursor:pointer;font-size:20px;}

.cartBadge{
background:red;color:white;border-radius:50%;
padding:2px 6px;font-size:11px;
position:absolute;top:-6px;right:-8px;
}

/* ACCOUNT */
.accountBtn{
background:black;
color:white;
border:none;
padding:5px 10px;
border-radius:15px;
font-size:13px;
}

/* SEARCH */
.searchBox{
position:fixed;top:55px;left:0;right:0;
background:white;padding:8px;z-index:999;
}

.searchBox input{
width:100%;padding:10px;border-radius:15px;border:1px solid #ddd;
}

/* SUGGESTIONS */
#suggestions{
background:white;
position:absolute;
width:100%;
z-index:999;
border-radius:10px;
overflow:hidden;
}

/* BANNER */
.banner{
margin-top:105px;
background:#ff6a00;
color:white;
padding:8px;
text-align:center;
font-weight:bold;
font-size:14px;
}

/* LOADER */
#loader{text-align:center;padding:20px;}

/* PRODUCTS */
.products{
column-count:2;
column-gap:10px;
padding:10px;
padding-bottom:100px;
}

.product{
background:white;
border-radius:12px;
margin-bottom:10px;
break-inside:avoid;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.2s;
}

.product:hover{transform:scale(1.02);}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

/* INFO */
.info{padding:8px;}
.name{font-weight:bold;font-size:14px;}
.price{color:#ff6a00;font-weight:bold;font-size:14px;}
.desc{font-size:12px;color:#555;}
.stars{color:#FFD700;font-size:13px;}

/* CART BTN */
.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* FAVORITE */
.favBtn{
position:absolute;
top:8px;
right:8px;
font-size:16px;
cursor:pointer;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;right:0;
background:white;
display:flex;
justify-content:space-around;
padding:8px;
border-top:1px solid #ddd;
font-size:13px;
}

/* TOAST */
.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:8px 12px;
border-radius:20px;
display:none;
font-size:13px;
}
</style>
</head>

<body>

<div class="header">

<div class="logo">Shopping 🇦🇴</div>

<div class="headerRight">

<button class="topBtn" onclick="location.href='settings.html'">⚙️</button>
<button class="topBtn" onclick="location.href='guide.html'">📘</button>

<div class="cartIcon" onclick="location.href='cart.html'">
🛒
<span id="cartCount" class="cartBadge">0</span>
</div>

<!-- ✅ PROFILE SUPPRIMÉ -->

<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<div class="searchBox">
<input id="search" placeholder="Procurar produto...">
<div id="suggestions"></div>
</div>

<div class="banner">
🔥 Promoções hoje • Entrega rápida 🚀
</div>

<div id="loader">Carregando...</div>
<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠<br>Inicio</div>
<div onclick="location.href='categories.html'">📦<br>Categorias</div>
<div onclick="location.href='messages.html'">💬<br>Mensagens</div>
<div onclick="location.href='cart.html'">🛒<br>Carrinho</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { db,auth } from "./firebase.js"
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let products=[]

function showToast(msg){
const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2000)
}

function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let total=0
cart.forEach(i=> total += i.qty || 1)
document.getElementById("cartCount").innerText = total
}
updateCartCount()

/* AUTH */
const accountButton=document.getElementById("accountButton")

onAuthStateChanged(auth, (user)=>{

if(user){
accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="login.html" // ✅ CORRIGÉ
}else{
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
}

})

function productHTML(p){

const img = p.images?.[0] || "https://via.placeholder.com/300"

return `
<div class="product" onclick="openProduct('${p.id}')">

<div class="favBtn" onclick="event.stopPropagation();toggleFav('${p.id}')">❤️</div>

<div onclick="event.stopPropagation();addToCart('${p.id}')" class="cartBtn">🛒</div>

<img loading="lazy" src="${img}">

<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} Kz</div>
<div class="desc">${(p.description||"").slice(0,40)}</div>
<div class="stars">${"⭐".repeat(Math.round(p.rating || 4))}</div>
</div>

</div>
`
}

async function loadProducts(){

const snap=await getDocs(collection(db,"products"))

const container=document.getElementById("productList")
document.getElementById("loader").style.display="none"

products=[]

snap.forEach(docSnap=>{
const data=docSnap.data()
data.id=docSnap.id
products.push(data)
})

products.sort((a,b)=>(b.sales||0)-(a.sales||0))

container.innerHTML = products.map(p=>productHTML(p)).join("")
}

window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

window.addToCart=function(id){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
const product = products.find(p => p.id === id)

if(!product) return

const exist = cart.find(p => p.id === id)

if(exist){
exist.qty++
}else{
cart.push({
id:product.id,
name:product.name,
price:Number(product.price) || 0,
image:product.images?.[0] || "",
qty:1
})
}

localStorage.setItem("cart", JSON.stringify(cart))
updateCartCount()
showToast("Adicionado 🛒")

}

window.toggleFav=function(id){

let fav = JSON.parse(localStorage.getItem("fav") || "[]")

if(fav.includes(id)){
fav = fav.filter(i=>i!==id)
}else{
fav.push(id)
}

localStorage.setItem("fav", JSON.stringify(fav))
}

loadProducts()

</script>

</body>
</html>

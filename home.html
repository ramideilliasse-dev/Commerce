 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngoShop</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f9f9ff;
color:#222;
}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;
background:white;
padding:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-size:26px;
font-weight:bold;
color:#111;
}

.logo span{
color:#ff6a00;
font-size:30px;
}

.headerRight{
display:flex;
gap:6px;
align-items:center;
}

.iconBtn{
background:#f1f1f1;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.accountBtn{
background:#ff6a00;
color:white;
border-radius:20px;
border:none;
padding:6px 12px;
}

.adminBtn{
background:black;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
display:none;
cursor:pointer;
}

/* BANNER */
.banner{
margin-top:120px;
height:200px;
border-radius:12px;
margin:10px;
overflow:hidden;
position:relative;
}

/* PRODUCTS */
.products{
column-count:2;
padding:10px;
padding-bottom:80px;
}

.product{
background:white;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow:hidden;
cursor:pointer;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{padding:10px;}
.name{font-weight:bold;font-size:14px;}

.desc{
font-size:12px;
color:#666;
margin-top:3px;
}

.priceP{
color:#ff6a00;
}

.province{color:#1aa34a;font-size:11px;}

.cartBtn{
position:absolute;
right:8px;
bottom:8px;
background:#1aa34a;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d4f8d4;
display:flex;
justify-content:space-around;
padding:8px;
}
</style>
</head>

<body>

<div class="header">

<div class="logo"><span>A</span>ngoShop 🇦🇴</div>

<div class="headerRight">

<button class="iconBtn" onclick="location.href='guide.html'">📘</button>
<button class="iconBtn" onclick="location.href='settings.html'">⚙️</button>

<button id="adminBtn" class="adminBtn">Admin</button>
<button id="accountButton" class="accountBtn">...</button>

</div>
</div>

<div id="banner" class="banner"></div>
<div id="productList" class="products"></div>

<div class="nav">
<div onclick="location.href='index.html'">🏠 Inicio</div>
<div onclick="location.href='categories.html'">📦 Categorias</div>
<div onclick="location.href='cart.html'">🛒 Carrinho</div>
</div>

<script type="module">

import { db, auth } from "./firebase.js"
import { collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const adminBtn = document.getElementById("adminBtn")
const accountButton = document.getElementById("accountButton")

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
accountButton.innerText="Login"
accountButton.onclick=()=>location.href="login.html"
return
}

const snap = await getDoc(doc(db,"users",user.uid))
const data = snap.data() || {}

const role = (data.role || "").toLowerCase()
const approved = data.approved === true

if(role === "admin" || role === "superadmin"){
adminBtn.style.display="block"
adminBtn.onclick=()=>location.href="admin-dashboard.html"
}

if(role === "merchant" && approved){
accountButton.innerText="Minha Loja"
accountButton.onclick=()=>location.href="merchant-dashboard.html"
return
}

accountButton.innerText="Conta"
accountButton.onclick=()=>location.href="settings.html"

})

/* 🔥 FIX iPhone ici */
let products=[]

async function loadProducts(){

const productSnap = await getDocs(collection(db,"products"))
const userSnap = await getDocs(collection(db,"users"))

/* 🔥 construire map users */
let usersMap = {}

userSnap.forEach(u=>{
usersMap[u.id] = u.data()
})

products=[]

productSnap.forEach(d=>{

let p = d.data()
p.id = d.id

let merchant = usersMap[p.merchantId]

/* ✅ filtre rapide */
if(
merchant &&
merchant.role === "merchant" &&
merchant.approved === true &&
!merchant.blocked
){
products.push(p)
}

})

renderProducts(products)

}

/* RENDER */
function renderProducts(list){

if(list.length === 0){
productList.innerHTML = "⚠️ Aucun produit disponible"
return
}

let html=""

list.forEach(p=>{

let img=p.images?.[0]||"https://via.placeholder.com/300"
let desc=(p.description||"").split("\n")[0]

html+=`
<div class="product" onclick="openProduct('${p.id}')">

<div style="position:relative">
<img src="${img}">
<div class="cartBtn" onclick="event.stopPropagation();addToCart('${p.id}')">🛒</div>
</div>

<div class="info">
<div class="name">${p.name}</div>
<div class="desc">${desc}</div>
<div class="priceP">${p.price} Kz</div>
<div class="province">📍 ${p.province || "Angola"}</div>
</div>

</div>
`
})

productList.innerHTML=html
}

/* ACTIONS */
window.openProduct=function(id){
localStorage.setItem("selectedProduct", id)
location.href="product.html"
}

window.addToCart=function(id){

let cart=JSON.parse(localStorage.getItem("cart")||"[]")
const product=products.find(p=>p.id===id)

if(!product) return

const exist=cart.find(p=>p.id===id)

if(exist){exist.qty++}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.images?.[0]||"",
qty:1,
merchantId:product.merchantId
})
}

localStorage.setItem("cart", JSON.stringify(cart))
alert("🛒 Ajouté au panier")
}

/* LOAD */
loadProducts()

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
}

.profilePic{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#1aa34a;
color:white;
font-weight:bold;
}

.role{
margin-top:10px;
font-size:14px;
color:#555;
}
</style>
</head>

<body>

<div class="header">Meu Perfil 👤</div>

<div class="container">

<img id="profilePic" class="profilePic">
<input type="file" id="upload" hidden>

<input id="name" placeholder="Seu nome">

<div class="role" id="role"></div>

<button onclick="saveProfile()">Salvar</button>
<button onclick="goSettings()">Configurações ⚙️</button>

</div>

<script type="module">

import { db, auth } from "./firebase.js"
import {
doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

let userRef

const pic = document.getElementById("profilePic")
const upload = document.getElementById("upload")

pic.onclick = ()=> upload.click()

upload.onchange = function(){
const url = URL.createObjectURL(this.files[0])
pic.src = url
localStorage.setItem("profilePic", url)
}

onAuthStateChanged(auth, async (user)=>{

if(!user){
location.href="login.html"
return
}

userRef = doc(db,"users",user.uid)

const snap = await getDoc(userRef)

if(snap.exists()){

const data = snap.data()

document.getElementById("name").value = data.name || ""
document.getElementById("role").innerText = "Tipo: " + data.role

pic.src = data.photo || localStorage.getItem("profilePic") || "https://via.placeholder.com/100"

}

})

window.saveProfile = async function(){

await updateDoc(userRef,{
name: document.getElementById("name").value,
photo: pic.src
})

alert("Salvo ✅")

}

window.goSettings = function(){
location.href="settings.html"
}

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisar</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ff6a00;
padding:15px;
display:flex;
gap:10px;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.back{
background:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.searchBox{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-weight:bold;
font-size:14px;
}

.desc{
font-size:12px;
color:#666;
margin-top:4px;

display:-webkit-box;
-webkit-line-clamp:1;
-webkit-box-orient:vertical;
overflow:hidden;
}

.price{
color:#ff6a00;
font-weight:bold;
margin-top:5px;
}

.empty{
text-align:center;
padding:30px;
color:#777;
}

</style>
</head>

<body>

<div class="header">

<button class="back" onclick="history.back()">
←
</button>

<input 
type="text" 
id="searchInput" 
class="searchBox"
placeholder="Pesquisar produtos..."
>

</div>

<div id="products" class="products"></div>

<script type="module">

import { db } from "./firebase.js"

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const productsDiv = document.getElementById("products")
const searchInput = document.getElementById("searchInput")

let allProducts=[]

/* LOAD */
async function loadProducts(){

const snap = await getDocs(collection(db,"products"))

allProducts=[]

snap.forEach(doc=>{

let p = doc.data()
p.id = doc.id

allProducts.push(p)

})

renderProducts(allProducts)

}

/* RENDER */
function renderProducts(list){

if(list.length===0){

productsDiv.innerHTML = `
<div class="empty">
Nenhum produto encontrado 😢
</div>
`

return
}

let html=""

list.forEach(p=>{

let img = p.images?.[0] || "https://via.placeholder.com/300"

let desc = (p.description || "").split("\n")[0]

html += `
<div class="card" onclick="openProduct('${p.id}')">

<img loading="lazy" src="${img}">

<div class="info">

<div class="name">${p.name || "Produto"}</div>

<div class="desc">${desc}</div>

<div class="price">${p.price || 0} Kz</div>

</div>

</div>
`
})

productsDiv.innerHTML = html

}

/* SEARCH */
searchInput.oninput = function(){

let value = this.value.toLowerCase().trim()

if(!value){
renderProducts(allProducts)
return
}

let filtered = allProducts.filter(p=>{

let name = (p.name || "").toLowerCase()
let desc = (p.description || "").toLowerCase()
let province = (p.province || "").toLowerCase()

return (
name.includes(value)
|| desc.includes(value)
|| province.includes(value)
)

})

renderProducts(filtered)

}

/* OPEN */
window.openProduct = function(id){

localStorage.setItem("selectedProduct",id)

location.href = "product.html"

}

loadProducts()

</script>

</body>
</html>

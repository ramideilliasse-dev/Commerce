 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Favoritos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{

position:sticky;

top:0;

z-index:1000;

height:72px;

display:flex;

align-items:center;

justify-content:center;

background:white;

color:#111827;

font-size:24px;

font-weight:800;

box-shadow:0 2px 15px rgba(0,0,0,.08);

border-bottom:1px solid #ECECEC;

}

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-weight:bold;
}

.price{
color:#ff6a00;
margin-top:5px;
}
.soldOut{
background:red;
color:white;
padding:4px 8px;
border-radius:8px;
font-size:12px;
font-weight:bold;
display:inline-block;
margin-top:5px;
}
.empty{
text-align:center;
padding:50px 20px;
color:#666;
}

.btnHome{
background:#ff6a00;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
margin-top:15px;
font-weight:bold;
}
.favoriteRemove{

position:absolute;

top:10px;

right:10px;

width:40px;

height:40px;

border-radius:50%;

background:white;

display:flex;

justify-content:center;

align-items:center;

font-size:20px;

box-shadow:0 5px 15px rgba(0,0,0,.18);

cursor:pointer;

z-index:100;

}

.favoriteRemove:hover{

transform:scale(1.08);

}
.cartAdd{

position:absolute;

bottom:10px;

right:10px;

width:48px;

height:48px;

border-radius:50%;

background:#16A34A;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

color:white;

box-shadow:0 8px 18px rgba(22,163,74,.30);

cursor:pointer;

transition:.25s;

z-index:100;

}

.cartAdd:hover{

transform:scale(1.08);

}

.product{

background:#fff;

border-radius:18px;

overflow:hidden;

box-shadow:0 6px 18px rgba(0,0,0,.08);

transition:.25s;

}

.product:hover{

transform:translateY(-3px);

box-shadow:0 10px 26px rgba(0,0,0,.12);

}

.store{

margin-top:8px;

font-size:13px;

color:#666;

font-weight:600;

}
</style>
</head>

<body>

<div class="header">

❤️ Meus Favoritos

</div>

<div id="content"></div>

<script type="module">

import { db } from "./firebase.js";

import {

doc,
getDoc

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {

getFavorites,
removeFavorite as removeFavoriteStorage,
addToCart

} from "./js/storage.js";
window.removeFavorite = function(id){

    removeFavorite(id); // fonction de storage.js

    loadFavorites();

};

window.addToCart = async function(id){

try{

const snap = await getDoc(doc(db,"products",id));

if(!snap.exists()) return;

addToCart({

id,

...snap.data()

});

alert("Produto adicionado ao carrinho ✅");

}catch(e){

console.log(e);

}

}

async function loadFavorites(){

const ids = getFavorites()

if(ids.length === 0){

document.getElementById("content").innerHTML = `
<div class="empty">

<h3>Nenhum favorito ainda ❤️</h3>

<p>
Guarde os produtos que mais gosta.
</p>

<button
class="btnHome"
onclick="location.href='index.html'"
>
🛍️ Procurar produtos
</button>

</div>
`

return

}

let html = `<div class="products">`;

const products = await Promise.all(

ids.map(async(id)=>{

const snap = await getDoc(doc(db,"products",id));

if(!snap.exists()) return null;

return{

id,

...snap.data()

};

})

);

for(const p of products){

if(!p) continue;

const id = p.id;

const soldOut = Number(p.stock||0)<=0;

html += `

<div class="product">

<div style="position:relative;">

<img
src="${p.images?.[0] || ''}"
onclick="location.href='product.html?id=${id}'">

<div
class="favoriteRemove"
onclick="removeFavorite('${id}')">

❤️

</div>

<div
class="cartAdd"
onclick="addToCart('${id}')">

🛒

</div>

</div>

<div class="info">

<div
class="name"
onclick="location.href='product.html?id=${id}'">

${p.name}

</div>

${
soldOut
?
`
<div class="soldOut">

ESGOTADO

</div>
`
:
`
<div class="price">

${p.price} Kz

</div>

<div class="store">

✔ ${p.storeName || "Loja"}

</div>
`
}

</div>

</div>

`;

}

html += "</div>"

document.getElementById("content").innerHTML = html

}

loadFavorites()

</script>

</body>
</html>

 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
color:#333;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}

.stats{
display:flex;
gap:20px;
}

.stat{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="stats">
<div class="stat">
<h3>Total Marchands</h3>
<p id="merchantCount">0</p>
</div>

<div class="stat">
<h3>Total Produits</h3>
<p id="productCount">0</p>
</div>
</div>

<h2>Liste des marchands</h2>

<div id="merchantList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
};

const app = initializeApp(firebaseConfig);

const auth = getAuth();

const db = getFirestore();


onAuthStateChanged(auth, async(user)=>{

if(!user){

document.body.innerHTML="Connecte-toi en admin";
return;

}


const userDoc = await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){

document.body.innerHTML="Utilisateur introuvable";
return;

}


const data = userDoc.data();

if(data.role !== "admin"){

document.body.innerHTML="Connecte-toi en admin";
return;

}

loadDashboard();

});


async function loadDashboard(){

loadMerchants();
loadProducts();

}


async function loadMerchants(){

const snapshot = await getDocs(collection(db,"merchants"));

document.getElementById("merchantCount").innerText = snapshot.size;

const container = document.getElementById("merchantList");

container.innerHTML="";

snapshot.forEach(docSnap=>{

const data = docSnap.data();

const div = document.createElement("div");

div.className="card";

div.innerHTML = `
<p><b>Email:</b> ${data.email}</p>
<p><b>Approved:</b> ${data.approved}</p>

<button class="approve" onclick="approveMerchant('${docSnap.id}')">
Approuver
</button>

<button class="delete" onclick="deleteMerchant('${docSnap.id}')">
Supprimer
</button>
`;

container.appendChild(div);

});

}


async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

document.getElementById("productCount").innerText = snapshot.size;

}


window.approveMerchant = async(id)=>{

await updateDoc(doc(db,"merchants",id),{

approved:true

});

alert("Marchand approuvé");

location.reload();

}


window.deleteMerchant = async(id)=>{

await deleteDoc(doc(db,"merchants",id));

alert("Marchand supprimé");

location.reload();

}


</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ANGcomerce Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#111;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
min-width:200px;
}

.list{
margin-top:30px;
}

.item{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#2ecc71;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<header>
<h2>ANGcomerce Admin Dashboard</h2>
</header>

<div class="container">

<div class="stats">

<div class="card">
<h3>Total Marchands</h3>
<p id="merchantCount">0</p>
</div>

<div class="card">
<h3>Total Produits</h3>
<p id="productCount">0</p>
</div>

<div class="card">
<h3>Marchands en attente</h3>
<p id="pendingCount">0</p>
</div>

</div>


<div class="list">

<h2>Marchands</h2>
<div id="merchantList"></div>

</div>


<div class="list">

<h2>Produits</h2>
<div id="productList"></div>

</div>


</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);


/* ================= CHECK ADMIN ================= */

onAuthStateChanged(auth, async(user)=>{

if(!user){

document.body.innerHTML="Connecte-toi en admin";
return;

}

const userDoc = await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){

document.body.innerHTML="Utilisateur introuvable";
return;

}

const data = userDoc.data();

if(data.role !== "admin"){

document.body.innerHTML="Accès refusé";
return;

}

loadDashboard();

});


/* ================= DASHBOARD ================= */

async function loadDashboard(){

loadMerchants();
loadProducts();

}


/* ================= MERCHANTS ================= */

async function loadMerchants(){

const snapshot = await getDocs(collection(db,"users"));

const container = document.getElementById("merchantList");

container.innerHTML="";

let merchantCount=0;
let pendingCount=0;

snapshot.forEach(docSnap=>{

const data = docSnap.data();

if(data.role === "merchant"){

merchantCount++;

if(!data.approved){
pendingCount++;
}

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

<b>${data.email}</b><br>
Approved: ${data.approved}

<br><br>

<button class="approve" onclick="approveMerchant('${docSnap.id}')">
Approuver
</button>

<button class="delete" onclick="deleteMerchant('${docSnap.id}')">
Supprimer
</button>

`;

container.appendChild(div);

}

});

document.getElementById("merchantCount").innerText=merchantCount;
document.getElementById("pendingCount").innerText=pendingCount;

}


/* ================= PRODUCTS ================= */

async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

document.getElementById("productCount").innerText=snapshot.size;

const container=document.getElementById("productList");

container.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

<b>${data.name}</b><br>
Prix: ${data.price}

<br><br>

<button class="delete" onclick="deleteProduct('${docSnap.id}')">
Supprimer produit
</button>

`;

container.appendChild(div);

});

}


/* ================= ACTIONS ================= */

window.approveMerchant = async(id)=>{

await updateDoc(doc(db,"users",id),{
approved:true
});

alert("Marchand approuvé");

loadDashboard();

}


window.deleteMerchant = async(id)=>{

await deleteDoc(doc(db,"users",id));

alert("Marchand supprimé");

loadDashboard();

}


window.deleteProduct = async(id)=>{

await deleteDoc(doc(db,"products",id));

alert("Produit supprimé");

loadDashboard();

}

</script>

</body>
</html>

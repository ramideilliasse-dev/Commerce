 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - ANGcomerce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Dashboard Admin</h1>

<h2>Commerçants en attente</h2>
<div id="merchantList"></div>

<h2>Total Commerçants</h2>
<p id="totalMerchants">0</p>

<h2>Total Produits</h2>
<p id="totalProducts">0</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  where, 
  updateDoc, 
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= CHARGER MARCHANDS EN ATTENTE ================= */

async function loadPendingMerchants(){

  const q = query(
    collection(db,"users"),
    where("role","==","merchant"),
    where("approved","==",false)
  );

  const querySnapshot = await getDocs(q);

  const merchantList = document.getElementById("merchantList");
  merchantList.innerHTML = "";

  querySnapshot.forEach((docSnap)=>{

    const data = docSnap.data();
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${data.email}</p>
      <button onclick="approveMerchant('${docSnap.id}')">Approuver</button>
      <button onclick="deleteMerchant('${docSnap.id}')">Supprimer</button>
      <hr>
    `;

    merchantList.appendChild(div);

  });

}

/* ================= APPROUVER ================= */

window.approveMerchant = async function(uid){

  await updateDoc(doc(db,"users",uid),{
    approved:true
  });

  alert("Marchand approuvé !");
  loadPendingMerchants();
  loadTotals();
}

/* ================= SUPPRIMER ================= */

window.deleteMerchant = async function(uid){

  await deleteDoc(doc(db,"users",uid));

  alert("Marchand supprimé !");
  loadPendingMerchants();
  loadTotals();
}

/* ================= TOTALS ================= */

async function loadTotals(){

  const usersSnapshot = await getDocs(collection(db,"users"));
  const productsSnapshot = await getDocs(collection(db,"products"));

  let merchantCount = 0;

  usersSnapshot.forEach(docSnap=>{
    const data = docSnap.data();
    if(data.role === "merchant"){
      merchantCount++;
    }
  });

  document.getElementById("totalMerchants").innerText = merchantCount;
  document.getElementById("totalProducts").innerText = productsSnapshot.size;

}

/* ================= INIT ================= */

loadPendingMerchants();
loadTotals();

</script>

</body>
</html>

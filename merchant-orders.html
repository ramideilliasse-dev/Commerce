 <!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos | Toma</title>

<link rel="stylesheet" href="merchant-dashboard-v2.css">

<link rel="stylesheet" href="merchant-orders.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

</head>

<body>

<div class="productsPage">

<header class="productsHeader">

<div class="leftHeader">

<a href="merchant-dashboard-v2.html" class="backButton">

<span class="material-symbols-rounded">

arrow_back

</span>

</a>

<div>

<h1>Pedidos</h1>

<p>Gerencie todos os pedidos da sua loja.</p>

</div>

</div>

</header>

<section class="searchSection">

<div class="searchBox">

<span class="material-symbols-rounded">

search

</span>

<input

type="text"

id="searchOrder"

placeholder="Pesquisar pedido...">

</div>

</section>
<div class="ordersFilters">

<button class="orderChip active" data-status="all">

Todos

<span id="countAll">0</span>

</button>

<button class="orderChip" data-status="Pendente">

Pendentes

<span id="countPending">0</span>

</button>

<button class="orderChip" data-status="Confirmado">

Confirmados

<span id="countConfirmed">0</span>

</button>

<button class="orderChip" data-status="Enviado">

Enviados

<span id="countSent">0</span>

</button>

<button class="orderChip" data-status="Entregue">

Entregues

<span id="countDelivered">0</span>

</button>

<button class="orderChip" data-status="Cancelado">

Cancelados

<span id="countCanceled">0</span>

</button>

</div>
<section

id="ordersContainer"

class="ordersContainer">

<!-- Pedidos aparecerão aqui -->

</section>

</div>

<script type="module"

src="./js/merchant-orders.js">

</script>

</body>

</html>

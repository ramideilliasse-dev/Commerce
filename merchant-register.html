 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar conta vendedor</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:400px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Criar conta vendedor</h2>

<input id="shopName" placeholder="Nome da loja">

<input id="phone" placeholder="Número WhatsApp (244XXXXXXXXX)">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button onclick="register()">
Criar conta
</button>

</div>



<script type="module">

import { auth, db } from "./firebase.js"

import {
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



window.register = async function(){

const shopName=document.getElementById("shopName").value
const phone=document.getElementById("phone").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(!shopName || !phone || !email || !password){
alert("Preencha todos campos")
return
}

/* VALIDATION ANGOLA */
if(!phone.startsWith("244")){
alert("Use formato Angola: 244XXXXXXXXX")
return
}

try{

const user = await createUserWithEmailAndPassword(auth,email,password)

/* 🔥 FIRESTORE COMPATIBLE AVEC TOUT TON SYSTEME */
await setDoc(doc(db,"merchants",user.user.uid),{

name: shopName,          // utilisé dans boutique
phone: phone,            // 🔥 WhatsApp vendeur
email: email,
status: "approved",

/* BONUS FUTUR */
created: Date.now(),
deliveryPrice: 0

})

alert("Conta criada com sucesso")

/* 🔥 REDIRECTION CORRECTE */
location.href="merchant-shop.html"

}catch(e){

alert(e.message)

}

}

</script>

</body>

</html>

 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion Commerçant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Connexion / Inscription Commerçant</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button id="registerBtn">S'inscrire</button>
<button id="loginBtn">Se connecter</button>

<p id="message"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3rKXZjJqskewJM-cBvBRw8-ecJPvoeBw",
  authDomain: "angcomerce-v1.firebaseapp.com",
  projectId: "angcomerce-v1",
  storageBucket: "angcomerce-v1.firebasestorage.app",
  messagingSenderId: "238735890157",
  appId: "1:238735890157:web:db3f87960db7916d7fdee4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const message = document.getElementById("message");

/* ================= INSCRIPTION ================= */

document.getElementById("registerBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    message.innerText = "Remplis tous les champs";
    return;
  }

  try {

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔥 ÉCRIT DANS users (IMPORTANT)
    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      role: "merchant",
      approved: false,
      verified: false,
      createdAt: new Date()
    });

    message.innerText = "Compte créé ! En attente validation admin.";

  } catch(error) {
    message.innerText = error.message;
  }

});

/* ================= CONNEXION ================= */

document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      message.innerText = "Compte introuvable.";
      return;
    }

    const userData = userSnap.data();

    if(userData.role !== "merchant"){
      message.innerText = "Accès refusé.";
      return;
    }

    if(!userData.approved){
      message.innerText = "Compte en attente de validation admin.";
      return;
    }

    window.location.href = "merchant.html";

  } catch(error) {
    message.innerText = error.message;
  }

});

</script>

</body>
</html>

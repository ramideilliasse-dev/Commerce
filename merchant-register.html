 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.login{
margin-top:10px;
text-align:center;
font-size:14px;
cursor:pointer;
color:#1aa34a;
}

</style>
</head>

<body>

<div class="box">

<h2>Criar Conta Comerciante</h2>

<input id="shopName" placeholder="Nome da loja (ex: Loja Maria)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<input id="whatsapp" placeholder="WhatsApp (ex: 244923000000)">

<button onclick="register()">Criar conta</button>

<div class="login" onclick="location.href='login.html'">
Já tem conta? Entrar
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js"

import {
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


/* 🔥 REGISTER PRO */
window.register = async function(){

const shopName = document.getElementById("shopName").value.trim()
const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()
const whatsapp = document.getElementById("whatsapp").value.trim()

/* ✅ VALIDATION */
if(!shopName || !email || !password || !whatsapp){
alert("Preencha todos os campos ❌")
return
}

/* 🔥 SHOP NAME MIN */
if(shopName.length < 3){
alert("Nome da loja muito curto ❌")
return
}

/* 🔥 EMAIL VALIDATION */
if(!email.includes("@")){
alert("Email inválido ❌")
return
}

/* 🔥 PASSWORD */
if(password.length < 6){
alert("Senha deve ter no mínimo 6 caracteres ❌")
return
}

/* 🔥 WHATSAPP VALIDATION */
if(!whatsapp.startsWith("244") || whatsapp.length < 12){
alert("Número WhatsApp inválido ❌ Ex: 244923000000")
return
}

try{

/* ✅ CREATE AUTH */
const cred = await createUserWithEmailAndPassword(auth, email, password)

/* ✅ FIRESTORE USER */
await setDoc(doc(db, "users", cred.user.uid), {

email: cred.user.email,

shopName: shopName,      // 🔥 IMPORTANT (nouveau)
whatsapp: whatsapp,      // 🔥 pour commandes

createdAt: Date.now(),
approved: true,
role: "merchant",
blocked: false

})

alert("Conta comerciante criada com sucesso ✅")

/* REDIRECTION */
location.href = "merchant-dashboard.html"

}catch(e){

console.error(e)
alert("Erro: " + e.message)

}

}

</script>

</body>
</html>

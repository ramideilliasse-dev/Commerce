 <!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1aa34a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.login{
margin-top:10px;
text-align:center;
font-size:14px;
cursor:pointer;
color:#1aa34a;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>
</head>

<body>

<div class="box">

<h2>Criar Conta Comerciante</h2>

<input id="shopName" placeholder="Nome da loja (ex: Loja Maria)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<input id="whatsapp" placeholder="WhatsApp (ex: 244923000000)">

<button onclick="register()">Criar conta</button>

<div class="login" onclick="location.href='login.html'">
Já tem conta? Entrar
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js"

import {
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"


/* 🔥 REGISTER PRO */
window.register = async function(){

const shopName = document.getElementById("shopName").value.trim()
const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()
const whatsapp = document.getElementById("whatsapp").value.trim()

/* ✅ VALIDATION */
if(!shopName || !email || !password || !whatsapp){
showToast("⚠️ Preencha todos os campos","warning")
return
}

/* 🔥 SHOP NAME MIN */
if(shopName.length < 3){
showToast("⚠️ Nome da loja muito curto","warning")
return
}

/* 🔥 EMAIL VALIDATION */
if(!email.includes("@")){
showToast("❌ Email inválido","error")
return
}

/* 🔥 PASSWORD */
if(password.length < 6){
alert("Senha deve ter no mínimo 6 caracteres ❌")
return
}

/* 🔥 WHATSAPP VALIDATION */
if(!whatsapp.startsWith("244") || whatsapp.length < 12){
showToast("⚠️ Número WhatsApp inválido","warning")
return
}

try{

/* ✅ CREATE AUTH */
const cred = await createUserWithEmailAndPassword(auth, email, password)

/* ✅ FIRESTORE USER */
await setDoc(doc(db, "users", cred.user.uid), {

email: cred.user.email,

shopName: shopName,
whatsapp: whatsapp,

createdAt: Date.now(),

/* 🔥 ADMIN VALIDATION */
role: "client",
approved: false,
requestMerchant: true,
blocked: false

})

alert("Pedido enviado para validação ✅")

location.href = "settings.html"
}catch(e){

console.error(e)
alert("Erro: " + e.message)

}

}
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
</body>
</html>

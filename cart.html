 <!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Carrinho</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#ff6a00;
color:white;
padding:18px;
font-size:22px;
}

.container{
padding:20px;
}

.item{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

img{
width:80px;
border-radius:8px;
}

.total{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>Meu Carrinho</header>

<div class="container" id="cartList"></div>

<div class="container">
<div class="total" id="total"></div>
</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart")) || []

const container=document.getElementById("cartList")

let total=0

cart.forEach(p=>{

total+=p.price

container.innerHTML+=`

<div class="item">

<img src="${p.image}">

<div>

<h3>${p.name}</h3>

<p>${p.price} Kz</p>

</div>

</div>

`

})

document.getElementById("total").innerText="Total: "+total+" Kz"

</script>

</body>

</html>

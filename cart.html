 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
.header{background:#ff6a00;color:white;padding:15px;text-align:center;font-size:20px;}
.item{background:white;margin:10px;padding:10px;border-radius:10px;display:flex;gap:10px;}
.item img{width:80px;height:80px;border-radius:8px;object-fit:cover;}
.info{flex:1;}
.qty{display:flex;gap:5px;margin-top:5px;}
button{padding:5px 10px;border:none;border-radius:5px;}
.total{padding:15px;font-size:18px;font-weight:bold;}
.checkout{background:#1aa34a;color:white;padding:15px;text-align:center;margin:10px;border-radius:10px;cursor:pointer;}
</style>

</head>

<body>

<div class="header">Meu Carrinho 🛒</div>

<div id="cartList"></div>

<div class="total" id="total"></div>

<div class="checkout" onclick="checkout()">
Finalizar pedido
</div>

<script>

function loadCart(){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

let html=""
let total=0

cart.forEach((item,index)=>{

total += item.price * item.qty

html += `
<div class="item">

<img src="${item.image}">

<div class="info">

<div>${item.name}</div>
<div>${item.price} Kz</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">-</button>
<div>${item.qty}</div>
<button onclick="changeQty(${index},1)">+</button>

</div>

</div>

</div>
`
})

document.getElementById("cartList").innerHTML=html
document.getElementById("total").innerText="Total: "+total+" Kz"

}

function changeQty(index,delta){

let cart = JSON.parse(localStorage.getItem("cart"))

cart[index].qty += delta

if(cart[index].qty <=0){
cart.splice(index,1)
}

localStorage.setItem("cart",JSON.stringify(cart))

loadCart()

}

function checkout(){
alert("Paiement à venir 💰")
}

loadCart()

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:100;
}

.item{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
width:80px;
height:80px;
border-radius:8px;
object-fit:cover;
background:#eee;
}

.info{
flex:1;
}

.qty{
display:flex;
gap:5px;
margin-top:5px;
align-items:center;
}

button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.qty button{
background:#f1f1f1;
font-weight:bold;
}

.remove{
background:red;
color:white;
}

.total{
padding:15px;
font-size:18px;
font-weight:bold;
}

.checkout{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
margin:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.checkout.disabled{
background:#ccc;
cursor:not-allowed;
}

.clearCart{
background:black;
color:white;
margin:10px;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.empty{
text-align:center;
padding:30px;
color:#777;
font-size:16px;
}

.badge{
background:#ff6a00;
color:white;
padding:2px 8px;
border-radius:20px;
font-size:12px;
margin-left:5px;
}
/* ================= TOAST MODERNE ================= */

.toastBox{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.toast{
min-width:220px;
max-width:320px;
padding:14px 18px;
border-radius:14px;
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:toastIn .3s ease, toastOut .3s ease 3.7s forwards;
backdrop-filter:blur(10px);
}

.toast.success{
background:linear-gradient(135deg,#1aa34a,#23c55e);
}

.toast.error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.toast.warning{
background:linear-gradient(135deg,#ff6a00,#ff9f43);
}

@keyframes toastIn{
from{
opacity:0;
transform:translateY(-20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes toastOut{
to{
opacity:0;
transform:translateY(-20px) scale(.9);
}
}
</style>

</head>

<body>

<div class="header">
Meu Carrinho 🛒
<span id="cartBadge" class="badge">0</span>
</div>

<div id="cartList"></div>

<div class="total" id="total"></div>

<div id="checkoutBtn" class="checkout" onclick="goCheckout()">
Finalizar pedido
</div>

<div class="clearCart" onclick="clearCart()">
🗑️ Limpar carrinho
</div>

<script>

/* 🔥 SAFE CART */
function getCart(){
try{
return JSON.parse(localStorage.getItem("cart") || "[]")
}catch(e){
console.error("Erro cart:",e)
return []
}
}

/* 🔥 SAVE CART */
function saveCart(cart){
localStorage.setItem("cart",JSON.stringify(cart))
window.dispatchEvent(new Event("storage"))
}

/* 🔥 UPDATE BADGE */
function updateBadge(){
let cart = getCart()

let totalQty = cart.reduce((a,b)=>{
return a + (b.qty || 1)
},0)

document.getElementById("cartBadge").innerText = totalQty
}

/* LOAD CART */
function loadCart(){

let cart = getCart()

let html=""
let total=0

const checkoutBtn = document.getElementById("checkoutBtn")

updateBadge()

if(cart.length === 0){

document.getElementById("cartList").innerHTML = `
<div class="empty">
Seu carrinho está vazio 😢
</div>
`

document.getElementById("total").innerText=""
checkoutBtn.classList.add("disabled")
return
}

checkoutBtn.classList.remove("disabled")

cart.forEach((item,index)=>{

if(!item.qty){
item.qty = 1
}

let price = Number(item.price) || 0

let image = item.image || "https://via.placeholder.com/80"

total += price * item.qty

html += `
<div class="item">

<img loading="lazy" src="${image}">

<div class="info">

<div>
<b>${item.name || "Produto"}</b>
</div>

<div>
${price} Kz
</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">
-
</button>

<div>${item.qty}</div>

<button onclick="changeQty(${index},1)">
+
</button>

<button class="remove" onclick="removeItem(${index})">
🗑️
</button>

</div>

</div>

</div>
`
})

document.getElementById("cartList").innerHTML = html

document.getElementById("total").innerText =
"Total: " + total + " Kz"

}

/* CHANGE QTY */
function changeQty(index,delta){

let cart = getCart()

cart[index].qty = (cart[index].qty || 1) + delta

if(cart[index].qty <= 0){
cart.splice(index,1)
}

saveCart(cart)

loadCart()

}

/* REMOVE ITEM */
function removeItem(index){

let cart = getCart()

cart.splice(index,1)

saveCart(cart)

loadCart()

}

/* CLEAR CART */
function clearCart(){

if(!confirm("Limpar carrinho?")) return

localStorage.removeItem("cart")

loadCart()

}

/* GO CHECKOUT */
function goCheckout(){

let cart = getCart()

if(cart.length === 0){

showToast("⚠️ Carrinho vazio","warning")

return
}

/* VALIDATION */
let invalid = cart.filter(item => !item.merchantId)

if(invalid.length > 0){

console.error("Produtos inválidos:", invalid)

alert("Erro: alguns produtos não têm vendedor ❌")

return
}

/* NORMALIZE */
let checkoutCart = cart.map(item => ({

id: item.id || "",

name: item.name || "Produto",

price: Number(item.price) || 0,

qty: item.qty || 1,

image: item.image || "",

merchantId: String(item.merchantId)

}))

localStorage.setItem(
"checkoutCart",
JSON.stringify(checkoutCart)
)

location.href = "checkout.html"

}

/* 🔥 AUTO SYNC */
window.addEventListener("storage",()=>{
loadCart()
})

loadCart()
/* ================= TOAST ================= */

function showToast(message,type="success"){

const box = document.getElementById("toastBox")

const toast = document.createElement("div")

toast.className = "toast " + type

toast.innerText = message

box.appendChild(toast)

setTimeout(()=>{
toast.remove()
},4000)

}
</script>
<div id="toastBox" class="toastBox"></div>
</body>
</html>

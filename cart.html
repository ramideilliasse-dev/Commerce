 <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.item{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
width:80px;
height:80px;
border-radius:8px;
object-fit:cover;
background:#eee;
}

.info{flex:1;}

.qty{
display:flex;
gap:5px;
margin-top:5px;
align-items:center;
}

button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.remove{
background:red;
color:white;
}

.total{
padding:15px;
font-size:18px;
font-weight:bold;
}

.checkout{
background:#1aa34a;
color:white;
padding:15px;
text-align:center;
margin:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.checkout.disabled{
background:#ccc;
cursor:not-allowed;
}

.clearCart{
background:black;
color:white;
margin:10px;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.empty{
text-align:center;
padding:30px;
color:#777;
font-size:16px;
}
</style>

</head>

<body>

<div class="header">Meu Carrinho 🛒</div>

<div id="cartList"></div>

<div class="total" id="total"></div>

<div id="checkoutBtn" class="checkout" onclick="goCheckout()">
Finalizar pedido
</div>

<div class="clearCart" onclick="clearCart()">
🗑️ Limpar carrinho
</div>

<script>

/* LOAD CART */
function loadCart(){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

console.log("CART RAW:", cart) // 🔥 DEBUG

let html=""
let total=0

const checkoutBtn = document.getElementById("checkoutBtn")

if(cart.length === 0){

document.getElementById("cartList").innerHTML = `
<div class="empty">Seu carrinho está vazio 😢</div>
`

document.getElementById("total").innerText=""
checkoutBtn.classList.add("disabled")
return
}

checkoutBtn.classList.remove("disabled")

cart.forEach((item,index)=>{

if(!item.qty){ item.qty = 1 }

let price = Number(item.price) || 0
let image = item.image || "https://via.placeholder.com/80"

total += price * item.qty

html += `
<div class="item">
<img src="${image}">
<div class="info">
<div><b>${item.name || "Produto"}</b></div>
<div>${price} Kz</div>
<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
<div>${item.qty}</div>
<button onclick="changeQty(${index},1)">+</button>
<button class="remove" onclick="removeItem(${index})">🗑️</button>
</div>
</div>
</div>
`
})

document.getElementById("cartList").innerHTML = html
document.getElementById("total").innerText = "Total: " + total + " Kz"

}

/* CHANGE QTY */
function changeQty(index,delta){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

cart[index].qty = (cart[index].qty || 1) + delta

if(cart[index].qty <= 0){
cart.splice(index,1)
}

localStorage.setItem("cart",JSON.stringify(cart))
loadCart()

}

/* REMOVE ITEM */
function removeItem(index){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

cart.splice(index,1)

localStorage.setItem("cart",JSON.stringify(cart))
loadCart()

}

/* CLEAR CART */
function clearCart(){

if(!confirm("Limpar carrinho?")) return

localStorage.removeItem("cart")
loadCart()

}

/* GO CHECKOUT (🔥 FIX IMPORTANT) */
function goCheckout(){

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

if(cart.length === 0){
alert("Carrinho vazio ❌")
return
}

/* 🔥 VALIDATION */
let invalid = cart.filter(item => !item.merchantId)

if(invalid.length > 0){

console.error("Produtos inválidos:", invalid)

alert("Erro: alguns produtos não têm vendedor ❌\nRecarregue a página")

return
}

/* NORMALISER PRO */
let checkoutCart = cart.map(item => ({

id: item.id || "",
name: item.name || "Produto",
price: Number(item.price) || 0,
qty: item.qty || 1,
image: item.image || "",
merchantId: String(item.merchantId) // 🔥 FORCE STRING

}))

console.log("CHECKOUT CART:", checkoutCart) // 🔥 DEBUG

localStorage.setItem("checkoutCart", JSON.stringify(checkoutCart))

location.href = "checkout.html"

}

loadCart()

</script>

</body>
</html>

 <!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Meu Carrinho</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ff6a00">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:120px;
}

.header{

position:sticky;
top:0;
z-index:100;

background:linear-gradient(135deg,#ff6a00,#ff8c1a);

color:#fff;

padding:20px;

display:flex;
justify-content:center;
align-items:center;
gap:10px;

font-size:30px;
font-weight:bold;

}

.badge{

background:#fff;
color:#ff6a00;

padding:3px 10px;

border-radius:30px;

font-size:14px;

font-weight:bold;

}

#cartItems{

padding:15px;

}

.cartItem{

background:#fff;

border-radius:15px;

padding:12px;

margin-bottom:12px;

display:flex;

gap:12px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.cartImage{

width:100px;

height:100px;

object-fit:cover;

border-radius:12px;

background:#eee;

}

.cartInfo{

flex:1;

display:flex;

flex-direction:column;

justify-content:space-between;

}

.cartName{

font-size:18px;

font-weight:bold;

}

.cartPrice{

color:#ff6a00;

font-size:18px;

font-weight:bold;

margin-top:6px;

}

.cartActions{

display:flex;

align-items:center;

gap:8px;

margin-top:12px;

}

.cartQuantity button{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#ff6a00;
    color:#fff;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.2s;
}

.cartQuantity button:active{
    transform:scale(.95);
}

.cartQuantity span{
    min-width:38px;
    text-align:center;
    font-size:20px;
    font-weight:700;
}

.removeBtn{

border:none;

background:#ff3b30;

color:#fff;

padding:8px 12px;

border-radius:8px;

cursor:pointer;

}

.footer{

position:fixed;

left:0;

right:0;

bottom:0;

background:#fff;

padding:15px;

box-shadow:0 -4px 15px rgba(0,0,0,.1);

}

.total{

font-size:22px;

font-weight:bold;

margin-bottom:15px;

}

.checkoutBtn{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#18a84f;

color:#fff;

font-size:20px;

font-weight:bold;

cursor:pointer;

margin-bottom:10px;

}

.clearBtn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#000;

color:#fff;

font-size:18px;

cursor:pointer;

}
.cartQuantity{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="header">

Meu Carrinho 🛒

<span
id="bottomCartCount"
class="badge">
0
</span>

</div>

<div id="cartItems">

</div>

<div class="footer">

<div
id="cartTotal"
class="total">

0 Kz

</div>

<button
id="checkoutBtn"
class="checkoutBtn">

Finalizar pedido

</button>

<button
id="clearBtn"
class="clearBtn">

🗑️ Limpar carrinho

</button>

</div>
<script type="module">

import {
renderCart,
updateCartCount,
checkout,
clearCart
} from "./js/cart.js";

/* ==========================
DÉMARRAGE
========================== */

window.addEventListener("load",()=>{

renderCart();

updateCartCount();

});

/* ==========================
BOUTON CHECKOUT
========================== */

document
.getElementById("checkoutBtn")
.addEventListener("click",()=>{

checkout();

});

/* ==========================
VIDER PANIER
========================== */

document
.getElementById("clearBtn")
.addEventListener("click",()=>{

if(confirm("Limpar todo o carrinho?")){

clearCart();

renderCart();

}

});

/* ==========================
SYNC ENTRE PAGES
========================== */

window.addEventListener("storage",()=>{

renderCart();

updateCartCount();

});

</script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("/service-worker.js")
.catch(()=>{});

}

</script>

</body>

</html>
